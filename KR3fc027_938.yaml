body:
  text: 弧矢內股弦求勾圖圎徑與截矢求截弦歌畀相乘數也圎徑與矢求弧弦半徑自乘立一邉另以半徑减去矢餘亦自乘减却前又餘平方隅見數倍置名即是弧弦圎徑十寸弧矢减一寸問截弦若干答曰弦六寸法日置半徑五寸為弦自乘得二十五寸另以半徑五寸减矢一寸餘四寸為股自乘得一十六寸相减餘九寸平方開之得三寸為勾倍之得六寸為截弧弦即自二勾相積為弦餘皆傲此又法以圎徑自乘得一百寸為弦另以圎徑减倍矢二寸餘八寸自乘得六十四寸為股相矢得三十六寸為勻平方開置得全弦六寸
