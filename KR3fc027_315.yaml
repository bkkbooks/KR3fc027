body:
  text: 答曰八分箇之七即是八隻鴨生七箇子也法日列子母數更相减損置母七十二减去子六十三仍餘母九反將子六十三內减去六箇餘母九子亦餘九相同就以九為法除原母七十二得八箇九又以法九除原子六十三得七箇故命之曰八分之七也乘分假如今有一百九十人支銀一兩十九分兩之一問該銀若干答曰二百兩法日置銀一兩以分母十九通之加分子一共得二十又以
  hash: sha256:a035a1823a6a5edad0344ebb6acb5eb030d4672fb078beb1ec3103820c05d72b
