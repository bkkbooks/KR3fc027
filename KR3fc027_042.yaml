body:
  text: 臂若枯木雖天地之大萬物之多而唯蜩翼之知不以異物他好易慮位之窮年矻矻于數癖無類是乎碩不以時序次成書藏之名山傅之其人通都大是寧獨無以盡管蠡之見即天地之祕藏萬彚之變態將何由泄而名何以著成法于天下浚卋于是參會諸家攄以獨見畫以形象綴以訓釋列屬九章釐為一十七卷題曰旨指
