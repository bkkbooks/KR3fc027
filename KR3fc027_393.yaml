body:
  text: 答曰二百四十步計稅一畝法曰置長三十步以濶十六步乘之得四百八十步折半得積二百四十步合問假如梯田上廣二十步下廣三十步中長四十五步問積若干答曰一千一百二十五步法曰置上下二廣併之得五十步折半得二十五步以中長四十五步乘之得積合問一法併二廣以乘長折半亦得假如斜田南廣三十步北廣四十二步縱六十四步問積若干
