body:
  text: 除之得麥一百八十石却以上米麥五百石內减麥數餘三百二十石為米數各以原價乘之合問今有銀五十五兩五錢共買網鍚鐡八萬三千零五十兩只云銀價相做每銀一錢買銅一百三十兩每銀一錢買鍚一百五十兩每銀一錢買鐡一百七十兩問三色各若干此為三色差分答曰銅二萬四千七百兩價銀十九兩鍚二萬七千七百五十兩價銀一十八兩五錢鐡三萬零六百兩價銀一十八兩法日置總銀以三歸之得一十八兩五錢約鍚為中以每錢買
