body:
  text: 汝思少逰吳楚歷大澤名山老憩丘園舉平生師友之所講求咨詢之所獨淂者提網潔要縷拆支分著是編而迪來學儻其中有先進言之未偹之矣而或未精者汝思悉為闡明之汝思謂余曰大位悅孫武子兵家言而感其通于事理也曰多算勝少算不勝而況于無算乎迄今疇為隸首而吾幾其徒耶疇為
