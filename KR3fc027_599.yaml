body:
  text: 法曰置折銀七兩為實以共本銀三十二兩為法除之得二錢一分八釐七毫五絲乃是一兩折數就以乘各人原本合得各折數也合問今有三色金共二十兩內九色四兩七色七兩五色九兩欲銷一處問成色若干答曰六五成色法曰置九色四兩以九因得三兩六錢七色七兩以七因得四兩九錢五色九兩以五因得四兩五錢併三位折赤金一十二兩為實以原金二十兩為法除之合問今有一人將桃二百七十五箇一人將梨二百二十箇各
