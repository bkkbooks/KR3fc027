body:
  text: 法曰置折銀七両爲實以共本銀三十二両爲法除之得二錢一分八厘七毫五絲乃是一両折数就以乘各人原本合得各折数也合問今有三色金共二十両內九色四両七色七両五色九両欲銷一處問成色若干荅曰六五成色法曰置九色四両以九因得三両六錢七色七両以七因得四両九錢五色九両以五因得四両五錢併三位折赤金一十二両爲實以原金二十両爲法除之合問今有一人將桃二百七十五箇一人將梨二百二十箇各
