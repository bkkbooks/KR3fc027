body:
  text: 開之得九爲勾股較前倍弦實減勾股較九自乘得八十一餘三千九百六十九平方開之得六十三爲勾股和並勾弦共七十二除股自乘得一千二百九十六得十八爲勾股較卽勾弦之差十八除股自乘得一千二百九十六得七十二爲勾弦和並得股弦共八十一以除勾自乘得七百二十九得九爲股弦較卽股弦之差九除勾自乘得七百二十九得八十一爲股炫和勾股和六十三自乘得三千九百六十九減弦自乘得二千令二十五餘一千九百四十四爲實以弦較較三十六除之得五十四爲弦較和弦較和除前實得弦較較勾股之差九自乘得八十一以減弦自乘得一千令二十五餘一千九百四十四爲實以
