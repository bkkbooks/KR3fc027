body:
  text: 六除二千四百萬餘實三千八百五十萬零三千二百三十二尺以右下一十六萬尺以三乘之得四十八萬為法歸除之呼四三七十二少除呼四歸起一下還四呼六八除四十八另置初商四百尺以次商六十尺乘之得二萬四千尺以三因之得七萬二千尺為廉法加入次商六十尺自乘得三千六百尺共七萬五千六百尺却以次商六十尺相呼除之六七除四十二又五六除三十又六六除三十六餘實五百一十六萬七千二百三十二尺以方法四十八萬併入兩箇廉法七萬二千再併入隅法三箇三千六百尺共得方法六十三萬四千八百尺為法歸除之呼六五八十二呼三八除二十四又呼四八除三十二又八八除六十四右下之法不用再置所商共
