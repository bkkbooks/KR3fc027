body:
  text: 假如覆月天弦長五十六步矢濶二十八步問積步若干答曰一千一百七十六步法曰置弦五十六步併矢二十八步共八十四步折半得四十二步又以矢二十八步乘之得積一法以弦矢相乘另以矢自乘併之折半亦得假如弧矢田弦長四十步矢濶八步問積步若干答曰一百九十二步法日置弦矢相併得四十八步折半得二十四步又以矢八步乘之得積合問
