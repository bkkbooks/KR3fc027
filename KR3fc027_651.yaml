body:
  text: 答曰甲四十文乙三十七文丙三十四文丁三十一文戊二十八文巳二十五文庚二十二文法曰置二人七十七文三人七十五文令母互乘子以二人乘七十五文得一百五十以三人乘七十七文得二百三十一文以少減多餘八十一為一差之實併分母二人三人得五折半得二人半以減總七人餘四人半却以分母二人三人乘得六以乘四人半得二十七為一差之法除實八十一得三文為一差數置甲乙均七十七文加三文共八十文折半得四十文為甲得數遞減三文合問今有兵士三千四百七十四名每三人支衫絹七十尺每
