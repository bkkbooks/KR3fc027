body:
  text: 六萬五千八百八十八尺爲實以圓率三十六尺除之得積合問築墙截高問今上廣歌上下原廣数相减餘用今高数相乗原高爲法除爲積積减下廣上廣存假如原築墙上廣一尺下廣三尺高一十二尺今巳築高九尺問上廣若干荅曰一尺五寸法日將原下廣三尺减原上廣一尺餘二尺以今築高九尺乗之得一十八尺爲實以原高一丈二尺爲法除之得一尺五寸却於原下廣三尺减法一尺五寸餘得今築上廣合問
