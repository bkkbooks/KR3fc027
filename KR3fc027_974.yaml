body:
  text: 六萬五千八百八十八尺為實以圓率三十六尺除之得積合問築墻截高問今上廣歌上下原廣數相減餘用今高數相乘原高為法除為積積減下廣上廣存假如原築墻上廣一尺下廣三尺高一十二尺今巳築高九尺問上廣若干答曰一尺五寸法日將原下廣三尺減原上廣一尺餘二尺以今築高九尺乘之得一十八尺為實以原高一丈二尺為法除之得一尺五寸却於原下廣三尺減法一尺五寸餘得今築上廣合問
