  text: 是兩也順下合得兩還原用乘五八得四十二五得一十八九七十二二九一十八假如今有金二兩八錢三分五厘作四百零五人分之問每人該金若干答曰七厘法日置金為實以人數為法除之合問定位法多實少先從原實首位起往逐位逆數陛上至呼遇法首位百則止向前一位得令是兩降下合得
