body:
  text: 以又難之法也今新增歸除開立故法之易便矣倍法者加一倍是也法當用二因而位反降矣今變用五歸而位不降矣折半法者謂減去一半是也法理當用五歸而位反升矣今變用五因而位不升也定位總歌數家定位法為奇因乘俱向下位推加減只須認本位歸與歸除上位施法多原實逆上法位前得令順下冝法少原實降下數法前得令逆上知
