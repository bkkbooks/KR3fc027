body:
  text: 定位五分五五二十五本位上二右位加五下位是錢也回向前逆教逐位陞之合得二錢實尾位五疋二五得一十变五爲一二五得一十本位加一疋法首位是每疋二錢遇疋卽止下一位得術是錢也六両二二如四本位去二右位加四四五得二本位加二十實首位四五二四如八本位去四右位加八原實百起呼百往後合順數至疋得二百還原用歸法法詳後二一添作五無除起一下還一四五除二十逢四進二十二五除一十二一添作五五五除二十五假如今有豆二十八石六斗每斗價銀三分四厘五毫問
