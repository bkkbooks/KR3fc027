body:
  text: 高十尺得木高四十尺合問解曰木高如股是上節三十尺表高十尺減人目四尺餘六尺是餘股木至表末加勾二十五尺表後推行五尺是餘勾木頂斜至表末如弦表末斜至人目是餘弦弦之內外分二段勾股其勾中容橫股中容直二積皆同各一百五十尺以餘勾五尺除橫積一百五十得積外之股木上三十尺加表高十尺卽木高
