body:
  text: 毎根長一丈五尺除之得六根爲法乗實得八千四百六十又以深七尺五寸加之或用十七五乗亦可合問今有方捆深七尺濶五丈長六尺問木若干荅曰八千四百根法曰置深七尺倍作一十四根又以濶五丈亦倍作一百根相乘得一千四百根爲實另置長六丈以一丈五尺除之得四根爲法乘實得五千六百根又以濶五丈加之合問今有荒排深二丈一尺濶四丈四尺長六尺問木若干荅曰八千三百七十七根六分法曰置深二丈一尺以三歸得七尺倍作一十四根又以濶四丈四尺倍
