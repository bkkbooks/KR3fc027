body:
  text: 逢三進一十法三人實三兩歸日逢三進一于前位每人各得一兩三人共得三兩以合原數四歸四人為法一兩為實二十二法實相呼將一兩添一變作每人二錢四人共除八錢餘二錢歸日二十二二錢又用後歸四二添作五每人又得五分也四人為法二兩為實添作五法實相呼將二兩添三變作每人五錢四人四五得二兩合原四人為法三兩為實七十二法實相呼將三兩添四變作每人七錢四人四七共除二兩八錢餘二錢歸日七十二二錢又用前四二源作五法每人又得五分是也逢四進一十法四人實四兩歸日逢四進一于前位每人各得一兩四人共得四兩以合原數五歸五人為法一兩為實倍作二法實相呼將一兩添一變作每人二錢五人二五得一兩合原五人為法二兩為實倍作四法實相呼將二兩添二變作每人四錢五人四五得二兩合原五人為法三兩為實倍作六法實相呼將三兩添三變作每人大錢五人五六得三兩合原
