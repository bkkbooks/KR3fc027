body:
  text: 逢三進一十法三人實三両歸日逢三進一于前位每人各得一両三人共得三両以合原数四歸四人爲法一兩爲實二十二法實相呼將一両添一变作每人二錢四人共除八錢餘二錢歸日二十二二錢又用後歸四二添作五每人又得五分也四人爲法二兩爲實添作五法實相呼將二両添三变作每人五錢四人四五得二両合原四人爲法三両爲實七十二法實相呼將三両添四变作每人七錢四人四七共除二両八錢餘二錢歸日七十二二錢又用前四二源作五法每人又得五分是也逢四進一十法四人實四両歸日逢四進一于前位每人各得一両四人共得四両以合原数五歸五人爲法一両爲實倍作二法實相呼將一両添一变作每人二錢五人二五得一両合原五人爲法二兩爲實倍作四法實相呼將二両添二变作每人四錢五人四五得二両合原五人爲法三兩爲實倍作六法實相呼將三両添三变作每人大錢五人五六得三両合原
