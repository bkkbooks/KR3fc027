body:
  text: 左上馬四匹爲法次乘右中牛五乘得一十五下價一百六十二両五錢得四百八十七両五錢先以右行馬三爲法逼乘左行中牛五得一十五又以法乘左行下價一百六十二両五錢得四百八十七両五錢却以左行馬四爲法復遍乘右行中牛二得八減左行乘得牛十五餘七爲法又以左上馬四乘右下價一百一十四両得四百五十六両減左行乘價四百八十七両五錢餘三十一両五錢爲實以法七除之得牛匹價四両五錢却以右行中牛二乘之得九両以減右行下價一百一十四両餘一百令五両爲實以右行馬三爲法除之得馬一匹價三十五両合問今有綾三尺共價四錢八分又綾七尺絹二尺共價六錢八分問綾絹各價若干
  hash: sha256:babc175ccb9d680186b0164864feeb6a78b31c5799cc85608d3476e97f717d2b
