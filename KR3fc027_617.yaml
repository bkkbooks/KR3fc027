body:
  text: 答曰上等戶二千四百兩下等戶六百兩法日置總金列二位為實一位以八因得上等戶所納之數一位以二因之得下等戶所納之數若令三等人戶作二八出之法日置總金為實列丙二乙八甲三十二三共併得四十二衰為法除實得若干為一衰之數以為法則以二衰因得若干為丙出金之數又以八衰因得若干為乙出金之數又以三十二衰乘之得若干為甲出金之數合問若令四等人戶二八出納只加上第四衰一百二十八四共併
