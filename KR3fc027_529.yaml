body:
  text: 法曰置長一丈五尺以濶一丈二尺乘之得一百八十尺又以高六尺五寸乘之得一千一百七十尺又以每尺四十斤乘之得盬重四萬六千八百斤為實以每引三百斤為法除之得一百五十六引若問包以包數除之衡法斤稱歌斤如求兩身加六減六留身兩見斤論銖三百八十四六十四分為一斤二十四銖為一兩三十二兩一裏名一稱斤諛一千五二稱併之為一鈞四鈞之數為一石又名一馱實為真
  hash: sha256:87b505e250ff93716d2f1d1e2f24c83fa7151c42054dfab670fffebd6a0c72b6
