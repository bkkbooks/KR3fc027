body:
  text: 法曰置長一丈五尺以濶一丈二尺乘之得一百八十尺又以高六尺五寸乘之得一千一百七十尺又以毎尺四十斤乘之得盬重四萬六千八百斤爲實以毎引三百斤爲法除之得一百五十六引若問包以包数除之衡法斤秤歌斤如求兩身加六減六畱身両見斤論銖三百八十四六十四分爲一斤二十四銖爲一両三十二両一裏名一秤斤諛一千五二秤併之爲一鈞四鈞之数爲一石又名一馱實爲真
  hash: sha256:6f548a95eb4340b101ec65c0d42cccfe90c06d773c4d535af13fd52116f576c3
