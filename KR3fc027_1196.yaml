body:
  text: 荅曰門二扇廣九尺九寸法曰置去閾十寸爲勾自乘得一百寸以不合二寸折半得一寸爲股較自乘得一寸以減一百寸餘九十九寸爲實以較一寸倍作二寸爲法除之得一扇門廣四尺九寸五分如股倍之得二扇門廣九尺九寸合問今有墻高一丈斜倚二木於上木杪與墻頭齊其木根抵地卻將木一根平臥於地其木杪抵墻腳此木根則過斜木根一尺問木長併去墻若干
