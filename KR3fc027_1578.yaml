body:
  text: 以通寸一萬六千三百八十四寸以二因之得三萬二千七百六十八寸爲實另以三因二千一百八十七得六千五百六十一爲法除之得四寸六千五百六十一分寸之六千五百二十四隔八下生無射無射属陽律長四寸六千五百六十一分寸之六千五百二十四却以分母通四寸加分子共得三萬二千七百六十八寸以空圍九分因之得二百九十四萬九千一百二十分却以分母六千五百六十一分爲法除之不盡三千二百三十一分以法命之得積四百四十九分六千五百六十一分寸之三千二百三十一其候霜降却以通寸三万二千七百六十八寸以四因之得一十三萬一千令七十二寸另以三因分母六千五百六十一得一万九千六百八十三爲法除之得六寸一萬九千六百八十三寸之一萬二千九百七十四隔八上生仲
