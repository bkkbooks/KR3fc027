body:
  text: 倍商四百之次皆與上商四相呼四四除一萬六千又呼四四除一千六百恰盡駐馬聽不比尋常欲造金毬内外无要求高徑尺寸今有金積耀眼睛黄百二十一五分詳立圓高許如等杖折半曾量折半曾量金實虛積無偏向荅曰立圓徑高六寸法日置金積一百二十一寸五分以十六乘得一千九百四十四寸以九歸之得二百一十六寸爲實以開立方法除之初商六寸自乘再乘得二百一十六寸除實恰尽得徑合問
