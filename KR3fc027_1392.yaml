body:
  text: 船粮均載歌今歲都要納秋粮雇船搬載去上倉五萬七千六百石河中漏濕一船粮每船負帶一石去船仍剩得一石粮秋粮納米巳有数不知原用幾船裝解題問總粮用船及每隻裝数相同各該若干荅曰船二百四十隻每隻裝二百四十石法日置米爲實以開平方法除之初商二百于左亦置二百于右左右相呼二二除四萬石餘實一萬七千六百另以右商二百倍作四百次商四十于左初商之次亦置四十于右
