body:
  text: 只記得七錢七買六斤腳錢便使用三分總記用牙錢四錠是六分中取二分問先生服買數分明荅曰人參四萬三千五百斤原銀六千両牙錢二百両脚錢二百一十七両五錢解曰毎人參六一價七錢七分又用脚錢三分牙錢六分中取二分共牙錢四錠計二百両乃是六十分中取二分也法曰置牙錢四錠以錠率五十両乗之得二百両以六十分取二分該得原銀六千両减牙錢二百両餘剩五千八百両以置參六斤因之得三萬四千八百斤爲實卻以價七錢七分併脚錢三分共八錢爲法
