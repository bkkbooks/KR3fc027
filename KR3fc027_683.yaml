body:
  text: 差分貴賤法尤精高價先乘共物情却用都錢減今數餘留為實甚分明别將二價也相減用此餘錢為法行除了先為低物價自餘高價物方成今有米麥五百石共價銀四百零五兩七錢只云米每石價八錢六五麥每石價七錢二分五釐問米麥各若开答曰米三百二十石價銀二百七十五兩二錢麥一百八十石價銀一百三十兩零五錢法曰置米麥五百石以米價八錢六分乘之得四百三十商減去共價餘二十四兩三錢為實以米價內減麥價餘一錢三分五釐為法
  hash: sha256:aef1871e58557a2e4ba82cdcec0399bd0f05d55d16a9cf033ba4a1b66381930c
