body:
  text: 愚按前賢畆法率二百四十歩爲一畆萬曆九年遵詺淸丈敝邑總書擅變畆法田分四等上則一百九十歩中則二百二十歩下則二百六十歩下下則三百歩地亦四等上則二百歩中則二百五十歩下則三百五十歩下下則五百歩在城基地有等正之名一等正三十歩二等正四十歩三等正五十歩四等正六十歩與前賢二百四十歩一畆大相繆戾借日土田有肥磽徵役有輕重亦冝就土田高下别米麥之多寡不得輕變畆法第總書開其弊實舉邑業巳遵行何容置喙姑記之此以見作聰明亂舊章之自云
  hash: sha256:ed77d8a9bfda8b2faacc9d4b539691155f3cf219d1e3ff3a6322cfdd20de00fd
