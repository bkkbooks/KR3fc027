body:
  text: 答曰八寸九分三釐有奇雞盡法曰置銀一萬兩為實以銀率每寸一十四兩為法除之得七百一十四寸二分八釐又為實以開立方法除之初商八寸于左亦置八寸于又為下法自乘得六十四寸再乘得五百一十二寸除實訖餘實二百令二寸二分八釐却以三乘下法八寸得二十四寸為方法次商九分于初商八寸之亦置九分于右初商八寸之次共八寸九分就以九分遍乘得八寸令一為廉法再以方法二十四寸乘廉法得一百九十二寸二分四釐除實訖餘實十寸令令四釐却以次商九分自乘再乘得七寸二分九釐除實訖餘實不盡二分七釐五毫
