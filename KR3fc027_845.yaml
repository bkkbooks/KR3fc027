body:
  text: 乘再乘併入不盡數周以四十八除徑以九因十六除之見積若問周問徑遇有餘積不盡者依開立方下命之今有積六萬二千二百零八尺欲為立圎問徑若干答曰徑四十八尺法曰置積尺數以十六乘之又用九歸之得一十萬令五百九十二尺為實以開立方法除之初商四十自乘得一千六百再乘得六萬四千除實餘實四萬六千五百九十二尺另將初商四十以三因得一百二十為方法列位次商八尺于初商之次得四十八尺就以八乘之得三百八十四尺為廉法以方乘廉得四萬六千令八十
