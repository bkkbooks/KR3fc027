body:
  text: 乘再乘併入不盡数周以四十八除徑以九因十六除之見積若問周問徑遇有餘積不盡者依開立方下命之今有積六萬二千二百零八尺欲爲立圎問徑若干荅曰徑四十八尺法曰置積尺数以十六乘之又用九歸之得一十萬令五百九十二尺爲實以開立方法除之初商四十自乘得一千六百再乘得六萬四千除實餘實四萬六千五百九十二尺另將初商四十以三因得一百二十爲方法列位次商八尺于初商之次得四十八尺就以八乘之得三百八十四尺爲廉法以方乘廉得四萬六千令八十
