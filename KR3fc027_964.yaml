body:
  text: 法日併上下廣折半得四十七尺以深一十二尺乗之得五百六十四尺又以長乗之得積四百二十五万八千二百尺爲實以每工三百尺爲法除之卽得今有穿渠上廣二丈四尺下廣二丈一尺深九尺長三千八百四十尺每用人夫一十二名日開積六百尺問該人夫若干荅曰一萬五千五百五十二名法日併両廣共得四十五尺折半得二十二尺五寸以深九尺乗之得二百令二尺五寸又以長乗之得七十七万七千六百尺爲積又以人夫一十二名乗之得九百三十三万一千二百尺爲實却以六百尺爲法除之
  hash: sha256:a669d6f989c0a22aee42586d57227ea32bbba6895828a6a4220913ff6ce60c39
