body:
  text: 法日併上下廣折半得四十七尺以深一十二尺乘之得五百六十四尺又以長乘之得積四百二十五万八千二百尺為實以每工三百尺為法除之即得今有穿渠上廣二丈四尺下廣二丈一尺深九尺長三千八百四十尺每用人夫一十二名日開積六百尺問該人夫若干答曰一萬五千五百五十二名法日併兩廣共得四十五尺折半得二十二尺五寸以深九尺乘之得二百令二尺五寸又以長乘之得七十七万七千六百尺為積又以人夫一十二名乘之得九百三十三万一千二百尺為實却以六百尺為法除之
  hash: sha256:0125666edca66a98dba555cf47994575818e34fe6e3c5f37a47e0a803fa6b02e
