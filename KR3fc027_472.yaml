body:
  text: 答曰二十三步六分步之五法日置廣五步以分母二通之加分子一共十一另置縱八步以分母三通之加分子二共二十六與廣一十相乘得二百八十六折半得一百四十三為實以分母二分三分相乘得六分為法除之得二十三步餘實五以法命之得六分之五今有圓田徑六步十三分步之十二周圍二十步四十一分步之三十二問該積若干答曰三十六步法日徑求積置徑六步以分母十三通之加分子十二共九十自乘得八十一百又以分母十三减分子十二餘一以乘分
