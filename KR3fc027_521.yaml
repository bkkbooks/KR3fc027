body:
  text: 答曰五十六石一斗六升法曰以南頭腰廣倍之併人靣廣底廣共二十四尺以四除之得六尺另以北頭腰廣倍之併人靣廣底廣共二十八尺以四除之得七尺併二數共一十三尺折半得六尺五寸以深二尺四寸乘得一十五尺六寸以長乘得一百四十尺零四寸為實以斛法除之合問今有蘆席二領長濶相同先以席一領作囤較之盛米二石五斗問席二領為一囤盛米若干答曰盛米十石法曰置席二領自乘得四領為實以較囤米二石五斗為法乘之
  hash: sha256:ec8ef074fe162829a587c67217696bf5879983628d1d8395a53b4509d4951cd6
