body:
  text: 四七加二十八千位加二下位加八按因乘加三法其名雖殊而理則一但加法須記實位不動本身學者冝當詳審不致差誤也减法凡歸除過法首位有一數者用此所謂定身除者先定本身之位而後减除也置所有物為實以所求價為法與身數相呼九九之數言十就身言如隔位次第如法减而除之先從實首位起用加法還原定位法因實位本身减去而無逢進比歸除而降一位今將法首一數除而不用亦可以抵逢進升位也
