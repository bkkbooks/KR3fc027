body:
  text: 除實得九兩二錢為四子所得數自下而上各加九兩二錢合問今有金八兩一錢欲挨次造套鍾五箇問各重若干答曰大號二兩七錢二號二兩一錢六分三號一兩六錢二分四號一兩零八分五號五錢四分法曰置金為實以五四三二一副併得一十五衰為法除實得五錢四分為五號鍾重數自下而上各加五錢四分合問若造禮樂射御書數六號杯置總金為實以六五四三二一副併得二十一衰為法除實得數字杯重若干自下而上各加數字號杯重若干合問
