body:
  text: 今有圎田徑二十六歩今從旁截一弧矢積一百二十八歩問截弦矢各若干荅曰矢八歩弦二十四歩法日倍積自乘得六萬五千五百三十六歩爲實另以四因積得五百一十二歩爲上廉又以四因徑得一百令四歩爲下廉以五爲負隅法商得八於左上爲法以乘上廉得四千令九十六歩又以商八乘隅五得四十以臧下廉餘六十四歩另以商八歩自乘得六十四歩以乘餘下廉得四千令九十六歩併上廉共八千一百九十二歩爲下法除實得矢八歩若問求弦法日置積倍之得二百五十六歩以矢八除之得三十二於內减矢八歩餘下得弦二十四歩合問
  hash: sha256:2497ef2fad081d104ca56a02322a280f25c6577d6f656709925eb76aeb9e9708
