body:
  text: 今有圎田徑二十六步今從旁截一弧矢積一百二十八步問截弦矢各若干答曰矢八步弦二十四步法日倍積自乘得六萬五千五百三十六步為實另以四因積得五百一十二步為上廉又以四因徑得一百令四步為下廉以五為負隅法商得八於左上為法以乘上廉得四千令九十六步又以商八乘隅五得四十以臧下廉餘六十四步另以商八步自乘得六十四步以乘餘下廉得四千令九十六步併上廉共八千一百九十二步為下法除實得矢八步若問求弦法日置積倍之得二百五十六步以矢八除之得三十二於內减矢八步餘下得弦二十四步合問
  hash: sha256:0eba52c77cef072e3d4198f527031b9b9826081e8bc560799066f9dcbedb0b04
