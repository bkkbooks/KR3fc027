body:
  text: 法曰置鐵七十九斤加六併入零兩錢共一千二百七十四兩九錢三分一釐為實另以七斤自乘得四十九再乘得三百四十三為法除實得三百七十一兩七錢以斤法除之得二百三十二斤三一二五邦將三一二五加六為五兩合問今有煉礦為銀初次入爐每三兩煉得二兩第二次入爐每七兩煉得五兩第三次入爐每五兩煉得四兩凡三次入爐煉到足色銀一十六兩問原礦若干答曰四十二兩法曰以每次煉得二兩五兩四兩相乘得四十兩為法另以入爐三兩七兩五兩相乘得一百五兩以乘一十六兩得一千六百八十兩為實
