body:
  text: 九歸歸除法者單位者曰歸位數多者曰歸除通而言之日歸除置所出率為實以所求率為法皆從實首位而起以法之首位用歸以次之位皆用除之故日歸除歸者呼九歸之歌除者呼九字相生之數次第除之降積謂之除其數雖降而位反升矣須詳定位訣而求之以法為母以實為子實為法而一法實相反失之千里必須用心詳玩直指定位法實訣于後或有畸零之不盡者設有約分之法而命之商除法者商量法實多寡而除之古法未有歸除故用之不如歸除最是捷徑之法也然開方法用之
  hash: sha256:1996a0525fad78c8b85da9f54c72d0e67729ed9a89c7a9fc423a05c03861afce
