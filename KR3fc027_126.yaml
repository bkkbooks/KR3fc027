body:
  text: 九歸歸除法者單位者曰歸位數多者曰歸除通而言之日歸除置所出率爲實以所求率爲法皆從實首位而起以法之首位用歸以次之位皆用除之故日歸除歸者呼九歸之歌除者呼九字相生之數次第除之降積謂之除其数雖降而位反陞矣須詳定位訣而求之以法爲母以實爲子實爲法而一法實相反失之千里必須用心詳玩直指定位法實訣于後或有畸零之不盡者設有約分之法而命之商除法者商量法實多寡而除之古法未有歸除故用之不如歸除最是捷徑之法也然開方法用之
  hash: sha256:9c8c107175e47d22732fa4955f6b51c5fe87672a5109e3115902c9ea9a73308f
