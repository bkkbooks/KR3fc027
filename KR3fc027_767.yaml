body:
  text: 除之得長濶相和九十二步加入差二十八共一百二十步折半得長六十步內减相差二十八步餘得濶三十二步合問又法名帶縱開平方置田積一千九百二十步為實以相差二十八步為帶縱列于右上商三十于左右位亦置三十加于縱上共得五十八步皆與上商三十相呼三五除實一千五百又呼三八除實二百四十餘實一百八十另以下法初商三十倍之得六十加差二十八共得八十八步次商二于左三十之次下法亦置二于倍方之次共九十步皆與次商二相呼二九除實一百八十恰盡得濶三十二步加差二十八步得長六十步合問如勾股田積長濶相差問答倍積用法同前
