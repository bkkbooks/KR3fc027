body:
  text: 除之得長濶相和九十二歩加入差二十八共一百二十歩折半得長六十歩内减相差二十八歩餘得濶三十二歩合問又法名带縱開平方置田積一千九百二十歩爲實以相差二十八歩爲带縱列于右上商三十于左右位亦置三十加于縱上共得五十八歩皆與上商三十相呼三五除實一千五百又呼三八除實二百四十餘實一百八十另以下法初商三十倍之得六十加差二十八共得八十八歩次商二于左三十之次下法亦置二于倍方之次共九十歩皆與次商二相呼二九除實一百八十恰盡得濶三十二歩加差二十八歩得長六十歩合問如勾股田積長濶相差問荅倍積用法同前
