body:
  text: 面方八根却減去一根得七根以四因得外周二十八根若前方箭積八十一根乃是單層者若只以方箭為實以開平方法除之得一面方九根却減去一根得八根以四因得外周三十二根亦得面方八數為雙乃八八六十四也九數為單乃九九八十一也此法不論雙層單層皆可用捷徑無差演段根源開方圖解夫算之術入則諸問出則直田蓋直田能致諸用而有此説故立演段蓋欲演算之片段也知片段則能窮根源既知根源而心無滕昧矣今摘數問詳誅圎解以明後學其餘自可引而伸之不待盡述
  hash: sha256:92a22800251d7b47c20fc8da3ea995234d93ca05db8b7a4b6162195d3598c237
