body:
  text: 法曰列所問數以一行三行爲奇二行四行爲偶一瓜二梨四空空價四分二空梨二桃七空價四分三空空桃四榗七價三分四瓜一空負四空榗八得幹六價二分四厘得四分八厘先以一行瓜二爲法遍乘日行梨空負四桃空榗八得一十六價二分四厘得四分八厘卻以四行瓜一遍乘一行梨四得四第四行梨空無減桃空價四分得四分與四行四分八厘對減餘八厘次以二行梨二遍乘四行梨負四得八桃空榗十六得三十二價八厘得一分六厘卻以四行梨負四遍乘二行梨二
