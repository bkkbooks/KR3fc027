body:
  text: 四人支裙絹五十尺問該總絹若干答曰共絹一十二萬四千四百八十五尺衫絹八萬一千零六十尺裙絹四萬三千四百二十五尺法曰置三人七十尺四人五十尺以三人互乘五十得一百五十以四人互乘七十得二百八十併之共四百三十乘兵士得一百四十九萬三千八百二十為實又以三四相乘得十二為法除實得總絹數置兵士總以七因三歸得衫絹數以五因四歸得裙絹數合問互和減半差分
