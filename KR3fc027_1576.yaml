body:
  text: 夷則属陽律長五寸七百二十九分寸之四百五十一却以分母通五寸加分子共得四千令九十六寸以空圍九分因之得三十六萬八千六百四十分爲實以七百二十九爲法除之不尽四百一十四分法實皆九約之得積五百八十一分寸之四十六其候處暑却以通寸四千令九十六以四因之得一万六千三百八十四寸另以三因七百二十九得二千一百八十七爲法除之得七寸二千一百八十七分寸之一千令七十五隔八上生夾鍾夾鍾属陰律長七寸二千一百八十七分寸之一千令七十五却以分母通七寸加分子共得一萬六千三百八十四寸以空圍九分因之得一百四十七万四千五百六十分以分母二千一百八十七除之不尽五百二十二分法實皆九約之得積六百七十四分二百四十三分寸之五十八其候春分却
