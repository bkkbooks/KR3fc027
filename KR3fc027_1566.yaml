body:
  text: 律吕相生圖律吕相生歌律吕相生識者稀黃鍾九寸是根基隔八生陰三損一隂律生陽益一奇黃林大簇皆全寸餘者通之更不疑俱用九分乘見積四時氣候配攸宜黃鐘大簇姑洗蕤賔夷則無射爲陽大吕夾鐘仲吕林鍾南吕應鍾爲隂陽吕生隂二分損一隂律生陽三分益一二因三除爲損四因三歸爲益律吕之中惟黃鍾林鍾大簇之律皆得全寸餘者皆有零不尽之数以法通之
