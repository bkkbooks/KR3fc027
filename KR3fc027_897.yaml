body:
  text: 邉勾濶若干答曰截北勾濶七步直截勾股法日直截積三十一步五分倍置得六十三步以西股長九步為法除之得截北勾濶七步合問今有直田積一千九百二十步只云長六十步問濶若干答曰濶三十二步法日置積一千九百二十步為實以長六十步為法除之得濶若是只云濶三十二步問長若干就以濶為法除之得長今有圭田積二百二十五步只云長三十步問濶若干答曰濶一十五步
