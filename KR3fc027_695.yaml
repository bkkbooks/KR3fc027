body:
  text: 十一文乘之二數相减餘一萬四十五為實仍以長法四十一除之得二百四十五為短法列二位一位以七箇乘得梨數一位以四文乘得梨價合問求桃者求梨者以梨人價求之以桃價求之今有半羊一百隻共價一百六十八兩只云中三隻價銀一十二兩羊四隻價銀一兩五錢問半羊併價各若干答曰半三十六隻價銀一百四十四兩半六十四隻價銀二十四兩法日列置半三十二兩羊箇一兩五錢共一百隻共一百六十八一兩先以上半貴價一十二兩互乘賤物羊四隻得四十八兩又以貴物半三互乘賤物羊價一兩五錢得四兩五錢以减四十八兩餘
