body:
  text: 一十五步加一步共一十六步以减前實六十步七分五厘餘四十四步七分五厘合問位因傑辨吳氏之非故立圓考校前法每一步自方五尺橫直相乘得積二十五尺乃是本身連根其理甚明假如錢內方周每靣三步四圍共合為十二得積九步無差據傑用方束之法反正為邪不免有差殊不知束積皆是論箇論隻之物無零宜當除根不辨明矣束法具載第六卷少廣章賓渠子歌曰
  hash: sha256:8fa2a531afa56973c74ad7cefb8d80b2706424604f525c03081298a08aba5dc9
