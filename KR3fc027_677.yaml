body:
  text: 七兩七錢為馬價合問今有銀二千九百二十八兩共買綾一百五十匹羅三百匹絹四百五十匹只云綾匹價比羅匹價多四錢七分羅匹價比絹匹價多一兩三錢五分問三物匹價若干答曰綾價每匹四兩三錢二分羅價每匹三兩八錢五分絹價每匹二兩五錢法曰列羅三百匹以多絹價一兩三錢五分乘得四百零五兩又列綾一百五十匹以二項多價共一面八錢二分乘得二百七十三兩併之得六百七十八兩減總銀餘二千二百五十兩為實併綾羅絹共九百
