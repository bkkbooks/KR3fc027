body:
  text: 方法三百乘廉得七十二萬除實訖餘實二十三萬三千一百二十五尺却以次商二十自乘再乘得八千為隅法除實訖餘實二十二萬五千一百二十五另以三乘下法一百二十得三百六十又為方法列位再商五千左初次商一百二十之下共一百二十五就以五乘之得六百二十五又為廉法再以方法三百六十乘廉法六百二十五得二十二萬五千餘實訖再以再商五自乘再乘得一百二十五又為隅法餘實盡合問今有積四千一百五十尺問立方面若干答曰立方靣一十六尺八百一十七之五十四法曰置積為實初商一十自乘再乘得一千尺除實訖餘
