body:
  text: 帶分母用約分者今有直田廣二步二十分步之九縱九十七步四十九分步之四十七問該積若干答曰一畝法曰置廣二步以分母二十乘之得四十加分子九共四十九另以縱九十七步以分母四十九乘之加分子四十七共四千八百以乘廣四十九得二十三萬五千二百為實又以分母二十乘四十九得九百八十為法除之得二百四十步以畝法除之合問今有圭田廣五步二分步之一縱八步三分步之二問該積若干
  hash: sha256:e17fd843ac30b7cc6a73c7de876b495a04a624e361eb2f50b7e99fdfabddc322
