body:
  text: 自乘得四百步併入三百二十九步共得七百二十九步為實以開平方法除之得截濶二十七步就以截濶二十七步併小頭原濶二十步其四十七步折半得二十三步五分為法以除截積八百二十二步五分得截長三十五步合問今有梯田長九十步小頭濶二十步大頭濶三十八步今自大頭截積一千七百八十七步五分問截長濶各若干答曰截下長五十五步截中濶二十七步法日置截積倍之得三千五百七十五步以大小二濶相减餘一十八步為濶差以乘倍積得六万四千三百五十步以原長九十
