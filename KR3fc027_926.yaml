body:
  text: 自乘得四百歩併入三百二十九歩共得七百二十九歩爲實以開平方法除之得截濶二十七歩就以截濶二十七歩併小頭原濶二十歩其四十七歩折半得二十三歩五分爲法以除截積八百二十二歩五分得截長三十五歩合問今有梯田長九十歩小頭濶二十歩大頭濶三十八歩今自大頭截積一千七百八十七歩五分問截長濶各若干荅曰截下長五十五歩截中濶二十七歩法日置截積倍之得三千五百七十五歩以大小二濶相减餘一十八歩爲濶差以乘倍積得六万四千三百五十歩以原長九十
