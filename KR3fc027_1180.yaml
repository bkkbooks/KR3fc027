body:
  text: 法曰置弦四十五尺自乘得二千令二十五尺內有一勾一股自乘之幾另以股自乘得一千二百九十六尺二數相減餘七百二十九尺是勾自乘數以開平方法除之初商二十於左亦置二十於右爲方法左二對右二呼二二除實四百餘實三百二十九尺卻以下位初商十二倍作四十爲廉法次商七尺於左初商二十之次亦置七尺於右廉法四十之次爲隅法左七對右四呼四七除實二百八十又左七對右七呼七七除實四十九恰盡得勾濶二十七尺合問勾股容方容圓共歌勾股容方法最良以勾乘股實相當併之勾股數爲法以法除實便知方
  hash: sha256:98d1184e6697d64a647e04f33a1a84dd80510257ddf337c8dbf71c538a2b918b
