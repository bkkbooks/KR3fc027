body:
  text: 零堪可乙得甲錢中半亦然二百無那英賢筭得的無訛將甚法兒方可荅曰甲錢一百六十文乙錢一百二十文法曰解所問数甲二八一百六十乙三四一百二十故甲二分之一乙三分之一湊錢二百于乙錢二百于甲先以二分互乘二百得四百次以三分互乘二百得六百以少减多餘二百爲實以甲二分乙三分併之得五分爲法除之得四十以乙三乘之得乙該錢一百二十文以减原錢二百餘八十以甲二分乘之得甲該錢一百六十文合問又解曰甲借一半湊乙乃八十併之爲二百也乙借四十湊甲亦是二百数也難題勾股九
  hash: sha256:53a7d7c35837efd6d9397fcfe17256756067620a61d33fc6c08ffd147803b055
