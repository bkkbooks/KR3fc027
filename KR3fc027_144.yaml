body:
  text: 但用因乗法實後定位故云乗法雖陞而位反降矣但用歸除法實前定位故云除法雖降而位反陞矣定法實訣訣日凢因乗不必拘于法實或以法乗實或以實乗法皆可也惟歸除不可類倒錯亂詳理而用之歸除法實假如有銀若干買某物若干或幾人分或幾人出以銀物爲實以人分爲法有銀若干買貨若干問銀每両該貨若干以貨爲實以銀爲法
