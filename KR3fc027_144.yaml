body:
  text: 但用因乘法實後定位故云乘法雖升而位反降矣但用歸除法實前定位故云除法雖降而位反升矣定法實訣訣日凡因乘不必拘于法實或以法乘實或以實乘法皆可也惟歸除不可類倒錯亂詳理而用之歸除法實假如有銀若干買某物若干或幾人分或幾人出以銀物為實以人分為法有銀若干買貨若干問銀每兩該貨若干以貨為實以銀為法
