body:
  text: 遙望木竿歌望木須知立表竿表離木處幾多寬退行表後參眸望望表斜平木與竿表數減除人目數餘表乘遠實相看退行之數爲法則法實相除加一竿假有木不知高從木腳量遠二十五尺立一丈表竿表後退行五尺用窺穴望表與木斜平其人窺穴高四尺問木高若干荅曰木高四尺法曰以表高十尺減去人目穴四尺餘六尺以乘表竿去木遠二十五尺得一百五十尺爲實以推行五尺爲法除之得三十尺加表
