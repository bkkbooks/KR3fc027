body:
  text: 荅曰七十歩法日置中長一十七歩五分以廣八歩折半得四歩乘之得積合問或量內外灣併之折半另以半徑乗之亦得假如攬形中長四十歩濶一十六歩問積若干荅曰三百八十四歩法曰置長四十歩如弧弦以半濶八歩如矢併得四十八歩折半得二十四歩又以矢八歩乘之得一百九十二歩卽一弧矢之積倍之是攬得積合問假如三廣田南廣二十六歩北廣五十四歩中廣一十八
