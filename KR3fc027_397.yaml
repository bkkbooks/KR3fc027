body:
  text: 答曰七十步法日置中長一十七步五分以廣八步折半得四步乘之得積合問或量內外灣併之折半另以半徑乘之亦得假如攬形中長四十步濶一十六步問積若干答曰三百八十四步法曰置長四十步如弧弦以半濶八步如矢併得四十八步折半得二十四步又以矢八步乘之得一百九十二步即一弧矢之積倍之是攬得積合問假如三廣田南廣二十六步北廣五十四步中廣一十八
