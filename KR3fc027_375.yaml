body:
  text: 前圖下段坐車三式總合于一以爲完成車樣于上外套似無葢底墨匣兩旁木比十字木空長存作兩頭橫木插角合栒內空僅容十字轉動下横木鑿一匾眼後高前底出篾上可釘環下釘鐟脚十字中心如墨斗㯒轉之心作曲尺様三折裝在十字中心内者方而不動外者俱圓活動以便收放卽似紡車之形套匣上頭橫木之下鑿一眼其十字四頭各開一口但遇一頭湊着匣眼用拴拴之置鎖其篾擇嫩竹竹節平直者接頭處用銅絲札住篾上逐寸寫字每寸爲二厘二寸爲四三寸爲六四寸爲八不必厘字五寸爲一分自一分至
