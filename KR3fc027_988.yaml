  text: 答曰二十四尺法日置原下周七十二尺內减今用上周一十八尺餘五十四尺以原高三十二尺乘之得一千七百二十八尺為實以原下周七十二尺為法除之得今高二十四尺合問原有圓錐下周七十二尺高三十二尺今改作圓臺已築高二十四尺問今上周若干答曰一十八尺法日置原高三十二尺减今高二十四尺餘八尺以乘原下周七十二尺得五百七十六尺以原高為法除之合問築堤歌
