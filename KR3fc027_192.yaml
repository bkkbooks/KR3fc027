body:
  text: 晒得乾榖九斗問該乾榖若干答日一千一百一十一石一斗一升一合一勺一抄法日置濕榖為實以曬乾九斗為法因之合問法九斗因一秒實尾九勺起呼九九八十一變九為八下位加一一勺七合七九六十三變七為六下位加三一合六升六九五十四變六為五下位加四定位一升五斗五九四十五變五為四下位加五下位是斗也回向前逆升合得一斗四石四九三十六變四為三下位加六石法上是每石乾九斗遇石即止下一位是斗也一石
