body:
  text: 晒得乾榖九斗問該乾榖若干荅日一千一百一十一石一斗一升一合一勺一抄法日置濕榖爲實以曬乾九斗爲法因之合問法九斗因一秒實尾九勺起呼九九八十一变九爲八下位加一一勺七合七九六十三变七爲六下位加三一合六升六九五十四变六爲五下位加四定位一升五斗五九四十五变五爲四下位加五下位是斗也回向前逆陞合得一斗四石四九三十六变四爲三下位加六石法上是每石乾九斗遇石卽止下一位是斗也一石
