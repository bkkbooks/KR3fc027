body:
  text: 錢不錯巳用香油和合二斤十二無訛再添多少麵來和不會應須問我荅曰添麵一斤九両五錢法曰用異乗同除法置今有油二斤十二先將十二両化爲七五于二斤之次以乗原麵四斤得麵一十一斤爲實以原用油一斤爲法除之如故仍得實麵一十一斤减去巳用麵九斤六両五錢餘爲添麵一斤九両五錢合問梅氣清三石五斗粟會換芝麻三石足又有五斗五升蔴換來小麥量八斗今有小麥換粟米九石六斗無零數
  hash: sha256:aa10b5b914b68e4ed52ba45c1e575f1533e06247acbd2f60e719adf6b3fb5c9c
