body:
  text: 次除本身二百餘一再以次商五尺自乘再乘得一百二十五尺為隅法除實俱尽中實首三千右法呼先餘本身一千又以右法方廉相乘得二千二百五十餘下本身二尽更平挨次二三位餘次商五尺左初商一十今有積一百九十五萬三千一百二十五尺問立方靣若干答曰立方靣一百二十五尺法曰置積尺數為實約初商一百自乘再乘得一百萬餘實訖餘實九十五萬三千一百二十五尺却以三乘下法一百得三百為方法列位次商二十于初商一百之次下法亦置二十于初商一百之次共一百二十就以二十乘之得二千四百為廉法再以
