body:
  text: 縱多二堵共一十六尺以五歸之得三歩二分爲縱方以平方帶縱法除之得濶一十六歩加三歩二分得長一十九歩二分各以一歩六分除之得墻二十二堵合問解法縱多二堵共一十六尺以五歸之卽每尺爲二分也各以一歩六分除之卽每堵八尺也繋羊問索歌瞔野之地有箇樁椿上繋着一腔羊圑團踏破三畆二試問羊繩幾丈長荅曰繩長八丈法日此乃平圓之法置地三畆二分以畆法二四通之得七百六十人歩以四因三歸之得一千令二十四歩爲實以開平方法除之初
  hash: sha256:936ef79cbeb3dfa4aac337d739334c8636e842777296ae50f76ee7917f535f88
