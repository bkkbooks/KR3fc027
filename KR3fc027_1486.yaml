body:
  text: 法曰置送行十尺如勾自乘得一百尺爲實以股弦較離地五尺减去原離地一尺餘四尺爲法除之得二十五尺加較四尺共得圓徑二十九尺折半得索長一丈四尺五寸合問其竿至地一丈一尺五寸今有方池一所每邉丈二無移中心蒲長一根肥出水過於二尺斜引蒲稍至岸適然與岸方齊請君明筭更能推蒲長水深各幾右調西江月荅曰蒲長一丈水深八尺法曰置半池方六尺如勾自乘得三十六以减股弦較出水二尺自乘得四尺餘三十二尺爲實倍出水二尺得四尺爲法除之得股水深八尺加出水二尺卽蒲長一丈合問是股弦差
  hash: sha256:59605a369f0dd5a4304f804bc1c87cf110d326ce2875cb3c73b1ea01d55a741d
