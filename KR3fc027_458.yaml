body:
  text: 答曰六角積一百七十步角外餘積九十步法日置中長二十步減去半面濶五步餘長一十五步以通濶一十八步乘之得六角占積二百七十步另以角外餘長九步以餘濶五步折半得二步五分乘之得一角餘二十二步五分以四因之得四角餘積九十步併入六角占利二百七十步共合直田總積也假如方田一段面方十七步計積二百八十九步內容八
