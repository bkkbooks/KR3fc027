body:
  text: 原高乗併積爲實六歸實数積如常今有築直臺一所上廣八尺長二丈下廣一丈八尺長三丈高一丈八尺問積若干荅曰六千尺法日倍上長得四十尺加下長共七十尺以上廣八尺乗之得五百六十尺另倍下長得六十尺加上長二十尺共八十尺以下廣一十八尺乗之得一千四百四十尺併二数共二千尺以高一十八尺乗之得三万六千尺以六歸之合問今有築方臺上方六尺下方八尺高一十二尺問積若干荅曰五千九百二十尺
