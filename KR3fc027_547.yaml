body:
  text: 法曰置斤以上不動只將四両化作二五併入斤共二百一十八斤二五爲實以價五錢二分爲法乘之合問今有銅絲四百六十八十両毎斤價銀二錢四分問諛銀若干荅曰一百一十二両四錢七分法曰置銅絲百斤不動只將十両化作六二五併斤得四百六十八斤六二五爲實以價二錢四分爲法乘之合問今有棗子七十八斤二両毎棗一斤換栗二斤四両問該栗若干荅曰諛栗一百七十五斤一十二両五錢
