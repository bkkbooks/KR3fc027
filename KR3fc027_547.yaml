body:
  text: 法曰置斤以上不動只將四兩化作二五併入斤共二百一十八斤二五為實以價五錢二分為法乘之合問今有銅絲四百六十八十兩每斤價銀二錢四分問諛銀若干答曰一百一十二兩四錢七分法曰置銅絲百斤不動只將十兩化作六二五併斤得四百六十八斤六二五為實以價二錢四分為法乘之合問今有棗子七十八斤二兩每棗一斤換栗二斤四兩問該栗若干答曰諛栗一百七十五斤一十二兩五錢
