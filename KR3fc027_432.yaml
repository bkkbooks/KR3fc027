body:
  text: 乘亦得九十八步將四角總合亦為一小方每角正方二十一步斜方七步折半得三步五分併得二十四步五分以四角因之得九十八步亦為一斜方積也此合大方求積毫忽無差楊輝用開平求方求斜理明以合方積張丘建用方五斜七難以合數又論大方靣十四步內容小方斜十四自乘得一百九十六步是兩箇斜方積乃黑白積四段以上下斜白配合如一方斜又以左右斜黑配合如一方斜故用折半得一箇斜方九十八步
  hash: sha256:f4b02092125b26851b7158b6fa04c602ea79c40e14d179cf99eeadd3c2b2e411
