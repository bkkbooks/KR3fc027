body:
  text: 荅曰木長五丈零五寸去墻四丈九尺五寸法曰依弦較求弦以墻高十尺爲勾自乘得一百尺以過斜木根一尺爲弦較除之如故一百尺加較一尺共得一百令一尺折半得木長五丈令五寸如弦減過斜木一尺餘如股至墻四丈九尺五寸合問今有圓木泥在壁中不知徑以鋸鋸之深一寸鋸道長一尺問木徑若干荅曰木徑二尺六寸
