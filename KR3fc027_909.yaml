  text: 圭求中廣數圭求中廣要思量却用下廣乘尖長正縱加入尖長數為法除之中廣長法日置下廣一十二尺八寸以尖長一尺五寸乘之得一十九尺二寸為實另以正縱一十尺令五寸加入尖長一尺五寸共一十二尺為法除之得中廣一尺六寸合問假如三角田一丘三靣各一十四步今作三段俱要四角問長濶各若干答曰共積八十四步三角各得二十八步每各計長八步濶七步
