body:
  text: 管三套五爲期定問君多少配成完荅曰管套各得一十五萬五千六百二十五箇管竹五萬一千八百七十五竿套竹三萬一千一百二十五竿解題共有短竹八萬三千竿毎一竿截作筆管三个毎一竿截爲筆套五個問各該用竹若干裁截配合成筆法曰置竹八万三千爲實以管三套五併作八爲法除之得一万令三百七十五又爲實另以管三乗套五得一十五又爲法乗實得管套各得一十五万五千六百二十五个列置問管竹以三歸之問套竹以五歸之合問
