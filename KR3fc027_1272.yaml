body:
  text: 有一公公不記年手持竹杖在門前借問公公年幾歲家中數目記分明一两八銖泥彈子毎歲盤中放一丸日久歲深經雨濕總然化作一泥團秤重八斤零八両加減方知得幾年荅曰一百零二歲法早置總八斤牛以毎斤三百八十四銖乗之得三千二百六十四銖爲實以毎歲一両作二十四銖加入八銖共三十二銖爲法除之合問西江月白麵秤來四斤使油一斤相和今來有麵九斤多六両五
