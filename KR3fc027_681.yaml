body:
  text: 今有金九塊銀十一塊秤之適等交換二塊則餘金比換銀多一十三両問金銀各重若干荅曰金一塊重三十五両七錢五分銀一塊重二十九両二錢五分金九塊銀十一塊各共重三百二十両七錢五分法日列金重一十三両折半得六両五錢乘金九塊得五十八両五錢爲實却以金九銀十一相减餘二爲法除實得銀一塊重二十九両二錢五分数另置銀十一塊以六両五錢乘之得七十一両五錢爲實仍以前二爲法除之得金一塊重数合問貴賤差分歌
