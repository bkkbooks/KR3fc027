body:
  text: 今有布四百二十五匹每匹價銀二錢五分問該銀若干答曰一百零六兩二錢五分法曰置四百二十五匹為實以匹二價二錢五分為法乘之合問今有絹一端長五丈每尺價鈔二百四十文問鈔若干答曰一十二貫法曰置絹五十尺為實以每尺價二百四十文為法乖之合問今有羅二丈四尺共價一錢八分今羅一匹長四丈問該銀若干答曰三錢法曰置原銀一錢八分以乘今羅四丈得七十二為實以原羅二丈
