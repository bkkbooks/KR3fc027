body:
  text: 法曰置田積以四因得三千四百五十六步另以相和六十步自乘得三千六百步却减去四因積三千四百五十六步餘一百四十四步乃相差自乘積用開平方法除之得長濶相差一十二步合問長濶相和求差同前圖解曰其相和六十步自乘積三千六百步內有四因積四箇共三千四百五十六步居邉有一箇相差自乘積一百四十四步用開平方法除之得長濶相差十二步今有直田積八百六十四步只云長濶相和六十步問長濶各若于答曰長三十六步濶二十四步
