body:
  text: 連環圖三七三五五十卄四四三二九求積法曰併上一下七十二共七十七二二五九十二六六八三以七十二乘之得五千二百五十六一七一十四六十七六五折半得二千六百二十八爲实以九三六三八二三四九三十四四爲法除之得毎環八子爲一陣各二三九三三五二二二四五二七百九十二子多寡相資隣壁相兼以七十四五七十五六四十九陣化一十三陣此見運用之道也三六九十六五八九六三三四四十二一五一二八四六四一三一五四二十四七二五六八六五五十七六二十二五六七十八五六十一六一三二四二十九五三二六四八
