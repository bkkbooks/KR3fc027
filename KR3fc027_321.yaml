body:
  text: 答曰三十兩法日置布四十五匹以分子之二因之得九十兩為實却以分母三為法歸之合問解題曰三分兩之二即每匹六錢六分六釐而不能盡故用約分之法也假如今有米三分石之二每斗價銀七分二釐問共該銀若干答曰四錢八分法日置銀七分二釐以分子之二因之得一兩四錢四分為實却以分母三為法歸之合問假如今有商夥論本分物俱得八分之七至銀百兩問該若干答曰八十七兩五錢法日置銀一百兩以子之七因之如故仍以分母八為法
