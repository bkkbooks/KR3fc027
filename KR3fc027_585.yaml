body:
  text: 買顏色羅一卞四丈七尺六寸五分六厘二毫五絲法曰置總羅六十七丈五尺以染紅羅六丈二尺五寸乘之得四百二十一丈八尺七寸五分爲實以染紅羅六丈二尺五寸併入顏色羅一丈七尺五寸共得八丈爲法除之得紅羅五十二丈七尺三寸四分三厘七毫五絲以减總羅餘得顏色羅合問今有絲四十三斤十二面織絹每疋用絲一斤與織工絲四兩問各該若干荅曰織成絹三十五疋織工絲八斤十二兩法曰置絲四十三斤不動斤下十二兩化爲七五併共四十三斤七五以
  hash: sha256:4275b0938459c81ef5eaf985ef6423d6c477618a2419d2eaf7dc01c72782250a
