body:
  text: 除實餘實五百一十二另以次商八尺自乘再乘得五百一十二尺爲隅法除實恰盡得立圎徑合問此問周徑如圎毬今有積六萬二千二百零八尺欲爲立圎問周若干荅曰周一百四十四尺法曰置積尺以四十八乘之得二百九十八萬五千九百八十四尺爲實以開立方法除之初商一百尺自乘得一萬再乘得一百萬除實餘實一百九十八萬五千九百八十四尺另以初啇一百以三因得三百爲方法次商四十于初商之下共一百四十就以四十乘之得五千六百爲廉法以方乘廉得一百六十八萬除實餘實三十萬五千九百八十四另以次商四十自乘再乘得六萬四千爲隅法除實餘實
