body:
  text: 今有官米二百二十五石三斗六升令五等人戶作十分之有出之問每戶逐等各若干荅日第一等四戸每戸二石五耳共一十石第二等八戸每戸二石共一十六石第三等十五戸每戸一石六斗共二十四石第四等四十一戸每戸一石二斗八升共五十二石四斗八升第五等一百二十戸每戸一石二升四合共一百千二石八斗八升解法日一等定率一萬以八因得八千爲二等率又八因得六千四爲三等率又八因得五千一百二十爲二等率又八因得四千九十六爲五等率前問十分之七倣此卽以七因定率
  hash: sha256:5b049a009e2cfe97e5efa1f1e88201dd83a3fbb8715f017a39efc214a01c5ff7
