body:
  text: 今有官米二百二十五石三斗六升令五等人戶作十分之有出之問每戶逐等各若干答日第一等四戶每戶二石五耳共一十石第二等八戶每戶二石共一十六石第三等十五戶每戶一石六斗共二十四石第四等四十一戶每戶一石二斗八升共五十二石四斗八升第五等一百二十戶每戶一石二升四合共一百千二石八斗八升解法日一等定率一萬以八因得八千為二等率又八因得六千四為三等率又八因得五千一百二十為二等率又八因得四千九十六為五等率前問十分之七倣此即以七因定率
