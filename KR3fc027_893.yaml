body:
  text: 法曰置截積七百二十步為實以原濶四十步為法除之得截長一十八步合問今有方田一丘今從東南角截一直形積三十二步原要南邉濶四步問截東邉長若干答曰截東長八步法曰置截積三十二步為實以南濶四步為法除之得截東長八步合問若東長定數問截南濶就以長數為法而除截積今有直田長一十五步濶一十二步今從東邉截積五十
