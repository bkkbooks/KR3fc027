body:
  text: 假如今有八五色五兩六錢換九五色銀問該若干答曰該九五色銀五兩零一分零五毫法曰置銀五兩六錢以八五乘之得日丙七錢六分為實以九五為法除之合問假如今有足色紋銀七兩六錢五分傾出成色銀九兩問色幾何答曰八五色法曰置紋銀為實以傾出色銀九兩為法歸之合問假如今有足色紋銀三十五兩二錢欲傾八八色銀問用銅若干
