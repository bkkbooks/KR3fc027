body:
  text: 答日共該銀七十兩零三錢五分法日置所有米為實以所求價為法因之定位先數原實百起順下至石止下一位得術是錢回向前逆數升上合得法三錢因定位五分實尾五斗起呼三五一十五變五為一下位加五下位是錢也回向前逆升合得三錢四石三四一十二變四為一下位加二石法上是每石三錢遇石即止下一位是錢也三十三三如九本位除去下位加九十得合七十實首二百二三如六本位除去下位加六原實百起呼百往後順數至石還原用三歸法詳後
