body:
  text: 假如勾股田股長六十歩勾濶三十二歩問積若干荅曰九百六十歩法日置股長六十歩以勾濶三十二歩乘之得一千九百二十歩折半得九百六十歩合問假如直田廣緃相和九十二歩両隅斜去六十八歩問積若干荅曰一千九百二十歩折半如勾股積法曰置斜六十八歩自乘得四千六百二十六歩另以相和九十二歩自乘得八千四百六十四歩以少減多餘三千八百四十歩折半得積一千九百二十歩合問
