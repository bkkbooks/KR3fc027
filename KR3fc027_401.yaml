body:
  text: 假如勾股田股長六十步勾濶三十二步問積若干答曰九百六十步法日置股長六十步以勾濶三十二步乘之得一千九百二十步折半得九百六十步合問假如直田廣緃相和九十二步兩隅斜去六十八步問積若干答曰一千九百二十步折半如勾股積法曰置斜六十八步自乘得四千六百二十六步另以相和九十二步自乘得八千四百六十四步以少減多餘三千八百四十步折半得積一千九百二十步合問
