body:
  text: 實尾公錢一八如除八盡錢法上是每匹錢數遇錢即止前一位得令是匹也四兩一六如除六本位十四去六存入兩是匹也逆升合得八匹九十本位七約存六可將一退子下位共十四起一二如除二本位去二存七十六十實首二百原實百起呼百往後順數至錢合得二百假如今有米一千零三十八石作一百七十三人分之間每人該米若干答曰六石法日置米為實以人數除首位百不用只以七十三人為法定身除之合問定位此是求零之法先數原實起順下至遇法首十數則止前一位得令是石也
