body:
  text: 實尾公錢一八如除八尽錢法上是每疋錢数遇錢卽止前一位得令是疋也四両一六如除六本位十四去六存入両是疋也逆陞合得八疋九十本位七約存六可將一退子下位共十四起一二如除二本位去二存七十六十實首二百原实百起呼百往後順数至錢合得二百假如今有米一千零三十八石作一百七十三人分之間每人該米若干荅曰六石法日置米爲實以人数除首位百不用只以七十三人爲法定身除之合問定位此是求零之法先数原實起順下至遇法首十数則止前一位得令是石也
  hash: sha256:98a31c1b48a0ccc7d27f041ab8dd7b33ca303b29786f678f910a758fad171cc0
