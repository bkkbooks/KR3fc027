body:
  text: 位也身者本位也率者齊數也實者所問之物也法者所求之價也乘之者九字相生之數也除之者謂九歸歸除商除之類用字凡例法樣數也實本數也因法之單位者又由也歸入已之數也加增添也減除少也乘法之多位者歸先歸後除合名也除減少也積乘成之數也乘法實合變數也如九數用此下一位也身本位也則法也左上邊大位也右下邊小位也縱直長也橫廣濶也廣橫濶也濶橫廣也直長也面方面也高立起也深陷下也
  hash: sha256:a0b2e984454d89019f24b78def9eec8e29b349ed1580f7688d5f66babac9131a
