body:
  text: 位也身者本位也率者齊数也實者所問之物也法者所求之價也乗之者九字相生之數也除之者謂九歸歸除商除之類用字凢例法樣數也實本數也因法之單位者又由也歸入已之数也加增添也減除少也乗法之多位者歸先歸後除合名也除減少也積乗成之數也乗法實合變數也如九數用此下一位也身本位也則法也左上邊大位也右下邊小位也縱直長也橫廣濶也廣橫濶也濶橫廣也直長也面方面也高立起也深陷下也
