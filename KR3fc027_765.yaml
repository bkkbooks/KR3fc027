body:
  text: 相和九十二歩爲减縱加前商之卽得長濶相差歌與带縱開平方法同長濶相差要識情積数將来以四乘差歩自乘加入積開方得数以和名和歩加差須折半此爲長数更無零以長减差便爲濶學者畱心仔细尋今有直田積一千九百二十歩長濶相差二十八歩問長濶若干荅曰長六十歩濶三十二歩法曰置積以四因之得七千六百八十歩另以相差二十八歩自乘得七百八十四歩加入積数共八千四百六十四歩爲實以開平方法
