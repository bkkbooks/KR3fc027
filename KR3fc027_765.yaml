body:
  text: 相和九十二步為减縱加前商之即得長濶相差歌與帶縱開平方法同長濶相差要識情積數將來以四乘差步自乘加入積開方得數以和名和步加差須折半此為長數更無零以長减差便為濶學者留心仔細尋今有直田積一千九百二十步長濶相差二十八步問長濶若干答曰長六十步濶三十二步法曰置積以四因之得七千六百八十步另以相差二十八步自乘得七百八十四步加入積數共八千四百六十四步為實以開平方法
