body:
  text: 人一百九十乘得三千八百為實却以支銀一兩以分母十九通之得十九兩為法除之合問解題曰十九分兩之一每人即一兩五分二厘六毫有課分假如今有布二匹九分匹之五用過一匹六分匹之一問尚餘若干答曰一匹十八分匹之七法日置用過布一匹以分母六通之加分子一共得七又以原布分母尢通之得六十三另置原布二匹以分母九通之加分子五其得二十三又以用過布分母六通之得一百三十八內减去前六十三餘七十五為實以二分母九六相乘得五十四為法除之得一匹餘實二十一法實
