body:
  text: 五尺却以三乘下法一十得三十爲方法列位次商五尺于左初商之次下法亦置共商五于初商一十之次共一十五就以五遍乘之得七十五爲廉法再以方法三十乘廉法七十五得二千二百五十除實訖餘實一百二十五却以次商五自乘再乘得一百二十五爲隅法餘實恰盡開立方法圖式此如方倉還原之意次商併初商共一十五尺又用次商五尺乘之得七十五尺爲廉法以乘方法餘实右自乘得一百再乘得一千除实訖就以二箇初商一十得二十爲方法实尾次除本身五十餘二
