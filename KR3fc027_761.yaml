body:
  text: 要知濶歩如何見長歩减差濶便明今有直田積一千九百二十歩長濶相和九十二歩問長濶各若干荅曰長六十歩濶三十二歩法日置田積以四因之得七千六百八十歩另以和歩九十二歩自乘得八千四百六十四歩减去因積餘七百八十四歩爲實以開平方法除之得長濶相差二十八歩加入和歩九十二歩共一百二十歩折半得長六十歩内减差歩二十八餘得濶三十二歩合問又法名减縱開平方置田積一千九百二十歩爲實以相和九十二歩于右爲縱上商三十以减九十二歩餘縱六十二歩與上商三十相呼三六除實一千八百又呼二三除六十餘實六十歩又以上
