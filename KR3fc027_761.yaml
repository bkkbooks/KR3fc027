body:
  text: 要知濶步如何見長步減差濶便明今有直田積一千九百二十步長濶相和九十二步問長濶各若干答曰長六十步濶三十二步法日置田積以四因之得七千六百八十步另以和步九十二步自乘得八千四百六十四步減去因積餘七百八十四步為實以開平方法除之得長濶相差二十八步加入和步九十二步共一百二十步折半得長六十步內減差步二十八餘得濶三十二步合問又法名減縱開平方置田積一千九百二十步為實以相和九十二步于右為縱上商三十以減九十二步餘縱六十二步與上商三十相呼三六除實一千八百又呼二三除六十餘實六十步又以上
