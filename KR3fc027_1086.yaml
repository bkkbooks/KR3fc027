body:
  text: 相减餘一十一両六錢爲物實另以不足四両减不足二両餘二両爲人實又以出五両四錢內减出五両餘四錢爲法除物實得物價就以法四錢除人實得五爲人数合問今有里長值月議云毎里科出銀五錢依帳買物以辨酒席多銀三両五錢毎里科出四錢亦多五錢問合用銀併里数若干荅曰三十里用銀一十一両五錢法曰置兩盈出五錢出四錢互多三両五錢多五錢先以出五錢互乘多五錢得二両五錢次以出四錢互乘多三両五錢得一十四両二数相减餘一十一両五錢爲用銀實另以多三両五錢减多五錢餘三両爲人實再
