body:
  text: 生率之妙今略具五乘方圖式可為求廉率之梯階又考其平方形如方田以平方面自乘得平方積數是一乘方其立方形如骰子樣以平方面自乘得平方積再以高方靣乘之得立方積數是二乘方其三乘方以平方面自乘得平方積數再以高方面乘得立方積數又以方面乘得三乘方積數故日三乘方其形不知如何模樣只是取數而已或至十乘方三十餘乘方皆是先賢取生率之妙以明開方正律亦不可廢
