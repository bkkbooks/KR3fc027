body:
  text: 四百六十尺以次商八尺乘之得三千六百八十尺以三因之得一萬一千令四十尺併入再商八尺自乘得六十四尺共一萬一千一百零四尺又以次商八尺相呼除之一八除八萬又一八除八干又一八除八百又四八除三十二尺除實恰盡以左上所商四百六十八尺為立方一面之數合問開立方帶縱法今有倉貯米五百一十八石四斗方比高多三尺問方高各若干答曰方一丈二尺高九尺法曰置米五百一十八石四斗以斛法二尺五寸乘之得積一千二百九十六尺
