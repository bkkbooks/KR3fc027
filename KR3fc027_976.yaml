body:
  text: 一法將原下廣三尺減原上廣一尺餘二尺另以原高一丈二尺內減今高九尺餘三尺以乘二尺得六尺為實以原高一十二尺為法除之得五寸加原上廣一尺共一尺五寸亦得原築墻上廣一尺下廣三尺高一丈二尺今欲築高一丈五尺開上廣若干答曰上廣五寸法日置原下廣三尺減原上廣一尺餘二尺另以原高一丈二尺減今高一丈五尺餘三尺以乘二尺得六尺為實以原高一丈二尺為法除之得五寸以減原上廣一尺餘五寸為今上廣合問築墻截下廣問今高歌即是截去下節
