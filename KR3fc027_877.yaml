body:
  text: 得四千三百二十九尺為實以開立方法約之得上方九尺便約下方一十二尺却以上方自乘得八十一尺另以下方自乘得一百四十四尺又以上方九尺乘下方一十二尺得一百零八尺併三位共三百三十三尺為法除實得深一十三尺合問今有米七千七石二斗欲作圎窖盛置問上下周及深若干答曰上周一十四尺下周一十八尺深九尺法曰置米數以斛法二尺五寸乘之得一百九十三尺再以圎率三十六乘之得六千九百四十八尺為實以開立方法約之得上周一十四寸便約下周一十八尺另上周一十四尺自乘得一百九十六尺又以下周一十八尺自乘得三百二十四尺又以上周十四乘下周十八得二百
