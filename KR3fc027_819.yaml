body:
  text: 自乘一百餘四十四以减餘實又餘實九十六却以三因得二百八十八另併大方多中四小八共十二倍之得二十四與初商十步相呼一二除二一四除四又與次商二步相呼二二除四二四除八得小方面十二步加多四步得中方面十六步又加多四步得大方面二十步各以方面自乘得各積合問若四段則用四歸五段則用五歸假如大小圎田二段共積只云大圎徑多小圎徑者法置共積以四因三歸得數仍如前方田算或只云大圎周多小圎周者法置共積以十二乘得數仍如大小方田算假如大小立方二所共積只云大立方靣多小立方面者法
  hash: sha256:429141bed21f4641a737c12bc07c56f693e68c79b1a3d3506790bccd17e01e70
