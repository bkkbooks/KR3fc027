body:
  text: 欲換西瓜其瓜每箇錢二十七文半桃每箇三文半其梨每箇八文問各換瓜若干答曰桃主該換瓜三十五箇梨主該換瓜六十四箇法曰置桃數以價三文半乘得九百六十二文半為實以瓜價為法除之得桃換瓜數置梨數以價八文因之得一千七百六十文為實以瓜價為法除之得梨換瓜數合問今有官米七十三石二斗令三等人戶出之上等二十五戶每戶五分中等四十戶每戶三分下等六十戶每戶一分問各等戶米若干
