body:
  text: 今有開濠上廣七尺下廣九尺深四尺長一千八百尺每人曰穿一百四十四尺今用人夫二百名問幾日畢答曰二日開畢法日併上下廣折半得八尺以深四尺乘之得三十二尺又以長乘之得五萬七千六百尺為實另置二百人以每人一百四十四尺乘之得二萬八千八百尺為法除之合問築臺歌築臺丈尺要推詳上長倍之加下長上廣乘之别列位另倍下長加上長仍以下廣乘見數二數共併積相當
  hash: sha256:02dcbe563cf09aff5d2c043943e3de4ec60c93e50489585df22f587e6ff358b8
