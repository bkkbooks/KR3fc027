body:
  text: 法曰置積倍之得四百五十步為實以長為法除之得濶若問中長步數倍積為實以濶為法除之即得以上二數名日忘長失短與直田截積意同今有勾股田長三十步濶一十五步今從尖截長一十二步問中廣若干答曰截中廣六步勾股截積法日置截長一十二步以勾濶乘之得一百八十步為實以股長為法除之又法置勾為實以股為法除之每股長一步得濶五分以乘截長亦得今有斜田南廣四步北廣十二步長三十二步今從中截
  hash: sha256:e4169d07e9cacc137e5cc2b62fafe4fd7a58d4e2486b0c31deed70bd379609f6
