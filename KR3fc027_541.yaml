body:
  text: 加三作八両芸香一萬両退作六百二十五斤因無両数不必加也餘倣此還原五六加三二六加一十二六六加三十六以合萬両今有心紅毎斤價銀三錢八分問毎両價若干荅曰每両該銀二分三厘七毫五絲法日置銀三錢八分以截両爲斤法之卽一退六二五或用十六除之亦同八分起八五本身八去三爲五三錢三一八七五变本身三作一下位挨次加八七五今有水銀毎両價銀一分八厘五毫問毎今價若干荅曰毎斤二錢九分六厘
