body:
  text: 加三作八兩藝香一萬兩退作六百二十五斤因無兩數不必加也餘倣此還原五六加三二六加一十二六六加三十六以合萬兩今有心紅每斤價銀三錢八分問每兩價若干答曰每兩該銀二分三厘七毫五絲法日置銀三錢八分以截兩為斤法之即一退六二五或用十六除之亦同八分起八五本身八去三為五三錢三一八七五變本身三作一下位挨次加八七五今有水銀每兩價銀一分八厘五毫問每今價若干答曰每斤二錢九分六厘
