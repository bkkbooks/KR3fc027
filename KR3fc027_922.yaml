body:
  text: 原有直田一丘今從東北角截勾股形積三十八步七分二釐股與勾數相同問該若干答曰東北各八步八分法日置截積三十八步七分二釐倍得七十七步四分四釐為實以開平方法除之得積截東北各八步八分合問若還原以勾股自乘折半即得梯田截積歌梯斜截勾股具截十五卷梯田截積細端詳倍積濶差乘最良却用原長為法則歸除乘數實之行若截大頭田積步大濶自乘減實當
