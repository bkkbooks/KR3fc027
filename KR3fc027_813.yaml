body:
  text: 法除之初商一十于左下法亦置一十于縱方之上共一十四皆與上商一十相呼除實一百四十步餘實五十二步却以下法初商一十倍作二十併入縱四步共二十四步次商二步于左初商一十之次下法亦置二步于縱方之次共二十六步皆與次商二步相呼除實恰盡得小方面一十二步加四步得大方面一十六步各以方面自乘得各積合問解曰共積是一段大方積一段小方積其大方積內有一段小方積一段大多小方自乘積如隅又大多小的兩段長濶積如廉每廉長即小方靣數濶即大多小數先用大多小方步數自乘得數以減共積者是減去大方田一段
  hash: sha256:a764e5106b73ab65d7ced3bfca0186eabc4da89906ef4978fab3a325b85c3f13
