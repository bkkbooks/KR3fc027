body:
  text: 荅曰客六十人飯碗三十隻羮碗二十隻肉碗一十五隻法曰以二人乘三人得六人又以四人乘之得二十四人以乘總六十五碗得一千五百六十爲實另列維乘得六得一十二先以二乘三得六次以三乘四得一十二又以四乘二得八併之得二十六爲法除實得六十人各列以二歸得飯碗以三歸得羮碗以四歸得肉碗合問書生分卷歌毛詩春秋周易書九十四册共無餘毛詩二册三人共春秋一本四人呼周易五人讀一本要分每樣幾多書
