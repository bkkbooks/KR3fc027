body:
  text: 三角截四角法日置每靣一十四步六因七歸得中徑一十二步另以每靣一十四步與徑一十二步相乘得一百六十八步折半得積八十四步為實以三段歸之各得二十八步却以每靣折半得濶七步歸之得四步倍之得中長八步合問今有直田長一十五步濶一十二步今依濶截圭積四十直田截圭五步問截圭長若干答曰圭長七步五分法日置截積倍之得九十步為實以濶一十二步為法除之即得其餘圭積等截法俱用開放于左
