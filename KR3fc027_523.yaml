body:
  text: 合問今有蓆三領作一囤亦用一蓆較数同前問盛米若干荅曰二十二石五斗法曰置蓆三領自乘得九領以較米二石五斗乘之令問今有蓆四領作一囤照前一蓆較数相同問盛米若干荅曰四十石法曰置蓆四領自乘得一十六領以較米二石五斗乘之令問若五六七領俱倣前例自乘再以較数乘之卽得今有米十石欲用蘆蓆囤盛之先以一蓆作囤較数盛米石五斗問諛用蓆若干
