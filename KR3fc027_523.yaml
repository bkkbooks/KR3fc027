body:
  text: 合問今有席三領作一囤亦用一席較數同前問盛米若干答曰二十二石五斗法曰置席三領自乘得九領以較米二石五斗乘之令問今有席四領作一囤照前一席較數相同問盛米若干答曰四十石法曰置席四領自乘得一十六領以較米二石五斗乘之令問若五六七領俱倣前例自乘再以較數乘之即得今有米十石欲用蘆席囤盛之先以一席作囤較數盛米石五斗問諛用席若干
