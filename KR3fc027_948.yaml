body:
  text: 弦矢求圎徑併離徑歌弦矢求圎徑可推半弦自乗矢除之再加矢濶爲圎徑半之减矢離無疑法日置弦二十四歩折半得一十二歩自乘得一百四十四歩爲實以矢八歩爲法除之得十八歩再加矢濶八歩得圎徑二十六歩復折半得一十三歩减矢八歩餘爲離徑五歩圎徑及弧徑求離徑併矢濶歌徑弦求離徑矢濶元徑弧弦各折半各自乘减餘開方離徑圎徑弧矢辨法日置圎徑二十六歩折半得一十三歩自乘得一百六十九歩另以弧
