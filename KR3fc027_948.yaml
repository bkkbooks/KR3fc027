body:
  text: 弦矢求圎徑併離徑歌弦矢求圎徑可推半弦自乘矢除之再加矢濶為圎徑半之减矢離無疑法日置弦二十四步折半得一十二步自乘得一百四十四步為實以矢八步為法除之得十八步再加矢濶八步得圎徑二十六步復折半得一十三步减矢八步餘為離徑五步圎徑及弧徑求離徑併矢濶歌徑弦求離徑矢濶元徑弧弦各折半各自乘减餘開方離徑圎徑弧矢辨法日置圎徑二十六步折半得一十三步自乘得一百六十九步另以弧
