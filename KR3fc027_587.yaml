body:
  text: 織工絲四兩化為二五乘之得十斤九三七五為實另將織絹絲併織工絲共一斤二五為法除之得八斤七五却將七五用加六法加之為十二兩共八斤十二兩為織工絲以減總絲餘為織絹絲三十五斤每匹用絲一斤即三十五匹合問一法置絲四十三斤十二兩以斤通兩共七百兩以織工絲四兩乘之得二千八百兩為實以每匹絲一十六兩加入織工絲四兩共二十兩為法除之得織工絲一百四十兩通斤得八斤十二兩以減總絲餘得三十五斤每匹用一斤即三十五匹合問新編直指算法統宗卷之四
