body:
  text: 若問周問徑遇有餘積不盡者依開平方法下命之今有圓田積二千三百五十二步問平圓周若干答曰周一百六十八步法日置圓田積步以二十乘之得二萬八千二百二十四步為實以開平方法除之初商一百于左位下法亦置一百為方法呼一一除實積一萬餘積一萬八千二百二十四就以方法一百倍之得二百為廉法續次商六十于左初商一百之下右位亦置六十于廉法二百之下為隅法共二百六十皆與上商六十呼除先呼二六除積一萬二千又呼六六除積三千六百餘積二千六百二十四另以右位次商六十倍作一百二十併入廉法二百共三百二十
  hash: sha256:365829c55fed5477008f357d41e7da741ea70da73d416008ca51963e73591102
