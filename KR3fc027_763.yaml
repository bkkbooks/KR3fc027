body:
  text: 商三十再减餘縱六十二仍餘縱三十二次商二又减縱二餘縱三十與次商二相呼二三除實六十盡合問若先問長者仍前布列先商長六十减縱亦得今有勾股田積九百六十步長濶相和九十二步問長濶各若干答曰長六十步濶三十三步法日置田積以八因之或倍田積以四因同得七千六百八十步另以和步自乘得八千四百六十四步相减餘七百八十四步以平方開之得長濶相差二十八步加入和步共一百二十步折半得長六十步內减差二十八餘得濶三十二步合問若以减縱開平方法算置積倍之得一千九百二十步為實以
