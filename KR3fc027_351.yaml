body:
  text: 假如原有小麥八斗六升磨麵六十四斤八兩今有小麥三十五石四斗八升問該麵若干答曰二千六百六十一斤法日置共麥三十五石四斗八升以磨麵六十四斤半乘之得二萬二千八百八十四斤六為實以原麥八斗六升為法除之合問假如今有夏布四十五匹欲換棉布只云夏布三匹共價二錢棉布七匹共七錢五分問換棉布若干答曰棉布二十八匹法日先置今有夏布四十五匹以原夏布價二錢因之得九兩又以棉布七匹因之得六十三匹為實以夏布三匹因棉布價七錢
  hash: sha256:35f95c1f99887ae09bafd56112f03ce1fda0bc16fa7e3bef7621a0d1e2083491
