body:
  text: 假如原有小麥八斗六升磨麵六十四斤八両今有小麥三十五石四斗八升問該麵若干荅曰二千六百六十一斤法日置共麥三十五石四斗八升以磨麵六十四斤半乘之得二萬二千八百八十四斤六爲實以原麥八斗六升爲法除之合問假如今有夏布四十五疋欲換棉布只云夏布三疋共價二錢棉布七疋共七錢五分問換棉布若干荅曰棉布二十八疋法日先置今有夏布四十五疋以原夏布價二錢因之得九両又以棉布七疋因之得六十三疋爲實以夏布三疋因棉布價七錢
  hash: sha256:48c6bfb40d1e341aa16328cec4ea1c2e6d90a6fff02e9fbae19fe8130a07dbf3
