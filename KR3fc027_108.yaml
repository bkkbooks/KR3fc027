body:
  text: 金重十六兩銀重十四兩玉重十二兩鉛重九兩五錢銅重七兩五錢鐵重六兩碃重三兩錢鈔名數錢鈔之法謂之文一文之上有十文十十為百文十百文為千文千文為一貫五貫為一錠一文之下亦有分釐毫絲忽之數定算盤位次實左法右論按洛書數日左三右七則右者第一之行位也左者第二之行位也又按大學章句日別為序次如左則左者以後之事也又日右傅之某章則右者以前之事也今
