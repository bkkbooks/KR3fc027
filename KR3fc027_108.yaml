body:
  text: 金重十六両銀重十四両玉重十二両鉛重九両五錢銅重七両五錢鐵重六両碃重三両錢鈔名數錢鈔之法謂之文一文之上有十文十十爲百文十百文爲千文千文爲一貫五貫爲一錠一文之下亦有分釐毫絲忽之数定筭盤位次實左法右論按洛書数日左三右七則右者第一之行位也左者第二之行位也又按大學章句日別爲序次如左則左者以後之事也又日右傅之某章則右者以前之事也今
