body:
  text: 荅曰狐狸九箇鵬鳥七隻法曰置總頭七十二以减總尾八十八餘一十六是二禽獸共数以尾九因之得一百四十四內减總尾八十八餘五十六爲實另以尾九內减一頭餘八爲法除實得鵬鳥七隻以减共数餘得狐九箇合問新編直指筭法綂宗卷之九
