body:
  text: 法日置積三千三百七十五尺為實以開立方法除之古法用三為廉率約實定位從實末位尺十尺定尺百尺千尺定十尺初商一十于左下法亦置初商一十自乘得一百再乘得一千除實訖餘實二千三百七十五尺却以下法初商一十自乘得一百用三因為方法又以初商一十以三因得三十為廉次商五尺于左初商之次下法亦置次商五尺自乘得二十五尺為隅法又以次商五尺乘廉三十得一百五十為廉法併方法三百廉法一百五十隅法二十五共四百七十五尺皆與次商五尺相呼四五除二五七除三十五五五除二十五恰盡得方靣一十五尺合問
