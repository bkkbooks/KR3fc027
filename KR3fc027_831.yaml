body:
  text: 得立方數若干自乘得若干又以三因之得若干另以所商得立方數若干用三因之得若干再添一箇共得若干便商得多一立方數也因此不及而為之命立圓法遇有不盡者亦倣此若要還原以立方面自乘再乘見積若還原遇立方原有不盡數者以立方靣自乘再乘併入不盡數見積今有物三千三百七十五尺問立方若干答曰立方靣一十五尺法曰置物三千三百七十五尺為實約初商得一十于左下法亦置一十于右自乘得一百再乘得一千除實訖餘實三千三百七十
  hash: sha256:e72f3b3a2d454dfa8b83136ac7979c3d25c5415efcd05cc556313bbd29778f70
