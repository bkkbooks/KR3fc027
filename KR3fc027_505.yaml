body:
  text: 如三而一為方積三十六兮圓積成斛法却將除見數一升一合數皆明古斛法以積方二尺五寸為一石謂長一尺濶一尺高二尺五寸是也解曰斛有大小尺有長短古之度量與今不同未有定則故也直指曰若較今時斛法可將棹四張橫頭竪地以為井字樣式內用今尺橫直各量一尺上下皆同四旁用物擠住不動將米一石傾放內中米上以平為度却用尺量高若干定為斛法除之得積米之數也此乃本處斛斗之積若别處斛斗大小不同但較一石大者多若干併石為法除之如斛斗小啓就以不
  hash: sha256:fc4b1f79fe20248fae6c3844ad7dcc9f2d1fcfcebc5591d18006753bab699a22
