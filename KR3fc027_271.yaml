body:
  text: 法日置銀為實以人分為法除之合問定位法先數原實千順下至法首百前位定兩合得法首七十除五百歸法少實多實尾三分二錢五七除三十五逢五進一十定位七兩五二倍作四二七除一十四五厘九十五一倍作二七九除六十三二分見五無除作九五一七如除七百法首位是百遇百即止前位得令是兩合得六錢實首一千無除起一下還五原起五一倍作二實千起呼千往後至百合得一兩還原用乘
