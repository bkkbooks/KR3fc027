body:
  text: 四日少廣以御積冪方圓五日商功以御功程積實六日均輸以御遠近勞費七日盈朒以御隱雜互見八日方程以御雜操正負九日勾股以御高深廣遠算學節要學算之人須努力先將九數時時習呼如下位算為先變其身數呼求十觀其發問果何如仔細斟量分法實若然法實既能知次求定位最為急再考九歸及歸除又將減法細尋繹有能致意用工夫算學雖深可盡識乘除用字釋以者用也置者列也為者數未定也得者數已成也呼者呼喚其數也命者言也首者第一位也尾者末
