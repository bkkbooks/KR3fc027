body:
  text: 下位廉法六十併入次商五步共六十五步皆與上商五步呼五六除實三百五五除二十五步得廣三十五步合問若問縱照前布列上商五十以乘不及五十得七百五十步併加前積共二千五百步却呼五五除實二千五百步盡得縱合問今有圭田積一百二十六步濶不及長九步問長濶各若干答曰長二十一步濶一十二步法日倍田積得二百五十二步為實以不及九步為縱方于右上商十步下法亦置十步于縱九步上共一十九步與上商十步除實一百九十步餘六十二步另以下法初商十一倍之作二十次商二步于左下法亦置二步加于縱方九上共三十一步皆與
  hash: sha256:2e60af7ed77c06e7ca9426b5332d713b33861f57646236978bf3b3b83bb46d20
