body:
  text: 原今下廣數相減餘以原高乘為實原下廣減原上廣餘為法除高數是原築墻上廣一尺下廣四尺高一十二尺今只築下廣二尺一寸問今高若干答曰七尺六寸法日置原下廣四尺減今築下廣二尺一寸餘一尺九寸以原高一十二尺乘之得二十二尺八寸為實另以原下廣四尺減原上廣一尺餘三尺為法除之合問原築墻上廣二尺下廣六尺髙二丈今已築上廣三尺六寸問今築高若干
