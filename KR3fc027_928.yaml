body:
  text: 步除之得七百一十五步另以大濶三十八步自乘得一千四百四十四步减去七百一十五步餘七百二十九步為實以開平方法除之得二十七步為截中濶就以此濶二十七步併大頭原濶三十八步共得六十五步折半得三十二步五分為法以除截積一千七百八十七步五分得截長五十五步合問若作三段分者先截大小二頭長併中濶餘長即是中段數也或又作四五段分者亦先截去大小二頭長濶再將原長內减截去二頭長數餘長步數併截二段中廣復作梯法截之是也其斜形截法與梯形同理如截東西兩傍積具截貞本雞題少廣章中
  hash: sha256:9d038ba3a72b662327b9e4788063beb907f4fe7464ee919c83ca20148430616e
