body:
  text: 族人程際明序之而汝思意不但已後屬余論列之不慧持籌未能何知籌數顧夫技藝之學六數業聖人所以寄至精意扵窮者用之大至扵窺天測海推宇原宙秭岻京不可窮小之極扵分毫秒忽塵撮而無所間情物君子奈何以小道視之傳曰數可陳也其義知也熟其落向
