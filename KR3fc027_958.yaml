body:
  text: 高以乘之長又續又以長乘二以為城積甚分明五因其積三而一此是堅求壤法行穿地四因為壤積法中仍用五歸成穿地四尺為壤五尺為堅三尺壤是虛土也堅是實土也穿地求壤五因求堅三因皆四歸之壤地求穿四四求堅三因皆五歸之堅地求穿四因求壤五因皆三歸之城垣堤溝求積併上下廣折半以高深乘之又以長乘之得積方臺求積上方自乘下方自乘另以上下方相乘併之
