body:
  text: 高以乗之長又續又以長乗二以爲城積甚分明五因其積三而一此是堅求壤法行穿地四因爲壤積法中仍用五歸成穿地四尺爲壤五尺爲堅三尺壤是虛土也堅是实土也穿地求壤五因求堅三因皆四歸之壤地求穿四四求堅三因皆五歸之堅地求穿四因求壤五因皆三歸之城垣堤溝求積併上下廣折半以高深乗之又以長乗之得積方臺求積上方自乗下方自乗另以上下方相乗併之
