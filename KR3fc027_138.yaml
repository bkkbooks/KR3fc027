body:
  text: 又十二字訣日乘從每下得術歸從法前得令定位祕訣凡定位俱從實上原首位數起至遇法首位乘則每數即斤兩貫丙石等類除則不拘斤兩貫箇千萬等類則止乘從每下得術術者乃法首位每下該得之名也從實上原首位赳往後順數至法首位每數則止于下位得法首每該之名是錢呼錢是石呼石是兩呼兩已上十百千萬已下厘毫合勺回向前數則升依數呼之歸從法前得令令者斤兩貫箇石等類亦從實上原首位起
