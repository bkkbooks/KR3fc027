body:
  text: 得七二此乃合斤之兩數可用加六法加之二六加一十二六七加四十二共成一十一兩五錢二分是也亦是異乘同除法今有木香一十二斤價銀四兩三錢二分問每兩價若干答曰二分二厘五毫法曰置銀四兩三錢二分為實以木香一十二斤為法除之每斤得價三錢六分以兩求斤法呼之六三七五三一八七五合問若用十六歸除亦得今有豬肉八十四斤每銀一兩四十八斤算問該銀若干答曰一兩七錢五分法曰置肉八十四斤為實以每兩四十八斤為法除之合同
