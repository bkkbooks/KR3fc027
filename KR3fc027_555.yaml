body:
  text: 得七二此乃合斤之両数可用加六法加之二六加一十二六七加四十二共成一十一両五錢二分是也亦是異乘同除法今有木香一十二斤價銀四両三錢二分問毎両價若干荅曰二分二厘五毫法曰置銀四両三錢二分爲實以木香一十二斤爲法除之毎斤得價三錢六分以両求斤法呼之六三七五三一八七五合問若用十六歸除亦得今有豬肉八十四斤毎銀一両四十八斤筭問該銀若干荅曰一両七錢五分法曰置肉八十四斤爲實以毎両四十八斤爲法除之合同
