body:
  text: 答曰五十七石六斗法曰置下周二丈四尺自乘得五百七十六尺以高九尺乘之得五千一百八十四尺却以尖堆率三十六除之得一百四十四尺為實以斛法二尺五寸為法除之合問今有倚壁堆米下周六十尺高一十二尺問積米若干答曰九百六十石法曰置下周六十尺自乘得三千六百尺又以高十二尺乘之得四萬三千二百尺用倚壁率十八除之得積二千四百尺為賓以斛法除之合問今有倚壁內角堆米下周三十尺高十二尺問積米若干
