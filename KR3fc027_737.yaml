body:
  text: 九塊因此不及而為之命餘倣此今有方田積七萬一千八百二十四步問平方一面若干答曰每一面方二百六十八步法日置方田積為實以開平方法除之初商二百于左位亦置二百于右位為方法以左二對右二相呼二二除實四萬訖餘實三萬一千八百二十四步就以方法二百倍作四百為廉法次商六十于左初商二百之下亦置六十于廉法四百之下為隅法四百六十皆與次商六十呼除先以左六對右四呼四六除積二萬四千又左六對右六呼六六除積三千六百餘實四千二百二十四步却以右位次商六十倍加六十于四百之下共
  hash: sha256:6018125bfb432bb7986af8b847e5e4f6b51398f2f036fe6bd2025833f3cbe879
