body:
  text: 仙人換影歌又曰貴賤相和貴賤相和換影仙賤物互乘貴價錢貴物互乘賤價訖相减餘爲長法然先使總錢乘賤物後用總物乘賤錢二数相减餘爲實長法除之短法言貴物貴價各乘短物價分明皆得全總内减貴餘爲賤不遇知音不與傳今有錢四千九百九十五文共買桃梨五千箇只云錢一十一文買桃九筒又錢四文買梨七箇問桃梨各若干荅曰佻三千二百八十五箇諛錢四千零一十五文
