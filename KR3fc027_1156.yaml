body:
  text: 得八與二行梨八對減盡桃七得二十八空價四分得一錢六分加四行一分六厘共一錢七分六厘又以三行桃四遍乘四行桃負二十八得一百一十二榗三十二得一百二十八價一錢七分六厘得七錢令四厘却以四行桃負二十八遍乘三行桃四得一百一十二與四行桃减尽榗七得一百九十六减四行榗一百二十八餘六十八爲法價三分得八錢四分减四行價七錢令四厘餘一錢三分六厘爲實以法除之得二厘爲榗價於三行價三分内减榗七共價一分四厘餘一分六厘以桃四除之得四厘爲桃價於二行價四分內減七桃價共二分八厘餘一分二厘以二梨除之得六厘爲梨價於一行價四分內減四梨共價二分四厘餘一分六厘以二瓜除之得八厘爲瓜
