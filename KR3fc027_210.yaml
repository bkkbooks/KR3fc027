body:
  text: 萬則止向前一位得令是石也順數降下合得法五萬歸定位實首二十起五二倍作四本位加二為四原實十起呼十往前逆數遇法是萬合得四勺百合千升萬法上是五萬人遇萬即止前一位得令是石也斗前位是石也退後降小合得石還原用五因四五得二十假如今有銀二百六十五兩三錢二分作六人分之問每
