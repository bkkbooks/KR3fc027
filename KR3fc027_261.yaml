body:
  text: 四九三十六一四如四八九七十二一八如八六九五十四一六如六假如今有銀二十六兩六錢買猪二十八隻問每隻該銀若干答日九錢五分法日置銀為實以猪二十八隻為法除之合問法酋八隻除二十歸定位法實首位十數皆同實尾六錢五八除四十恰尽六兩二一添作五本位加四為五八九除七十二本位去七右位去二定位五分實首二十見二無除作九二變二為九右位加二原實十法首是十過十即止合前位得合是兩也得九錢
