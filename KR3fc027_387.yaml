body:
  text: 又考如前圓田內除方田一丘方四十步占積一千六百步四邉四弧矢占積七百六十八步共合圓田積却多一十六步其多者何也是弦自乘得一千六百步每百步中多一步該十六步也或每弧矢內減去四步只該一百八十八步又考弧矢田居直田四分之三假如弧矢田弦長四十步矢濶八步問圓中徑若干答曰今改正得徑五十六步又設此間以辨前大小二弧矢虛實之數法曰置弦長折半得二十步自乘得四百步以矢八步除之得五十步加矢八步共得五十八步却比前圓徑多二十步今減去是也今改其數乃是細半箇圓田因弦長而矢短故虛數差不準
