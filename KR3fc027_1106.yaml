body:
  text: 上三人互乘右中九両得二十七再以右上五人互乘左中五両得二十五二数相减餘二爲除人實物實法次以右中得数二十七乘左下盈十両得二百七十両就爲物實以前法二除之得銀一百三十五両却以左下盈十両就爲人實率先以前通法十五乘之得一百五十爲人實後仍以前法二除之得七十五人合問雙套不足適足倣此取錢買物盈朒歌取錢買物求盈朒分子互將分母乘乘訖將來通物價以錢併作物之情互乘物價亦相併乘子除爲錢實名
  hash: sha256:8df0a9539d3aaa1245f74d64327d0a21253a931432f466690bfe272148be2125
