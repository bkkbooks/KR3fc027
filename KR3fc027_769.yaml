body:
  text: 平圓法歌平圓之法若求周十二乘積数可求求徑四因三而一開平方法以除收法日問外周者置積若干以圓法十二乘得若干爲實以開平方法除之得周若要還原如圓田以外周自乘又以二十除見積若周下原有不盡数者以周自乘併入不盡以二十除見積問徑者置積若干以四因三歸得若干爲實以開平方法除之得徑其圓居方四分之三故用四因三歸之若要還原如圓田以徑自乘併入不盡数以三因四歸之見積
