body:
  text: 楊輝方求斜法置方步自乘得一百步是一箇小方積倍之得二百步是兩小方積用開平方法除之得斜十四步却有不盡餘實四步斜求積法置斜步如大方面自乘得積一百九十六步如兩箇斜方積折半得九十八步如一箇斜方積却比前方積步中少二步斜求方面置斜步自乘折半得積九十八步如一箇斜方積以開平方法除之得方面九步九分此論大方一箇方面一十四步內容斜方一箇即小方也斜亦一十四步自乘得一百九十六步是兩箇斜方積內小方斜積一箇九十八步外四角用勾股求弦法得弦九步九分即如小方靣自
  hash: sha256:5c128a395ab36ce2a4852d2cf354d484b44651fc144ef6fbe5ee5285c8f11f9e
