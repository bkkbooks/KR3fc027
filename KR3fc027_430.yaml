body:
  text: 楊輝方求斜法置方歩自乗得一百歩是一箇小方積倍之得二百歩是両小方積用開平方法除之得斜十四歩却有不盡餘實四歩斜求積法置斜歩如大方面自乘得積一百九十六歩如両箇斜方積折半得九十八歩如一箇斜方積却比前方積歩中少二歩斜求方面置斜歩自乗折半得積九十八歩如一箇斜方積以開平方法除之得方面九歩九分此論大方一箇方面一十四歩内容斜方一箇卽小方也斜亦一十四歩自乗得一百九十六歩是両箇斜方積内小方斜積一箇九十八歩外四角用勾股求弦法得弦九歩九分卽如小方靣自
  hash: sha256:38448112dfb67b23ba4e0079d0350bb70429a5a9b7d62c37b30008aba0082360
