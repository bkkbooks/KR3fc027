body:
  text: 各人衰數得各人出納數也今有米三百八十五石五斗二升令二等人戶從上四六出之甲上等二十六戶乙下等四十戶問各戶各若干答曰上等每戶七石三斗二升計一百九十石三斗二升下等每戶四石八斗二升計一百九十五石二斗法曰置米為實另以上等二十六戶以六因得一百五十六衰又以下等四十戶以四因得一百六十衰二共併之得三百一十六衰為法除實得一石二斗二升為一差衰以六因得七石三斗二升是上等一戶出數另以一衰數以四因得四石八斗八升是下等一戶所出數各以戶數乘之合問
  hash: sha256:825c5f639536d6a786746fdd3eb270dcdf4bc55665068a6d5216bf99a4eed5a2
