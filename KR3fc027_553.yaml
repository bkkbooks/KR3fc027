body:
  text: 該銀若干答曰一兩四錢五分零七毫七絲汯曰置今買銅五斤二兩以斤求兩汯加之只加斤不加兩五六加三十共得八十二兩以原銀二錢三分乘之得一十八兩八錢六分為實以原銅一十三兩為法除之合問此乃異乘同除之法原有銀七錢五分買墨二斤四兩今有銀二錢四分問諛墨若干答曰該墨一十一兩五錢二分法曰置今有銀二錢四分以原買墨二斤四兩可將四兩化為二五共二斤二五為法乘之得五十四兩為實以原銀七錢五分為法除之
  hash: sha256:4b3a4f17daa72670a39cccc71f6b2d8aecd8d37f623a8ce4c14d25d236068c32
