body:
  text: 四十四寸爲實以開平方法除之得一十二寸倍之得二尺四寸合問今有股長三十六步只雲弦多勾十八步問勾弦各若干荅曰勾二十七步弦四十五步法曰置股三十六步自乘得一千二百九十六步另以弦多勾一十八步爲勾較自乘得三百二十四步二位相減餘九百七十二步爲實倍較十八得三十六步爲法除之得勾二十七步加較一十八步得弦長四十五步合問卽勾弦相差一法名弦較求弦置股自乘得一千二百九十六步爲實以弦較十八步爲法除之得勾弦和七十二步仍和較一十八步共九十步折半得弦四十五步內減較一十八步餘二十七步卽勾之數也
