body:
  text: 古法周圍三尺圓徑一尺假如圓徑三十二尺以周三因之得九十六尺而四尺矣嶶術周百尺徑三十一尺四尺宻術周二十二尺徑七尺智術圓徑三十二尺周有百尺術日圓徑卽方徑若求圓積四分之三不必立法惟以圓求方其法不一始錄亍此盖圓徑一則周不止于三所謂周三徑一者舉其大較耳方五斜七者此乃言其大畧矣内方五尺外方七尺有奇方靣求弦法日以方面自乗依之爲实以開平方法除之得七歩七一故日斜七有奇以此自乗折半得積二十三歩若以七歩自乗折半得積二十四歩半校之得積不全
