body:
  text: 次商遍乘名為廉方法乘廉除次積次商自再乘名隅依數除積方了畢初次三因又為方三商偏乘傲此得謂商歌一千商十定無疑三萬為三十餘九千九萬不離十百萬方為一百推解曰謂如積一千步約商九十步又如積三萬就約商三十步又如積九十九萬步就夠商九十步如積一百萬步可約商一百步乃自乘再乘之積而求原數也此謂有實無法故曰約之
