body:
  text: 次商遍乘名爲廉方法乘廉除次積次商自再乘名隅依数除積方了畢初次三因又爲方三商偏乘傲此得謂商歌一千商十定無疑三萬爲三十餘九千九萬不離十百萬方爲一百推解曰謂如積一千歩約商九十歩又如積三萬就約商三十歩又如積九十九萬歩就夠商九十歩如積一百萬歩可約商一百歩乃自乘再乘之積而求原数也此謂有實無法故曰約之
