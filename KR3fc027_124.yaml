body:
  text: 八七八十六逢八進一十九歸九歸隨身下逢九進一十右法與九九合數相混伹記句法惟辨多數在先少數在次即九歸之句如八六七十四是歸六八四十八是因之類已上句法併後各樣歌訣皆學者所當熟記因乘法者單位日因位數多日乘通而言之乘也置所有物為實以所求價為法皆從末位而起如法乘之呼九字相生之數次第乘之呼如須次位言十在本身升積謂之乘其數離升而位反降矣必須用定位之法而治之詳見于後
