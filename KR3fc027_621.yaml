body:
  text: 却以六十三用三歸七因得一百四十七為乙衰却以一百四十七用三歸七因得三百四十三為甲衰併得五百八十五位者首位三以三因又三因再三因得八十一為戊衰却以戊衰用三歸七因得二百八十九為丁衰却以丁衰用三歸七因得四百四十一為丙衰却以丙衰用三歸七因得一千零二十九為乙衰却以乙衰用三歸七因得二千四百零一為甲衰併得四千一百四十一各以副併為法除實得一衰數以乘各衰如位數多者皆以三因首位用三歸七因以求下位衰數今有金三千兩令休績二縣金行鋪戶三七上納問各該
