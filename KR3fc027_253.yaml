body:
  text: 荅曰四百五十石法日置總銀爲實以每斗價五分四厘爲法歸除之合問定位法只認實上原首位起往後順数至分過法首位是每斗五分則止前一位得令是斗逆数厘上合得後做此法酋四厘五分爲歸除定位法少實多定位分法首位是每斗五分過分即止前一位得合是斗也錢是斗也向前進数陞上合得斗實尾二両四五除二十逢五進一十本位去二尺本位去五進一千左両十
