body:
  text: 答曰四百五十石法日置總銀為實以每斗價五分四釐為法歸除之合問定位法只認實上原首位起往後順數至分過法首位是每斗五分則止前一位得令是斗逆數釐上合得後做此法酋四釐五分為歸除定位法少實多定位分法首位是每斗五分過分即止前一位得合是斗也錢是斗也向前進數升上合得斗實尾二兩四五除二十逢五進一十本位去二尺本位去五進一千左兩十
