body:
  text: 假如直田縱長六十步廣斜相和一百步問積若干答曰一千九百二十步折半如勾股法日置廣斜百步自乘得一萬步另以緃六十步自乘得三千六百步以少减多餘六千四百步折半得三千二吾步為實以廣折和一百步為法除之得廣三十二步以縱六十步乘之得積一千九百二十步合問假如直田兩隅斜去六十八步只云縱多廣二十八步問積若干答曰一千九百二十步折半如勾股積法日置斜六十八步自乘得四千六百二十四步另以縱多廣二十八步自乘得七百八十四步以少减多餘三十八百四十步折半得積合問
  hash: sha256:550cd2b83849d8ae85d72d0e4458ae07514bcf70fbb8654ccc519f8a82658514
