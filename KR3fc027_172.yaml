body:
  text: 此所謂逢如隔位者也八斗實尾位四錢起呼二四如八本位除去下位如八下位泵位是石也回向前逆數逐位升之合得六石三兩二三如六本位除去下位如六兩法上是每兩二石遇兩即止下一位得術是石也四十二十二二如四本位除去下位加四十合得二百實首位二百一二如二本位除去下位加二原實百起呼百往後順數至而還原用二歸法詳後逢二進一十逢四進二十逢六進三十逢八進四十假如今有米二百三十四石五斗每石賣銀三錢問共該銀若干
