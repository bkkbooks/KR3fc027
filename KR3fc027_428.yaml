body:
  text: 田畝演段根源圖解方求積法置方十步自乘得積一百步合問張丘建方求斜法置方十步用五歸得二是兩箇方正却用七因得斜十四步故曰方五斜七若依方五求斜則斜有餘若依斜七求方則方不足假如方田隅斜一十四步問積步併方面各若干答曰積一百步實只有九十八步方面十步實只有九步九分張丘建法置斜十四步用七歸得二乃是二箇斜七却用五因得方面十步是兩箇方五就以方十步自乘得積一百步有斜必有方只以方求積無差
  hash: sha256:149194d6645e439461f8fd8e47d3370b11cee0dffc4604eb5bafe283d175f130
