body:
  text: 解曰弧矢狀類勾股勾股得直方之半故倍其積以股除之即得勾股背曲倍積則長一弦而又一矢以矢乘積倍之恰得一弦一矢之數因未知矢故以積自乘為實約矢一度乘積以為上廉兩度乘徑以為下廉併之為法而後可以得矢用三乘者何也積本平方以積乘積是兩度平方矣故用三乘方法開之上廉下廉俱用四因者何也倍積則乘出之數為積者四故上下廉俱四以就之減徑者何也徑乃圓之全徑矢乃截處之勾矢本減徑而得故亦減徑以求矢五為負隅者何也凡平圓之積得平方四分之三在內者七五在外者二五不拘圓之大小每方一尺該虛隅二寸五分其矢得四其虛隅得一合而為五亦陛實就法之意如不倍積廉不用四因以一二五為隅法亦通或不減徑作添積三乘方法亦通新編直指算法統宗卷之七
  hash: sha256:4db4aa0717540aed0854b042faa8f24ec17ef0d1caecc093d3d8252ac308e61e
