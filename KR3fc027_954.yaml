body:
  text: 解曰弧矢狀類勾股勾股得直方之半故倍其積以股除之卽得勾股背曲倍積則長一弦而又一矢以矢乘積倍之恰得一弦一矢之数因未知矢故以積自乘爲實約矢一度乘積以爲上廉両度乗徑以爲下廉併之爲法而後可以得矢用三乗者何也積本平方以積乗積是両度平方矣故用三乗方法開之上廉下廉俱用四因者何也倍積則乗出之数爲積者四故上下廉俱四以就之减徑者何也徑乃圓之全徑矢乃截處之勾矢本减徑而得故亦减徑以求矢五爲負隅者何也凢平圓之積得平方四分之三在内者七五在外者二五不拘圓之大小每方一尺該虚隅二寸五分其矢得四其虚隅得一合而爲五亦陛實就法之意如不倍積廉不用四因以一二五爲隅法亦通或不减徑作添積三乗方法亦通新編直指筭法綂宗卷之七
