body:
  text: 一十二恰盡合問今有圓箭一束外周三十六根問總積若干荅曰一百二十七根法曰置外周三十六于左亦置三十六于右加內周六共四十二相乘得一千五百一十二爲實以圎束法十二除之得一百二十六加中心一合問凢圓物乃是六箇周中包一以六婦外周卽知層数也目内之外每層加六自外之內每層减六今有三稜物九十一箇問外周若干荅曰外周三十六箇
