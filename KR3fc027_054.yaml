body:
  text: 保氏而吾幾其副耶匪汝思自任亦汝思之自淂者耳汝思之書具在一寓目而于古所謂方田以下旁要以上九數云者靡不了了于胸臆間妱知汝思之稱說不迂矣余謂汝思不佞于此道未見一斑第嘗讀漢記至安定嵩真玄菟元理一能自算其年壽一能為友人算困米舉所食筋十餘轉不差圭合其術
