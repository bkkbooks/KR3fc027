body:
  text: 答曰高二丈三尺方倉三丈六尺法日置積二萬九千八百八尺為實以開立方帶縱法除之約實二萬商三十尺自乘得九百尺再以三十尺乘之得二萬七千尺又約商三十六尺自乘得一千二百九十六尺另置三十六尺减不及一十三尺餘二十三尺乘之得二萬九千八百零八尺除實盡得方倉三十六尺高二十三尺合問今有二乘方積二千零一十五萬一千一百二十一尺問一靣若干答曰六十七尺法日置積為實下法常起三位初商六十于左下法
