body:
  text: 除倍積四百五十得積濶一十五步另將原長減去截長三十步餘得下長一十步合問今有圭田長七十五步北濶三十步今自北濶截積七百二十步問截長濶各若干答曰截下長三十步濶一十八步又法置截積七百二十步倍之得一千四百四十步以原濶三十步乘之得四万三千二百步為實以原長七十五步為法除之得五百七十六步再以北濶三十步自乘得九百步以減五百七十六步餘三百二十四步為實以開平方法除之得截濶一十八步併北廣三十步共四十八步折半得二十四步為法除截積七百二十步得截長三十步合問
  hash: sha256:af759584e99c525f8735d9d2729a4439ff850360220032783cfc48a4ab115465
