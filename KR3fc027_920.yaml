body:
  text: 除倍積四百五十得積濶一十五歩另將原長减去截長三十歩餘得下長一十歩合問今有圭田長七十五歩北濶三十歩今自北濶截積七百二十歩問截長濶各若干荅曰截下長三十歩濶一十八歩又法置截積七百二十歩倍之得一千四百四十歩以原濶三十歩乘之得四万三千二百歩爲實以原長七十五歩爲法除之得五百七十六歩再以北濶三十歩自乘得九百歩以减五百七十六歩餘三百二十四歩爲實以開平方法除之得截濶一十八歩併北廣三十歩共四十八歩折半得二十四歩爲法除截積七百二十歩得截長三十歩合問
