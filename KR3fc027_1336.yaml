body:
  text: 七文以少减多餘四十一爲常法又以右中七箇互乗左下九百九十九文得六千九百九十三文再以左中四文互乗右下一千箇得四千以少减多餘二千九百九十三文却以常法除之得七十三爲短法若求甜果以七十三乗九箇得甜果六百五十七箇另以七十三乗一十一文得甜果錢八百令三文於總果內除六百五十七餘苦果三百四十三箇又於總錢减去甜果錢餘得苦果錢合問均舟載塩歌四千三百五十塩大小船隻要齊肩五百塩裝三大隻三百塩裝四小船請問船隻多少数毎隻船載幾引塩
