body:
  text: 遠望巍匕塔七層紅光點匕倍加增共燈三百八十一請問尖頭幾盞燈荅曰頂層三盞法曰置共燈三百八十一盞爲實列置衰一二四八十六三十二六十四併之得一百一十七衰爲法除實得三爲頂層燈数各加倍得各層燈数合問三等賠償鷓鴣天八馬九牛十四羊趕在村南牧草場吃了人家一叚榖議定賠他六石粮牛一隻比二羊四牛二馬可賠償若還筭得無差錯姓字超羣到處揚
