body:
  text: 假如直田長六十步濶三十二步問積稅各若干答曰積一千九百二十步稅八畝法日置長六十步以濶三十二步乘之得積一千九百二十步為實以畝法二四除之合問假如圓田徑五十六步周一百六十八步問積若干答曰二千三百五十二步法曰以徑問積置徑五十六步自乘得三千一百三十六步又以七五乘之得積二千三百五十二步若周徑問積置周一百六十八步以徑五十六步乘之再以四歸之亦得若周問積以周自乘用十二除之亦得合問
