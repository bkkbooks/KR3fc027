  text: 法酋五人四百除空歸除實尾五釐三分五七除卅五本位去三右位除五盡公錢逢八進二十本位去八進二十于存定位實首二兩起四二添作五變二為五原實兩起呼兩向前逆陛至遇法首位百止合得七釐十百法首位是百遇百即止前一位得合九兩石前位是兩也順數降下合得還原用乘
