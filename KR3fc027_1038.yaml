body:
  text: 丁三千四百三十八石九斗一升四合該鈔二十五両戊一千八百七十九石五斗六升八合四勺該鈔一十五両解日甲縣乃自輸本縣而無僦里惟乙丙丁戊四邑有之各照里数遠近以僦鈔一錢因之各得僦里鈔也法曰置甲縣戸数爲實以粟價二両爲法除之得一千令二十六衰乙縣行道二百里以毎車載二十五石除之得八錢併粟價一両共一両八錢除戸数得六百八十四衰丙縣行道一百五十里以毎載二十五百除之得六錢併粟價共一両八錢除戸得三百九十九衰丁縣行道二百五十里亦以二十五石除之得一両併粟價共二両七錢除戸得四百九十四衰戊縣行道一百五十里亦以二十五石除之得六錢併粟價共
