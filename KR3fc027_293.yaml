body:
  text: 歌曰減法須知先定身得其身數始為真法中有一何曾用身外除零妙入神假如今有銀二百九十四兩八錢買絹每匹價銀一兩一錢問該絹若干答曰二百六十八匹法日置總銀為實以每匹除價首一兩不用只以次位一錢為法定身減而除之合問定位此是求總之法數原實順下至錢則止前一位是匹也逆數升上合得法錢為減定位
