body:
  text: 歌曰减法須知先定身得其身数始爲眞法中有一何曾用身外除零玅入神假如今有銀二百九十四両八錢買絹每疋價銀一両一錢問該絹若干荅曰二百六十八疋法日置總銀爲實以每疋除價首一両不用只以次位一錢爲法定身减而除之合問定位此是求總之法数原實順下至錢則止前一位是疋也逆数陞上合得法錢爲减定位
