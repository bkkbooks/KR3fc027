body:
  text: 二八一十六一八如八假如今有銀二百六十五兩三錢二分買椒每斤價銀丸分問共該椒若干答曰二千九百四十八斤法日置總銀為實以每斤椒價九分為法歸之合問法九分歸定位實尾二分逢九進一十本位去九進一于左分法上是九分遇分即止前一位得令是斤也二錢九七下加七本位不動右位加七錢是斤也向前道升合得五兩九四下加四逢九進一十本位不動右位加四本位去九進一于左兩四十六十九八下加八本位不動右位加八十九百
