body:
  text: 硯正三爲法復遍乘右行中筆負三得九同减左行筆負六十三餘得筆負五十四爲法價正四百八十得正一千四百四十異加左行價負一千二百六十共得二千七百爲實以法除之得筆價五十文右行價正四百八十異加筆負三價一百五十共得六百三十以硯七除之得硯價九十文合問西江月七釧九釵成噐釧子分兩重多九兩四錢是相和仔細與公説過二物相交一隻秤之適等無那不能筭得是喽囖二人却來問我荅曰釧一隻重七錢釵一隻重五錢
