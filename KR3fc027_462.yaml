body:
  text: 答曰錠占積一百步兩腰外餘積四十八步法曰圓徑即錠長十四步又如圓內方之斜也以方五斜七之法置十四步以七歸五因得方十步自乘得錠占積一百步置兩腰外如欖田長十步加半濶二步共十二步以濶四步乘得餘積四十八步加入錠占積共合圓田總多一步者是欖長十步自乘得百內多一步舊法以錠長自乘折半得九十八步却以二步其錠長如方田斜求積則百步中少二步可用九八歸除即一百步法截上下有餘補兩腰不足作方十步自乘得一百步錠田還原以積用開平方法除得十步却以五歸七因得斜長十四步也
