body:
  text: 荅曰錠占積一百歩兩腰外餘積四十八歩法曰圓徑卽錠長十四歩又如圓內方之斜也以方五斜七之法置十四歩以七歸五因得方十歩自乗得錠占積一百歩置兩腰外如欖田長十歩加半濶二歩共十二歩以濶四歩乗得餘積四十八歩加入錠占積共合圓田總多一歩者是欖長十歩自乘得百內多一歩舊法以錠長自乗折半得九十八歩却以二歩其錠長如方田斜求積則百歩中少二歩可用九八歸除卽一百歩法截上下有餘補兩腰不足作方十歩自乘得一百歩錠田還原以積用開平方法除得十歩却以五歸七因得斜長十四歩也
