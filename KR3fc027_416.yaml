body:
  text: 右量田地之法舉此數條巳見大意若截作幾叚凑形以例其餘如蛇碗丘扇盆瓜鑿欹側者形狀極多難以一一盡述考究校之數無准積恐悞學者故盡删去不錄今纂集直指圖形具之于前以爲通變之術若平地而無碍者或作幾叚定形立法只以勾股圭梭梯斜弧矢方直之類截而量之或併或减以求實積倘遇基地有房屋者難用此法必須取其方直或借别地以凑方直筭積内减除還則形可窮而数可盡學者詳玩形勢理何異焉凢圖形内用點斷節以爲繩索耕形定式之辨
  hash: sha256:c9567273e028435b8bfc3709ad40dd0114939dcd185139f42b702bba86fbcfe4
