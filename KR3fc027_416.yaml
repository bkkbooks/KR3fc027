body:
  text: 右量田地之法舉此數條巳見大意若截作幾假湊形以例其餘如蛇碗丘扇盆瓜鑿欹側者形狀極多難以一一盡述考究校之數無準積恐誤學者故盡刪去不録今纂集直指圖形具之于前以為通變之術若平地而無礙者或作幾假定形立法只以勾股圭梭梯斜弧矢方直之類截而量之或併或減以求實積倘遇基地有房屋者難用此法必須取其方直或借别地以湊方直算積內減除還則形可窮而數可盡學者詳玩形勢理何異焉凡圖形內用點斷節以為繩索耕形定式之辨
  hash: sha256:74a133b3d3dd37142da0c059946987ca49fbad0b80d28c02fdce46da761f2909
