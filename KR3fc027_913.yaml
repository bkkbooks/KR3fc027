body:
  text: 圭田截積歌若作三段分者先截尖段下二段以做梯形截法圭田截積小頭知倍積原長以乘之原濶歸除為實積開方便見截長冝仍以截長乘原濶原長為法以除之除來便見截濶數法明簡易不須疑今有圭田長七十五步北濶三十步今自尖頭截積四百零五步問截長濶各若干答曰長四十五步濶一十八步圭截小頭法日置截積四百零五步倍置得八百一十步以原長七十五步乘之得六萬令七百五十步以濶三十步除之得二千令二十五步為實以開平
  hash: sha256:c0cb7b89e3c0929534eb9daf1147898333f242d97c7a895ae8f6bc1381bf1534
