body:
  text: 開方便見弦之數法術從來有見成勾弦求股要推詳各自乘來各一張以少減多餘作實實求股數要開方弦股求勾皆一例算師熟記莫相忘勾股求弦法曰置勾自乘股自乘併二數以開平方法除之得弦數其勾自乘股自乘二數併之合弦自乘數故用開平方法除之卽得弦斜數也勾弦求股法曰置弦自乘內減勾自乘餘以開方除之得股長數其弦自乘數內有一勾自乘一股自乘數今減去勾自乘數餘是股自乘數故用開平方除之得股長數股弦求勾法曰置弦自乘內減股自乘餘以開方除之得勾濶數其弦自乘有一勾一股自乘數今減去股自乘數餘是勾自乘數故用開平方除之得勾濶數
