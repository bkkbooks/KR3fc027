body:
  text: 共該米若干答日二百四十六石八斗法日置銀于左為實以每銀糴米二石于右為法因之合間定位法只認兩下位即錢之位定石逆上即兩之位定十石再上位十兩之位定百石合得此所謂因乘俱向下位推先數原實百起順下至兩遇法首位每兩二石則止下位得術是石回向前逐位逆數升上合得也今列布算之方于後法二石為因
