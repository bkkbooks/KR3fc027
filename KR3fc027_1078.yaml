body:
  text: 得一百七十五疋爲絹数又併盈十五不足五共二十爲人数合問此是分八疋分九疋相减餘一爲法者雖用歸之数亦如故惟以大数変化爲小故不必用此法亦得只併盈朒爲人實另併前互乘二位爲絹数人有絹一疋欲作帳幅先摺作六幅比舊帳長六寸後摺作七幅比舊帳短四寸問絹及舊帳幅長各若干荅曰絹長四丈二尺舊帳幅長六尺四寸法曰置絹六幅以長六寸乘之得三尺六寸另置七幅以短四寸乘得二尺八寸如盈不足列六幅七幅互乘短二尺八寸長三尺六寸以七幅互乘長三尺六寸得二丈五尺二寸又以六幅互乘二尺八寸得一丈六尺八寸併二数得四丈二尺爲絹實却以七幅減去六幅餘一幅爲法除絹實得絹長
