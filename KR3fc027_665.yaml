body:
  text: 得數是四分再將二等與三等仍前考之其二等原得數却是六分三等原得數却是四分也其二八三七俱照此考驗無差因指明等書不依古法却以十分之六誤為四六以十分之七為三七以十分之八為二八俱差矣因差而考之今有絹四百七十丈零一尺八寸四分令三等人戶作十分之六出之上等二十五戶中等三十戶下等四十八戶問每戶各若干答曰上等每戶七丈八尺共一百九十五丈中等每戶四丈六尺八寸共一百四十丈零四尺
