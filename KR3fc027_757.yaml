body:
  text: 上商二相呼除實盡得濶一十二步加不及九步得長合問今有勾股田積四百八十六步只云勾少弦一十八問各若干答曰勾濶二十七步股長三十六步弦斜四十五步法日倍積得九百七十二步為實以弦差一十八步折半得九步為縱方開平方法除之得勾二十七步加差一十八步為弦斜四十五步另以勾自乘弦自乘二數相減餘一千二百九十六步為實以開平方法除之得股長三十六步合問今有勾股田積四百八十六步只云股少弦九步問各若干
