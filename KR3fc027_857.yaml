body:
  text: 為實以開立方帶縱除之以方多三尺自乘得九尺為縱方再置三尺倍之得六尺為縱廉約積一千商十尺今有縱方只商九尺置于實前另以九尺自乘得八十一尺加入縱方九尺共九十尺為方法另以縱廉六尺以九尺乘之得五十四尺為廉法二法併共一百四十四尺于右下以所商九尺相呼一九除九又呼四九除三十六又四九除三十六實盡以商九尺為高加入方多三尺得方倉一十二尺合問今有立方一所積一千七百八十七萬五千尺只云高濶相等長多濶三十六尺問立方高濶及長若干答曰長二百八十六尺濶二百五十尺
