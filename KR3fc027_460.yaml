body:
  text: 角田一段每角面濶七步問八角占積併外餘若干答曰八角占積二百三十九步角外餘積五十步法曰每七步是上下斜角面如斜求方以五因其歸得五倍之得十步是上下二段長加中一段面七步共十七步自乘得方面總積二百八十九步另以一角長五步自乘得二十五步倍之得外餘積五十步以減上積餘得八角占積二百三十九步合問假如圓田徑十四計積一百四十七步內容錠田占積併兩腰外餘積如欖形田二段長是步濶四步問該積若干
  hash: sha256:d69bdaf3b4a8f0e06618f802c99be0550a4517a557c54f7d5c9e3ac854913dae
