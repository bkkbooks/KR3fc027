body:
  text: 高二百五十尺法日置積一千七百八十七萬五千尺為實以開立方待縱法除之初商約得二百尺自乘得四萬尺再乘得八百萬尺又約二百五十尺自乘得六萬二千五百尺再以二百五十尺乘之得一千五百六十二萬五千尺减去積餘積二百二十五萬尺為實另置長多三十六尺以所商二百五十尺乘之得九十尺再以二百五十尺乘之得二百二十五萬尺除實恰盡得濶二百五十尺加入長多三十六尺共二百八十六尺為長數合問今有立方積二萬九千八百零八尺高比方不及一丈三尺問高方各若干
  hash: sha256:eeb4c641b9e4f250ee56b859b50d136787b81f112e262709c5fcf94459a21c95
