body:
  text: 法日先以一両二錢三分列爲三行從左起依次增加逐位而下分又加四分作又加五分五去五存進一于前又加二分作四分二錢有加六錢作有加八錢八退二存進一于前加後進一作又加九錢九退一存進一于前六綫左起両又加二両作又加三両作加後進一作又加四両四退六存進一于前加後進一作二両後進一合得一十又式假如照前問数一両二錢三分二両六錢四分分三両八錢五分四両九錢二分両合得一十因法式假如今有米三十六石五斗每石價銀四錢問該銀若干
