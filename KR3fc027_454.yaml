body:
  text: 梯斜兩廣併來折半以乘長得積假如上廣六歩下廣八歩併得一十四歩折半得七歩以長乘之得積如借西北之角斜而倒凑東南之角直其理明矣梯斜二田形異理同解曰此是將北廣除一歩以凑南廣六歩均七爲之理形雖委曲筭折爲方其形原有定界不能変移筭中折法似凑方直之理
