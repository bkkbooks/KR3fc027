body:
  text: 梯斜兩廣併來折半以乘長得積假如上廣六步下廣八步併得一十四步折半得七步以長乘之得積如借西北之角斜而倒凑東南之角直其理明矣梯斜二田形異理同解曰此是將北廣除一步以凑南廣六步均七為之理形雖委曲算折為方其形原有定界不能變移算中折法似凑方直之理
