body:
  text: 法日置十二步以分母四通之得四十八步加分子二共得五十步自乘得二千五百步又以分母四减分子二餘二以乘分子二得四併前積二千五百四步為實另以分母四自乘得一十六為法除之此合開方不盡法已上皆雙分母子法今有直田長一十五步濶三步五分步之四問該積若干答曰五十七步法曰置濶三步以分母五遍之得十五加分子四共十九另置長十五步以分母五通之得七十五二數相乘得一千四百二十五為實另以分母五自乘得二十五為法除之合濶問此是單分母子法
  hash: sha256:9a0c7cfda777cc18ae10839f1f25f2cfe3fa4da791b9d250788f7a9b9c3098ec
