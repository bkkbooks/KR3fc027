body:
  text: 法日置十二歩以分母四通之得四十八歩加分子二共得五十歩自乘得二千五百歩又以分母四减分子二餘二以乘分子二得四併前積二千五百四歩爲實另以分母四自乘得一十六爲法除之此合開方不盡法已上皆雙分母子法今有直田長一十五歩濶三歩五分歩之四問該積若干荅曰五十七歩法曰置濶三歩以分母五遍之得十五加分子四共十九另置長十五歩以分母五通之得七十五二数相乘得一千四百二十五爲實另以分母五自乘得二十五爲法除之合濶問此是单分母子法
