body:
  text: 荅曰趙一該貼一両三錢六分八厘錢二八錢一分六厘孫三三錢三分六厘法曰置趙一貨九十五担以毎担船脚銀六分乗之得五両七錢另以錢二貨八十五担以毎担船銀四分乗之得三両四錢又以孫三貨五十六担以毎担船銀二分五厘乗之得一両四錢併三数原船脚銀一十両令五錢爲法却以貼銀二両五錢二分爲實以法除之得二錢四分乃是船脚毎両貼剝之数就以此二錢四分爲法以乗各客船脚銀数卽得筆套取齊歌八萬三千短竹竿將來要把筆頭安
