body:
  text: 五人爲法四兩爲實倍作八法實相呼將四兩添四变作每人八錢五人五八得四両合原逢五進一十法五人實五兩歸日逢五進一于前位每人各得一兩五人共得五両以合原数六歸六人爲法一両爲實下加四法實相呼一兩不動变作每人一錢六人共除六錢餘四錢歸日下位加四四錢又用後六四六十四歸法筭六人爲法二兩爲實三十二法實相呼將二両添一变作每人三錢六人三六共除一兩八錢餘二錢歸日三十二二錢又用此歸重筭六人爲法三兩爲實添作五法實相呼將三兩添二变作每人五錢六人五六得三兩合原六人爲法四兩爲實六十四法實相呼將四兩添二变作每人六錢六人共除三兩六錢餘四錢歸日六十四四錢又照此歸筭六人爲法五兩爲實八十二法實相呼將五兩添三变作每人八錢六人共除四両八錢餘
