body:
  text: 五人為法四兩為實倍作八法實相呼將四兩添四變作每人八錢五人五八得四兩合原逢五進一十法五人實五兩歸日逢五進一于前位每人各得一兩五人共得五兩以合原數六歸六人為法一兩為實下加四法實相呼一兩不動變作每人一錢六人共除六錢餘四錢歸日下位加四四錢又用後六四六十四歸法算六人為法二兩為實三十二法實相呼將二兩添一變作每人三錢六人三六共除一兩八錢餘二錢歸日三十二二錢又用此歸重算六人為法三兩為實添作五法實相呼將三兩添二變作每人五錢六人五六得三兩合原六人為法四兩為實六十四法實相呼將四兩添二變作每人六錢六人共除三兩六錢餘四錢歸日六十四四錢又照此歸算六人為法五兩為實八十二法實相呼將五兩添三變作每人八錢六人共除四兩八錢餘
