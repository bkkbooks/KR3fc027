body:
  text: 人該銀若干答日四十四兩二錢二分法日置銀為實以六人為法歸之合問定位法從原實數百降下次位幾十又次位幾人過法是人則止前一位得令是兩逆上升之合得法六人歸實尾二分逢六進一十本位去盡進一千左三錢六一下加四逢六進一十本位不動右位加四本位去六進一千左定位二分五兩六一下加四逢六進一十本位不動右位加四本位去六進一千左人法上是六人遇人則止前位得令是兩也六十六二三十二逢六進一十本位加一右位加二本位去六進一于左十是兩也向前逆升合得四兩
