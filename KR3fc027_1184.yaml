body:
  text: 若干荅曰中容圓徑一十八尺法曰置勾二十七尺股三十六尺相乘得九百七十二尺倍之得一千九百四十四尺爲實併勾股弦三數共一百令八爲法除實得容圓徑一十八尺合問今有勾股玉一塊長一尺二寸濶六寸今欲截角爲方取印一顆問方面若干荅曰四寸法曰置勾股相乘得七十二寸爲實以勾股相併得十八爲法除之卽得
