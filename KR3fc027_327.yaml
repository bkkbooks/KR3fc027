body:
  text: 一十八為法除之不尽之數一法實皆折半而命之差分衰分意同歌日差分之法併來分須要分數一分成將此一分為之實以乘各數自均平假如今有東西二鄰共織絲絹東鄰四斤六兩西鄰三斤二兩共絲七斤八兩織絹二十一丈八尺問各該若干答曰東鄰一十二丈七尺一寸六分七厘西鄰九丈零八寸三分三厘法日置總絹二十一丈八尺為實以共絲七斤八兩先將八兩變化為五就
