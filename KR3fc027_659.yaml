body:
  text: 米折半得乙米六十石合問今有銀二百四十兩令四人從上互相减半分之只云甲多丁一十八兩問各該若干答曰甲六十九兩乙六十三兩丙五十七兩丁五十一兩法曰置銀為實以二四六八併得二兩為法除實得一百二十乃甲丁首尾二人共數干內减甲多一十八兩餘一百零二兩折半得丁銀五十一兩加多十八得甲銀六十九兩惟乙丙二人不可併折以甲多十八例用三歸之得六兩加人丁銀得丙銀五十七兩又加六兩得乙銀六十三兩合問
  hash: sha256:fed7e12869ec2f3efd333abbc7f7752e38b32c40e91af887301ac4718af72c5e
