body:
  text: 若干答曰二百六十八步六分二釐法日置長為實以濶七步四分為法乘之合問定位法只認步下一位是法首步數逆上合得也法酋四分七步乘二釐三四一十二定位六分實尾三分三七二十一四六二十四下位是步也向前逆升合得八步六步六七四十二三四一十二步只認步下一位定法首位是步也六十實首三十三七二十一原實十起呼十往後至步合得二百
