body:
  text: 寸二百四十三分寸之一百令四隔八上生大吕按甤賔陽律生陰之法當用三分損一如上所云乃三分益一之法此又不可暁者抑夏至一陰始生之故欤自此以後陰律生陽三分損一陽律生陰三分益一大吕属陰律長八寸二百四十三分寸之一百令四却以分母通八寸加分子共得二千令四十八寸以九分因之以分母二百四十三爲法除之不盡一百二十六分法實皆三約之得積七百五十八分八十一寸寸之四十二其候大寒却以通寸二千令四十八寸以二因之得四千令九十六寸爲實另以三因二百四十三得七百二十九爲法除之得五寸七百二十九分寸之四百五十一隔八下生夷則
