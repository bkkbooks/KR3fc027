body:
  text: 五斗米五斗換豆七斗問米豆各若干答曰米七百六十石豆一千零六十四石法日置芝麻為實以三斗歸之得一百五十二石以米五斗因之得米七百六十石若換豆就以米用五歸之仍得一百五十二石以豆七斗因之得豆一千零六十四石合問今有人原借九色金五十兩今還八色金問諛若干答曰八色金五十六兩錢五分法日置借九色金五十兩以九因得赤金四十五兩為實却以今還八色除之即得
  hash: sha256:77fc1446173459ed552394a127c98fc268e861b3015369315e41a42efb98874a
