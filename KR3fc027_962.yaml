body:
  text: 芻蕪倍下長如上長以廣乘之又以高乘用六歸之如屋脊上斜下平羡除併三廣以深乘之用六歸之上平下尖或倍上長加下長假如今有堅地積七千五百尺問穿地壤土各若干答曰穿地一萬丈壤土一萬二千五百尺法日置堅地積以五因三歸之為壤土積另置壤積以四因五歸之得穿地積合問今有問河長七千五百五十尺上廣五十四尺下廣四十尺深一十二尺每日一工問三百尺問用工若干答曰一萬四千一百九十四工
