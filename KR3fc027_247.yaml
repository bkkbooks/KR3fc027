body:
  text: 先將法首對實首呼九歸歌或進或倍後將法次位對所歸数呼九九数除之用乘法還原歌曰惟有歸除法更奇筭學中惟歸除最玅將身歸了次除之先將本位呼歸法歸之其次不拘幾位俱呼小九数除之有歸若是無除数若本位有子可歸次位無子可除也起一還將原数施如一歸本位起一下位還一如二歸本位起一下位還二餘歸傲此或遇本歸歸不得如一歸只一子二歸只二子因下位無子可除故不能歸也餘做此撞歸之法莫教遲如一歸見一無除加入撞凑作九下位加一如撞歸乾除数不足照前用起一還原法若人識得中問意如學者曉得歸除中間之理深奧也
  hash: sha256:f98844e49a648053c7974722e613ec41bec40829a5e4ca51cdffd0a397fd5689
