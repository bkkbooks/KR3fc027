body:
  text: 丙銀七両二錢丁銀四両八錢法曰併四人各除七両五錢共三十両爲法另以四人各原銀折作足色紋銀甲得六両乙得五両二錢五分丙得四両五錢丁得三両四共併得足色銀一十八両七錢五分爲實以法除實得六二五色就以此爲法以除各人折過足色銀得分六二五色銀数合問今有張三出本銀十九両六錢四分李四出本銀十二両三錢六分共本三十二両營運折了七両問各折若干荅曰張三折銀四両二錢九分六厘二毫五絲李四折銀二両七錢零三厘七毫五絲
