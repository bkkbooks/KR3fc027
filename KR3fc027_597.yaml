body:
  text: 丙銀七兩二錢丁銀四兩八錢法曰併四人各除七兩五錢共三十兩為法另以四人各原銀折作足色紋銀甲得六兩乙得五兩二錢五分丙得四兩五錢丁得三兩四共併得足色銀一十八兩七錢五分為實以法除實得六二五色就以此為法以除各人折過足色銀得分六二五色銀數合問今有張三出本銀十九兩六錢四分李四出本銀十二兩三錢六分共本三十二兩營運折了七兩問各折若干答曰張三折銀四兩二錢九分六釐二毫五絲李四折銀二兩七錢零三釐七毫五絲
