body:
  text: 今有銀一百二十一兩一千七分五釐糴米麥豆議要米一分麥二分豆三分其米每斗九分二釐麥每斗八分五釐豆每斗三分六釐問三色併價各若干答曰米三十二石七斗五升價三十兩零一錢三分麥六十五石五斗價五十五兩六錢七分五釐豆九十八石二斗五升價三十五兩三錢七分法曰置總銀為實另置麥價以二因之得一錢七分又置豆價以三因得一錢零八釐米價九分二釐併三價得三錢七分為法除實得米數二因得麥數三因得豆數各以原價乘之得各價合問又法先得米數倍之得麥數加五即豆數
