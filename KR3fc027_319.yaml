body:
  text: 皆三約之合問通分通分者通以分母納以分子也夫數之有盡者不必通也若畸零之不盡者使不通之則何以置位而算之乎此通分之法所由立也假如四分兩之一者則二錢五分也此所謂數之有盡者也若三分兩之一者三錢三分三厘以至于三三之無窮此所謂數之不盡者也必須以分通之乃可算也不然則畸零之不盡終無可置位矣假如今有布四十五匹每匹價三分兩之二問共該銀若干
