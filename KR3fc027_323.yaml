body:
  text: 歸之合得假如今有羅九十匹匹之六每匹價二兩五錢問該銀若干答曰一百六十六兩六錢三分錢之二法日置每匹價二兩五錢以分子六因之得一百五十兩以分母九為法歸之合問餘不盡之數仍以約分法命之假如今有米六分石之二每斗價四分錢之三問該銀若干答曰二錢五分法日置分子石之二錢之三因之得六兩為實以分母六分四分相乘得二十四兩為法除之得二錢五分合問假如今有假四十五匹價四兩三分兩之二問該銀若干
