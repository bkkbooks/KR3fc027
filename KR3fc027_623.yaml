body:
  text: 若干答曰休寧縣二千一百兩績溪縣九百兩法曰置金總為實以七因休邑數以三因績邑數合問今有銀四百九十七兩七錢令甲乙丙三人三七分之問各若干答曰甲三百零八兩七錢乙一百三十二兩三錢丙五十六兩七錢法曰置總銀為實列丙九乙二十一甲四十九副併得七十九衰為法除實得六兩三錢為一衰數以乘各衰得各人數合問若令四人作三七分之
