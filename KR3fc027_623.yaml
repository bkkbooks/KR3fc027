body:
  text: 若干荅曰休寧縣二千一百両績溪縣九百両法曰置金總爲實以七因休邑数以三因績邑数合問今有銀四百九十七両七錢令甲乙丙三人三七分之問各若干荅曰甲三百零八両七錢乙一百三十二両三錢丙五十六両七錢法曰置總銀爲實列丙九乙二十一甲四十九副併得七十九衰爲法除實得六両三錢爲一衰数以乘各衰得各人数合問若令四人作三七分之
