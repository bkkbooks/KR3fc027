body:
  text: 今有圎田中徑一十三步今從邉截積三十二步問所截弦矢各若干答曰弦一十二步矢四步法日倍積得六十四步自乘得四千令九十六步為實以四因積三十二步得一百二十八步為上廉又以四因徑一十三步得五十二步為下廉以五為負隅用開三乘方法除之商四步于左上為法以乘上廉得五百一十二步就以商四乘隅五得二十以減下廉五十二步餘三十二另以商四自乘得一十六以乘下乘三十二得五百一十二併上廉五百一十二共一千令二十四為下法除實得矢四步另置積倍之得六十四步以矢除之得一十六步減矢四步餘得弦二十二步合時
  hash: sha256:39b803e6e90a941ae51b2f1a36b2d60290b1026c511fac44485a694eb6d14512
