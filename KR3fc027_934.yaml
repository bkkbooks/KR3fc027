body:
  text: 今有圎田中徑一十三歩今從邉截積三十二歩問所截弦矢各若干荅曰弦一十二歩矢四歩法日倍積得六十四歩自乘得四千令九十六歩爲實以四因積三十二歩得一百二十八歩爲上廉又以四因徑一十三歩得五十二歩爲下廉以五爲負隅用開三乗方法除之商四歩于左上爲法以乗上廉得五百一十二歩就以商四乘隅五得二十以减下廉五十二歩餘三十二另以商四自乗得一十六以乗下乗三十二得五百一十二併上廉五百一十二共一千令二十四爲下法除實得矢四歩另置積倍之得六十四歩以矢除之得一十六歩减矢四歩餘得弦二十二歩合时
  hash: sha256:eabe9723f5514b740c91740f7f7fcb7c6a8c466f0de9803b79ce93d335e9db61
