body:
  text: 法曰置米五百七十六石於圖中爲實以每石三錢爲法因之乾三六一十八將乾六移在坎一却干斗圖定位八錢下艮八兌三七二十一將兊七移在坤二却將石圖在坤二坎一移中三五一十五將中五移在坎一却將十圖坤而攺作兌七今有絲六十八両每両價鈔四百六十文問該鈔若干荅曰三十一貫二百八十文法曰置絲干圖爲實以両價鈔四百六十文爲法乘之六八四十八將次位下㢲四又次位下艮八艮四八三十二將艮入移在震三又將次位㢲四攺作乾六六六三十六將次位震三移在乾六却將下位乾六加六退四
