body:
  text: 沈司封受學著述具在乃儒者所罕而曲藝所不敢望庶乎稱專職精諸者汝思折而裁職之信謂淂大全也已嗚呼乘除積分合道退皆茹之自然即巧曆不能窮者一神之所為也引伸觸類以畢孔事匪化裁之人矣詣有之行年六十而化汝思舞象而習茹及耆而著書捿托神明遊心
