body:
  text: 九章詳通筭法成化癸卯鄙陽余進作采取詳明通明法啟蒙發明筭法嘉靖丙戌福山鄭高昇作馬傑攺正筭法河間吳橋人嘉靖戊戌作而無乘除只攺錢塘吳信民法反正爲卯数今予辯明圖釋系校免愪後李勾股筭衝嘉靖癸巳吳㒷尚書箬溪顧應祥公作無乘除正明筭法嘉靖巳亥金臺張爵作筭理明解嘉靖庚子江西寧都陳必智作重明筭法訂正筭法嘉靖庚子浙東會稽林高作詳解定位測圓海鏡嘉靖庚戌學士樂城李佁公作無乘除弧矢弦術嘉靖壬子顧箬溪作無乘除
