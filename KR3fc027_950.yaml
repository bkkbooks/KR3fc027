body:
  text: 弦二十四步折半得一十二步自乘得一百四十四步二數相减餘二十五步以開平方法除之得離徑五步另以圎徑二十六步折半得一十三步减離徑五步餘為矢八步圎徑及矢濶求弧弦歌圎徑矢濶求弧弦圎徑矢濶减餘存復以矢濶乘為實開方倍之得弧弦法日置徑二十六步臧矢八步餘一十八步以矢八步乘之得一百四十四步以開平方法除之得一十二步倍之得弧弦二十四步弧弦乃離徑求圎徑歌弧弦離徑求圎徑弧弦折半自相乘
