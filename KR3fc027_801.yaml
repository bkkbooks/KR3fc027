body:
  text: 演段解曰四因積者乃是四長四濶積居邉共三千四百五十六步却以相差一十二步自乘得一百四十四步補中得相和積三千六百步以開平方法除之得長濶相和六十步也今有直田積八百六十四步只云長濶相和六十步問長濶相差若干答曰長濶相差一十二步
