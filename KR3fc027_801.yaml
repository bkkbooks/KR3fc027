body:
  text: 演段解曰四因積者乃是四長四濶積居邉共三千四百五十六歩却以相差一十二歩自乘得一百四十四歩補中得相和積三千六百歩以開平方法除之得長濶相和六十歩也今有直田積八百六十四歩只云長濶相和六十歩問長濶相差若干荅曰長濶相差一十二歩
