body:
  text: 置六于右廉法一百隔一位下為隅法共一百六皆與上商六相呼一六除積六百又左六對右六呼六六除積三十六步恰盡今有圓積五萬四千箇欲為平圓問徑若干答曰徑二百六十八箇五百三十七箇之一百七十六法日置積數先以四因後用三歸之得七萬二千為實以開平方法除之初商二百于左位下法右位亦置二百為方法呼二二除實四萬餘積三萬二千就以右位二百倍之得四百為廉法次商六十于左亦置六十于右廉法四百之次為隅法相呼四六除積二萬四千又呼六六除實三千六百餘
