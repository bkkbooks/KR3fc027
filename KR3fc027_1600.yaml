body:
  text: 重刋筭法綂宗序高祖賔渠府君手輯是編當時風行海內坊間刻本無慮数十然傳刻既多舛謬日甚余家有藏版頗足辨証訛偽緣經兵燹十亡其七此者國家嚮用文學研究律暦扵是搢紳之士持籌握筭考論源流益知崇信府君之書而故家所藏善本乃稍稍間出矣光紳动徥友人借録一帙謀
