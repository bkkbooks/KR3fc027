  text: 令慢行者先行八日問快行者幾日趕至追及之行路程各若干答曰快行者三十日慢行者多八日路程二千八百五十里法日置慢行者日行七十五里以八日乘之得六百里為實却以快行減慢行餘二十里為法除之即得今有慢行者巳去七日後令快行者趕去六日追至中途及之其路程巳一千一百七十里問緊慢各每日行若干答曰快者日行一百九十五里慢者日行九十里
