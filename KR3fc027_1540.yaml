body:
  text: 右易換術曰以十六子依陽圖作四行排列先將外四角封換一換十六四換十三次將內四角對換六換十一七換十只以内外四角換畢橫直斜角皆積三十四数求積法日以上西南一下東北十六両角共十七以十六乘之折半得積一百二十六爲實以四行爲法除之得縱橫斜角皆二十四数易換術曰先以十三居中位周圍連中位各三層一二三四五六七八九十十一十二廿二廿四廿三廿一廿一二十十九十八十七十六十五十四各相對換畢卽得数上債有餘下橫不足各数八
