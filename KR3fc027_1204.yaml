body:
  text: 今有弦長四十五步只雲股多勾九步問勾股各若干荅曰勾二十七步股三十六步法曰置弦四十五步自乘得二千令二十五步另以股多勾九步爲勾股較自乘得八十一步二位相減餘一千九百四十四步加入弦自乘得二千令二十五步共三千九百六十九步爲實以開平方法除之得勾股相和六十三步加入差九步共得七十二步折半得股三十六步內減差九步餘得勾二十七步合問今有戶高多廣六尺八寸両隅斜去十尺問高廣若干荅曰高九尺六尺廣二尺八寸法曰置両隅斜十尺如弦自乘得一百尺另以高多廣六尺八寸
  hash: sha256:c59740afc52b7ac1ca301cdc3827d60fcaa9d9d52e15d80462a8fecc68e36ee9
