body:
  text: 百分者以約去其繁而就其簡也或有不可約者法日數多為母數少為子子母之數兩列互相減損至同就以此數為法各以法除子母原數却無畸零所謂齊不齊而致其齊也如人分銀以至數之不能盡者亦有物之不可分者不能呼數必以法而約之歌曰數有參差不可齊須憑約法命分之法為分母實為子不與差分一例推又歌約分須分子母名更相減損至同成
