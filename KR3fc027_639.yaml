body:
  text: 又併丙三丁二戊一得六减九餘三却于前五人衰内各增三甲得八乙得七丙得六丁得五戊得四副併得三十衰爲法除實得八石爲一衰数以乘各人後增衰数得各人所得数合問戊起逓加八数至甲止或七人分者要將甲乙丙三人数與丁戊巳庚四人数同者又云三人分者要將甲得数與乙丙二人所得数同者俱倣前法筭之今有金六十両令甲乙丙三人依等逓差五両問各若干荅曰甲二十五両乙二十両丙一十五両法曰置金六十両内减差甲多丙十両乙多丙五両共一十五両餘
