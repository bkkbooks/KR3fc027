body:
  text: 仍用前長法一錢八分除之得一錢二分五釐為短法列二位一位七斤乘之得小魚八十七斤半一位以五分乘之得小魚價六錢二分五釐合問今有圓木大小二根內大者一根頭徑一尺二寸稍徑八寸長二丈五尺小者一根頭徑一尺稍徑七寸長二丈共價銀四十九兩零八分問大小木各價若干答曰大木三十一兩二錢小木一十七兩八錢八分法曰先置大木頭徑一尺二寸自乘得一百四十四寸又將稍徑八寸自乘得六十四寸併之得二百零八寸以長二丈五八乘之得積五萬
