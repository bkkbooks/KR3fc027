body:
  text: 實仍以前法一除之得田價三十七両合問取錢買物両盈歌附兩朒卽两不足取錢買物兩皆盈分子互乘分母訖以母通乘物價周封減盈錢爲物實物價互乘少減多乘子除爲錢實積率減零餘爲法行法實相除盡可識今有銀不知数欲買鹿取銀六分之四買之盈二両取銀四分之三買之盈三両五錢問銀数鹿價各若干荅曰銀一十八両鹿價一十両法曰先以之四互乘四分得一十六以通盈三両五錢得五十六両次
