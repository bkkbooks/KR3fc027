body:
  text: 吕仲吕属陰律長六寸一萬九千六百八十三分寸之一萬二千九百七十四却以分母通六寸加分子共得一十三萬一千零七十二寸以空圍九分因之得一千一百七十九萬六千四百八十分以分母一萬九千六百八十三爲法除之得積五百九十九分一萬九千六百八十三分分之六千三百六十三其候小満綂紀曆年度分地里今有一元綂十二會一會綂三十運一運綂十二世一世積三十年問一元該年若干荅曰一十二萬九千六百年法曰置十二會以乘三十運得三百六十又以十二世乘之得四千三百
