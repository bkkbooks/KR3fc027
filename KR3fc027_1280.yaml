body:
  text: 乙該分一両七錢五分折足色一両四錢法曰置甲金二両折足色一両八錢乙金七成二両折足色一両四錢併之得足色三両二錢以原金二共四両歸之得八色就以八爲法除甲一両八錢得甲金二両二錢五分亦以法八除乙一両四錢得乙金一両七錢五分合問歌肆中聽得語吟吟薄酒名醨厚酒醇好酒一缾醉三客薄酒三缾醉一人共同飲了一十九三十三客醉醺醺試問高明能筭士幾多醨酒幾多醇
