body:
  text: 小雞八十一隻價錢二百七十文原法曰置錢千文爲實另置公雞一母雞一各以小雞三因之得公雞三母雞三小雞三共得九爲法除實得十一爲母雞數不尽一返减下法九餘八爲公雞数另列總雞一百隻减去公雞八隻母雞一十一隻餘八十一隻爲小雞数各以價錢因之合問又引前法置所荅数公雞八隻增四作十二母雞十一減七爲四小雞八十一益三得八十四共百雞千文也此乃張丘建云雞公增四雞母減七雞雛益三又細叅之仍置原数却將雞公八隻減四得四隻雞母十一增七得一十八隻雞雛八十一减三得七十八隻亦得百雞千文也其一法而生三數在変通之意也
