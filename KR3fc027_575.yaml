body:
  text: 四尺為法除之合問今有紗一十二匹二丈六尺每匹四丈二尺賣鈔二百六十五貫問每尺該鈔若干答曰五百文法曰置鈔二百六十五貫為實以紗一十二匹以匹法四丈二尺乘之加入零二丈六尺其得五百三十丈為法除之合問今有銀二十六兩五錢買紗每匹長四丈二尺價銀五錢問該買紗若干答曰五十三匹法曰置銀二十六兩五錢以乘每匹四丈二尺得一千一百一十三匹為實以
