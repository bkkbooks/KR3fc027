body:
  text: 半堆歌半堆瓶法另推詳上長倍之加下長却用上濶乘見数下長仍倍加上長別以下濶乘見積下長另減上頭長餘存三位同相併再以高乘爲實良要知其積從何見六而取一積該當今有半堆酒瓶一棧上長二十五箇濶一十二箇下長三十箇濶一十七箇高六箇問積若干荅曰該瓶二千四百一十箇法曰倍上長加下長以上濶乘之得九百六十又倍下長加
