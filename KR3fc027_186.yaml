body:
  text: 實尾九斗起呼七九六十三變九為六下位加三下位是錢也回向前逆升合得五錢七石七七四十九變七為四下位加九石法上是每石七錢遇石即止下一位是錢也五十五七三十五變五為三下位加五十二十四百四七二十八變四為二下位加八百四百三千三七二十一變三為二下位加一千六千實首二萬二七一十四變二為一下位加四原實萬起呼萬往後順數至石合得一萬還原用七歸法詳後七一下加三逢七進一十七二下加六逢七進一十七三四十二七四五十五七五七十一七六八十四逢七進一十
