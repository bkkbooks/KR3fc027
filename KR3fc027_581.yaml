body:
  text: 却將狹布長二百八十尺問折算合還濶若干答曰一尺八寸六分法曰置原布長以原濶乘為實以今長為法除之合問就物抽分歌抽分法就物中抽腳價乘他都物求別用腳錢搭物價以其為法要除問除來便見腳之總餘者皆為主合留算者不須求別訣只將此法記心頭今有米三千五百石每石腳價五分因無存銀却將原米抽出誰還照原米價每石六錢五分扣算還腳問主腳
