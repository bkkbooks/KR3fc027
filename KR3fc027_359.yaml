body:
  text: 同乘同除法理假如原有鵝八隻換雞二十隻每雞三十隻換鴨九十隻每鴨六十隻換羊二隻今却有羊五隻換鵝問該若干答曰該鵝二十隻法曰用異乘同乘法置原鵝八隻以乘原雞三十隻得二百四十隻又以原鴨六十隻乘之得一萬四千四百隻再以今有羊五隻乘之得七萬二千隻為實又用異除同除之法以所換雞二十隻乘換鴨九十隻得一千八百隻再以所換羊二隻因之得三千六百隻為法除實得鵝二十隻合問指日法應一除一乘多有不盡之數今變法總乘為實
  hash: sha256:5569717854257750873604393fb1efa3d2331a8dbae8488005a2e0da6caf4934
