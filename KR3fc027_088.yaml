body:
  text: 黃鍾萬事根本圖黃鍾生度黃鍾生量黃鍾之管其長積秬黍黃鍾之管其長廣容秬中者九十粒一粒為一黍中者一千二百粒為分十分為寸十寸為尺一勺十勺為合十合為十尺為丈十丈為引升十升為斗十斗為斛黃鍾生衡黃鍾生律黃鍾所容千二百黍為黃鍾之長九寸空圖九勺重十二銖兩勺則草分積一百一十分是為四銖為兩十六兩為斤律本十一律由是而損三十斤為釣四釣為石益焉首篇終屬八相生圖釋具載卷末
