body:
  text: 之得麥毎石折米八斗有零又云今有麥九石六斗換米問該幾何置麥九石六斗以麥毎石折米八斗併零乗之得米七石七斗此乃用法之理是一乗一除理之然也葢因除法多有畸零數之不盡故前法用總乗然後用總除真是大術矣西江月甲釧九成二両乙釵七色相同李銀鋪內偶相逢各欲攺成噐用其子未詳所以誤將一處銷鎔當時悶惱李三翁又把筭師擾動荅曰共銷镕八成色金四両甲該分二両二錢五分折足色一両八錢
