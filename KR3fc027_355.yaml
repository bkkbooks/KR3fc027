body:
  text: 同乘異除歌此法買實石珍珠大小塊顆價用此果品亦同同乘異除法可讀原物價相乘為實今物除實求今價今價除實求今物假如原有小珍珠五十顆重一兩價銀一十二兩今有大珍珠三十顆重一兩問該銀若干答曰二十兩法曰置原珠五十以原價十二乘得六百兩為實以今珠三十顆除之合問異除之同乘法假如原每人一日織錦八尺二寸五分今有五十六人共
