  text: 二歩得長六十八歩合問船缸均載歌三百六十一隻缸任君分作幾船裝不許一船多一隻不許一船少一缸荅曰船一十九隻每隻裝缸一十九箇法日置缸三百六十一隻爲實以開平方法除之初商一十于左亦置一十于右爲方法左右相呼一一除實一百餘實二百六十一右法初商一十倍作二十爲廉法次商九于左亦置九于右之次共二十九皆與左次商九相呼二九除實一百八十又呼九九除八十一實晝得一十九船每船載缸一十九个合問
