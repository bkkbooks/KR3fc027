body:
  text: 原有人担物一百五十斤行道一百三十里與脚銀二錢今担一百八十斤行道九十里問該銀若干荅曰一錢六分六厘一毫五絲法曰置今重一百八十斤乘今行道九十里得一百六十二里又以原銀二錢乘之得三錢二分四厘爲實另以原担重一百五十斤乘原行道一百三十里得一百九十五斤爲法除之卽得今有空車日行七十里重車日行五十里今載榖至倉五日三返問路遠若干荅曰四十八里三十六分之二十二法曰置空重車日行里数相乘得三百五十里又以五日乘
