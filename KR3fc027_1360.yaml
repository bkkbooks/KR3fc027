body:
  text: 四軍纔分布一疋請問官軍多少数荅曰官二百員該布八百疋軍八百名該布二百疋法曰置官軍共一千爲实以四疋一疋併得五疋爲法除之得官二百員以每員四疋因之得布八百疋於總官軍內減二百餘八百名爲軍以四軍歸之得布二百疋合問歌今有千文買百雞五十雄價不差池草雞每箇三十足小者十文三箇知荅曰公雞八隻賣錢四百文母雞十一隻賣錢三百三十文
