body:
  text: 為法除之得四十四尺不盡八以法實皆折半命之曰九分尺之四合問此是借寬還窄原有銀二十三兩買布七十五匹每匹長四丈濶二尺今要狹布濶一尺六寸長與前同狹教照前扣减問價若干答曰四兩六錢法曰置銀為實另置布七十五匹以每匹四丈通之得三百丈以濶二尺乘之得六千尺為法除實得尺價三厘八毫三緑三忽三另以濶二尺减去一尺六寸餘濶四寸以乘三千尺得一千二百尺為不及數以尺價三八三三三三乘之得退還銀四兩六錢合問假如原買布其長二百四十八尺濶二尺一寸今無原布
  hash: sha256:f01844398f4354dd051314b35b33a2cada172c9aa0dba381aab0bb8141eb3290
