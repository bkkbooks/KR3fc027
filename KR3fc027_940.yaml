body:
  text: 弧矢內勾弦求股圖圎徑與截弦求截矢歌圎徑與弦懂截矢半徑為弦自乘是弧弦折半名為勾亦自乘置相減矣餘用開方得股數半徑減股餘者矢圎徑十寸弧弦長八寸問截矢若干答曰矢二寸法日以半徑五寸為勾股之弦另以弧弦八寸折半得四為勾各自乘相減餘九寸平方開之得股三寸以減半徑五寸餘二寸即矢圎徑與截矢求截弧背截弦求弧背同術曰先求出弦徑除矢畀得半弦背差解曰圎之大小本於弧背之長短係于圎之大小與矢之多寡餘如平圎十寸平分一半則矢長五寸自乘得二十五寸以徑除之得二寸五分為半茲背差倍之得五寸加入圎徑得一十五寸為半圎周故不論圎之大小矢之多寡者凖也
