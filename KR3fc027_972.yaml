body:
  text: 法日置上周自乘得三百二十四尺以下周自乘得五百七十六尺以上下二周相乘得四百三十二尺併三數共二千三百三十二尺以高一十二尺乘之得一萬五千九百八十四尺為實以圓率三十六除之合問此如圓窖今有立錐高三十二尺下方二十四尺問積若干答曰六千一百四十四尺法日置下方自乘得五百七十六尺以高乘之得一万八千四百三十二尺為實以三歸之合問今有圓錐高三十二尺下周七十二尺問積若干答曰四千六百零八尺法日置下周自乘得五千一百八十四尺再以高三十二尺乘之得一十
  hash: sha256:7be594732d23f975775f0d5d8a781f28ed0e0fdee26899f12ae30b55a69e6b64
