body:
  text: 今有錢五百九十四文令甲乙二人折半分之問各諛若干答曰甲三百九十六文乙二百九十八文法曰置總錢為實以甲二乙一併得三衰為法歸實得一百九十八文為乙所得數倍之得三百九十六文為甲所得數合問今有銀六百七十二兩令三等人作折半分之問各若干答曰甲三百八十四兩乙一百九十二兩丙九十六兩法曰置總銀為實以甲四乙二丙一併得七衰為法除實得九十六兩為丙所得數以二因得乙數以四因得甲數合問今有女子善織初日遲次日加倍第三日轉速倍增第四
