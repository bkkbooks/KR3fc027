body:
  text: 答曰二百九十四兩八錢法日置珠為實以每顆價除價首一兩只以次價一錢為法從末位加起次第而上定位只認顆本位定兩十顆上定十兩百顆上定百兩所謂加减只須認本位也餘倣此法首一錢為加定位起一八如八因字故下位下位是錢也回向前逆數升上合得八錢實尾八顆一六如六起五進一于左顆法首是每顆加一錢遇顆即止下一位是錢也四兩六十一二如二伒七共九十九十實首二百原實百起呼百往後順數至顆合得二百
  hash: sha256:05edb238eee5691e88e76c630ba3d831fc3ef03c1698ebea405854e34e2a4c6a
