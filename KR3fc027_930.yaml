body:
  text: 環田截積歌環田要截外周積倍積二周差歩乘原徑爲法除見数另以外周周自乘以少减多餘作實開方便得內周成二周相减餘零数六而取一徑分明今有環田外周七十二歩內周二十四歩徑八歩今自外周截積二百八十五歩問截中周併徑若干荅曰中周四十二歩截徑五歩法日置截積二百八十五歩倍置得五百七十歩却以外周减內周二十四歩餘四十八歩爲差歩以乘倍積五百七十歩得二万七千三百六十歩
