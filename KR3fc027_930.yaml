body:
  text: 環田截積歌環田要截外周積倍積二周差步乘原徑為法除見數另以外周周自乘以少减多餘作實開方便得內周成二周相减餘零數六而取一徑分明今有環田外周七十二步內周二十四步徑八步今自外周截積二百八十五步問截中周併徑若干答曰中周四十二步截徑五步法日置截積二百八十五步倍置得五百七十步却以外周减內周二十四步餘四十八步為差步以乘倍積五百七十步得二万七千三百六十步
