body:
  text: 四步六分北頭要濶四步問截南濶若干答曰截南頭濶三步直田截斜法日置截積五十四步六分為實以原長一十五步六分為法除之得截濶三步五分此是二廣均勻之數加倍得七步減去北廣四步餘得截南廣三步是也又法倍截得一百令九步二分為實以原長一十五步六分為法除之得共截濶七步減北廣四步餘得截南廣三步亦得今有直田長一十五步濶一十二步今從西北角截勾股形一段積三十一步五分年原坐落西邉股長九步問截北
