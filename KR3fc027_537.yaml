body:
  text: 用十六乘法亦同定位只認原斤位得十兩依次求之即得今列布算于後半起先呼五六加三不動本身加三為八兩二斤次呼二六加一十二本身加一更于下位加二兩一十又次呼一六如加六不動本身只于下位加六今有銀四百三十二兩問該斤若干答曰二十七斤法曰此是兩求斤置銀四百三十二兩為實以截兩法通之定位只認十兩上得斤依次升上即得二兩起先呼二一二五變本二為一更于下位加二又下位加五
