body:
  text: 一百五十兩乘得鍚二萬七千七百五十兩於總物內減訖餘五萬五千三百兩另置總銀內減去一十八兩五錢餘三十七兩却以銅一百三十兩乘之得四萬八千一百減去五萬五千三百餘七千二百為實另以銅鐡數相減餘四十為法除實得錢價一十八兩又于三十七兩減去一十八兩餘一十九兩為銅價各以每錢買數乘之合問今有綾羅紗絹一百六十匹共價九十三兩綾每匹價九錢羅每匹七錢紗每匹五錢絹每匹三錢問四色各若干答曰綾三十五匹該銀三十一兩五錢羅四十匹該銀二十八兩紗四十匹該銀二十兩
