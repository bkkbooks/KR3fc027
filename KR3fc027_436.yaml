body:
  text: 假如圓田徑六步周十八步問積若干答曰二十七步徑六步是一箇六周十八步是三箇六故曰周三徑一也其方積三十六步是四箇九其圓積二十七步是三箇九其圓外剩九是一箇九故曰圓居方四分之三也圓三象天方四象地徑求積法置徑六步如方面自乘得方積三十六步用三因得一百八步是三箇方積合四箇圓積故用四歸之得一箇圓積二十七步周求積法置周十八步如大方面自乘得三百二十四步是九箇小方積每積三十六步正合十二箇九步圓田積九分故用十二除之得一箇圓積二十七步周徑求積法置徑六步是一箇六與周十八是三箇六相乘得數
