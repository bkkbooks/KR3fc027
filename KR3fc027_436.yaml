body:
  text: 假如圓田徑六歩周十八歩問積若干荅曰二十七歩徑六歩是一箇六周十八歩是三箇六故曰周三徑一也其方積三十六歩是四箇九其圓積二十七歩是三箇九其圓外剩九是一箇九故曰圓居方四分之三也圓三象天方四象地徑求積法置徑六歩如方面自乘得方積三十六歩用三因得一百八歩是三箇方積合四箇圓積故用四歸之得一箇圓積二十七歩周求積法置周十八歩如大方面自乗得三百二十四歩是九箇小方積每積三十六歩正合十二箇九歩圓田積九分故用十二除之得一箇圓積二十七歩周徑求積法置徑六歩是一箇六與周十八是三箇六相乘得数
