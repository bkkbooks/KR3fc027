body:
  text: 法曰置米三石五斗爲實將斗價七分爲原法另將七分倍之得一錢四分爲倍法先于實末位五斗上呼起雙下加倍起了二斗挨身下一錢次位下四分再起二斗挨身下一錢四分却呼見一只還原起丁一斗隔位下七分次于三石上呼起雙下加倍起了二石挨身下一両次位下四錢却呼見一只還原起了一石隔位下七錢讀得二両四錢五分合問假如綿布五十七疋每疋價銀二錢五分問該銀若干荅曰一十四両二錢五分法曰置布五十七疋爲实以疋價二錢五分爲原法另以二錢五分倍作五錢爲倍法先于末位七疋內起了三箇二疋挨身
