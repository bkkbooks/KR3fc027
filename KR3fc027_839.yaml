body:
  text: 實三千一百五十却以三乘下法一十得三十為方法列位次商六尺于上初商一十之次共一十六就以六乘之得九十六為廉法再以方法三十乘廉法九十六得二千八百八十除實訖餘實二百七十却以次商六自乘再乘得二百一十六為隅法除實訖餘實五十四尺不盡却以所商立方一十六尺自乘得二百五十六又以三因得七百六十八另以十六以三因之得四十八再添一箇併入共得一立方數積八百一十七之五十四何謂命以原總數除去五十四加上八百一十七便商得靣方一十七因此不及而為之命假如今有銀一萬兩問方若干
  hash: sha256:6f3440af51d080ed5f398dc13e4f4c45a0221d7d9e0b37bf1a53e3ad8599053c
