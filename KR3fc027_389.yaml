body:
  text: 今減二步者何也是弦長折半得二十步是十步中多一步故减二步也或云弦長四十步矢二十步間圓徑者置弦四十步折半得二十步自乘得四百步以矢二十步除之得二十步加矢二十步即得此乃是平半圓田則數再無差矣假如圭田中正長六十步下濶三十二步間該積若干答曰九百六十步法曰長六十步以濶三十二步乘之得一千九百二十步折半得積九百六十步合間圭形乃直田之半故用折半之法棱形則二圭合一也假如三角田每面一十四步間該積若干
  hash: sha256:5265dcd8b465ab2824d5525818cab5a7e0a3be6c63602f28154e711448ce9737
