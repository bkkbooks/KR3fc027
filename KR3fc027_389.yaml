body:
  text: 今減二歩者何也是弦長折半得二十歩是十歩中多一歩故减二歩也或云弦長四十歩矢二十歩間圓徑者置弦四十歩折半得二十歩自乘得四百歩以矢二十歩除之得二十歩加矢二十歩即得此乃是平半圓田則数再無差矣假如圭田中正長六十歩下濶三十二歩間該積若干荅曰九百六十歩法曰長六十歩以濶三十二歩乘之得一千九百二十歩折半得積九百六十歩合間圭形乃直田之半故用折半之法棱形則二圭合一也假如三角田每面一十四歩間該積若干
  hash: sha256:c679cbf53087789cbadc5fa916ef0456267d3ef2755e6fd7fce4de3ca4809cb8
