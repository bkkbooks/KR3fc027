  text: 新安賔渠程大位汝思甫編集會孫素亭光紳佩章甫較正蘊齊鈁洪聲甫黍閱難題少廣四歌直田七畆半忘了長和短記得立契時長濶爭一半今特問高明此法如何筭荅曰長六十歩濶三十歩法曰置田七畆半以畆法二四通之得積一千八百歩折半得九百歩爲實以開平方法除之約商三十歩自乘得九百歩餘實盡得濶三十歩爲法以除總田積一千八百歩得長六十歩合問
