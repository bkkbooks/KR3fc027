body:
  text: 荅曰股長三十六尺法曰置弦四十五尺自乘得二千令二十五尺內有一勾一股自乘之幾另以勾自乘得七百二十九尺二數相減餘一千二百九十六尺爲實是股自乘數以開平方法除之初商三十於左位亦置三十於右位爲方法左三對右三呼三三除實九百餘實三百九十六尺另以下位初商三十倍作六十爲廉法次商六尺於左三十之次亦置六於右廉法六十之次爲隅法左六對右六呼六六除實三百六十又左六對右六呼六六除實三十六尺怡盡得股長三十六尺合問今有股三十六尺弦四十五尺問勾濶若干荅曰勾濶二十七尺
