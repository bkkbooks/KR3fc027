body:
  text: 人實以法二除之得六人合問浪淘沙昨日獨看瓜因事來家牧童盗去眼昏花信歩廟東墻外過聽得争差十三俱分咱十五增加每人十六少十八借問人瓜各有巳會先荅荅曰一十一人瓜一百五十八箇法日併盈十五不足十八得三十三爲實以各十三十六相减餘三爲法除之得一十以各得十六乘之得一百七十六减不足十八餘得瓜数合問歌
