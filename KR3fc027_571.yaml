body:
  text: 以法除之得原礦四十二兩合問度法端匹歌四十為匹五為端或减或加尺寸寬端匹乘來方見尺尺求端匹法除看諸物皆所用度故首論之今世俗尺度不等無物可為定則或云以黍作一分十分為一寸又云黃金方寸為一斤今較古斛法二尺五寸此俗用尺不同難為凖則解曰原以四丈為一匹五丈為一端今無定規或三丈上下亦為匹也古設端匹之數今亦長短不一難以執法從俗可也
