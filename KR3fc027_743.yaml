body:
  text: 六除實二百四十歩又呼四四除實一十六歩恰盡以左上所商得二百三十四歩爲平方一面之教也今有平方積四百九十歩欲爲平方問每面若干荅曰二十二歩四十五分歩之六歸除開平方法日置積四百九十爲實于盤中見實四百商二十歩于實左亦置二十歩于右下左右相呼二二除實四百歩餘實九十歩就以右位二十歩倍之得四十歩爲法歸除之呼逢八進二歩就置二歩于右四十之下相呼二二除實四歩除實六歩歩盡以直方命之法日以所商二十二歩倍之又添一歩共得四十五歩爲分母命之日四十五分歩之六
