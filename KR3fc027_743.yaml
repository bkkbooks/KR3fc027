body:
  text: 六除實二百四十步又呼四四除實一十六步恰盡以左上所商得二百三十四步為平方一面之教也今有平方積四百九十步欲為平方問每面若干答曰二十二步四十五分步之六歸除開平方法日置積四百九十為實于盤中見實四百商二十步于實左亦置二十步于右下左右相呼二二除實四百步餘實九十步就以右位二十步倍之得四十步為法歸除之呼逢八進二步就置二步于右四十之下相呼二二除實四步除實六步步盡以直方命之法日以所商二十二步倍之又添一步共得四十五步為分母命之日四十五分步之六
