body:
  text: 减矢三歩餘一歩八分七厘五毫自乘得三歩五分一厘五毫相減餘二十歩令二分五厘以平方開之得四歩五分倍之得九歩爲上下弧弦用弧矢法得一矢積一十八歩倍之得三十六歩爲上下二弧矢之積又以方池左右両旁取直二叚濶各二歩六分二厘五毫以池方三歩七分五厘乘之得九歩八分四厘四毫倍之得一十九歩六分八厘八毫爲左右直積再以東西二小弧矢矢各三分七厘五毫弦各三歩七分五厘各用弧矢法得七分七厘三毫五綵併之得一歩五分四厘七毫爲東西二小弧矢積併四傍積只有五十七歩二分三厘五毫加方池積一十四歩令六厘二毫五綵通共總得七十一歩三分此乃較凖毫忽無差併池地合原積七十二歩尚亦不足七分焉得三分耕犁之地乎予思馬傑用四歸
