body:
  text: 答曰六尺法日置原高內减今高二十四尺餘截去八尺以乘下方二十四尺得一百九十二尺為實以原高為法除之得上方合問原有方錐下方二十四尺高三十二尺今改作方臺只用上方六尺問今高若干答曰二丈四尺法日置原下方二十四尺內减今上方六尺餘一十八尺以原高三十二尺乘之得五百七十六尺為實以原下方二十四尺為法除之得今高二十四尺合問築方臺丈尺今改作方錐問接高歌
