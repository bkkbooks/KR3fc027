body:
  text: 荅曰六尺法日置原高内减今高二十四尺餘截去八尺以乗下方二十四尺得一百九十二尺爲實以原高爲法除之得上方合問原有方錐下方二十四尺高三十二尺今改作方臺只用上方六尺問今高若干荅曰二丈四尺法日置原下方二十四尺内减今上方六尺餘一十八尺以原高三十二尺乗之得五百七十六尺爲實以原下方二十四尺爲法除之得今高二十四尺合問築方臺丈尺今改作方錐問接高歌
