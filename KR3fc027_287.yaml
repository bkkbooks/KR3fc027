body:
  text: 起五八加四下位是分也向前逆升合得三分八尺三八加二十四本位加二共十下位加四十五九加四十五本位加四共四下位加五法首是每尺三分遇尺即止下位是分也二實首九丈三九加二十七本位加二下位加七原實丈往後順至尺三兩合得一十假如今有羅二百四十六匹每匹價銀一兩二錢七分五厘問該銀若干答曰三百一十三兩六錢五分法日置羅為實以每匹除價首一兩只以二錢七分五厘為法加之定位只認匹位上定兩依次逆升合得六七加四十二五六加三十二六加一十二
