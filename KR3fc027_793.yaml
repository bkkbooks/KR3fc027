body:
  text: 今有三稜物外周三十六箇問總積若干答曰九十一箇法曰置外周三十六于左亦置三十六于右加內周九共四十五相乘得一千六百二十為實以東法十八除之得九十加中心一合問凡三稜物乃是九箇周中包一以九歸外周即知層數也自丙之外每層加九自外之內每層減九假如方箇積六十四根問外周若干答曰外周二十八根法曰此是雙層者只以方箭積為實以開平方法除之得一
