body:
  text: 九分俱用分字五尺為一步依次而增至三十步以上或四十步以下可止篾上用明油油之雖污泥可洗又後制一式只用十字內中開槽留頭不通中用木圓餅轉篾篾雖不散但轉起篾書皆挨擦損攘甚速總不如前制車式篾在十字十字轉動其篾安靜故難壤也方圓定制九圖首大約之其餘勾股用法詳解見後
