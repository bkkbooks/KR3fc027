body:
  text: 答曰一丈二尺法日置原下廣六尺內减去今築上廣三尺六寸餘二尺四寸以原高二十尺乘之得四十八尺為實另以原下廣六尺减原上廣二尺餘四尺為法除之得今高合問原築墻上廣十尺下廣三十尺高四十尺今欲築上廣九尺問接高若干答曰二尺法日置原高四十尺為實另以原上廣十尺减原下廣三十尺餘二十尺除之得二尺又為實以今欲築上廣九尺减原上廣十尺餘一尺為法除之得接高二尺合問
