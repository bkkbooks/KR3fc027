body:
  text: 平方帶縱法為奇下位先安縱步基上商得數加縱內縱方下法併為題上下相呼除實畢倍方不倍縱開餘餘數續商方再倍何愁此術不能知法日如有田積若干只云濶不及長若干問濶者置田積若干為實以不及若干為縱列于下法以帶縱開平方法除之實商初商得若干下法亦置初商若干于縱內共得若干皆與上商相呼除實若干餘實若干另以下法初商若干倍之倍方不倍縱次商若干于左初商之次下法亦置次商若干于倍方之次共若干皆與次商相呼除實盡得濶數加不及
