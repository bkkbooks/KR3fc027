body:
  text: 五七三十五五五二十五二七一十四二五得一十七九六十三五九四十五一七如七一五如五假如今有銀四錢八分每銀七分五釐換赤金一分問該金若干答曰六分四釐法日量總銀為實以七分五釐為法除之合問法酋五釐除七分歸定位法少實多四丑除二十定位八分七三四十二五六除三十分法首位是分遇分即止前位得令是金分也合得四釐
