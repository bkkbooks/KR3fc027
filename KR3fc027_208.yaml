body:
  text: 三兩五三倍作六變三為六兩法上是銀兩遇兩即止前一位得令是金兩也六錢二十五二倍作四變二為四十是金兩也向前逆升合得四兩實首二百起五一倍作二變一為二原實百起呼百往後順數至兩合得二十還原用五因五九四十五五六得三十四五得二十二五得一十又如今有米二十石作五萬人分之問每人該米若干答日四勺法日置米為實以人五萬為法歸之合問定位法多實少先從實首原位數起逆上至遇法首位是
  hash: sha256:5c3342fe56e8e7c12d8a6967da84d8f900678c34fc2fad867584f55811927a0f
