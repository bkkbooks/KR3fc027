body:
  text: 法日置長五十步以濶亦五十步乘之得積二千五百步為實以畝法二四除之定位法先從原實首位數幾十起順下至幾步止下一位定法首十數逆數陛上至實首位合得二千順下即是五百也餘皆傲此假如方田斜量東南角至西北角西南角至東北角各斜七十步問積稅若干答曰積二千四百五十步稅十畝二厘八法日置斜弦七十步自乘得四千九百步折半得二千四百五十步為實以畝法二四除之合問定位同前
