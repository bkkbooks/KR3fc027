body:
  text: 法日置長五十歩以濶亦五十歩乗之得積二千五百歩爲實以畆法二四除之定位法先從原實首位數幾十起順下至幾歩止下一位定法首十数逆数陛上至實首位合得二千順下卽是五百也餘皆傲此假如方田斜量東南角至西北角西南角至東北角各斜七十歩問積税若干荅曰積二千四百五十歩税十畝二厘八法日置斜弦七十歩自乘得四千九百歩折半得二千四百五十歩爲實以畆法二四除之合問定位同前
