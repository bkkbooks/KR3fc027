body:
  text: 右鵝四爲法先乘中行鴨三中法乘得九空七錢五分中法乘得二両二錢五分中鵝三爲法次乘右行空緊左負九鷄四右法乘得十六左法乘得八十六錢右杰粟得二両四錢減右除一錢五分左法乘得七錢五分左空鴨五中法負九乘得四十五鷄六中法負九乘得五十四八錢一分中法負九乘得七両二錢九分先以右行鵝四爲法遍乘中行得数鷄一十六價一両四錢列中位又以中行鵝三爲法遍乘右行得数鴨九價二両二錢五分列右位以中右封減餘鷄一十六價一錢五分又列中位爲用再以左行鴨五爲法復遍乘中行得数鴨照右設立負九得四十五鷄十六得八十價一錢五分得七錢五分列中位又以中行負九爲法遍乘左行得数鴨四十五鷄五十四價七両二錢九分列左位以中左封減鴨尽鷄中行八十加左行五十四共一百三十四爲法以價中七錢五分加左七両二錢九分共八両令四分爲實
