body:
  text: 要將易換貴求賤乘來除去不差池諸数率数此若粟換稻置粟以稻率乗之爲实以粟率爲法除之得稻今率不一姑記之餘做此粟率五十稻率六十糲率三十糲七十五粺米二十七御米二十一御四十二粺大麵各五十四小麺十三半糳米二十四豉六十三蔴麥菽各四十五今有榖八百六十八石五斗礱爲糙米四百一十六石八斗八升問每榖一石礱米若干荅曰糙米四斗八升法日置糙米爲實以榖数爲法除之卽得今有糙米四百一十六石八斗八升春作白米三百三十
