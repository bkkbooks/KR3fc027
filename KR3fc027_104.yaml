body:
  text: 塵埃渺漠模糊逡巡須臾瞬息彈指剎那六德虛空清淨雖有此名而無實公私亦不用度所以分別長短之法也丈十尺尺十寸寸十分分十釐釐毫絲忽同前正四丈今無定則端五丈今亦不一量所以分別多寡之法也石十斗斗十升升十合合十勺勺十抄抄十撮撮十圭圭六粟粟即一粒之粟也斛古一石今五斗或二斗五升釜六斗四升瘐十六斗秉十六斛衡所以分別輕重之法也
  hash: sha256:5454ca6f5249a9abb39e82890e024baf1aad971e405d17c45b91ebd443480673
