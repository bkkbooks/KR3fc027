body:
  text: 答曰二千三百零四步法曰置南北二廣併得七十二步折半得五十六步以縱六十四步乘之得積合問假如眉田上周四十步下周三十步經八步問積若干答曰一百四十步法曰置上下周相併得七步十折半得三十五步另以徑八步行折半得四步乘之得積合問假如牛角田中依灣長十七步五分濶八步問積若干
