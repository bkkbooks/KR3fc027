body:
  text: 荅曰二千三百零四歩法曰置南北二廣併得七十二歩折半得五十六歩以縱六十四歩乘之得積合問假如眉田上周四十歩下周三十歩經八歩問積若干荅曰一百四十歩法曰置上下周相併得七歩十折半得三十五歩另以徑八歩行折半得四歩乘之得積合問假如牛角田中依灣長十七歩五分濶八歩問積若干
