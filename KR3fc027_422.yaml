body:
  text: 云九步巳知圓三徑一得徑九步除方四步外徑一面豈有三步哉傑又增此意駐雲飛此類錢田題法難明不足觀非俺自誇羡改正珍寶鑒嗏二十七步圓眼中間十二方問攺法精制算圖樣明名天下傳答曰改正得四十四步七分五釐傑改正法日置錢周二十七步自乘得七百二十九步以圓法十二除之得六十步七分五釐為實另以錢眼方周十二加八得二十步與十二步相乘得二百四十步為實以方問法十六除之得
