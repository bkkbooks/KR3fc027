body:
  text: 荅曰好酒十缾薄酒九缾解曰共三十三人飲酒一十九缾好酒三人飲一缾薄酒一人飲三缾法曰列置問衰一缾三人互三缾一人十九缾三十三人先以右上一缾互乗左中一人得一人又以左上三人互乗右中三缾得九缾相减餘八缾爲法另以右中三缾互乗左下三十三人得九十九人另以左上三人乗右中三缾得九缾再乗共酒一十九缾得一百七十一人內减九十九人餘七十二人爲實以法八缾除之得薄酒九缾以减總酒餘得好酒十缾合問水仙子爲商出外去經營將帶白銀去販參爲當初不記原銀錠
