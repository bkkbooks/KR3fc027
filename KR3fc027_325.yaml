body:
  text: 答曰二百一十兩法日置每匹價四兩以分母三兩因之得一十二兩加入分子二兩共得一十四兩以乘總假四十五得六百三十兩為實以分母三兩為法除之合問假如今有豆九石六斗六分斗之四每石價銀二錢三分錢之一問該銀若干答曰二兩二錢五分九分錢之五法日先置每石價二錢以三因之得六加納子之一共得七錢另置豆九石六斗以六因之得五七六加納子之四共得五十八以七錢因之得四十兩零六錢為實却以分母六分三分因之得
