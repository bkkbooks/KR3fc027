body:
  text: 積四千四百却以右位六十倍之併入廉法共五百二十皆爲亷法又商八于左二百六十之次右位亦置八于廉法之次共五百二十八皆與上商八呼除先呼五八除積四千又呼二八除積一百六十又呼八八除實六十四餘實一百七十六不盡却將所商数倍之再加一箇得五百三十七命之一百七十六若於總内减法一百七十六加上五百三十七便商得徑二百六十九也開平方通分法今有積一千五百九十歩六十四分歩之一問平方一靣若干荅曰三十九歩八分歩之七卽八分七厘五毫法日置積一千五百九十歩以分母六十四分乘之加入分子一共
