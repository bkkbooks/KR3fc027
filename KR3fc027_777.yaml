body:
  text: 積四千四百却以右位六十倍之併入廉法共五百二十皆為亷法又商八于左二百六十之次右位亦置八于廉法之次共五百二十八皆與上商八呼除先呼五八除積四千又呼二八除積一百六十又呼八八除實六十四餘實一百七十六不盡却將所商數倍之再加一箇得五百三十七命之一百七十六若於總內減法一百七十六加上五百三十七便商得徑二百六十九也開平方通分法今有積一千五百九十步六十四分步之一問平方一靣若干答曰三十九步八分步之七即八分七釐五毫法日置積一千五百九十步以分母六十四分乘之加入分子一共
  hash: sha256:fe28d87e4285ed47615dfb667931886e1988be8894aabe2edc35145bab270a68
