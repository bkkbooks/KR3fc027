body:
  text: 得四十秤又以二歸之得二十鈞後以四歸之得五石再以十二乘之仍得原六百斤却以二歸之得三引又以二乗之仍得原六百斤却以六加之得九千六百兩又以二四乗之得二十三萬零四百銖另以價銀七十五兩爲實却以各率数爲法除之合問今有銅一千零五十六銖問該斤両若干荅曰二斤十二兩法曰此是銖最斤兩置銅一千五十六爲實以銖法三百八十四除之得二斤餘二百八十八銖另以二十四銖除之得一十二兩合問煉鎔銅鉄礦
  hash: sha256:c28fe23881fbc3d11a83a3b921828d370937d17daa507cbe1c652618ac58aac2
