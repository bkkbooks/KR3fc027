body:
  text: 得四十稱又以二歸之得二十鈞後以四歸之得五石再以十二乘之仍得原六百斤却以二歸之得三引又以二乘之仍得原六百斤却以六加之得九千六百兩又以二四乘之得二十三萬零四百銖另以價銀七十五兩為實却以各率數為法除之合問今有銅一千零五十六銖問該斤兩若干答曰二斤十二兩法曰此是銖最斤兩置銅一千五十六為實以銖法三百八十四除之得二斤餘二百八十八銖另以二十四銖除之得一十二兩合問煉鎔銅鐵礦
