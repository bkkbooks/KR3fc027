body:
  text: 爲廉法次商二歩以隅七乘得十四併入廉法一百四十共一百五十四與次商二歩相呼除實恰盡合問减積帶縱開平方今有大小方田二段相併共積四百歩只云大方田面比小方田面多四歩問大小方面併積各若干荅曰大方面一十六歩計積二百五十六歩小方面一十二歩計積一百四十四歩法曰置共積于中另置大方田面多小方面四歩自乘得一十六歩以减共積四百歩餘積三百八十四歩折半得一百九十二歩爲實另置大方面多小方面四歩爲縱方以帶縱開平方
