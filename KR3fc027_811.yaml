body:
  text: 為廉法次商二步以隅七乘得十四併入廉法一百四十共一百五十四與次商二步相呼除實恰盡合問減積帶縱開平方今有大小方田二段相併共積四百步只云大方田面比小方田面多四步問大小方面併積各若干答曰大方面一十六步計積二百五十六步小方面一十二步計積一百四十四步法曰置共積于中另置大方田面多小方面四步自乘得一十六步以減共積四百步餘積三百八十四步折半得一百九十二步為實另置大方面多小方面四步為縱方以帶縱開平方
