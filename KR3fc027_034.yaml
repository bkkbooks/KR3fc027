body:
  text: 刻旨指算法統宗序昔齊威公時有以九九見者威公不迸當時大之豈非以九九末技非也主之所屑越者手不知數雖出于算師掌故之手而其理則原自鴻濛紀于易範肇創于軒后之世其為用起沙塵秒忽以迄秭億無量凡日月運行朓朒遲速之變天地山川之高深廣縱律曆戎賦度量權衡之輕重多
