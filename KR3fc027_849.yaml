body:
  text: 二十四萬一千九百八十四再以初次商一百四十以三因得四百二十為方法再商四尺于初次商之下共得一百四十四尺就以四尺因之得五百七十六為廉法以方乘廉得二十四萬一千九百二十除實餘實六十四又以再商四尺自乘再乘得六十四除實訖合問凡立圎問周徑遇數單者則有不盡今有立方積一萬五千六百二十五步問立方一靣若干答曰二十五步歸除開立方法曰置積一萬五千六百二十五尺為實以萬積商二十置于積前就置二十于右下自乘得四百步與上商二十相呼二四除實八十餘實七千六百二十五步却以右下四百步以三乘
