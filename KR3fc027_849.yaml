body:
  text: 二十四萬一千九百八十四再以初次商一百四十以三因得四百二十爲方法再商四尺于初次商之下共得一百四十四尺就以四尺因之得五百七十六爲廉法以方乘廉得二十四萬一千九百二十除實餘實六十四又以再商四尺自乘再乘得六十四除實訖合問凢立圎問周徑遇数单者則有不盡今有立方積一萬五千六百二十五歩問立方一靣若干荅曰二十五歩歸除開立方法曰置積一萬五千六百二十五尺爲實以萬積商二十置于積前就置二十于右下自乘得四百歩與上商二十相呼二四除實八十餘實七千六百二十五歩却以右下四百歩以三乘
  hash: sha256:4dac9ea1d207f7b31acbdfad3dff14547e0d87bc96c0283667f751df014af1dd
