body:
  text: 七人為法五兩為實七十一法實相呼將五兩添二變作每人七錢七人共除四兩九錢餘一錢歸日七十一一錢又用前七一下加三歸法算七人為法六兩為實八十四法實相呼將六兩添二變作每人八錢七人共除五兩六錢餘四錢歸日八十四四錢又用前七四五十五歸法算逢七進一十法七人實七兩歸日逢七進一於前位每人各得一兩七人共得七兩以合原數八歸八人為法一兩為實下加二法實相呼一兩不動變作每人一錢八人共除八錢餘二錢歸日下加二二錢又用後八二下加四歸法算八人為法二兩為實下加四法實相呼二兩不動變作每人二錢八人共得一兩六錢餘四錢歸日下位加四四錢又用後八四添作五歸法算八人為法三兩為實下加六法實相呼三兩不動變作每人三錢八大共除二兩四錢餘六
