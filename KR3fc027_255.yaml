body:
  text: 四十五二倍作四變二為四四四除一十六本位去二下位加四十五十實首二百起五二倍作四變二為四原實百起呼百往後合順數至分得四百還原用乘法四五得二十五五二十五四四一十六四五得二十假如今有銀二百六十五兩三錢二分作十二人分之問每人該銀若干答曰二十二兩一錢一分法日置銀為實以十二人為法歸除之合問定位與前歸法同法酋二人除一十歸定位法少實多
