body:
  text: 必須挨斤之次設若五斤十二兩就以十二兩在五斤之下位算盤梁之上二子梁之下二子即十二兩也若兼歸除為法為實就以十二兩本身梁之上除去一子餘七另以下位加五即為七五然後用法乘除之即不差也如除畢斤下有零數必須從尾位起用加六之法逐位逆上加之至斤下止切不可加於斤上學者慎之今有金一十二斤半問諛兩若干答曰二百靣法曰此是斤求兩置金一十二斤半為實以六為法加之或
  hash: sha256:fd6da36f717904e97af250baa87977c4b84db37b06aa17f717c5f970ea455f25
