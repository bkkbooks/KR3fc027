body:
  text: 法曰並內外周共一百七十五步以內周之三乘外周二分得六分另以外周之一乘內周四分併之得十却以分母二分四分相乘八為法除十得一步二分五釐併前共得一百七十六步二分五釐折半得八十步一分二釐五毫為實却以徑十二步分母三通之加分子二共三十八為法乘之得三千三百四十八步七分五釐又以分母三除之得一百一十一步六分二釐五毫以畝法除之得四畝六分五釐不盡步下二分五釐以法約之得四分步之一合問今有方田一丘面方十二步四分步之二問該積若干答曰一百五十六步五分
  hash: sha256:1b0e64e499683cdf88a37c5eed71e76d4dc04401960c26637f9f90fb5595588a
