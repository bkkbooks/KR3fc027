body:
  text: 離徑自乘併為實開方倍數為圓徑法日置弦二十四步折半得一十二步自乘得一百四十四步以離徑五步自乘得二十五步相併得一百六十九步為實以開平方法除之得一十三步倍之得二十六步為圓徑圓徑及離徑求弧弦歌圓徑離徑求弧弦圓徑折半自相乘離徑自乘減餘實開方倍得弧弦成法日置圓徑二十六步折半得一十三步自乘得一百六十九步以離徑五步自乘得二十五步相減餘一百四十四步為實以開平方法除之得一十二步倍之得弧弦二十四步
