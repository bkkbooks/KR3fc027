body:
  text: 每靣方有二尺以每靣計小囤二箇共諛四小囤故以二席自乘得四却以一小囤米數乘之是也餘倣此凡席皆相等取一領較之不同盛幾石幾斗就以此為法各處盬場散堆量算引法歌每方一尺積鹽四十斤長濶相乘共一遭巳乘之數又乘高每方四十乘斤總三百斤歸即引包今有盬一堆長一丈五尺濶一丈二尺高六尺五寸問該斤引各若干答曰四萬六千八百斤一百五十六引
