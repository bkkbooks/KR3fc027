body:
  text: 西江月今有方田一叚中問有箇圓地歩量田池可耕犁十畆無零在記方至池邉有数每邉十歩無疑外方池徑果能知到處芳名説你解題耕犁十畆乃是池外餘地忘却方面圓徑二數只記得方至池邉十歩今問外方面內圓徑各若干荅曰方面六十歩內圓池徑四十歩法曰置田十畆以畆法二四通之得二千四百歩另以每邉十歩自乘得一百歩又以二因之得三百歩加入積內共得二千七百歩爲實另以每邉十歩以六因之得六十歩爲縱方于右以開平方帶縱法除之約商三十歩于位就置三十
