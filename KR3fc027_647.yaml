body:
  text: 法日置分母子互乘七人六人互四十八九十二以七人乘九十二尺得六百四十四尺又以六人乘四十八尺得二百八十八尺併之得九百三十二尺為法置布一十二萬五千八百二十尺却以六人七人相乘得四十二而乘之得五百二十八萬四千四百四十為實以法除之得軍數各五千六百七十人以四十八乘又用七歸得褲布又以九十二乘軍數用六歸得襖布合問今有昆仲三人小弟謂長兄曰我年記比汝四分之三次兄年紀比汝六分之五我多八歲問三人歲數各若干答曰長兄九十六歲次兄八十歲小弟七十二歲
  hash: sha256:ea339fa10cdd6ef8b8b7f7dbd60907b3e510c32fd4f39b33d15802297ee02cf9
