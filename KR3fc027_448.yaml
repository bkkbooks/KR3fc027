body:
  text: 今有直田長一十二步濶九步問田積併斜弦各若干答曰積一百零八步該斜弦一十五步求積法日置長濶相乘得一百八步若問斜者如勾股求弦以長自乘又以濶自乘併二數得二百二十五步為實以開平方法除之得弦十五步也若以斜問積置斜一十五步自乘折半得一百一十二步半却比直積多四步半其多者何也是長多濶三步自乘折半得四步半也假如斜若干只云廣緃相和若干問積以斜自乘另以相和自乘二數相减餘折半得積假如有廣若干只云縱斜相差若干問積以廣自乘另以相差自乘二數相減餘折
  hash: sha256:c988200e63fdde60bc77e4cc1ac89ba176d6b85d7657bcbb854015cebd8376f8
