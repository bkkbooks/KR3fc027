body:
  text: 今有直田長一十二歩濶九歩問田積併斜弦各若干荅曰積一百零八歩該斜弦一十五歩求積法日置長濶相乘得一百八歩若問斜者如勾股求弦以長自乘又以濶自乘併二数得二百二十五歩爲實以開平方法除之得弦十五歩也若以斜問積置斜一十五歩自乘折半得一百一十二歩半却比直積多四歩半其多者何也是長多濶三歩自乗折半得四歩半也假如斜若干只云廣緃相和若干問積以斜自乗另以相和自乗二数相减餘折半得積假如有廣若干只云縱斜相差若干問積以廣自乘另以相差自乘二數相減餘折
  hash: sha256:0ea1c50f3ac74230f7cb4e8653f3aa913dca3e7dce27d88940b567fc0267941d
