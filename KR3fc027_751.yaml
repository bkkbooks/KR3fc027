body:
  text: 數為長若要還原以所商得濶若干為實另以所得商數加上縱多共或減不及餘若干乘之見積今有田積一千七百五十步只云長比濶多一十五步問長濶各若干答曰長五十步濶三十五步法日置積為實以多一十五步為縱列于下位以帶縱開平方法除之初商三十于左位下法亦置三十加于縱上共得四十五步與上商相呼左三對右四呼三四除實一千二百又左三對右五呼三五除實一百五十另以下法初商三十倍六十加縱多十五共得七十五次商五于左位
