body:
  text: 假如直田廣三十二步只云斜多縱八步問積若干答曰一千九百二十步折半如勾股積法日置廣三十二步自乘得一千二十四步另以多八步自乘得六十四步以少減多餘九百六十步為實倍多八步作一十六步為法除之得緃長六十步以廣三十二步乘之得積合問假如直田縱六十步只云斜多廣三十六步問積若干答曰一千九百二十步折半如勾股積法日置縱六十步自乘得三千六百步另以多三十六步自乘得一千二百九十六步以少減多餘二千二百四步為實倍多十六步作七十二步為法除實得廣三十二步以縱六十步乘之得積合問
