body:
  text: 假如錢田外周二十七步徑三步內錢眼方周一十二步問該積若干答曰五十一步四分步之三步之三即是七分五釐也原法日置外周二十七步自乘得七百二十九步以圓法十二除之得六十步七分五釐以減內方周十二自乘得一百四十四步以方周法十六除之得內方積九步餘積五十一步七分五釐孤峯馬傑斷日錢塘算師吳信民編集此類世罕聞孤峯裁攺隺坡校錢田之法有差爭傑論此錢眼方周一十二步中間明有迹一十六步何
  hash: sha256:4c894cc8b83664eddf6244ac78ae6efa9fce9bbea2958c2b5c731397154538a0
