body:
  text: 答曰外周三十六根法曰此是六箇周中包一置圓箭一百二十七根减去中心一餘一百二十六跟以十二乘之得一千五百一十二根為實于中以縱六列于右用帶縱開平方法除之初商三十于左下法亦置三十于右縱六之上共三十六左右相呼三三除實九百又呼三六除實一百八十就以右位初商三十倍作六十不倍縱次商六于初商三十之次下法亦置六于倍方之次共七十二左六對右七呼六七除實四十二又左六對右二呼二六除實
