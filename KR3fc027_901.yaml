body:
  text: 腰廣六歩問截南長若干荅曰截南頭長八歩斜田截積法日置截中廣六歩减上廣四歩餘二歩以乘长三十二歩得六十四歩爲實却將南北二廣相减餘八歩爲法除之卽得若截下長置下廣减中廣餘六歩以乘原長得一百九十二歩爲實以上下二廣相减餘八歩爲法除之得截下長二十四歩合問今截下長二十四歩問截中廣若干荅曰六歩法日將下廣减去上廣四歩餘八歩爲實以原長三十二歩爲法除之每長一歩得濶差二分五厘就以此爲法以乘下長二十四歩
