body:
  text: 法首三人七十減實尾八石定位三十三六除一十八本位去一十下位去八十法首是七十遇十即止前位得令是石也六七除四十二本位去四右位去二本位定六百是石也木位合得合得六石實首一千起此一千下位空無除可退作十百原實千起呼千往後順數至十假如今有金八十九兩三錢八分令金戶一百零九人辦納間每人各該若干答曰八錢二分法日置金為實以金戶除百不用只以九人為法隔位定身除之合問
