body:
  text: 三四五來乘遍了却將本位破其身用留頭乘法若依盤式小九數位次先後不一難以挨次今將暗馬數以別先後庶不亂矣暗馬式已附一卷大數前假如今有布四百二十五匹每匹價銀二錢五分問共該銀若干答日一百零六兩二錢五分法日置布為實以每匹價銀二錢五分為法乘之合問定位法只認匹下一位定錢依次逆數升上合得也此所謂因乘俱向下位推五分法百三錢為乘
