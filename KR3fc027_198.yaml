body:
  text: 定位法只認石上前一位即十之位定兩逆上即百之位定十兩再升上一位定百兩合得此所謂歸與歸除上位施先數原實百起順下至石遇法首位是每兩二石則止轉向前一位得令是兩逐位逆數升上合得也今列布算于後法二石為歸實尾位二斗逢二進一十本位除去進一于左定位六石逢六進三十本位除去進三于左石法上是每兩二石遇石即止前一位得令是兩也一錢八十逢八進四十本位除去進四于左十是兩也向前逆數還位升之合得三兩
