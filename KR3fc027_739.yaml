body:
  text: 五百二十皆爲廉法又商八于左初次商二百六十之下亦置八于右廉法五百二十之下皆與上商八歩呼除先以左八對右五呼除五八除積四于又呼二八除一百六十又呼八八除实六十四歩恰盡演段解日其初商二百自乘得積四萬是大方積次商六十内有濶六十長二百両段故倍初商二百作四百爲廉法與左次商六十乘得二萬四千是両箇濶六十長二百積其次商六十自乘得三千六百是中方積又商八歩内有濶八歩長二百六十両段故倍初次商二百六十爲五百二十却以八歩乘得積四千一百六十是両箇濶八歩長二百六十歩小廉積其又商八歩自乘積六十四歩是小方隅積无平圓先用開平方法後用十二除爲圓
  hash: sha256:d5bdc9a061d08d9841a8304b8b988466a0005a73541701c0fb5d15143613af27
