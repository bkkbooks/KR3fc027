body:
  text: 五百二十皆為廉法又商八于左初次商二百六十之下亦置八于右廉法五百二十之下皆與上商八步呼除先以左八對右五呼除五八除積四于又呼二八除一百六十又呼八八除實六十四步恰盡演段解日其初商二百自乘得積四萬是大方積次商六十內有濶六十長二百兩段故倍初商二百作四百為廉法與左次商六十乘得二萬四千是兩箇濶六十長二百積其次商六十自乘得三千六百是中方積又商八步內有濶八步長二百六十兩段故倍初次商二百六十為五百二十却以八步乘得積四千一百六十是兩箇濶八步長二百六十步小廉積其又商八步自乘積六十四步是小方隅積無平圓先用開平方法後用十二除為圓
