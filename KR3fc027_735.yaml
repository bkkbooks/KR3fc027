body:
  text: 五千四百又左六對右六呼六六除實三十六步恰盡合問今有方磗一千四百六十一塊欲為平方問一兩方若干答曰面方三十八塊七十七塊之十七法日置磚積為實初商三十塊于左下法亦置三十于右為方法左右相呼三三除實九百餘實五百六十一塊就以方法三十倍作六十為廉法次商八于左初商三十之下亦置八于右廉法六十之下為隅法共六十八皆與上商八相呼六八除實四百八十又呼八八除實六十四餘實一十七不盡却將所商三十八倍之再添一塊共得一方數七十七命一十七何謂之命以原總數內除一十七加上七十七便商得面方三十
