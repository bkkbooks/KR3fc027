body:
  text: 若依古法南邉依斜弦量比股多一步五分二厘東邉依斜弦量比股多二分總合積多地二十七步二分七厘今考較當以截法皆得其當以見前古法有差使學者易曉此理也但遇歪斜不等必有斜步豈可作正步相乘若截之庶無誤矣假如五不等田一丘截作二段量之四角斜長三十六步徑上十五步二分下十二步八分三角長二十二步徑一十二步問積若干答曰共積六百三十六步法日先置四角二徑併得二十八步折半得一十四步以乘長三十六步得積五百四步又置三角長二十二步以徑十二步乘之折半得積一百三十二步二共併得橫六百三十六步合問
  hash: sha256:817be36e9f3a01a0d3862231c325d0de424c083d1e43143fcc591a36eac0d7d6
