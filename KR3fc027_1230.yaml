body:
  text: 四十尺以餘股六尺除直積一百五十得積外之勾卽木至表二十五尺古人以題易名若非釋名則無以知其源今較還原法曰置弦內外二勾股木高四丈內除人目四尺餘股各三丈六尺爲長以遠二十五尺加退後五尺共三十尺爲濶相乘得方積一千令八十尺今復將弦內外二股各長三十尺二勾各濶二十五尺相除得方積七百五十尺另以下勾直長二十五尺濶六尺乘之得直積一百五十又以右邊股直三十尺以濶五尺乘之得直積亦一百五十再以餘勾五尺乘餘股六尺得積三十尺四共亦得一千令八十尺較之以和前數而不差也巳上遙望木竿是一表望木也今立表三尺六寸退行二尺又立表三尺人目望其高處
