body:
  text: 下法亦置五于倍方之下共八十皆與次商五相呼左五對右八呼五八除實四百步恰盡得濶三十五步加多一十五步為長合問又法名減積開平方置田積為實于中另置不及十五步于右位為減積上商三十于左位下法亦置三十于右為方法以乘減積一十五步得四百五十步以減中實餘實一千三百步却從初商三十與上商三十相呼三三減積九百餘實四百就以方法三十倍作六十為廉法次商五步于左三十之次下位亦置五步以乘減積一十五步得七十五步以減中積仍餘實三百二十五步却以
