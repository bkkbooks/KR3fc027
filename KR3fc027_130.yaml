body:
  text: 之得正米之数也約分法者凢用除法多有畸零數之不盡位數多者以法約之則簡假如九百四十分之二百三十五以法約之得四分之一何也日分母九百四十分乃是四箇二百三十五故謂四分之一也去其繁而截其簡之故耳通分法者謂法實帶有畸零之数若不設法通之則何由而置位乎假如畸零四分之一者就以一分之数變作四分加入零一分可用乗除而筭之故日通分凢公私皆不用之今但有畸零者至于毫忽以六收
