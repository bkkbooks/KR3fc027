body:
  text: 平地尖堆併圓窖俱併斛法九十尺倚壁堆併斛法四十五尺內角堆併斛法二十二尺五寸外角堆併斛法六十七尺五寸今有方窖上方六尺下方八尺深一十二尺問積米若干荅曰二百三十六石八斗法曰置上方六尺自乘得三十六尺另置下方八尺自乘得六十四尺又以上方六尺乘下方八尺得四十八尺併三位共得一百四十八尺以深一十二尺乘之得一千七百七十六尺用三除之得五百尢十二尺爲實以斛法除之令問
