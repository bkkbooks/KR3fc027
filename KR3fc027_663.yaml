body:
  text: 折半得丁鈔三十九貫二百文又互和甲丙鈔共一百一十二貫折半得乙鈔五十六貫令問今有五人均銀四十両内甲得十両四錢戊得五両六錢問乙丙丁次第均之各該若干荅曰乙九両二錢丙八両丁六両八錢法曰併甲戊共一十六両折半得丙銀八両又併甲丙共一十八両四錢折半得乙銀九両二錢又併丙戊共一十三両六錢折半得丁銀六両八錢合問假加前三人四六分物者可將一等與二等所得数併作一處却分爲十分比驗其一等原得数是六分其二等原
