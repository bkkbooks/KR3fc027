  text: 荅曰股三十六歩勾二十七歩弦四十五歩法日三因積得一千四百五十八歩爲實以弦差九歩折半四歩五分爲縱方開平方法除之得股長三十六歩加九歩爲弦四十五歩另以股自乘弦自乘二数相减餘七百二十九歩爲實以開平方法除之得勾濶二十七歩合問長濶相和歌與减縱開平方法同長濶相和不識情四因積歩莫差争和歩自乘减去積餘用開方差歩名却將和歩加差歩折半當爲長数成
