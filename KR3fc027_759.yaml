body:
  text: 答曰股三十六步勾二十七步弦四十五步法日三因積得一千四百五十八步為實以弦差九步折半四步五分為縱方開平方法除之得股長三十六步加九步為弦四十五步另以股自乘弦自乘二數相减餘七百二十九步為實以開平方法除之得勾濶二十七步合問長濶相和歌與减縱開平方法同長濶相和不識情四因積步莫差爭和步自乘减去積餘用開方差步名却將和步加差步折半當為長數成
