body:
  text: 築堤之法最蹊蹺東高倍之加西高上下廣併乘折半西高另倍加東高上下廣併仍乘折一折數併共相交却用原長乘為實五歸其實積無饒今築堤一所東頭上廣八尺下廣一十四尺高九尺西頭上廣二十尺下廣二十二尺高二十一尺東至西長九十六尺問積若干答曰二萬八千八百尺法日以東高九尺倍之得一十八尺加西高二十一尺共三十九尺却以東頭上下廣併之共二十二尺乘之得八百五十八尺折半得四百二十
