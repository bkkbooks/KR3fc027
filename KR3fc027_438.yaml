body:
  text: 即如前徑自乘以三因數用故仍用四歸得積二十七步半周求積法置半周九步自乘得八十一步如三箇圓田積故用三歸之得圓積亦二十七步半徑求積法置半徑三步自乘得九步如方田積四分之一即圓三分之一故用三因之得圓積半周半徑求積法置半周九步以半徑三步相乘得圓積三十七步如方積四分之三正合圓田之積若問圓田外四角剩積法置一角長濶各三步折半得一步五分自乘得一角剩積二步二分五釐以四因得四角剩積共九步也巳上求積六法皆合周三徑一巳後二術俱有不盡非良法也徽術周求徑以五十因周用一百五十七除之得徑徑求周以一百五十七乘徑用五十歸之得周密術周求徑以七因周用二十二除之得徑徑求周以二十二乘用七歸之得周
