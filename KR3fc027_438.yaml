body:
  text: 卽如前徑自乘以三因数用故仍用四歸得積二十七歩半周求積法置半周九歩自乗得八十一歩如三箇圓田積故用三歸之得圓積亦二十七歩半徑求積法置半徑三歩自乗得九歩如方田積四分之一卽圓三分之一故用三因之得圓積半周半徑求積法置半周九歩以半徑三歩相乗得圓積三十七歩如方積四分之三正合圓田之積若問圓田外四角剩積法置一角長濶各三歩折半得一歩五分自乗得一角剩積二歩二分五厘以四因得四角剰積共九歩也巳上求積六法皆合周三徑一巳後二術俱有不盡非良法也徽術周求徑以五十因周用一百五十七除之得徑徑求周以一百五十七乗徑用五十歸之得周宻術周求徑以七因周用二十二除之得徑徑求周以二十二乗用七歸之得周
