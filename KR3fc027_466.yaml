body:
  text: 環田者如圓田中間有圓池也若圓池不在中面偏者只以圓田算之得全積却減去圓池積餘為本田實積也法以外周自乘又以內周自乘二數相減餘數以十二除之若以內周外周問徑者置外周減內周餘數以六除之得徑若以內周併徑問外周者置徑以六因之得數併入內周數即是外周若以外周併徑問內周者置徑以六因之得數減外周數餘為內周先論方內容圓外方十四步自乘計積一百九十六步問容圓併四旁庇積若干答曰圓積一百四十七步四旁庇積四十九步法曰置方徑十四即圓徑自乘再以七五乘之得圓積也若問四庇積以二五乘方積是也方面即圓徑也方積四分取三為圓積故法用七五乘之或用二因四
