body:
  text: 答日一十八兩三錢七分五釐法日置總苧為實以每錢賣四斤為法歸之合問定位法只認斤前一位定錢依次逆升合得法四斤歸四二添作五變二為五定位五釐實尾五斤四三七十二變三為七右位加二逢四進一十本位去四進一千左斤法上是四斤遇斤即止前一位得令是錢也七分三十四一二十二變一為二布位加二逢四進一十本位去四進一于左十是錢也向前道陛合得實首七百四三七十二變三為七右位加二原起逢四進一十本位去四進一于左實百呼百往後起順數至斤八兩合得千還原用四因
