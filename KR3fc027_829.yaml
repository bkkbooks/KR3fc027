body:
  text: 次商用法不同法曰置積為實別置一算名日下法于實數之下自末位至首常超二位約實千至九十餘萬俱定十百万後俱定百實上商置第一位得若干下法亦置初商若干自乘再乘得若干除實訖餘實若干却以三乘下法初商若干得若干為方法列位初商置第一位于初商之次得若干下法亦置次商若干于初商之次共得若干就以次商若干遍乘得若干為廉法再以方法乘廉得若干除實訖餘實若干却以次商若干自乘再乘得若干為隅法除實盡得立方靣數若有不盡數仍前再商之或有不盡數以法命之何謂之命若餘實若干不盡却以所商
