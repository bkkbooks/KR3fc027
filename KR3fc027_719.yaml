body:
  text: 實若干餘實若干乃以二乘方法即倍法也得若干為廉法續商置第二位于上商之次得若干下法亦置續商若干為隅法于倍方之次共若干皆與續商相呼除實盡得平方一靣數如不盡仍前再商之隅法者乃曲尺樣二亷之角為隅則小方也或數不及以法命之何謂之命若餘實若干不盡却以所商得平方數若干倍之再添一箇共得若干便商得靣方多一數也因此不及而為之命平圓不盡數亦倣此其立方立圓不同若要還原如方田以面方自乘見積若還原過面方下原有不盡數者以面方自乘併入不盡數見積
