body:
  text: 此古米增而麥減何也蓋謂古有官莊産土租米重而租麥輕又紫陽書院田府縣學田有米無麥今變總歸于一則丈出畝步派租米租麥各畝步不同等而田山塘等起科不廢古法惟地扣合米麥總數之故云山按原額計畝新丈不計步數每畝共米一升零七勺帶耗麥同塘池談埸同田則園圃洲堤同地則填塋境迹多作上地開墾儱野以作莞地三百為畝入山稅畝法論
  hash: sha256:fa4369f12f736d66573b57b4690ccaf0b2f815d8bf29171eac83b346133488fc
