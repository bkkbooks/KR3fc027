body:
  text: 法曰此是斤問兩價置蠟五百三十五斤用加六法得數併人零七兩共八千五百六十七兩為實以價八釐九毫為法乘之合問今有大青四百三十二斤一兩每斤價銀二兩問諛銀若干答曰八百六十四兩一錢二分五釐法曰此是斤下帶兩求斤價巳後同置青四百三十二斤不動以斤下一兩用截兩歌遍之將一兩退位作六二五併得四百三十二斤六二五為實以斤價為法乘之合問今有杏仁二百一十八斤四兩每斤價五錢二分問該銀若干答曰一百一十三兩四錢九分
  hash: sha256:6b7c14e800965005677ab0606103208152cf2abab5c335b252bf61f9e787c0a2
