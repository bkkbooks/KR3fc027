body:
  text: 右硃二爲法先乘左行粉三得九空價二両零四分中空粉五丹六價六錢四分左硃三空負九丹七得一十四價二両九錢八分得五両九錢六分却以左行硃三爲法遍乘右行粉三得九左空亦立負九價二両令四得六両一錢二分與左行得数五両九錢六分封減餘一錢六分又以中行粉五爲法遍乘左行粉負九得負四十五丹十四得七十餘價一錢六分得八錢再以左行負粉九爲法遍乘中行粉五得四十五與左行負粉封減尽丹六得五十四異加左丹七十共一百二十四爲法以中原價六錢四分亦以負粉九乘得五両七錢六分減左餘價八錢餘四両九錢六分爲實以法除之得丹毎斤價四分於中行
