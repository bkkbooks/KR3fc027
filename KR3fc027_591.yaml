body:
  text: 未併者是前列衰各自為實以法除之合問可約者約分之不盡者以法命之一法置所分物為實併各衰為法除之得一衰以乘各衰合率差分今有一銀一千二百兩買綾絹議要絹一停綾二停其綾每匹價三兩六錢絹每匹二兩四錢問二色併價各若干答曰綾二百五十匹價九百兩絹一百二十五匹價三百兩法曰置銀一千二百兩為實另置綾價以二因之得七兩二錢併入絹價二兩四錢共九兩六錢為法除之得絹一百二十五匹倍之得綾二百五十匹各以原價乘之合問
