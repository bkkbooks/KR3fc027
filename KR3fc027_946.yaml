body:
  text: 除求之數减去矢餘存此即是弧弦法日置積一百二十八步倍之得二百五十六步為實以矢八步為法除之得三十二步减矢八步餘得弧弦二十四步積求矢濶歌積求矢濶倍為實弦為縱方奠教遲商於左位右併縱前後呼除矢得冝法日置積一百二十八步倍得二百五十六步為實以弦二十四步於右為縱方約商八步于左亦置商八步于右縱方二十之下共三十二步皆與上商八相呼三八除實二百四十二八除實一十六步恰盡得矢八步
