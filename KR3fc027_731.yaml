body:
  text: 今有方田積三千一百三十六步問平一靣若干答曰五十六步法日置田積為實約實定初商五十步于左下法亦置五十步于右左右相呼五五除實二千五百步餘積六百三十六步就以下法五十步倍之得一百步次商六步于左初商五十之下亦置六步于右倍方一百隔位之下共得一百零六步皆與次商六步相呼一六除實六百步又左六對右六相呼六六除實三十六步恰盡今有方田積二十萬零七千九百三十六步問平方一面若干
