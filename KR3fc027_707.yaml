body:
  text: 物不知總孫子歌曰又云韓信點兵也三人同行七十稀五樹梅花草一枝七子團圓正半月除百令五便得知今有物不知數只云三數剩二箇五數剩三箇七數剩二箇問共若干答曰共二十二箇法日列三五七維乘以三乘五得一十五又以七乘之得一百零五為滿法數列位另以三乘五得一十五為七數剩一之衰又以三乘七得二十一為五數剩一之衰又以五乘七得三十五倍作七十以三除之餘一故用七十
