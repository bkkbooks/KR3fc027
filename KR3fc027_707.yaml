body:
  text: 物不知總孫子歌曰又云韓信點兵也三人同行七十稀五树梅花廿一枝七子團圓正半月除百令五便得知今有物不知数只云三数剩二箇五数剩三箇七数剩二箇問共若干荅曰共二十二箇法日列三五七維乘以三乘五得一十五又以七乘之得一百零五爲满法数列位另以三乘五得一十五爲七数剩一之衰又以三乘七得二十一爲五数剩一之衰又以五乘七得三十五倍作七十以三除之餘一故用七十
  hash: sha256:c1454226b1ec976b50e5da0f7014dca6b5290c5828b8860b2c68290b33059d0c
