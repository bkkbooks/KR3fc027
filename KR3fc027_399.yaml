body:
  text: 步正長八十六步問積若干答曰二千四百九十四步法日併南北二廣折半得四十步加中廣共五十八步以長乘得四千九百八十八步折半得積合問一法倍中廣併能北二廣共一百一十六步以四歸之得二十九步以長乘之亦得按三共田乃是二段梯田之併必共三廣相去俱停乃可以三廣法算或上段長下段短或上段短下段長並不可用三廣法當以二梯算而併之乃為無弊又按鼓田杖鼓田又有箭箬箭翎田亦要三廣相去俱停可用三廣法若不停者亦只以三梯或二斜算而併之是也
  hash: sha256:88db28e1a6622b86a0b1a46719a31f73a6cdd6db20c4cc84056d77e00e711bfc
