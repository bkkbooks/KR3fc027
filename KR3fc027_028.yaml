body:
  text: 其義則九之技扵致遠蓻成而下者等耳得如而又淂其所以數寫參伍錯綜之用可以成變化而行鬼神游蓻之功固易範之奧吾儒之實用也忑可以湏曳廢哉國家二百餗年薰陶醖釀之化鍾為人物三仁四科代不乏賢而筭如之學之無特出者嘉靖中大司寇顧以握算高一代唐中丞
