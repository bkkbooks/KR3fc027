body:
  text: 黍米一轉止三分幾轉轉到山脚底荅曰四百八十萬轉法日置山高八十里以每里三百六十歩乘之得二萬八千八百以每歩五十寸乘之得一百四十四萬寸爲實以米轉三分爲法除之合問排魚求数歌三寸魚兒九里溝口尾相野直到頭試問魚兒多少数請君對靣説因由荅曰五萬四千箇法日置九里以每里三百六十歩乘之得三千二百四十歩以每歩五十寸乘之得一十六萬二千寸以每魚長三寸爲法除之得魚数合問
