body:
  text: 實尾八錢逢九進三十本位除去進三千左定位五兩三一三十一變一為三在加一逢六淮二十本位去六進二于左兩讀上是兩遇兩即止前一位得令是石也六斗三十三二六十二變二為六右加二逢三進一十本位去三進一于左十是石也向前逆升合得八石實首八百三二六十二變二為六右位加二起逢六進二十本位去六進二于左百起呼百往後順數至兩七十合得二百還原用三因三六一十八三八二十四三七二十一二三如六假如今有苧麻七百三十五斤每四苧斤賣銀一錢問該銀若干
