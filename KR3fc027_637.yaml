body:
  text: 四因得若干又將一等戶數以五因得若干併五等數共得五百四十衰為法除實得二石一斗是第五等一戶所出數以二因得四等一戶所出數以三因得三等一戶所出數以四因得二等一戶所出數以五因得一等一戶所出數各以戶數乘之合問自五等起遁加二石一斗至一等止今有米二百四十石令甲乙丙丁戊五人分要將甲乙二人數與丙丁戊三人數以同問各該若干答曰甲六十四石乙五十六石丙四十八石丁四十石戊三十二石法曰置總米為實列甲五乙四丙三丁二戊一又併甲五乙四得九
