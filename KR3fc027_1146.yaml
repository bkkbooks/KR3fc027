body:
  text: 以法除之得六分爲雞一雙之價另以左行原價八錢一分減雞六雙共價三錢六分餘四錢五分以鴨五雙爲法除之得鴨價毎雙九分再以右行原價七錢五分減鴨三雙共價二錢七分餘四錢八分以鵝四爲法除之得鵝毎雙價一錢二分合問今有賣二牛五羊買十三猪剩銀五両賣一牛一猪買三羊適足賣六羊八猪買五牛少錢三両問牛羊猪各價若干荅曰牛價六両羊價二両五錢猪價一両五錢法曰以賣牛爲正以買猪爲負以多爲正以少爲負列所問数先以右行牛正二爲法遍乘中左二行得数
