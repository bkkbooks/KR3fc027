body:
  text: 答曰方面圎徑各一十二步法曰置共積以四因得一千零八步併方四圎三共七為法除之得一百四十四步以問平方法除之得方面一十二步圎徑亦同術曰四因方圓共積得四箇方積四箇圎積共四箇圎積恰折三箇方積故用七除得一箇方積以開平方法除之得方圎徑舊法四因共積得一千零八步為實以開平方法除之併方四圎三共七為隅于下法初商一十以隅七乘得七十為方法與上商一十相呼除實七百餘實三百零八步另倍方法得一百四十
