body:
  text: 荅曰方面圎徑各一十二歩法曰置共積以四因得一千零八歩併方四圎三共七爲法除之得一百四十四歩以問平方法除之得方面一十二歩圎徑亦同術曰四因方圓共積得四箇方積四箇圎積共四箇圎積恰折三箇方積故用七除得一箇方積以開平方法除之得方圎徑舊法四因共積得一千零八歩爲實以開平方法除之併方四圎三共七爲隅于下法初商一十以隅七乘得七十爲方法與上商一十相呼除實七百餘實三百零八歩另倍方法得一百四十
