body:
  text: 孕推男女法歌四十九数加孕月减行年歲定無疑一除至九多餘數逢雙是女隻生兒今有孕婦行年二十八歲八月有孕問所生男女荅曰生男法曰置四十九加孕月八共五十六减年二十八餘二十九减天除一地除二人除三四時除四五行除五六律除六七星除七不盡奇爲男偶爲女也一三五七九皆奇二四六八十皆偶如数多再以八風除八
