body:
  text: 荅曰四百五十六歩法日置方積爲實約初商四百于左位亦置四百于右位爲方法與上商相呼四四除實一十六萬餘實四萬七千九百三十六歩就以方法四百倍作八百爲廉法次商五十于左初商四百之下亦置五十于右廉法八百之下爲隅法共八百五十皆與次商五十呼除先从左五對右八呼五八除實四萬又左五對石五呼五五除實二千五百餘實五千四百三十六歩却以下法次商五十倍之併廉共得九百又爲廉法又商六歩于左初次商四百五十之下亦置六歩于廉法九百隔位之下共九百零六皆與左再商六歩呼除先左六對右九呼六九除實
