body:
  text: 得弦一十五尺合問今有立木不知其高索不知其長埀索委地二尺引索去木八尺其索斜拄地適盡問木高索長各若干荅曰木高一丈五尺索長一丈七尺法曰置去木八尺爲勾自乘得六十四尺以委地二尺爲股較自乘得四尺以減六十四尺爲實以較二尺倍作四尺爲法除之得木高一丈五尺如股加較二尺得索長一丈七尺如弦合問若以弦較求弦法置去木八尺爲勾自乘得六十四尺爲實以
