body:
  text: 南吕屬陰律長五寸三分之一却以分母三通五寸加分子之一共得一十六寸以九分因之以三歸之得積四百八十分其候秋分却以通寸一十六以四因之得六十四寸另以三因分母三得九爲法歸之得七寸九分寸之一隔八下生姑洗姑洗属陽律長七寸九分寸之一却以分母九通七寸加分子之一共得六十四寸以空圍九分因之得五千七百六十分以分母九歸之得積六百四十分其候榖雨却以通寸六十四以二因之得一百二十八寸另以三因分母九得二十七爲法除之得四寸二十七分寸之二十隔八下生應鍾應鍾属陰律長四寸二十七分寸之二十却以分母二寸七通四寸加分子
