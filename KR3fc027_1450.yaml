body:
  text: 荅曰三人綾一十二疋法曰置不足適足以不足六疋爲實以分綾六疋四疋相减餘二爲法除之得三人以適足四疋乘之得綾一十二疋合問歌今攜一壺酒遊春郊外走逢朋添一倍入店飲斗九相逢三處店飲盡壺中酒試問能筭士如何知原有荅曰原酒一斗六升六合二勺五抄法曰置三處倍之飲列一倍二二倍四併之得七率爲法以乘一斗九升得一石三斗三升折半三遭得原酒合問又法置一斗九升併倍
