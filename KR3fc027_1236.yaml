  text: 表問尺數乘高數以作實情更不疑二表退行相減較減餘爲法以除之更將一表相加併海島巔高盡可知另置表問之尺數以乘前表退行宜前法除之知隔水水程遠近不差池假如隔水望木有竿不知高立二表各長一丈前後參直相去一十五尺從前表退行五尺人目四尺窺望表與竿齊平復從後表退行八尺窺望亦與竿齊平問竿高隔水各若千荅日竿高四尺隔水廣二丈五尺
