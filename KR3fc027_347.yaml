body:
  text: 先下原錢乘只物却將原物法除之將錢買物互乘取百里千斤以類推算者留心能善用一絲一忽不差池假如原有米五石八斗四升賣銀四兩三錢八分今只有米一石七斗二升問該銀若干答曰一兩二錢九分法日置今有米一石七斗二升以原賣銀四兩三錢八分乘之得七兩五錢三分三釐六毫為實却以原有米五石八斗四升為法除之合問一法先用除而後乘先置原價四兩三錢八分以原米五石八斗四升為法除之得每石價銀七錢五分又為法以乘今米一石七斗
