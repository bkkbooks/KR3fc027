body:
  text: 九人為法一兩為實下加一法實相呼一兩不動變作每人一錢九人共除九錢餘一錢歸日九一隨身下加一如此挨身加一難盡九人為法二兩為實下加二法實相呼二兩不動變作每人二錢九人共除一兩八錢餘二錢歸日下加二二錢又用此歸法挨次而算九人為法三兩為實下加三法實相呼三兩不動變作每人三錢九人共除二兩七錢餘三錢歸日下加三三錢又用此歸挨次而算九人為法四兩為實下加四法實相呼四兩不動變作每人四錢九人共除三兩六錢餘四錢歸日下加四四錢又用此歸逐位而算九人為法五兩為實下加五法實相呼五兩不動變作每人五錢九人共除四兩五錢餘五錢歸日下加五五錢又用此歸逐位而算
