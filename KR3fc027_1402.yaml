body:
  text: 上廣一箇下廣五箇堆垜鐔式法日置積一百六十以六乘之得九百六十爲實倍多廣七个得一十四个加上長三个共一十七个爲縱方再加上長三个共二十个爲縱廉以三爲隅筭用開立方法除之上商五个下法亦置五个自乘得二十五个又以隅三乘之得七十五个爲隅法又以五乘縱廉二十得一百以方廉隅三法共得一百九十二皆與上商五除實盡得下廣五箇加多七箇爲下長三箇爲上長合問歌
