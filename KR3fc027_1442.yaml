body:
  text: 我問開店李三公衆客都來到店中一房七客多七客一房九客一房空荅曰房八眼客六十三人法日置盈七客以一房空九人乗之得六十三以九客乘多七客得六十三併之得一百二十六爲實以盈七與不足九相减餘二爲法除之得六十三人以减去多七客餘五十六人以每房七客除之得房八眼合問西江月幾箇牧童閉要張家園内偷瓜將來林下共分拿三人七枚便罷分訖剩餘一箇内有伴歌兠搭四人九箇又分拿
