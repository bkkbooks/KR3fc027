body:
  text: 法首九人空十减實尾八分三錢二九除一十八本位去一右位去八定位六兩本位定二本位去七存二右位去二八九除七十二二分實首八十本位定八原實十起法首空十遇十即止合前位得令是兩也得八錢前位是兩也順降下位合得兩求一乘除法按古有之賓渠因考其法用倍折之繁難不如歸除之簡易故愚于此而廢之使學者專心于乘除加减之法而無他岐之惑焉
