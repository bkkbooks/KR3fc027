body:
  text: 今有直田長一十四步濶七步計積九十八步問內容弧矢田一段占積併二角餘積各若干答曰弧矢積七十三步半二角積二十四步半法日置長一十四步為弧弦以濶七步為矢相併得二十一步折半得一十步五分又以矢七步乘之得弧矢占積七十三步五分以减直積九十八步餘二十四步五分是二角餘積今有直田長二十步濶十八步計積三百六十步內容六角田一段每角面十步問六角占田積併餘積各若干
