body:
  text: 荅曰勾二十七步股三十六步法曰置弦四十五步自乘得二千零二十五步另以勾股和六十三步自乘得三千九百六十九步二位相減餘一千九百四十四步再減弦自乘得二千令二十五步餘八十一步以開平方法除之得勾股相差九步加入相和六十三尺共七十二步折半得股三十六步內減去差九步餘得勾二十七步合問此是勾股相和勾弦較股弦較歌此是勾弦差又股弦差勾弦股較法尤精勾乘股較二來因平方開見弦和數和加勾較股份明股較加和勾可見筭師熟記看靈扄
