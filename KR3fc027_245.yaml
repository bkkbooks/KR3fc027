body:
  text: 起二六一十二二六一十二下位是百也向前逆陞合得八百實尾六歩一六如六二二如四一六如六歩只認步下一位定法首是百也五千二十一二如二一二如二十一萬實首二百一一如一原实百起呼百往後順数至步還原用歸除法詳後逢一進一十一二如除二一六如除六逢二進二十二二如除四二六除一十二逢六進六二六除一十二六六除三十六歸除凢二至九位数多者用此置物爲實以價或分者爲法
