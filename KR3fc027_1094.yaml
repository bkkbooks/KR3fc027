body:
  text: 今有人買物毎人出銀七両不足一十四両毎人出銀九両適足問人数物價各若干荅曰七人物價銀六十三両法曰置不足適足列出七両出九両互適足不足十四両只以不足一十四両互乘出九両得一百二十六両爲物實另以不足一十四両爲人實却以出九両內减出七両餘二両爲法除物實得物價除人實得人数合問一法以不足一十四両爲人實以出率相减餘二爲法除實得七人以九両乘之得物價今有米換布七疋多四斗換九疋適足問米布價各若干
