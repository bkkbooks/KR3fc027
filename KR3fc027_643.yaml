body:
  text: 正三品俸糧加十三是第四等從二品俸糧又加十三是正二品俸糧各品遞加十三合問今有官米二百六十五石令三等人戶出之上等二十戶每戶多中等七斗中等五十戶每戶多下等五斗下等一百一十戶問每戶所出及逐等各若干答曰上等每戶二石四斗共四十八石中等每戶一石七斗共八十五石下等每戶一石二斗共一百三十二石法曰置中等五十戶以每戶多下等五斗因之得二十五石又置上等二十戶以每戶多中等七斗多下等五斗共一石二斗乘之
  hash: sha256:1e69e4a4e9094d808ceb70bad5ca3649c3a7bed04d7d8183623b2014bc02b753
