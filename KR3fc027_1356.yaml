body:
  text: 就見學生多少数請君布筭莫躊蹰荅曰毛詩四十本春秋三十册周易二十四本學生各經一百二十名總計三百六十人法曰列置三人四人五人維乘以三人乘四人得一十二又以四人乘五人得二十又以五人乘三人得一十五併之得四十七爲法另以共書九十四本在位以詩三人乘之得二百八十二本再以秋四人乘之得一千一百二十八又以易五人乘之得五千六百四十本爲實以法四十七除之得各經學生一百二十名列三位以三人歸之得詩經四十本以四人歸之得春秋三十本以五人歸之得易經二十四本併三經學生共三百六十人合問
  hash: sha256:77e0d116a59103963e6b496eadb7e27606431effe79b33b75013b0d5f8ead3a8
