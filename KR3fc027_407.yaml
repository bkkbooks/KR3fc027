body:
  text: 假如四不等田一丘截作三段量之一段直田長四十步濶二十八步南邉勾股一段股長三十二步勾濶十步東邉勾股一段股長四十步勾濶四步問共積若干答曰三共積一千三百六十步法日先置直田長四十步以濶二十八步乘之得直積一千一百二十步又置南勾股一段股三十二步以勾十步乘之折半得積一百六十步再置東勾股一段股四十步以勾濶四步乘之折半得積八十步三共併積一千三百六十步此乃准數毫忽無差
