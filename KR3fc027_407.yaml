body:
  text: 假如四不等田一坵截作三段量之一段直田長四十歩濶二十八歩南邉勾股一段股長三十二歩勾濶十歩東邉勾股一段股長四十歩勾濶四歩問共積若干荅曰三共積一千三百六十歩法日先置直田長四十歩以濶二十八歩乗之得直積一千一百二十歩又置南勾股一段股三十二歩以勾十歩乗之折半得積一百六十歩再置東勾股一段股四十歩以勾濶四歩乗之折半得積八十歩三共併積一千三百六十歩此乃准数毫忽無差
