body:
  text: 二十次呼三一八七五変本身三爲一更于下位如八七五四百又次呼四二五変本身四爲二更于下位加五一法或用十六両除之亦得今有麝香一百両乳香一千両芸香一萬両問各斤数若干荅曰麝六斤四両乳六十二斤八両芸六百二十五斤法曰置香各用截両歌一退六二五法麝香一百両退作六斤二五斤数不動二五可用如六之法先從尾五起加五六加三作八二六加一十二共得四両合問乳香一千両退作六十二斤五六十二斤不動以六加五五六
