body:
  text: 二十次呼三一八七五變本身三為一更于下位如八七五四百又次呼四二五變本身四為二更于下位加五一法或用十六兩除之亦得今有麝香一百兩乳香一千兩藝香一萬兩問各斤數若干答曰麝六斤四兩乳六十二斤八兩藝六百二十五斤法曰置香各用截兩歌一退六二五法麝香一百兩退作六斤二五斤數不動二五可用如六之法先從尾五起加五六加三作八二六加一十二共得四兩合問乳香一千兩退作六十二斤五六十二斤不動以六加五五六
