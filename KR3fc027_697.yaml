body:
  text: 四十三兩五錢為長法次以中羊四互乖總價一百六十八兩得六百七十二又置總物一百隻以賤價一兩五錢乘之得一百五十以减六百七十二餘五百二十二為實以長法四十三兩五錢除之得二兩二錢為短法列二位一位以貴物半三乘之得半三十六隻一位以半貴價一十二兩乘之得一百四十四兩以减總銀餘得羊價合問今有大小魚一百斤共價八錢七分五厘只云大點大魚二斤價四分小魚七斤價五分問大小魚及各若干答曰大魚一十二斤半價銀二錢五分小魚八十七斤半價銀六錢二分五厘
