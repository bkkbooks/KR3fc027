body:
  text: 二千寸又置小木頭徑一尺自乘得一百寸又將稍徑自乘得四十九寸併之得一百四十九寸以長二丈乘之得積二萬九千八百寸併大小積共八萬一千八百寸為法以餘原價四十九兩零八分每寸派得六毫就以此為法各乘大小積合問今有石中有玉方三寸共重一十二斤十也兩只云玉方一寸重一十二兩石方一寸重三兩問玉石各重若干答曰玉一十四寸重一十斤零八兩石一十三寸重二斤七兩法曰置方三寸自乘得九寸再乘得二十七寸以玉率重一十二兩乘之得三百二十四兩减共重一十二斤十五兩即二百零七兩餘一百一十七兩
