body:
  text: 二千寸又置小木頭徑一尺自乘得一百寸又將稍徑自乘得四十九寸併之得一百四十九寸以長二丈乘之得積二萬九千八百寸併大小積共八萬一千八百寸爲法以餘原價四十九両零八分每寸派得六毫就以此爲法各乘大小積合問今有石中有玉方三寸共重一十二斤十也両只云玉方一寸重一十二両石方一寸重三両問玉石各重若干荅曰玉一十四寸重一十斤零八両石一十三寸重二斤七両法曰置方三寸自乘得九寸再乘得二十七寸以玉率重一十二両乘之得三百二十四両减共重一十二斤十五両卽二百零七両餘一百一十七両
  hash: sha256:434b82aa81857049c88169ebe9e73fc0d8a6b324cc5e0c0ce8d02e29d7ba2c54
