body:
  text: 加法十六共二十四歩是弦長折半得一十二歩自乗得一百四十四歩爲實以矢八歩爲法除之得一十八歩加矢八歩共得圎徑二十六歩若問索長以矢八歩加離邉五歩乃是索長一十三歩合問弧矢求積歌弧矢求積弧矢形丈量之法註分明弧矢弦長併矢歩半之又用矢相乗法日置弦二十四歩併矢八歩共三十二歩折半得一十六歩以矢八歩乗之得積一百二十八歩積求弧弦歌弧矢之積求弧弦倍積以矢除爲先
