body:
  text: 加法十六共二十四步是弦長折半得一十二步自乘得一百四十四步為實以矢八步為法除之得一十八步加矢八步共得圎徑二十六步若問索長以矢八步加離邉五步乃是索長一十三步合問弧矢求積歌弧矢求積弧矢形丈量之法注分明弧矢弦長併矢步半之又用矢相乘法日置弦二十四步併矢八步共三十二步折半得一十六步以矢八步乘之得積一百二十八步積求弧弦歌弧矢之積求弧弦倍積以矢除為先
