body:
  text: 答曰二領法曰置米十石以較米二石五斗除之得四領為實以平方開之得二領作囤合問今有米二十二石五斗欲用席囤盛之亦以一席較數同前問諛用席若干答曰三領法曰置總米為實以較米二石五斗為法除之得九領又為實以平方開之得三領合問論曰席盛米法豫以席一領且如長四尺作一囤較之四靣各方一尺也若二領若長八尺作一大囤是
