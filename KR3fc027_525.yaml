body:
  text: 荅曰二領法曰置米十石以較米二石五斗除之得四領爲實以平方開之得二領作囤合問今有米二十二石五斗欲用蓆囤盛之亦以一蓆較数同前問諛用蓆若干荅曰三領法曰置總米爲實以較米二石五斗爲法除之得九領又爲實以平方開之得三領合問論曰蓆盛米法予以蓆一領且如長四尺作一囤較之四靣各方一尺也若二領若長八尺作一大囤是
