body:
  text: 足折半得二十三隻合問一法以四因總頭减去總足餘折半得鶏或以二因四歸總足减總頭餘得兔倍頭减足折半是兔不分雞兔以雞二足乘頭数干共足內減之所餘者是一兔剩二足故折半爲兔也四頭足减折半是雞不分雞兔以兔四足乘頭数以共足减之所餘者雞足也故折半爲雞此法名二率分身卽貴賤差分也今有狐狸一頭九尾鵬鳥一尾九頭只云前有七十二頭後有八十八尾問二禽獸各若干
