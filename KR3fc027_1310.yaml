  text: 八子分綿歌九百九十六斤綿贈分八子做盤緾次第毎人多十七要將第八数來言務要分明依次第孝和休惹外人傳荅曰長子一百八十四斤次子一百六十七斤三子一百五十斤四子一百三十三斤五子一百一十六斤六子九十九斤七子八十二斤八子六十五斤法曰置七衰一二三四五六七併得二十八衰爲實以多十七乗之得四百七十六以数總綿数餘五百二十以八子除之得六十五斤爲第八子
