body:
  text: 勾股容圓法可知勾弦股數併爲奇三數併來爲法則勾股相乘倍實宜法除倍實爲圓數筭者詳之不用疑今有勾二十七尺股三十六尺問中容方面徑若干荅曰中容方面徑一十五尺有畸法曰置勾股相乘得九百七十二尺爲實另以勾二十七尺併股三十六尺共六十三尺爲法除之得中容方面徑一十五尺不盡二十七尺卽四分二厘八毫今有勾二十七尺股三十六尺弦十五尺問中容圓徑
