body:
  text: 以三除之得飯碗合問今有客不知數只云二人共飯三人共羹四人共肉通共用碗六十五隻問客若干答曰客六十人法日置二人三人四人雞乘以二乘三得六以三乘四得一十二又四乘二得八併之二十六為法另以二乘三得六却以四乘之得二十四以乘碗六十五得一千五百六十為實以法二十六除之得客合問雞乘者四處顛倒相乘也右二條先用合分後用互換也新編直指算法統宗卷之五
  hash: sha256:84fb9f5f37d9d2f8e94a806f46cc3b9ab3adb9deaebb1db2e37ee9e33f957403
