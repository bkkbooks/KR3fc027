body:
  text: 今有人支銀四錢五分又支三錢四分又支三両五錢問共該若干荅曰四両二錢九分法曰置九圖先呼四錢五分將銅錢置錢圖㢲四上次將五分置分圖中五上又呼三钱四分將錢圖㢲四移在兊七仍四分于分圖丙起中五移在離九上再呼三両五錢置両圖內震三上郝將五錢在于錢圖內兊七去五移在坤二上進一於両圖內震三移在㢲四共得四両二錢九分合問今有米五百七十六石每石價銀三錢問共該銀若干荅曰一百七十二両八錢
