body:
  text: 實首二百起九二下加二本位不動右位加二原實百起呼百往後順數至分合得二千還原用九因八九七十二四九三十六九九八十一二九一十八乗法畱頭乗按因與乗一也單位者謂之因位數多者謂之乗特以此而異其名耳原有破頭乗掉尾乗隔位乗總不如畱頭乗之妙故皆不錄歌曰下乗之法此爲眞起手先將得二因
