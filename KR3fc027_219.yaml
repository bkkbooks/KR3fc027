body:
  text: 實首二百起九二下加二本位不動右位加二原實百起呼百往後順數至分合得二千還原用九因八九七十二四九三十六九九八十一二九一十八乘法留頭乘按因與乘一也單位者謂之因位數多者謂之乘特以此而異其名耳原有破頭乘掉尾乘隔位乘總不如留頭乘之妙故皆不録歌曰下乘之法此為真起手先將得二因
