body:
  text: 法酉四斗二石乘四勺八八六十四四合六八四十八五八得四十五升四八三十二五六得三十一三八二十四定位三斗實尾八錢二八一十六四五得二十十三六一十八下位是石也向前逆陛合得八石五兩二五得一十三四一十二兩法酋是每兩米二石過兩即止下一位得術是石也合得實首三十二三如六原實十起呼十往後顧教至兩還原用歸除法詳後逢六進三十三四除一十二三六除一十八
