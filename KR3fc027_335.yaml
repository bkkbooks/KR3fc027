body:
  text: 先日先將二十四日用三歸得八數在十月隔空一位之下再以十二月除之得九數如年以乘原本得二百三十四兩為實以每年加三為法因之合問解日凡算年月日期即似與兩求斤法減六同理每斤一十六兩減六只作一數每年十二月每月三十日故先用三歸如月併月後用十二除月如年以乘各人原本合得餘皆倣此圖式具左定盤算日月為年式法先三歸如月數法後二月一十除如年數四日逢六進二十本位去盡進二于左
