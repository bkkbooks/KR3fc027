body:
  text: 一段田禾之外東邉近有荒丘離邉五步頭半只為繩長遊走踐迹五分八步如同弧矢弦時索長多少是根由演立天源窮究右調西江月原在離題少廣章中無圎今共圎之干此便入目矣解題弧矢田積一百二十八步離徑五步問矢濶弦長各若干答曰索長一十三步弧周二十八步有令矢濶八步離徑五步弧弦二十四步圎徑二十六步法日置積一百二十八步為實另以此數倍之得二百五十六步以開平方法除之得一十六步為法除實得矢八步
  hash: sha256:bd70c544d0f4c57c18ddb168f86734badba3b7f62c5065022d6c020975fb03af
