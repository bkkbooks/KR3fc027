body:
  text: 一段田禾之外東邉近有荒丘離邉五歩頭半只爲繩長遊走踐跡五分八歩如同弧矢弦時索長多少是根由演立天源窮究右調西江月原在離題少廣章中无圎今共圎之干此便入目矣解題弧矢田積一百二十八歩離徑五歩問矢濶弦長各若干荅曰索長一十三歩弧周二十八歩有令矢濶八歩離徑五歩弧弦二十四歩圎徑二十六歩法日置積一百二十八歩爲實另以此数倍之得二百五十六歩以開平方法除之得一十六歩爲法除實得矢八歩
  hash: sha256:1748624557c12387d9d69a7fbb2747b29a6d4c990508be68dd6f2ed3b8cd9538
