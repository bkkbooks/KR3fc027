body:
  text: 答曰八十四步法曰置十四步以六因之得八十四步以七歸之得中長十二步另以每面十四步折半得七步因之合間三角即圭也以半濶乘中長十二步亦得假如稜田中長五十二步中廣一十二步間積若干答曰三百一十二步法曰置長五十二步以廣十二步乘之得六百二十四步折半得積三百一十二步合問勾股圭稜乘折半田形雖典理一同假如斜圭田長三十步濶一十六步間積若干
