body:
  text: 法日置總一千一百七十里為實以六日為法除之得快者日行一百九十五里另將先行七日併後趕六日共一十三日為法除總一千一百七十里得慢行里數合同今有甲乙二人行步不等甲日行八十里乙日行四十八里令乙先行二百四十里甲才發步追之問幾里可及答曰六百里甲乙日半乙十二日半法日置先行二百四十里以甲日行八十里乘之得一万九千二百里為實却以甲乙日行里數相減餘三十二里為法除之合問今有人盜馬乘去巳去三十七里馬主方覺追去一百四十五里不及二十三里仍復追之問幾里可及
