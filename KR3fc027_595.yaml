body:
  text: 今有鰥寡孤獨四貧民共給米二十四石其鰥者四分寡者五分孤者七分獨者九分問四民各該若干答曰鰥三石八斗四升寡四石八斗孤六石七斗二升獨八石六斗四升法曰置米為實另鰥四寡五孤七獨九併之共二十五為法除實得九斗六升為一衰之數以各自衰因之合問今有甲乙丙丁四人各出本銀七兩五錢甲銀八色乙銀七色丙銀六色丁銀四色共三十兩入爐傾成一錠合夥不成各欲分散問各該若干答曰甲銀九兩六錢乙銀八兩四錢
