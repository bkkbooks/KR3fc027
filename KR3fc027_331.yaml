body:
  text: 貞該利二十五兩法日置利銀七十兩為實以四人共本一百四十兩為法除之得五錢為每兩之利就以此為法以乘各人原本合問假如今有甲乙丙三人合夥同商因各人本銀不齊前後付出甲于正月付出本七十兩乙于四月付出本八十兩丙于七月付出本九十兩三人共本二百四十兩至年終得利七十兩問各該利銀若干答曰甲該利二十八兩乙該利二十四兩丙該利一十八兩
