body:
  text: 新安賔渠程大位汝思甫編集會孫素亭光紳佩章甫較正蘊齋鈁洪聲甫泰閱勾股第九章橫濶謂之勾直長謂之股両隅斜去謂之弦此章以勾股求弦之斜勾弦求股之長以股弦求勾之濶求勾股中容方容圓求山之高水之深城之廣路之遠皆可知也勾股之形卽今木匠曲尺之形也勾是尺股是尺稍目尺頭至稍尾斜去是弦也假如勾二尺股四尺弦卽五尺也
