body:
  text: 今有人買物毎人出銀五両盈六両毎人出銀三両不足四両問人物價各若干荅曰五人物價銀一十九両法曰置盈不足出五両出三両互乘不足四両盈六両先以出五両互乘不足四両得二十両次以出三両互乘盈六両得一十八両併二位共三十八両爲物實另併盈六両不足四両共十両爲人實却以出五両内减出三両餘二両爲法除人實得五爲人数除物實得一十九両爲物價此是盈朒互乘出率併爲實又併盈朒爲人實者今有人分物毎人分一十二箇盈一十二箇毎人分一十四箇不足六箇問人数及物若干
