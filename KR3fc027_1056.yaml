body:
  text: 今有車一輪輪高六尺推行二十里問輪轉若干荅曰輪轉二千次法曰置二十里以里率一千八百尺乘之得三萬六千尺爲實另以輪高六尺三因得周一十八尺爲法除之合問今有人車不知其数凡三人共車二車空二人共車九人步行問人車各若干荅曰一十五車三十九人法曰置二人以三人乘之得六加九人得車一十五又以二人乘車十五得三十加九人得人数今齋僧不知人数初日毎五人米八斗次日毎九人米七
