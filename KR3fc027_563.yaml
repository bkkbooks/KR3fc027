  text: 及價各若干答曰銖二十三萬四百銖每銖三毫二絲五忽五分三萬八千四百分每分一厘九毫五絲三忽一二五雨九千六百兩每兩七厘八毫一絲二忽五裏三百裏每裏二錢五分稱四十稱每稱一兩八錢七分五厘鈞二十鈞又日砠每鈞三兩七錢五分石五石又日馱每石一十五兩引三引每引二十五兩法曰置椒六百斤為實以歸之得三百裏就以七五除之
