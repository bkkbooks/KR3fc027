body:
  text: 法曰置棗七十八斤不動將二兩化為一二五併得七十八斤一二五為實另以二斤不動將四兩化作二五併得二斤二五為法乘之得一百七十五斤七八一二五却將斤下零七八一二五用加六之法加之得一十二兩五錢合問今有生漆三百七十七斤每斤晒得熟漆四兩問諛熟漆若干答曰九十四斤四兩法曰置生漆為實以晒熟漆四兩化作二五為法乘之得九十四五二五却將二五用加六法得四兩合問原買大絲一斤用價七錢六分五釐今又買六兩問諛價
  hash: sha256:a7edfd3c055ef5f5901a39652a44caebeb3943d94957a20d3b6d5fd764731d03
