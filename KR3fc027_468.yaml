body:
  text: 歸亦得圓積四庇方內四分之一後論圓內容方圓徑十四歩計積一百四十七歩問容方併四旁羃積若干荅曰圓內容方每面十歩計積一百歩四旁羃積四十七歩圓內容方圓徑卽方斜方明方圓之理方環者謂如方田中央有方池方環求積法日以內方自乗得全積另以內方自乗得內積以减全積餘得方環積又法以外方併入內方倍之爲長以徑濶乘之得方環積解日非言田也皆是托物比興筭家窮理盡性致知格物以明方圓勾股之理至於天地高廣乎
