body:
  text: 法日置積一千七百五十步以四因之得七千步另以縱多一十五步自乘得二百二十五步相併共得七千二百二十五步為實以開平方法除之約商八十于左亦置八十于右左右相呼八八除實六千四百步餘實八百二十五步就以下法八十倍之得一百六十步為法歸除之呼逢五進五于初商八十之次共得八十五步下法亦置五于一百六十之下共一百六十五步左五對右六相呼五六除實三百步又左五對右五呼五五除實二十五步恰盡得左商八十五步如長濶相和之步加入縱多一十五步共得一百步折半得五十步于內减去縱多一十五步餘三十五步即是濶也帶縱開平方法歌兼商除
  hash: sha256:181f029db36f5ca41b6d67d024495e520fceed16998ea5d3e1bd0fed0671b8a8
