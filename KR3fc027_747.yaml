body:
  text: 法日置積一千七百五十歩以四因之得七千歩另以縱多一十五歩自乘得二百二十五歩相併共得七千二百二十五歩爲實以開平方法除之約商八十于左亦置八十于右左右相呼八八除實六千四百歩餘實八百二十五歩就以下法八十倍之得一百六十歩爲法歸除之呼逢五進五于初商八十之次共得八十五歩下法亦置五于一百六十之下共一百六十五歩左五對右六相呼五六除實三百歩又左五對右五呼五五除實二十五歩恰盡得左商八十五歩如長濶相和之歩加入縱多一十五歩共得一百歩折半得五十歩于内减去縱多一十五歩餘三十五歩卽是濶也带縱開平方法歌兼商除
