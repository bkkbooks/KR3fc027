body:
  text: 得一十萬零一千七百六十一分以開平方除之得靣方三百一十九分為實另以分母六十四以開平方法除之得八分為法除之得方面三十九步不盡七命之日八分步之七今有方田一段靣方四步一十八分步之一十七問積弦步各若干答曰斜弦七步方積二十四步五分法日置四步以分母一十八乘之加入分子一十七共得八十九步自乘得七千九百二十一步另以分母分子相減餘一以乘分子十七如故併前共得七千九百三十八步為實另以分母十八自乘得三百二十四為法除之得二十四步五分為方積倍之得四十九步以開平方法除之得斜弦七步方面下有零分數求積者倣此
