body:
  text: 得一十萬零一千七百六十一分以開平方除之得靣方三百一十九分爲實另以分母六十四以開平方法除之得八分爲法除之得方面三十九歩不盡七命之日八分歩之七今有方田一段靣方四歩一十八分歩之一十七問積弦歩各若干荅曰斜弦七歩方積二十四歩五分法日置四歩以分母一十八乘之加入分子一十七共得八十九歩自乘得七千九百二十一歩另以分母分子相减餘一以乘分子十七如故併前共得七千九百三十八歩爲實另以分母十八自乘得三百二十四爲法除之得二十四歩五分爲方積倍之得四十九歩以開平方法除之得斜弦七歩方面下有零分数求積者倣此
