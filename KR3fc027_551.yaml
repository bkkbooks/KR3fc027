body:
  text: 銀若干答曰二錢八分六釐八毫七絲五忽法曰置今買絲六兩化為三七五為實以每斤七錢六分五釐為法乘之合問原有銀一錢買豬肉四斤今有銀三分五釐問諛若干答曰諛肉一斤兩四錢法曰置錢三分五釐為實以每銀一錢肉四斤為法乘之得一斤四此四乃是虛數合斤之數也宜當每兩用加六之法四六加上二兩四錢共得一斤六兩四錢合問原有銀二錢三分買白銅一十三兩今欲買五斤二兩問
