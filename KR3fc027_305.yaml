body:
  text: 四石再除六七除四斗二升本位去四下位去二九十次除五六除三十石本位盡去中實三百起初除六六除三百六十石本位去三百下位除六十七合再商五升次商左位六斗初商假如今有芝麻六十七石榨得油三千零一十五斤問每石該油若干答曰四十五斤法日置油數于盤中為實以麻六十七石于右為法商除之
