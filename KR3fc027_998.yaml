body:
  text: 答曰二百三十八里一十四分里之三法日置不及二十三里以馬主追去一百四十五里乘之得三千三百三十五里為實另置巳行三十七里减去不及二十三里餘一十四里為法除實二百三十八里不盡三以法約之今有大都路至杭州四千二百七十五里馬從大都往南日行一百二十里船從杭州往北日行七十里問船馬幾日相會各行若干答曰二十二日半馬行二千七百里船行一千五百七十五里法曰置四千二百七十五里為實却併船馬日行共一百九十里為法除之得二十二日半又為實各以原行里數乘之得各行數
