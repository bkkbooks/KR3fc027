body:
  text: 平方求積法日以方面十六歩自乗得二百五十六歩平圓求積法日以外周自乗再以十二除之得全積一百九十二歩四旁餘積六十四歩另以內周二十四歩自乗再以十二除之得內圓積四十八歩圓環求積法日以大圓積內减小圓積餘一百四十四歩卽是環積也又法以環徑四歩以三因之得一十二歩以减外周餘得三十六歩爲長以徑四歩乗之得環積一百四十四歩
