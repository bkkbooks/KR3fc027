body:
  text: 平方求積法日以方面十六步自乘得二百五十六步平圓求積法日以外周自乘再以十二除之得全積一百九十二步四旁餘積六十四步另以內周二十四步自乘再以十二除之得內圓積四十八步圓環求積法日以大圓積內减小圓積餘一百四十四步即是環積也又法以環徑四步以三因之得一十二步以减外周餘得三十六步為長以徑四步乘之得環積一百四十四步
