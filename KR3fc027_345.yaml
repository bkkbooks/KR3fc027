body:
  text: 五分加原本一兩本利共一兩一錢五分為法除實得除本銀七兩八錢二分六厘又以通利一錢五分乘之得利銀一兩一錢七分四厘本利共合九兩之數另將原本一十五兩除還原本七兩八錢二分六厘餘者仍存數也異乘同除此法雖易知之術其意至奧或人用先除後乘之法若除之不盡將何以乘之乎此異乘同除實為通變之法也歌日異乘同除法何如物賣錢來作例推
