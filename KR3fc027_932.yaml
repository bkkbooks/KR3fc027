body:
  text: 以原徑八歩除之得三千四百二十歩又置外周七十二歩自乘得五千一百八十四歩以少减多餘一千七百六十四歩爲實以開平方法除之得中周四十二歩减外周七十一歩餘三十歩以六除之得徑五歩合問今有環田外周七十二歩内周二十四歩徑八歩欲從內周截積九十九歩問截中周併徑若干荅曰中周四十二歩徑三歩法日先將內外二周併之折半以徑乘之得總積三百八十四歩內减今截內積九十九歩餘二百八十五歩卽是前截外周積也
