body:
  text: 以原徑八步除之得三千四百二十步又置外周七十二步自乘得五千一百八十四步以少減多餘一千七百六十四步為實以開平方法除之得中周四十二步減外周七十一步餘三十步以六除之得徑五步合問今有環田外周七十二步內周二十四步徑八步欲從內周截積九十九步問截中周併徑若干答曰中周四十二步徑三步法日先將內外二周併之折半以徑乘之得總積三百八十四步內減今截內積九十九步餘二百八十五步即是前截外周積也
  hash: sha256:2e3ab899be7efab42c85f6f7842e4e02f6497410600a60b8e4b517432718a55c
