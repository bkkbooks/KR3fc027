body:
  text: 匿價分身法更奇多乘高物以為實得價减總餘又列共物除餘低價知低價添多為高價各乘各物不差池學者能知此般算三四物價也相宜今有銀一萬七千六百九十兩買馬騾一千匹議要馬七百匹騾三百匹其馬價多騾價七兩七錢問各價若干答曰馬每匹價二十兩騾每匹價一十二兩三錢以法日置馬七百匹以多七兩七錢乘之得五千三百九十兩以减總銀餘一萬二千三百兩以馬騾一千為法除之得騾一十二兩三錢加多
