body:
  text: 匿價分身法更奇多乘高物以爲實得價减总餘又列共物除餘低價知低價添多爲高價各乘各物不差池學者能知此般筭三四物價也相宜今有銀一萬七千六百九十両買馬騾一千匹議要馬七百匹騾三百匹其馬價多騾價七両七錢問各價若干荅曰馬每匹價二十両騾每匹價一十二両三錢以法日置馬七百匹以多七両七錢乘之得五千三百九十両以减總銀餘一萬二千三百両以馬騾一千爲法除之得騾一十二両三錢加多
