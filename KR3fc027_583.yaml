body:
  text: 各若干荅曰主米三千二百五十石脚米二百五十石法曰置米三千五百石以脚價五分乘之得一百七十五兩是脚銀数爲實却將米價五錢六分併脚價五分共七錢爲法除實得脚價米二百五十石以减總米三千五百石餘三千二百五十石爲主米合問今有白羅六十七丈五尺于內抽一丈七尺五寸買顏色作染只染得紅羅六丈二尺五寸問各諛若干荅曰紅羅五十三丈七尺三寸四分三厘七毫五絲
  hash: sha256:b4dff541ae0fd789586c5a9c400d741842e8d9865b5a2e98bfd068a1f972be3c
