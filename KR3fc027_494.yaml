body:
  text: 答曰二百一十六石法日置粳米為實以每石减五為法定身除之或用十五除亦得原借人小麥四百五十六石今將白米照依時價估折還之其麥每石價四錢五分白米每石價七錢五分問諛還白米若干答曰二百七十三石六斗法曰置麥數以麥價乘之得二百零五兩二錢為實却以米價七錢五分為法除之即得今有芝麻四百五十六石易換米豆只云芝麻三斗換米
