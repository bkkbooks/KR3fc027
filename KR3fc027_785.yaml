body:
  text: 之次下法亦置二于倍方之次共得七十左二對右七呼二七除實一百四十恰盡得周三十二根合問今有放箭一束外周三十二根問總積若干荅曰八十一根法曰置外周三十二于左亦置三十二于右加內周八共四十相乘得一千二百八十爲實以方束法十六除之得八十加上中心一共得八十一根合問凢方物乃是八箇周中包一以八歸外周卽知層数也自內之外每層加八自外之內每層减八今有圓箭一百二十七根問外周若干
