body:
  text: 若干答曰二千四百一十九石二斗汯曰置長二十八尺以濶一十八尺乘之得五百零四尺又以高一十二尺乘之得六千零四十八尺為實以斛法除之合問今有圓倉周三十六尺高八尺問積米若干答曰三百四十五石六斗法曰置周三十六尺自乘得一千二百九十六尺以高八尺乘之得一萬零三百六十八尺以國法十二除之得積八百六十四尺為實以斛法除之即得今有平地堆米下周二丈四尺高九尺問積米若干
