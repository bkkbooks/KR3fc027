body:
  text: 法日置正耗糧為實以耗米七升並正米一石共一石零七升為法除之得正米二千五百八十五石為實以耗七升因之得耗米合問若要見正耗共米隔位加七即得盤量倉窖歌方倉長用濶相乘惟有圓倉周自行各再以高乘見積圍圓十二一中分尖堆法用三十六倚壁須分十八停內角聚時如九一外角三九甚分明若還方窑兼圓窖上下周方各自乘乘了另將上乘下併三為一再乘深
