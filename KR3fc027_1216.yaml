body:
  text: 得三十六步爲實以開平方法除之得弦和六步加勾較九步得股長一十五步另以弦和六步加股較二步得濶八步再加勾較九步得斜弦一十七步合問今有勾弦和七十二步股弦和八十一步問勾股弦各若干荅曰勾二十七步股三十六步弦四十五步法曰置勾弦和七十二步以股弦和八十一步相乘得五千八百三十二步倍之得一萬一千六百六十四步爲實以開平方法除之得勾股弦和一百令八步以減股弦和八十一步餘得勾二十七步又置一百令八步內減勾弦和七十二步餘得股三十六步又置一百令八步以減勾二十七步減股三十六步餘得弦四十五步此是勾弦和又股弦和
  hash: sha256:edde88f2f676938cbf7ac005cbc081d8f782a5a889c29e15cfc26886265360b5
