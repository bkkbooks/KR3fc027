body:
  text: 其形截作二圭量之下圭中長二十二步濶八步向上圭中長一十二步濶六步問其積若干答曰二共積一百二十四步法日置倒圭中長以半濶四步乘之得積八十八步又以圭中長以半濶三步乘之得積三十六步二共併得積一百二十四步合問其形截作三圭量之東西二圭同中弦長二十六步東徑八步西徑十二步又北半梭弦十四步徑五步共問積若干答曰二百九十五步法日置東西共中弦長以二徑併之折半乘得二百六十步又以比弦十四步以徑五步乘之折半得三十五步二共併得積二百九十五步合問
  hash: sha256:70732820e81405997af40caa8f93f02da79c2e4255b009e5943c189979a1ffce
