body:
  text: 其形截作二圭量之下圭中長二十二歩濶八歩向上圭中長一十二歩濶六歩問其積若干荅曰二共積一百二十四歩法日置倒圭中長以半濶四歩乗之得積八十八歩又以圭中長以半濶三歩乗之得積三十六歩二共併得積一百二十四歩合問其形截作三圭量之東西二圭同中弦長二十六歩東徑八歩西徑十二歩又北半梭弦十四歩徑五歩共問積若干荅曰二百九十五歩法日置東西共中弦長以二徑併之折半乗得二百六十歩又以比弦十四歩以徑五歩乗之折半得三十五歩二共併得積二百九十五歩合問
  hash: sha256:6c75a430cd4e0fb29561bc566308f2682fab0d0b63647af3ae9f18d0de3fdcb0
