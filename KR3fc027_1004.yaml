body:
  text: 一面尖堆只添一乘來折半積如常三角果垜亦堪知脚底先求箇数齊一二添來乘兩遍六而取一不差地要知四解盤中果添半仍添一箇隨乗此数來以爲實如三而一法求之今有酒瓶一垜底脚濶八箇長一十三箇問該積若干荅曰三百八十四箇法曰置長內減濶餘五箇折半得二箇半添半箇作三箇併入長共一十六箇以底脚八箇因之得一百二十八箇另以濶八箇添一箇作九箇乗之得一千一百五十二箇以三除之合問
