body:
  text: 若以圓徑十八尺用一尺二寸歸除得放徑十五尺若以方徑十五尺用一尺二寸乘之得圓徑十八尺較求勾股弦共歌較差也是股弦相差勾弦相差股較求股勾自乘股較自乘減勾盈減除勾餘爲實數股較倍之爲法行法實相除爲股數勾較求勾一樣成弦較求弦勾自乘弦較除之爲實情仍加弦較須折半就得弦長數卽成今有勾濶二十七步只雲弦多股九步問股弦各若干荅曰股三十六步弦四十五步
