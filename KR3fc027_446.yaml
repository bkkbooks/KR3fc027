body:
  text: 而得止以徑一圍三定其平差立差耳雖然行之日久安保其不差也竊嘗思之天地之道陰陽而巳方圓天地也方象法地靜而有質故可以象數求之圓象法天動而無形故不可以象數求之方體本靜而中斜者乃動而生陽者也圓體本動而中心之徑乃靜而根陰者也天外陽而內陰地外陰而內陽陰陽交錯而萬物化生其機正合於畸零不齊之處上智不能測巧曆不能盡者也向使天地之道俱可以限量求之則化機有盡而不能生萬物矣余因論方圓之法而併著其理如此又述直圭梯斜勾股弧矢等形圓之于左
