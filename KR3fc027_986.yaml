  text: 上方與高乘為實下方內減上方積餘積為法除實數便見接高今丈尺原方臺上方六尺下方二十四尺高二十四尺今改作方錐問接高若干答曰接高八尺法日置原高二十四尺乘原上方六尺得一百四十四尺為實另以原下方二十四尺內減原上方六尺餘一十八尺為法除之得接高八尺合問原有圓錐下周七十二尺高三十二尺今改作圓臺只用上周一十八尺問今築高若干
