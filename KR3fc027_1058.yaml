body:
  text: 斗凡二日共米三十二石一斗問僧併米若干荅曰一百三十五人初日米二十一石六斗次日米一十石令五斗法曰置列五人八斗九人七斗又以九人乘八斗得七十二又以五人乘七斗得三十五併之得一百令七爲法另以九人五人相乘得四十五復乘共米三十二石一斗得一千四百四十四石五斗爲實以法除之合問今有圍兵二萬三千四百人以布圍之各相去五步今圍內縮除一十六里九十步而止問圍兵各相去若干荅曰四步七分五厘法曰置兵数以五步乘之得一十一萬七干步另以一十六里以三百六十步通之得五千七百六十步加零九十步共五千八百五十步以减上数
  hash: sha256:b26f36cf587d64e675c0a66c1619bf242374bb0db6bcb5a78e589ecb422f15b9
