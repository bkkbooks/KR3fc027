body:
  text: 定位五升實尾九斗起呼五九四十五變九為五下位加五下位是斗也回向前逆升合得四斗六石五六得三十變六為三石法上是每石碾五斗遇石即止下一位是斗也三石四十四五得二十變四為二十二十實首二百二五得一十變二為一原實百起呼百往後順數至石合得一百還原用五歸法詳後五一倍作二五二倍作四五三倍作六五四倍作八逢五進一十假如今有杉木二萬三千五百六十九根每根價銀六分問共該銀若干
