body:
  text: 河圖者伏羲氏王天下龍馬負圖出河遂則其文以畫八卦何圖以相生為序故左行自北而東而南而中而西復始于北數地數一三五七九積二十五二四六八十積三十共積五十五數以成變化求積法曰置天一地十併得十一以十乘之得一百一十折半得五十五為天地之數也
