body:
  text: 因乘定位法假如有田三百一十二畆毎畆科粮四升問共諛米若干荅曰一十二石四斗八升法曰置田畆爲實以毎畆粮四升爲法因畢得数莫動先從寅上定百畆以卯上得十畆以辰上得一畆就以畆下巳位上得術變升逆回辰上得斗卯上得石寅上卽十合問歸除定位法用歸法有逢進故陞前一位而得令假如有米四百石毎銀一両糶米二石五斗問共諛價銀若干
