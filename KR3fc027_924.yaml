body:
  text: 若截小頭田積步小濶自乘併實傍供用開方為截濶兩廣併來折半強折半數來為法則法除截積便知長今有梯田長九十步南廣二十步北廣三十八步今自南邉小頭截積八百二十二步五分問截長濶各若干答曰截上長三十五步截中濶二十七步法日置截積八百二十二步五分倍之得一千六百四十五步以二廣相減餘一十八步為濶差以乘倍積得二萬九千六百一十步以原長九十步除之得三百二十九步以小頭
