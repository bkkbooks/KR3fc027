body:
  text: 若截小頭田積歩小濶自乘併實傍供用開方爲截濶両廣併來折半強折半数來爲法則法除截積便知長今有梯田長九十歩南廣二十歩北廣三十八歩今自南邉小頭截積八百二十二歩五分問截長濶各若干荅曰截上長三十五歩截中濶二十七歩法日置截積八百二十二歩五分倍之得一千六百四十五歩以二廣相减餘一十八歩爲濶差以乘倍積得二萬九千六百一十歩以原長九十歩除之得三百二十九歩以小頭
