body:
  text: 若干法日置米為實以銀每兩雜米三石為法歸之得數莫動定位訣日此是實多法少先從實首位起數原實百順下至石遇法首位是石則止前一位得令是兩又前一位是十兩又前一位是百兩此是逆上假如麥四百五十石賣銀三十二兩四錢問每石該銀若干法日置銀為實以麥為法歸除之得數莫動定位訣日此是法多實少先從實首位起數原實十逆上至百遇法首位是百則止前一位得令是兩降下順數至實是七分次位即二釐也
