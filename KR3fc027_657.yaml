body:
  text: 五位者照依前得首尾甲戊二人數互和首尾數折半得中丙數又互和丙戊數折半得丁數又互和丙甲數折半得乙數如位數多者皆以空位取之併而為法除實得首尾數四位者用三歸之六位者用五除之今有白米一百八十石令三人從上互和减半分之只云甲多丙米三十六石問各該若干答曰甲七十八石乙六十石丙四十二石法曰置米一百八十石為實以三五七併得一石五斗為法除實得一百二十石乃甲丙二人首尾共數于內减甲多三十六石餘八十四石折半得丙四十二石加多三十六石得甲米七十八石互和甲丙
  hash: sha256:301674c0c258e66dc0c48ba25d1641a4c0ff420d9d873e193694fc97c9104e2a
