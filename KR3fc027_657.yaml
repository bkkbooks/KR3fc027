body:
  text: 五位者照依前得首尾甲戊二人数互和首尾数折半得中丙数又互和丙戊数折半得丁数又互和丙甲数折半得乙数如位数多者皆以空位取之併而爲法除實得首尾数四位者用三歸之六位者用五除之今有白米一百八十石令三人從上互和减半分之只云甲多丙米三十六石問各該若干荅曰甲七十八石乙六十石丙四十二石法曰置米一百八十石爲實以三五七併得一石五斗爲法除實得一百二十石乃甲丙二人首尾共数于內减甲多三十六石餘八十四石折半得丙四十二石加多三十六石得甲米七十八石互和甲丙
  hash: sha256:e0de1c0e1da44c3dfe629151a8f616c2070ce7cc9e54433f4e2eb3be3c296ff4
