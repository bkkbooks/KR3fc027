body:
  text: 實尾五畆一五如五四八三十二三七二十一畆法酋是每畆一斗過畆卽止下一位得術是斗也八石四十一四如四三八二十四二七一十四十三十三百一三如三二八一十六百合得四百實首二千一二如二原实千起呼千往後順数至畆還原用歸除法詳後逢二進二十二八除一六二七一十四逢三進三十三八除二十四三七除二十一逢四進四十四八除三十二四七除二十八逢五進五十五八除四十五七除三十五假如今有直田長三十六步三分濶七步四分問該田積
