body:
  text: 此是三條四條相减餘一爲法者不必用法除卽是盈適足不足適足歌盈與適足数相乘乘数將來爲物情盈数自稱爲人實二位各列要分明出率相减餘爲法法除物實物價眞法除人實爲人数不足適足一般行法曰盈適足者置所出率于上以盈與適足于下或以盈数互乘適足出率得若干爲法實另以盈数爲人實又以出率相减餘爲法除人實得人除物實得物一法以盈数爲人實另以出率相减餘爲法除人實得
