body:
  text: 為三數一之衰其三數剩二者剩一下七十剩二下二百四十五數剩三者剩一下二十一剩三下六十二剩二下四十二七數剩二者剩一下十五剩二下三十併之得二百三十三內减去溝數一百令五又减一百令五餘二十三箇合問今有客至不知其數只云三人共飯四人共羹通共用碗三百零一隻問客併羹飯碗各若干答曰客五百一十六人羹一百二十九碗飯一百七十二碗法日置碗三百零一隻以三人因之得九百零三為實併三人四人共七人為法除之得羹碗一百二十九隻又以四因之得客五百一十六人
