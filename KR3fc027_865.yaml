body:
  text: 呼除實恰盡得一面六十七尺合問此三乘方捷徑一法用二次開平方法除之亦得初一次置積數為實以開平方法除之商得四千四百八十九尺第二次就以此初商數為實亦以開平方法除之即得一靣六十七尺合問此又捷徑若還原置一靣六十七尺自乘得四千四百八十九尺再乘得三十萬零零七百六十三尺又乘之即見原積數也自乘再乘又乘故曰三乘共四乘乃四次乘也共五乘乃五次乘也今有田積三千三百七十五尺開平方靣若干答曰靣方一十五尺
