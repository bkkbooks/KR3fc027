body:
  text: 九百三四除一十二本位去一右位去二盡百六千三六除一丨八本位去一右位去八逢五進十十本位去五進一干左千法首位是千遇千即止前位得令是枚合得實首一萬起五一倍作二本位加一為二原實萬起呼萬往後順至千合得二枚還原用乘三六一十八三四一十二三五一十五假如今有銀五萬五千三百八十五兩作一千零七人分之問每人該銀若干答曰五十五兩法日置銀為實以人分為法除之合問七人除
