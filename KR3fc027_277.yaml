body:
  text: 九百三四除一十二本位去一右位去二尽百六千三六除一丨八本位去一右位去八逢五進十十本位去五進一干左千法首位是千遇千卽止前位得令是枚合得實首一萬起五一倍作二本位加一爲二原实萬起呼萬往後順至千合得二枚還原用乘三六一十八三四一十二三五一十五假如今有銀五萬五千三百八十五両作一千零七人分之問每人該銀若干荅曰五十五両法日置銀爲實以人分爲法除之合問七人除
