body:
  text: 以七斤五爲法除之得二丈九尺六分六厘六毫六絲爲法則另以東西各絲斤数不動將両减六東六両変作三五七西二両変作一二五併原斤爲實乘之合問假如今有元亨利貞四人合本經營元出本銀二十両亨出本銀三十両利出本銀四十両貞出本銀五十両共本一百四十両至年終共得利銀七十両問各該利銀若干荅曰元該利一十両享該利一十五両利該利二十両
