body:
  text: 以七斤五為法除之得二丈九尺六分六厘六毫六絲為法則另以東西各絲斤數不動將兩减六東六兩變作三五七西二兩變作一二五併原斤為實乘之合問假如今有元亨利貞四人合本經營元出本銀二十兩亨出本銀三十兩利出本銀四十兩貞出本銀五十兩共本一百四十兩至年終共得利銀七十兩問各該利銀若干答曰元該利一十兩享該利一十五兩利該利二十兩
