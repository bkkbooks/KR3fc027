body:
  text: 實得一錢八分八厘六毫五絲即是每年每兩之利也就以此又為法以乘各人通得之數合問假如人借去銀每年每兩加利二錢七分今有一年零三箇月二十日收還銀三百六十二兩四錢七分問本利各得若干答曰本二百六十八兩利九十四兩四錢七分法日置還本利共銀為實另置年月日數照依前式用三歸二十日得六六六六於三月之下位併月再以十二月除之得三月五五於一年之下位另以每年利二錢七分乘
