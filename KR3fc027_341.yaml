body:
  text: 實得一錢八分八厘六毫五絲卽是每年每両之利也就以此又爲法以乘各人通得之数合問假如人借去銀每年每両加利二錢七分今有一年零三箇月二十日收還銀三百六十二両四錢七分問本利各得若干荅曰本二百六十八両利九十四両四錢七分法日置還本利共銀爲實另置年月日数照依前式用三歸二十日得六六六六於三月之下位併月再以十二月除之得三月五五於一年之下位另以每年利二錢七分乘
