body:
  text: 假如中段四角中弦十六步以東西二徑共一十四步折半乘之得積一百一十二步南尖三角弦十步以半徑二步乘之得積二十步西弧矢弦八步加矢二步共十步折半以矢乘之得積十步東北三角弦十二步以半徑二步乘之得積二十四步四共計積一百六十六步合問假如東北弦八步以半徑三步乘之得積二十四步又正東三角弦六步以半徑二步乘之得積一十二步又弦十八步以半徑四步乘之得積七十二步又南弧矢弦八步加矢折半以矢乘得積十步又西三角弦二十四步以半徑六步乘之得積一百四十四步又西北弧矢弦十四步加矢折半以矢乘得十六步
