body:
  text: 丈量田地總歌古者量田較濶長全憑繩尺以牵量一形雖有一般法惟有方田法易詳若見斜併凹曲直須俾補取其方却將乘實爲田積二四除之畆數明又歌方自乘之積歩明直田長濶互相乘勾股圭梭乘折半圓田周徑折半乘周自乘之十二約徑自乘之七五乘周徑相乘四歸是碗田丘田同上乘環田內外周相併折半須將徑歩乘
