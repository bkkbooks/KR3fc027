body:
  text: 四二添作五三五除一十五假如今有田二千三百四十五畆每畆科粮一斗八升七合問該粮米若干荅曰四百三十八石五斗一升五合法日置總田爲實以每畆科米一斗八升七合爲法乘之合問法酋七合八升一斗乘三合五七三十五定位一升五八得四四七二十八下位是斗也向前逆陞合得五斗
