body:
  text: 足之數除之即得彼處之積也今有方倉方一十五尺高一十五尺問積米若干若曰一千三百五十石法田置方一十五尺目乘得二百二十五尺再以高一十五乘之得三千三百七十五尺為實以斛法二尺五寸除之合問乘汯定位從實首原數順數降下至尺止下一位得術定法首是十逆上逐位升之即得之數為實又定位斛法除之先數原實千順降下至遇法首每石二尺五寸遇之即止前一位得令是石逆數升上即得一千三百五十石餘傲此今有長倉長二十八尺濶一十八尺高一十二尺問積米
  hash: sha256:defc46f4985561a36ae20333cd9abeada9ae093606d914bf2b7c160f8a4bdde0
