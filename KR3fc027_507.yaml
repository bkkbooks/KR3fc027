body:
  text: 足之数除之卽得彼處之積也今有方倉方一十五尺高一十五尺問積米若干若曰一千三百五十石法田置方一十五尺目乘得二百二十五尺再以高一十五乘之得三千三百七十五尺爲實以斛法二尺五寸除之合問乘汯定位從實首原数順数降下至尺止下一位得術定法首是十逆上逐位陞之卽得之数爲實又定位斛法除之先数原實千順降下至遇法首每石二尺五寸遇之卽止前一位得令是石逆数陞上卽得一千三百五十石餘傲此今有長倉長二十八尺濶一十八尺高一十二尺問積米
  hash: sha256:93c96cc4fa6756d8b657dbd9fa89458c703b63ce037df3576d6d1c95a568fb00
