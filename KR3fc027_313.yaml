body:
  text: 亦餘七就以七爲法除母二十一得三又以法七除子一十四得二合問假如今有絲二百五十二斤賣過一百四十四斤問約得若干荅曰七分斤之四法日置母二百五十二减去子一百四十四餘母一百八反將原子一百四十四减去餘母一百八餘子三十六又將餘母一百八减去餘子二箇三十六餘母亦三十六爲之更相减損就以母子同数爲法以除原母原子各得分数假如今有鴨七十二隻生子六十三箇問約得若干
