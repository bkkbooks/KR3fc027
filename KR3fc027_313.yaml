body:
  text: 亦餘七就以七為法除母二十一得三又以法七除子一十四得二合問假如今有絲二百五十二斤賣過一百四十四斤問約得若干答曰七分斤之四法日置母二百五十二減去子一百四十四餘母一百八反將原子一百四十四減去餘母一百八餘子三十六又將餘母一百八減去餘子二箇三十六餘母亦三十六為之更相減損就以母子同數為法以除原母原子各得分數假如今有鴨七十二隻生子六十三箇問約得若干
  hash: sha256:a7056aeaf2d70c4b5a94502d7619327bd4ccd2a3930b1d2e92187ef333144ad8
