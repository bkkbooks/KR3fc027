body:
  text: 又名九官八卦三三圖八卦内二七六太極爲中五九五一併之以爲九九五一宫之位此圖為更換前圖易換術曰九子斜排上下對易左右相換四維挺出先以上一對換下九次以左七對換右三換畢將四維二六四八挺出平直列三行卽如前圖縱橫斜角皆積十五数求積法日併上下數一九共十以九乗之得九十折半得積四十五爲實以三行爲法除之得縱橫斜角皆十五数也
