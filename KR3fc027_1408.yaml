body:
  text: 零四歩共一萬零五百四十四歩以每歩五尺乘之得五萬二千七百二十尺爲長積另併上下廣二丈令六寸折半得一丈零三寸以深一丈八尺乘之得一百八十五尺四寸以乘長積得九百七十七萬四十二百八十八尺爲實以每人日開三百尺爲法除之得三萬二千五百八十人不盡二百八十八尺不嗀一人一日合問西江月張家三女孝順歸家頻望勤勞東村大女隔三朝五日西村女到小女南鄉路遠依然七日一遭何朝齊至飲香醪請問英賢回報荅曰一百零五日同到相會
