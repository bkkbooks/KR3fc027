body:
  text: 貴多法少往後順數至法首之數則止轉向前一位得令往前逐位陞之合得實少法多亦從實上原首位數起往前逆陞數至法首之數則止再進前一位得令回則往後降小直指定位訣用因乗定位訣日預先以筭盤上寫定萬千百十或頃畆石斗両錢之類因乗完畢得數莫動或云每畆科糧四升但以畆之下位得升以畆變斗以十變石以百畆變十石之類是也餘物倣此用歸除定位訣有二條日預先以筭盤上寫定石斗或両錢頃畆步分之類假如有米四百餘石每銀一両雜米三石問共該銀
