body:
  text: 貴多法少往後順數至法首之數則止轉向前一位得令往前逐位升之合得實少法多亦從實上原首位數起往前逆升數至法首之數則止再進前一位得令回則往後降小直指定位訣用因乘定位訣日預先以算盤上寫定萬千百十或頃畝石斗兩錢之類因乘完畢得數莫動或云每畝科糧四升但以畝之下位得升以畝變斗以十變石以百畝變十石之類是也餘物倣此用歸除定位訣有二條日預先以算盤上寫定石斗或兩錢頃畝步分之類假如有米四百餘石每銀一兩雜米三石問共該銀
