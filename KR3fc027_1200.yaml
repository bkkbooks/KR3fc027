body:
  text: 法曰置鋸道一尺折半得五寸爲勾自乘得二尺五寸爲實以淺一寸爲股較除之如故得二尺五寸爲股加淺一寸共得木徑二尺六寸合問此如圓田中截去以孤矢天問原徑同法置鋸道一尺如孤矢之弦折半得五寸自乘得二尺五寸爲實以淺一寸如矢爲法除之得二尺五寸併入矢淺一寸共二尺六寸爲圓木原徑亦得今有圓木徑二尺六寸鋸淺入木八寸問鋸道長若干荅曰鋸道長二尺四寸此問與右圖式相同今數註十圖內徑左共之便覧法曰以徑二尺六寸減淺八寸餘一十八寸復以鋸淺八寸乘之得一百
