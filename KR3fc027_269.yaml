  text: 二石四六除二十四本位去二右位去四定位實首二十起五二倍作四変二爲四原实十起呼原实十往前逆陞至法首千止合得四合百升千法首位是千卽止前位得令是石也斗前位是石也順数降下合得石還原用乘四六二十四三四一十二四五得二十假如今有銀一千零九十七両二錢五分作五百七十人分之問每人該銀若干荅曰一両九錢二分五厘
