body:
  text: 得濶差六步以減下濶一十二步餘六步即是中廣合問今有梯田積一千五百步北廣四十步中長五十步問南廣若干答曰南廣二十步法日置積一千五百步倍之得三千步為實以長五十步為法除得六十步於內減北廣四十步餘得南廣二十步合問原有斜田南廣四步北廣十步長一十二步今欲增作勾股樣式問股長出若干答曰股長出八步斜增為勾股法日以南廣四步乘長一十二步為實另以二廣相減餘六步為法除之得尖出股長八步合問
  hash: sha256:a839bd65907ceb57f92221a35080292772e1f0c25690bb5aaa1d553166f0362c
