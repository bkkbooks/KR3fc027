body:
  text: 今有菜子二百五十斤換八十八斤問百斤十斤一斤一兩各該油若干答曰百斤該油三十五斤三兩二錢十斤該油三斤八兩三錢二分一斤該油五兩六錢三分二釐一兩該油三錢五分二釐法曰置油八十八斤為實以菜子二百五十斤為法除之得數三五二為實聽從活變而用加六之法遇斤十百以上不可加但兩起以下加之合問今有胡換六百斤價銀七十五兩問銖分兩裏稱釣石引
