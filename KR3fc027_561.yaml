body:
  text: 今有菜子二百五十斤換八十八斤問百斤十斤一斤一両各該油若干荅曰百斤該油三十五斤三両二錢十斤該油三斤八両三錢二分一斤該油五両六錢三分二厘一両該油三錢五分二厘法曰置油八十八斤爲實以菜子二百五十斤爲法除之得数三五二爲實聽從活變而用加六之法遇斤十百以上不可加但両起以下加之合問今有胡換六百斤價銀七十五両問銖分両裏秤釣石引
