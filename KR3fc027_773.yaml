body:
  text: 又為廉法再商八步于左位初次商一百六十之下右位亦置八步又為隅法於廉法之下共三百二十八呼除先呼三八除積二千四百又呼二八除積一百六十又呼八八除積六百四十恰盡今有圓田積二千三百五十二步問平圓徑若干答曰徑五十六步法日置積步先以四因後用三歸得三千一百三十六步為實以開平方法除之初商五十于左位亦置五十于右位為方法左右相呼五五除積二千五百餘積六百三十六步却以右位五十倍作一百為廉法次商六于左初商五十之次亦
