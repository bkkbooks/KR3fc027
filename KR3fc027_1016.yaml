body:
  text: 上長以下濶乘之得一千四百四十五併之得二千四百零五又以下長減去上長餘五併入共得二千四百一十以高乘之得一萬四千四百六十爲實以六爲法除之卽得今有磚一堆長三丈高九尺入深四尺毎塊長一尺濶五寸厚二寸問共該若干荅曰一萬零八百塊法曰置長三丈爲實以毎塊二寸爲法歸之得一百五十塊另以高九丈以毎塊濶五寸歸之得一十八塊乘之得二千七百塊又以入深四尺乘之合問挑土計方歌每一方長濶各一丈高一尺開塘法同
