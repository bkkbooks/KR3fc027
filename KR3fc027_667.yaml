body:
  text: 下等每戸二丈八尺零八分共一百三十四丈七尺八寸四分法日置總絹爲實另置上等戸数以一百因之得二千五百衰中等戸数以六十因之得一千八百衰下等戸数以三十六乘之得一千七百二十八衰併三位共六千零二十八衰爲法除實得七丈八尺是上等一戸所出数以六因是中等一戸所出数再以六因是下等一戸所出数各以戸数乘之合問今有栗一百六十八石四斗八升八合令四等人戶作十分之七出之問每戸逐等各若干每等戸数總列荅曰之下荅曰第一等二十二戸每戸二石共四十四石
