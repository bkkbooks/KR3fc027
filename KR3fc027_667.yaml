body:
  text: 下等每戶二丈八尺零八分共一百三十四丈七尺八寸四分法日置總絹為實另置上等戶數以一百因之得二千五百衰中等戶數以六十因之得一千八百衰下等戶數以三十六乘之得一千七百二十八衰併三位共六千零二十八衰為法除實得七丈八尺是上等一戶所出數以六因是中等一戶所出數再以六因是下等一戶所出數各以戶數乘之合問今有栗一百六十八石四斗八升八合令四等人戶作十分之七出之問每戶逐等各若干每等戶數總列答曰之下答曰第一等二十二戶每戶二石共四十四石
