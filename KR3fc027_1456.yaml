body:
  text: 荅曰原酒一斗四升五合三勺一抄二撮五圭法曰置五處恰飲列併一二四八十八併之得三十一爲法以乘一斗五升得四石六斗五升折半五遭卽得原酒数又法置飲一斗五升以併倍酒率三十一乘之得四石六斗五升爲實以倍酒率三十一加原酒率一共三十二爲法除之亦得芳以原酒倍之除飲去一斗五升餘倍五次得四斗五升卽知酒尽也歌本利年年倍債主催速還一年取五斗三年本利完荅曰原本四斗三升七合五勺
