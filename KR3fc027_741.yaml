body:
  text: 歸除開平方今有平方積五萬四千七百五十六步問平方一面若干答曰二百三十四步歸除開平方法日置積五萬四千七百五十六步為實於盤中見實約商二百於實左亦置二百於右下左右相呼二二除實四萬步餘實一萬四千七百五十六步以右下二百步倍之得四百步為法歸除之呼四一二十二逢四進十一得商三十步就置三十步于右四百之下相呼三三除實九百步餘實一千八百五十六步就以右下三十步倍之得六十步共四百六十步為法歸除之呼四一二十二逢八進二十得商四步亦置四步于右十六之下相呼四
  hash: sha256:f490e6e3372d8c90d775c3bbad25d11992b2e5f43a7037d313b6bc6389ed7939
