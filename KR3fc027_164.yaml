body:
  text: 九人爲法六兩爲實下加六法實相呼六兩不動变作每人六錢九人共除五兩四錢餘六錢歸日下加六六錢又用此歸挨次而筭九人爲法七兩爲實下加七法實相呼七兩不動变作每人七錢九人共除六兩三錢餘七錢歸日下加七七錢又用此歸挨次而筭九人爲法八兩爲實下加八法實相呼八兩不動变作每人八錢九人共除七兩二錢餘八錢歸日下加八八錢又用此歸挨次而筭逢九進一十法九人實九兩歸日逢九進一于前位每人各得一兩九人共得九兩以合原数新增續編九歸釋義終
