body:
  text: 渠程大位氏幼負頴敏綜涉墳籍躭科斗籕頡古文而尤長于算學凡客游湖海遇古奇字文及算類諸書輙購而玩之齊心一志至忘寢食曠歲積力一旦恍然神識試之掻算淂心應手若庖丁之扵牛手之所觧肩之所倚是之所履滕之所綺無不中理解也者歲壬辰年躋六秩喟然與嘆曰昔痀僂文人之承調霧身若厥株拘執
