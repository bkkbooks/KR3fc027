body:
  text: 西江月今有圓田一所不知頃畆端的直河一道正中穿圓分弧矢両段通田七十四歩二十四歩河寬除河見在幾多田水占如何得見荅曰見在田九畆八分九厘五毫八水占田七畆二分一厘六毫六法曰先置通徑七十四歩自乘得五千四百七十六歩以三因四歸得四千一百零七歩爲全圓總積再置通徑七十四歩减去河寬二十四歩餘五十歩折半爲二个弧矢
