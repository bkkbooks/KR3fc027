body:
  text: 今有綿花一百五十七斤半每花八斤十二兩換布一匹問該布若干答曰一十八匹法曰置花一百五十七斤半為實以八斤十二兩先將十二化作七五共八斤七五為法除之即得今有猪一口因無大稱以小稱稱之不及原稱錘重一斤十兩又加稱錘一斤四兩八錢稱得六十七斤問該公道正數若干答曰實重一百二十斤九兩六錢法曰置原稱錘二十六兩又加錘二十兩八錢共四十六兩八錢以共稱
