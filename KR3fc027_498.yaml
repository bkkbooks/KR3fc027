body:
  text: 今有八色金五十面用價銀二百兩今又換九色金四十兩問諛銀若干荅曰銀一百兩八十兩法日置九色金四十両以九因之得赤金三十六兩以價二百両因之得七千二百兩爲實另置八色金五十兩以八因之得赤金四十兩爲法除之卽得官粮帶耗歌官粮帶耗在其中一石例加七升同要見正米减去七隔位除之法更隆今有正米二百一十二石每石加耗七升問該耗米若干
