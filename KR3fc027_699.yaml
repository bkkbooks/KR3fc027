body:
  text: 法日列大魚二斤價銀四個小魚七斤價銀五分總魚百斤總價八錢七分五厘先以上大魚價四分互乘中小魚七斤得二錢八分又以大魚二斤互乘小魚價五分得一錢以少减多餘一錢八分為長法次以中小魚七斤互乘下總價得六兩一錢二分五厘又以小魚價五分互乘總魚一百斤得五兩以少减多餘一兩一錢二分五厘為實以長法除之得六分二厘五毫為短法列二位一位以二斤乘之得大魚一十二斤半一位以四分乘之得大魚價二錢五分于總魚一百斤减去大魚餘得小魚合問若求小魚者置總價以大魚二斤乘之得説一兩七錢五分又置總魚一百斤以貴價四分乘之得四兩以少减多餘二兩二錢五分
  hash: sha256:e82a7c1ea314740dca3b261f14a2f64acce094d738e4b6d1b0cf5e1e66421efc
