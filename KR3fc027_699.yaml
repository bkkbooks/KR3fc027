body:
  text: 法日列大魚二斤價銀四個小魚七斤價銀五分總魚百斤總價八錢七分五釐先以上大魚價四分互乘中小魚七斤得二錢八分又以大魚二斤互乘小魚價五分得一錢以少減多餘一錢八分為長法次以中小魚七斤互乘下總價得六兩一錢二分五釐又以小魚價五分互乘總魚一百斤得五兩以少減多餘一兩一錢二分五釐為實以長法除之得六分二釐五毫為短法列二位一位以二斤乘之得大魚一十二斤半一位以四分乘之得大魚價二錢五分于總魚一百斤減去大魚餘得小魚合問若求小魚者置總價以大魚二斤乘之得説一兩七錢五分又置總魚一百斤以貴價四分乘之得四兩以少減多餘二兩二錢五分
  hash: sha256:0657b2202b2e6013f29f55b87593ec1a6612034e53c59dbd9c2d2663aa8ff72c
