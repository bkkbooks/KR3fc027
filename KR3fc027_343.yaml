body:
  text: 之得每両利三錢五分二厘五毫加原本一両二共爲法除實得原本銀二百六十八両再以每両利三錢五分二厘五毫乘之得利九十四両四錢七分合問假如原借本銀一十五両每月加利二分五厘今有六箇月巳還過銀九両除作本及利問本利各該若干仍存原本若干荅曰除原本七両八錢二分六厘該利一両一錢七分四厘仍存原本銀七両一錢七分四厘仍以原日起利法日置還銀九両爲實另置六箇月以月利二五通之得一錢
