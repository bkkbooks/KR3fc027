body:
  text: 之得每兩利三錢五分二厘五毫加原本一兩二共為法除實得原本銀二百六十八兩再以每兩利三錢五分二厘五毫乘之得利九十四兩四錢七分合問假如原借本銀一十五兩每月加利二分五厘今有六箇月巳還過銀九兩除作本及利問本利各該若干仍存原本若干答曰除原本七兩八錢二分六厘該利一兩一錢七分四厘仍存原本銀七兩一錢七分四厘仍以原日起利法日置還銀九兩為實另置六箇月以月利二五通之得一錢
