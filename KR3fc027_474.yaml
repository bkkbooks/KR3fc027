body:
  text: 子十二併前共得八千一百一十二以三因四歸之得六千八十四為實以分母十三自乘得一百六十九為法除之合問若以周求積置周二十步以分母四十一通之加分子三十二共八百五十二自乘得七十二萬五千九百四又以分母四十一減分子三十二餘九以乘分子三十二得二百八十八併入前數共七十二萬六千一百九十二以圓法十二除之得六萬五百一十六為實以分母四十一自乘得一千六百八十一為法除之合問今有環田內周六十二步四分步之三外周一百一十三步二分步之一徑十二步三分步之二問該積若干答曰四畝六分五釐四分步之一
  hash: sha256:33d78a47d38538559f412e694d78885224107824f38c7bebcd517a1ebf87bbe6
