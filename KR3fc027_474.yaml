body:
  text: 子十二併前共得八千一百一十二以三因四歸之得六千八十四爲實以分母十三自乗得一百六十九爲法除之合問若以周求積置周二十歩以分母四十一通之加分子三十二共八百五十二自乗得七十二萬五千九百四又以分母四十一减分子三十二餘九以乗分子三十二得二百八十八併入前数共七十二萬六千一百九十二以圓法十二除之得六萬五百一十六爲實以分母四十一自乘得一千六百八十一爲法除之合問今有環田内周六十二歩四分歩之三外周一百一十三歩二分歩之一徑十二歩三分歩之二問該積若干荅曰四畆六分五厘四分歩之一
