body:
  text: 五十四兩為實以三人為法除之得丙金一十五兩加五兩得二十兩為乙所得又加五兩為甲所得合問今有俸糧三百零五石令五等官依品遞差十三石分之問各若干答曰正一品八十七石從一品七十四石正二品六十一石從二品四十八石正三品三十五石法曰置五等於上又列五等减一餘四以乘五得二十折半得一十為實以每等差十三石乘之得一百三十以减總糧三百零五石餘一百七十五石却以五等除之得三十五石是第五等
