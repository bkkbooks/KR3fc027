body:
  text: 五十四両爲實以三人爲法除之得丙金一十五両加五両得二十両爲乙所得又加五両爲甲所得合問今有俸粮三百零五石令五等官依品逓差十三石分之問各若干荅曰正一品八十七石從一品七十四石正二品六十一石從二品四十八石正三品三十五石法曰置五等於上又列五等减一餘四以乘五得二十折半得一十爲實以每等差十三石乘之得一百三十以减總粮三百零五石餘一百七十五石却以五等除之得三十五石是第五等
