body:
  text: 以之三互乘六分得一十八以通盈二両得三十六両各列位十八十六互盈三十六盈五十六先以十六互乘三十六得五百七十六両又以十八互乘五十六得一千令八両二位相减餘四百三十二両却以分子之三之四相乘得十二除之得三十六爲銀實却以十八十六相减餘二爲法除之得銀数一十八両另以両盈三十六五十六相减餘二十爲鹿價實仍以前法二除之得鹿價一十両合問今有官派銀不知数依例令上等八戶下等五戶納之不足五両復令上等六戶下等八戶納之亦不足三両只云下戶例如上戶例十分之八問派銀数及各戶則例若干
