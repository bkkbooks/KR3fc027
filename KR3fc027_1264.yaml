body:
  text: 荅曰路墓占地二分二厘五毫內八墓計二十四步内路計三十歩剩地七分七厘五毫該銀一面九錢三分七厘五毫法曰通田一畆爲二百四十步於上另置墓八箇以每箇周六步自乘得三十六步以十二除之得三步八墓其積二十四步又十字路濶一步長一十六步濶一十五步二其三十一步除路中心一步實三十步加八墓其二十四步通其占地五十四步以畆法二四除之得二分二厘五毫爲占地數以減去一畆餘剩地七分七厘五毫以每畝價銀二而五錢乘之得剩地價銀合問
