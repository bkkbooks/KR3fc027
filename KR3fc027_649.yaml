body:
  text: 法曰置六分之五四分之三以母四互乘子五得二十為次兄之差又以母六互乘子三得十八為小弟之差又以母四六相乘得二十四為長兄之差另以二十減去十八餘二為法先置長兄差二十四以八歲乘之得一百九十二為實以法二除之得九十六為長兄之歲另以次兄差二十以八歲乘之得一百六十為實以法二除之得八十為次兄之歲另以小弟十八亦以八歲乘之得一百四十四為實以法二除之得七十二為小弟歲數合問今有七人差等均錢甲乙均七十七文戊巳庚均七十五文問丙丁各若干
  hash: sha256:db9b483176bc9f162a08ff204aeee079df51291f7feb056c7e270c697cc5066d
