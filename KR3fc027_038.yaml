body:
  text: 鮮窺衢道矜察秋毫卒忘眉睫若是者盖大氐然矣國朝雖不設算學而超絕倫之無論山林遺逸即一代宗公若尚書箬溪碩公中丞荊川唐公浚先闡緯勾股矢二術精詣神觧有巧厯不能淂而二公淂之一察者可不謂算學之金鍼哉第其法精微㓜眇可與通識道難與中庸言余族子賓
