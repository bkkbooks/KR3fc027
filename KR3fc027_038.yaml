body:
  text: 鮮窺衢道矜察秋毫卒忘眉睫若是者蓋大氐然矣國朝雖不設算學而超絶倫之無論山林遺逸即一代宗公若尚書箬溪碩公中丞荊川唐公浚先闡緯勾股矢二術精詣神解有巧厯不能淂而二公淂之一察者可不謂算學之金針哉第其法精微幼眇可與通識道難與中庸言余族子賓
