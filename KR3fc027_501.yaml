body:
  text: 答曰一十四石八斗四升法日置正米為實以耗米七升為法因之即得今有耗米一十四石八斗四升每石耗米七升問諛正米若干答曰二百一十二石法日置總耗米為實以每石耗米七升為法除之即得今有官糧二十七百六十五石九斗五升每正米一石帶耗米七升問正米耗米各若干答曰正米二千五百八十五石耗米一百八十石零九斗五升
