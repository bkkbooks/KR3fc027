body:
  text: 梯斜兩頭相併折長乘便見積分明三廣倍中加二濶四歸得步以長乘弧矢弦長併矢步半之又用矢相乘牛角眉田長步併折半還將半徑乘二不等併東西步折半仍將濶步乘蛇船三濶同相併三歸得步以長乘四不等田分兩段一為勾股一斜形田形不一須推類二四除之畝數明丈量之法以五尺為一步每步自方五尺計積二十五尺也以五尺計之步下五寸為一分一寸為二釐若以長濶丈尺問積就以法實加倍相乘
