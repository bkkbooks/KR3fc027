body:
  text: 截賣一百九十二欲從一邉截去積解題截積一邉如勾股之形也或用圭形樍截亦同荅曰截長八十歩濶四歩八分法日倍截積得三百八十四歩以乗長一百歩得三万八千四百歩爲實以大頭二十七歩减小頭一十五歩餘一十二歩折半得六歩爲法除之得六千四百歩以開平方法除之得截長八十歩以法六歩乘得四百八十歩却以原長一百歩除之得截濶合問歌
