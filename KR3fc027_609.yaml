body:
  text: 分五厘併得五十二衰七分五厘各副併爲法除實得一衰以乘各衰合問今有金四千両令二等金戶四六納之問各該若干荅曰上等戶該二千四百両下等戶該一千六百両法曰置總金爲實以六因得上戸以四因得下戸合問今有米一千五百五十八石令甲乙丙三人四六納之問各諛若干荅曰甲七百三十八石乙四百九十二石丙三百二十八石
