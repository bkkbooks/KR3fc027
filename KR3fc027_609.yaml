body:
  text: 分五厘併得五十二衰七分五厘各副併為法除實得一衰以乘各衰合問今有金四千兩令二等金戶四六納之問各該若干答曰上等戶該二千四百兩下等戶該一千六百兩法曰置總金為實以六因得上戶以四因得下戶合問今有米一千五百五十八石令甲乙丙三人四六納之問各諛若干答曰甲七百三十八石乙四百九十二石丙三百二十八石
