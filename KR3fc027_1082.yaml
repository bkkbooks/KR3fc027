body:
  text: 兩盈出率互相乘多减少剩是物情兩盈相减遺人實出率相减法之名法除物情是物價法除人實人数稱若問筭中兩不足與盈法例一般行法曰置所出率兩盈互乘各得若干以少减多餘爲物實另以兩盈相减餘爲人實又以出率相减餘爲法除人實得人数除物實得物数今有人買物毎人出銀三兩五錢盈六両毎人出三両三錢盈二両八錢問人数物價各若干荅曰一十六人物價銀五十両
