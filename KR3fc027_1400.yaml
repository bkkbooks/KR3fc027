body:
  text: 商三十自乘得九百除實餘一百二十四歩另以右位初商三十倍作六十次商二歩子左下法亦置二歩于倍商六十之次皆與左次商相呼二六除一百二十又呼二二除四歩恰盡得三十二歩乃地之全徑折半得一十六歩爲羊所繋樁處再以每歩五尺乘之得八十尺爲羊繩長合問西江月今有酒鐔一垜共積一百六十下長多廣整七枚廣少上長三隻堆積糟坊圜内上下長廣難知煩公仔細用心機借問各該有幾荅曰上長八箇下長十二箇
