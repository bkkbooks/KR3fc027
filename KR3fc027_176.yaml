body:
  text: 逢六進二十三一三十一三一三十一逢三進一十三一三十一逢六進二十假如有人借去本銀二百五十八兩二錢每年加四還利問該利銀若干答日一百零三兩二錢八分法日置本銀為實以利四錢為法因之合問定位照前法四錢因實尾二錢起呼二四如八本位除去下位加八下位是錢也回向前逆升合得二錢八兩四八三十二變八為三下位加二兩法上是每兩加四遇兩即止下一位是錢也三兩
