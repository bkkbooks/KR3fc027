body:
  text: 逢六進二十三一三十一三一三十一逢三進一十三一三十一逢六進二十假如有人借去本銀二百五十八両二錢每年加四還利問該利銀若干荅日一百零三両二錢八分法日置本銀爲實以利四錢爲法因之合問定位照前法四錢因實尾二錢起呼二四如八本位除去下位加八下位是錢也回向前逆陞合得二錢八両四八三十二變八爲三下位加二両法上是每両加四遇両卽止下一位是錢也三両
