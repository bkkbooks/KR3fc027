body:
  text: 中方靣一十六步計積二百五十六步小方靣一十二步計積一百四十四步法日置共積于上另置大方面多小方面八步自乘得六十四步又以中方面多小方面四步自乘得一十六步併二數共八十步以減共積八百步餘積七百二十步以三歸之得二百四十步為實初商一十自乘得一百步以減實積餘實一百四十步次商而併初商共十二自乘得一百四十四內除初商
