body:
  text: 衰一百七十為法除實得一衰之數以乘各衰即得若五等亦只加衰用法如前三七差分法日各以三為首就以三因或又三因再三因務求得宜為首衰却用三歸七因以求各衰二位者首位三次位七併得十三位者首位三就以三因得九為丙衰却以九用三歸七因得二十一為乙衰却以二十一用二歸七因得四十九為甲衰三位併得七十九衰四位者首位三以三因得九又三因得二十七為丁衰却以二十七用三歸七因得六十三為丙衰
