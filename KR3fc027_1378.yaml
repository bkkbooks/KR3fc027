body:
  text: 七十二歩乃是圓內容方弧弦方角俱至邉周可用此法若是錢形內容方池角不通邉外有餘空豈可以四均而歸之重疊四角其理明矣西江月方田一十五畆及時人去耕犁圓池在內甚稀奇圓徑不知怎記方至池邉有數每邉二十無疑外方圓徑若能知細演天源如積荅曰面方六十歩圓徑二十歩法曰以畆法通田得三千六百歩以平方開之得六十歩以减每邉二十歩二邉共减四十歩餘得圓徑二十歩合問
