body:
  text: 今有圓窖上周一十八尺下周二十四尺深一十二尺問積米若干答曰一百七十七石六斗法曰置上周一十八尺自乘得三百二十四尺另置下周二十四尺自乘得五百七十六尺又以上周一十八尺乘下周二十四尺得四百三十二尺併三位共得一千三百三十二尺以深一十二尺乘之得一萬五千九百八十四尺用圓率三十六除之得四百四十四尺為實以斛法除之合問今有船倉南頭靣廣六尺腰廣六尺五寸底廣五尺北頭靣廣七尺腰廣七尺五寸底廣六尺二尺四寸長北尺問積米若干
  hash: sha256:887705d4ea17621991fa8756833b9c67e823434452137130316fcc3e3f345c17
