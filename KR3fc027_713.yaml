body:
  text: 新安實渠程大位汝思甫編集會肆素亭光肆章甫乾正藴斋鈁洪䝂甫禾閲小廣章第四此章如田截縱之多益廣之少故日少廣如方田還原之意以方法除積幂而求方以圓法除方實而求圓所注開平方平圓頭緒樂冗初學者難今注釋簡明于後開平方法認商歌一百一十定無疑一千三十有零餘九千九九不離十一萬為一百推得商方除倍作亷次商名隅併亷除
