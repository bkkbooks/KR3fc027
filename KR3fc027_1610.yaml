body:
  text: 訛謬別其序次清其句讀俾上智见解扵筌蹄之外而成學众可縁是以獲魚兎豈敢日立我明一代筭数之宗胼以啟浚學之成式尔巳錐然图以刋陈而以图陳者不兵之法書以傳御而以書御者不書馬之情則今日筭数之编六图陈書御要要以縁尺度而求窾擊淂神理而六
