body:
  text: 請問先生知否荅曰甌一百二十隻油十斤盞一百八十箇油八斤七両法曰置油一秤爲一十五斤又添三斤共一十八斤毎斤用加六法得二百八十八両又添七両共二百九十五両以毎両二十四銖乗之得七千零八十銖為實另置油三両以二十四銖乗得七十二銖以四盞歸之毎盞得一十八銖又以三停乗之得五十四銖爲盞之法另又置油四両以二十四銖乗之得九十六銖以三甌歸之毎甌得三十二銖又以二停乗之得六十四銖爲甌之法併甌盞二法共一百一十八爲總法除实七千零八十銖得六十爲則以二停因得一百二十爲甌数以毎
