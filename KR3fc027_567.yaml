body:
  text: 今有銅一經入爐每十斤得八斤今三經入爐得七十五斤一十三兩四錢四分問原生銅若干答曰一百四十八斤二兩法置銅七十五斤加六併入零而錢共得一千二百一十三兩四錢四分為實另置八斤自乘得六十四再乘得五百一十二為法除之得二千三百七十兩以斤法十六除之得一百四十八斤一二五將一二五加六為二兩合問一法置銅變作兩數以八歸三次亦得今有鐵一經入爐每十斤得七斤今三經入爐得鐵七十九斤一十兩零九錢三分一厘問原生鐵若干答曰二百三十二斤五兩
  hash: sha256:61e94a8a8526acf935f7a87d94368998ea908cd820b75d3160abb47c9bad8481
