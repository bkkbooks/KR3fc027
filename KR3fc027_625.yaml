body:
  text: 置總銀為實列丁二十七丙六十三乙一百四十七甲三百四十三副併得五百八十衰為法除實得若干為一衰之數以乘各衰得各人數若令五人作三七分之置總銀為實列戊衰八十一丁一百八十九丙四百四十一乙一千二十九甲二千四百零一副併得四千一百四十一衰為法除實得若干為一衰之數就以此為法以乘各衰得數合問折半差分法日所分物折半為衰二位者一二併得三三位者一二四併得七四位者一二四八併得十五五位者一二四八十六併得三十一各副併得為法除實
