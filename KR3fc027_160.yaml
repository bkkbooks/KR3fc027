body:
  text: 錢歸日下位加六六錢又用後八六七十四歸法算八人為法四兩為實添作五法實相呼將四兩添一變作每人五錢八人共得四兩合原八人為法五兩為實六十二法實相呼將五兩添一變作每人六錢八人共除四兩八錢餘二錢歸日六十二二錢又用前六二三十二歸法算八人為法六兩為實七十四法實相呼將六兩添一變作每人七錢八人共除五兩六錢餘四錢歸日七十四四錢又用前八四添作五歸法算八人為法七兩為實八十六法實相呼將七兩添一變作每人八錢八人共除六兩四錢餘六錢歸日八十六六錢又用前八六七十四歸法算逢八進一十法八人實八兩歸日逢八進一於前位每人各得一兩八人共得八兩以合原數九歸總訣隨身下
