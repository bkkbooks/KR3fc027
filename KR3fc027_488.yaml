body:
  text: 新安賔渠程大位汝思甫編會孫素亭光紳佩章甫軗正藴齊紡洪聲甫參閲粟布章第二粟是米也布是錢也以粟稻等率求米之精粗以斛斗求糧之多寡以丈尺求帛之長短以斤兩求物之輕重以御變易粟布歌穀為糙米要須知法實分明莫亂題米為實數榖為法以法除之更不疑若言糙米為白米糙法白實以除之
