body:
  text: 荅曰一十四両六錢法曰置米于左列爲三行以價四錢于右爲法因之四五得二四六二十四三四一十二此乃總呼之法後分三行用之法七四五得加前四作六錢四六二十四本行下位加四加前二作四両三四一十二本行下位加二合得一十還原用四歸歸法式假如前銀一十四両六錢糴米每石價四錢問該米若干
