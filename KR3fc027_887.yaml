body:
  text: 今有米五百一十八石四斗欲造方倉盛之問方高若干荅曰方一十二尺高九尺法日置米数以斛法二五乘之得一千二百九十六尺爲實以開立方法約之得方一十二尺却以方一十二尺自乘得一百四十四尺爲法除實得高九尺合問或云高九尺問方若干荅曰方一十二尺法日仍以前實以高九尺除之得一百四十四尺以開平方法除之得方一十二尺合問新編直指筭法綂宗卷之六
