body:
  text: 今有米五百一十八石四斗欲造方倉盛之問方高若干答曰方一十二尺高九尺法日置米數以斛法二五乘之得一千二百九十六尺為實以開立方法約之得方一十二尺却以方一十二尺自乘得一百四十四尺為法除實得高九尺合問或云高九尺問方若干答曰方一十二尺法日仍以前實以高九尺除之得一百四十四尺以開平方法除之得方一十二尺合問新編直指算法統宗卷之六
