body:
  text: 一大數之始也十十箇一為十百十箇十為百千十箇百為千萬十千為萬十百千數之成也萬萬萬億萬萬十百千日億億億億萬十百千萬萬億萬億萬億兆萬萬億京萬萬兆垓萬萬京秭萬萬垓檳溝澗正載恆恆河沙阿僧秪那由他不可思議無量數自京垓以後世之罕用亦不可廢始存之按孟子注其麗不億之億為十萬誤也小數分十釐為分釐十毫毫十絲絲十忽忽十微微十纖纖十沙沙十塵
