body:
  text: 解曰若以積四百九十步加入四十五步減去分子六步仍得五百二十九步便商得二十三步所謂不及故謂之命也歸除平方帶縱歌平方帶縱法最奇四因積步不須疑縱多自乘加因積又用開方法除之再以縱多併开積折半方為長數施若問濶涉知多少將長減却縱多基今有直田積一千七百五十步長比濶多一十五步問該長濶各若干答曰長五十步濶三十五步
