body:
  text: 五分得二兩二錢五分為法除之得棉布二十八匹合問假如原有麥三斗五升磨麵二十五斤今欲用麵一百七十五斤問該麥若干答曰二石四斗五升法日置原麥乘今用麵為實以磨麵二十五斤為法除之合問假如今有綾一百六十一匹每七匹價銀五兩問共該銀若干答曰一百一十五兩法日置總綾以五兩因之為實以七匹為法歸之合問
