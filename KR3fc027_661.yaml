body:
  text: 今有鈔二百三十八貫令五等人從上作互和减半分之只云戊不及甲三十三貫六百文問各諛鈔若干荅曰甲六十四貫四百文乙五十六貫丙四十七貫六百文丁三十九貫二百文戊三十貫零八百文法日置鈔爲實以一三五七九併得二貫五百文爲法除之得九十五貫二百文乃首尾二人共数干内减戊不及甲鈔餘六十一貫六百文折半得戊鈔三十貫八百文仍加戊不及甲鈔三十三貫六百文得甲鈔六十四貫四百文互和甲戊鈔共九十五貫二百文折半得丙鈔四十七貫六百文又互和丙戊鈔共七十八貫四百文
  hash: sha256:678d9ee23312ca9caaf97b16a6461f119d4e3ec2f975d48d0fdc09db69f326fa
