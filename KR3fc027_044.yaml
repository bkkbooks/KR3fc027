body:
  text: 算法統宗既成問序于余余閲之率葉見其標倫揭目開啓鑰鈎玄抉隱剛繁業要苴罅補隙正訛點謬其啓振瞶也若發蔀其列同較異也若懸鑑其苞會統舉揔百端之略而集之成也若派列區分而統宗于一以是視天準地揆序萬物宣惟圍徑方斜繼橫旨曲鹽腸凹突開折愛物淂其變即陽海聖山捧影測表六合之
  hash: sha256:5dee61e42d613754e4f0dd682bc059c434bb88e8f77e95c721f35d25f0940499
