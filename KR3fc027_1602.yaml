body:
  text: 刻未果去年道過虞山購淂家藏元本囙與徔第鈁重加釐訂付諸剞氏用廣嘉惠浚學之志嗚呼是書之作也葢非偶然矣先府君穎悟過人詩文篆法偹極工妙然皆無意出之獨研窮筭學自少至老不少傣怠以謂痀偻承烔尚不以萬物易其所好矧專精一業思信今而傳後顾可鹵莾爲之凡吾之孳匕不釋良以是也光紳不
