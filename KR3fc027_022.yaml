body:
  text: 職及季六藝之教既寢而筭之學儒者紇不能舉官府會計第委之史輩其書之行于世者曲藝之士或能通一二雪豈獨哉即業其事者省循習而精詔余是以深古今之不相及宗人汝思幼而慧學為儒業既通不復出試吏而為儒不廢躭墳籍科斗文字而尤長扵筭如年
