body:
  text: 九歸歌日一歸不須歸一者原數不必歸也其法故不立惟兼歸除左邊爲實右邊爲法但法首位有一数者是一歸也故用逢一進一起至逢九進九止逢九卽是九次逢一進一也二歸二假如二人右邊爲法一假如一両左邊爲實添作五法實相呼將一両添四变作每人合得五錢二人二五得一両以合原數逢二進一十法二人實二両歸日逢二各得一両三歸三人右爲法一両左爲實三十一法實相呼將一両添二变作每人三錢三人共除九錢餘一錢歸日三十一一錢又歸每人合得三分三人共除九分而剩一分如此難盡三人爲法二而爲實六十二法實相呼將二両添四变作每人六錢三人三六共除一両八錢餘二錢歸日六十二二又再歸亦難盡也
