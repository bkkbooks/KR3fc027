body:
  text: 九歸歌日一歸不須歸一者原數不必歸也其法故不立惟兼歸除左邊為實右邊為法但法首位有一數者是一歸也故用逢一進一起至逢九進九止逢九即是九次逢一進一也二歸二假如二人右邊為法一假如一兩左邊為實添作五法實相呼將一兩添四變作每人合得五錢二人二五得一兩以合原數逢二進一十法二人實二兩歸日逢二各得一兩三歸三人右為法一兩左為實三十一法實相呼將一兩添二變作每人三錢三人共除九錢餘一錢歸日三十一一錢又歸每人合得三分三人共除九分而剩一分如此難盡三人為法二而為實六十二法實相呼將二兩添四變作每人六錢三人三六共除一兩八錢餘二錢歸日六十二二又再歸亦難盡也
  hash: sha256:d968f3ce38574a41fb120abc55ad4b694f5afbd10b279a0afcf13cac2c66d853
