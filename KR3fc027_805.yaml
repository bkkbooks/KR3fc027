body:
  text: 法日置積為實以相和六十步于右為減縱開平方法除之上商二十于左就將又縱減去上商二十餘四十與上商二十相呼除實八百餘實六十四步又以上商二十再減餘縱二十仍餘縱二十次商四步亦減餘縱二十仍淨餘縱十六與次商四相呼除實盡得濶二十四步以減相和六十步餘得長三十六步合問解曰若步益積便用減縱或有不可益積者須用減縱之術此是先問濶用此若先問長用減縱積法
