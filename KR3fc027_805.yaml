body:
  text: 法日置積為實以相和六十步于右為减縱開平方法除之上商二十于左就將又縱减去上商二十餘四十與上商二十相呼除實八百餘實六十四步又以上商二十再减餘縱二十仍餘縱二十次商四步亦减餘縱二十仍淨餘縱十六與次商四相呼除實盡得濶二十四步以减相和六十步餘得長三十六步合問解曰若步益積便用减縱或有不可益積者須用减縱之術此是先問濶用此若先問長用减縱積法
