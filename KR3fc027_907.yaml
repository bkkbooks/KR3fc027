body:
  text: 圭田若問梯下廣圭梯併長不必想上廣乘長為實則尖長法除即下廣法日置圭長併梯長共一十二只以上廣一尺六寸乘之得一十九尺二寸為實以尖長一尺五寸為法除之得下廣一十二尺八寸合問圭求外梯長歌圭田欲問外梯長下廣减去上廣長餘以圭長乘為實上廣法除是梯長法曰一下廣一十二尺八寸减去上廣一尺六寸餘一十一尺二寸以圭長一尺五寸乘之得一十六尺八寸為實以上廣一尺六寸除之得梯正縱長一十尺令五寸合問
