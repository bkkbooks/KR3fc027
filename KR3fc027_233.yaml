body:
  text: 法酋四銭乘五厘起三五一十五本位上一定位右位加五三分三四一十二有位上一右位加二下位是錢也向前逆陛合得實尾五石四五得二变五爲二三三如九一位加九九進一還一十石法酋是每石三錢遇石卽止下一位得術是也九両四四一十六本位存一右位加六十三十實首三百三四一十二本位存一右位加二原实百起呼百往後合順数至石得二百還原用歸除法詳後四一二十二逢四進一十三三如除九四一二十二逢八進二十三四除一十二
