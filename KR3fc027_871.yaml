body:
  text: 大段解日此立方積形如骰子有上下左右前後六面方如一段大方積是初商方高十尺自乘再乘得一千尺三段平廉每段方十尺高五尺卽初商十尺自乘又以次商五尺乘積五百尺用三因卽三段積一千五百尺三段長廉每段長六尺濶五尺高五尺卽初商十尺以次商五尺乘又以次商五尺乘得每段積二百五十尺用三圎卽三段積七百五十尺一段小方隅卽次商五尺乘再乘積一百二十五尺也呆求倉窖盛貯歌每石斛法二尺五寸米求倉窖要知源斛法先乘米数全若要圎倉乘十二方窖三因米数然
  hash: sha256:b9dc738180eeafa698519a46d1404fcb20d51cb5c72b197e2c142edd7635fb92
