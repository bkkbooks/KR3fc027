body:
  text: 大段解日此立方積形如骰子有上下左右前後六面方如一段大方積是初商方高十尺自乘再乘得一千尺三段平廉每段方十尺高五尺即初商十尺自乘又以次商五尺乘積五百尺用三因即三段積一千五百尺三段長廉每段長六尺濶五尺高五尺即初商十尺以次商五尺乘又以次商五尺乘得每段積二百五十尺用三圎即三段積七百五十尺一段小方隅即次商五尺乘再乘積一百二十五尺也呆求倉窖盛貯歌每石斛法二尺五寸米求倉窖要知源斛法先乘米數全若要圎倉乘十二方窖三因米數然
  hash: sha256:9dca352f8c90d2a25bebd67119474f66766b03c826911da53e30a5652e9d7162
