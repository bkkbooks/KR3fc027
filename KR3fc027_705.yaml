body:
  text: 為賎實以貴賤率王十二兩石三兩相減餘九兩為法除實得石一十三寸減共積二十七寸餘得玉一十四寸以玉率一十二兩乘之得一百六十八兩另以石一十三寸以石率三兩乘之得三十九兩各以斤法通之得斤數合問今有客三次出外為商俱得合利每次歸還銀三百兩三次本利恰盡問原本若干答曰二百六十二兩五錢法曰置銀三百兩折半得一百五十又加三百得四百五十又折半得二百二十五兩又加三百得五百二十五兩又折半得原本二百六十三兩五錢合問
