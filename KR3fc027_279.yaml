  text: 法酋一千實尾五両八十五七除三十五本位去三右位去五尽三百五七除三十五本位去三右位去玉定位五千除可隔二位在八十位上除逢五進五本位去五進五于左千法首位是千遇千即止前位得令是両逆陞合得實首五萬除可隔二位在三百位上除起逢五進五本位去五進五于左原实萬起呼萬往後顧至千三两合得五十還原隔二位乗五七三十五一五如五五七三十五一五如五
