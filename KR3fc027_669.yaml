body:
  text: 第二等三十六戶每戶一石四斗共五十石零四斗第三等四十二戶每戶九斗八升共四十一石斗六升第四等四十八戶每戶六斗八升六合共三十二石九斗二升八合法日置總粟為實另置一等戶一千因得二萬二千第二等戶以七百因之得二萬五千二百第三等戶以四百九十乘之得二萬零五百八十第四等戶以三百四十三乘三得一萬六千四百六十四併四位共八萬四千二百四十四衰為法除實得二石是第一等一戶所出數以七因是二等一戶數又七因是三等一戶數又七因是四等一戶數各以戶數乘之合問十分之七即以七因以生各等詳後解法
