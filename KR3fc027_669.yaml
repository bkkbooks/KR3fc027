body:
  text: 第二等三十六戸每戸一石四斗共五十石零四斗第三等四十二戸每戸九斗八升共四十一石斗六升第四等四十八戸每戸六斗八升六合共三十二石九斗二升八合法日置總粟爲實另置一等戸一千因得二萬二千第二等戸以七百因之得二萬五千二百第三等戸以四百九十乘之得二萬零五百八十第四等戸以三百四十三乘三得一萬六千四百六十四併四位共八萬四千二百四十四衰爲法除實得二石是第一等一戸所出数以七因是二等一戸数又七因是三等一戸数又七因是四等一戸数各以戸数乘之合問十分之七卽以七因以生各等詳後觧法
