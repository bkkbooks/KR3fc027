body:
  text: 適足同今有人買物毎八人出銀七両盈四両五錢毎九人出銀六両不足三両問人数物價各若干荅曰三十六人物價銀二十七両法曰雙盈不足置右上八人左上九人互中出六両中出七両互乘得六十三得四十八互下不足三両下盈四両五錢旡以左上九人右上八人相乘得七十二爲乘人率通法又以左上九人互乘右中七両各六十三再以右上八人互乘左中六両得四十八二数相减餘十五爲除人實物實法次以左中得数四十八互乘右下盈四両五錢得二百一十六又以右中得数六十三互乘左下不足三両得一百八十九二数相併共四百零五爲物
  hash: sha256:77a040c136a65047d0c094a0a8dd4c95295a2a2ae1f0001227d44d97e0a1015f
