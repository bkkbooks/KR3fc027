body:
  text: 共該銀若干答日九兩八錢六分七釐法日置豆為實以每斗三分四釐五毫為法乘之合問定位同前五毫四釐三分乘五六得三十定位七釐起四六二十四五八得四十下位是分也向前逆升合得六分實尾大斗三六一十八四八三十二三二五得一十斗法首位是每斗三分退斗即止下一位有術是分也八石八石三八二十四二四如八石合得九百實首二十文二三如六原實十起呼十往後順數至斗
