body:
  text: 共該銀若干荅日九両八錢六分七厘法日置豆爲實以每斗三分四厘五毫爲法乗之合問定位同前五毫四厘三分乗五六得三十定位七厘起四六二十四五八得四十下位是分也向前逆陞合得六分實尾大斗三六一十八四八三十二三二五得一十斗法首位是每斗三分退斗卽止下一位有術是分也八石八石三八二十四二四如八石合得九百實首二十文二三如六原實十起呼十往後順數至斗
