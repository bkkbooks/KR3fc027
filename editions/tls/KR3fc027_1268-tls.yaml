body:
  text: 荅曰二分五厘計六十步法曰置相和一十七步減不及五步餘一十二步爲長以濶五步相乘合問歌今有直田用較除一百二十步無餘長濶相和該一百問公三事幾何如荅曰長六十步濶四十步較二十步法曰置較除一百二十減長濶相和一百步餘二十步爲較以減相和一百步餘八十步折半得四十步爲濶加較二十得長十六合同
