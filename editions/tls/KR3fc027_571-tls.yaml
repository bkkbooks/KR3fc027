body:
  text: 以法除之得原礦四十二兩合問度法端疋歌四十爲疋五爲端或减或加尺寸寬端疋乗來方見尺尺求端疋法除看諸物皆所用度故首論之今世俗尺度不等無物可爲定則或云以黍作一分十分爲一寸又云黃金方寸爲一斤今較古斛法二尺五寸此俗用尺不同難爲凖則解曰原以四丈爲一疋五丈爲一端今無定規或三丈上下亦爲疋也古設端疋之數今亦長短不一難以執法從俗可也
