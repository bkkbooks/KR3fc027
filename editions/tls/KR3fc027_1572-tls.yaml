body:
  text: 二十共得一百二十八寸以空圍九分因之得一萬一千五百二十分以分母二十七除之不尽一十八分法實皆九約之得積四百二十分三分寸之二其侯小雪却以通寸一百二十八以四因之得五百一十二寸另以三因二十七得八十一爲法除之得六寸八十一分寸之二十六隔八下生甤賔甤賔属陽律長六寸八十一分寸之二十六却以分母八十一通六寸加分子二十六其得五百一十二寸以空圍九分因之得四万六千令八十分以分母八十一爲法除之不尽七十二分法實皆以九約之得積五百六十分九分寸之八其候夏至却以通寸五百一十二以四因之得二千令四十八寸另以三因八十一得二百四十三爲法除之得八
