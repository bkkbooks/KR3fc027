body:
  text: 今立表三尺退行一尺八寸又立表三尺六寸人目望其二表俱對遠處參合問遠若干答日十尺零八寸法日置後表三尺六寸一退行一尺八寸乘之得六十四寸八分爲實卻以二表相減餘六寸爲法除之得一十尺令八寸爲後表相去之遠若以前表三尺以退行一尺八寸乘之得五尺四寸爲實卻以二表相減餘六寸爲法除之得九尺爲前表相去之遠也窺望海島歌望島知高法術奇立來二表並高低
