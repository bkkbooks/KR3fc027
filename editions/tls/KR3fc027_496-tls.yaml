body:
  text: 五斗米五斗換豆七斗問米豆各若干荅曰米七百六十石豆一千零六十四石法日置芝蔴爲實以三斗歸之得一百五十二石以米五斗因之得米七百六十石若換豆就以米用五歸之仍得一百五十二石以豆七斗因之得豆一千零六十四石合問今有人原借九色金五十両今還八色金問諛若干荅曰八色金五十六兩錢五分法日置借九色金五十兩以九因得赤金四十五兩爲實却以今還八色除之卽得
  hash: sha256:363abaa2ef6c777ee2072fc1cde0d19df3c0d7f54470d6d28824ef94baca8c95
