body:
  text: 仍用前長法一錢八分除之得一錢二分五厘爲短法列二位一位七斤乘之得小魚八十七斤半一位以五分乘之得小魚價六錢二分五厘合問今有圓木大小二根内大者一根頭俓一尺二寸稍徑八寸長二丈五尺小者一根頭徑一尺稍俓七寸長二丈共價銀四十九両零八分問大小木各價若干荅曰大木三十一両二錢小木一十七両八錢八分法曰先置大木頭徑一尺二寸自乘得一百四十四寸又將稍徑八寸自乘得六十四寸併之得二百零八寸以長二丈五八乘之得積五萬
