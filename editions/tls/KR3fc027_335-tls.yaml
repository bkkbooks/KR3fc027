body:
  text: 先日先將二十四日用三歸得八数在十月隔空一位之下再以十二月除之得九数如年以乘原本得二百三十四両爲實以每年加三爲法因之合問解日凢筭年月日期卽似與両求斤法减六同理每斤一十六両减六只作一数每年十二月每月三十日故先用三歸如月併月後用十二除月如年以乘各人原本合得餘皆倣此圖式具左定盤筭日月爲年式法先三歸如月数法後二月一十除如年数四日逢六進二十本位去尽進二于左
