body:
  text: 弧矢內股弦求勾圖圎徑與截矢求截弦歌畀相乘数也圎徑與矢求弧弦半徑自乗立一邉另以半徑减去矢餘亦自乘减却前又餘平方隅見数倍置名卽是弧弦圎徑十寸弧矢减一寸問截弦若干荅曰弦六寸法日置半徑五寸爲弦自乘得二十五寸另以半徑五寸减矢一寸餘四寸爲股自乘得一十六寸相减餘九寸平方開之得三寸爲勾倍之得六寸爲截弧弦卽自二勾相積爲弦餘皆傲此又法以圎徑自乘得一百寸爲弦另以圎徑减倍矢二寸餘八寸自乘得六十四寸爲股相矢得三十六寸爲勻平方開置得全弦六寸
