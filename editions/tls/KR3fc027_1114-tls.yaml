body:
  text: 荅曰官派銀六十五両上戸例五両下戸例四両法曰先置上等八戸以十因之得八十戸又置下等五戸以八因之得四十戸併之得一百二十戸列位次置上等六戸以十因之得六十戸又置下等八戸以八因之得六十四戸併之得一百二十四戸列位一百二十戸一百二十四戸互不足五両不足三両先以一百二十戸互乘不足三両得三百六十両又以一百二十四戸互乘不足五両得六百二十両二位相减餘二百六十両爲銀實却以戸数一百二十一百二十四相减餘四爲法除之得官派銀六十五両另以両不足五両三両相减餘二両爲則例實仍以前法四除之得五錢以十因之得上等一戸則例銀五両另列五錢以八因之得下等一戸則例銀
