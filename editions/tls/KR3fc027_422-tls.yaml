body:
  text: 云九歩巳知圓三徑一得徑九歩除方四歩外徑一面豈有三歩哉傑又增此意駐雲飛此類錢田題法難明不足觀非俺自誇羡改正珍寳鍳嗏二十七歩圓眼中間十二方問攺法精制筭圖樣明名天下傳荅曰改正得四十四歩七分五厘傑改正法日置錢周二十七歩自乗得七百二十九歩以圓法十二除之得六十歩七分五厘爲實另以錢眼方周十二加八得二十歩與十二歩相乘得二百四十歩爲實以方問法十六除之得
