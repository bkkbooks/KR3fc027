body:
  text: 除求之数减去矢餘存此卽是弧弦法日置積一百二十八歩倍之得二百五十六歩爲實以矢八歩爲法除之得三十二歩减矢八歩餘得弧弦二十四歩積求矢濶歌積求矢濶倍爲實弦爲縱方奠教遲商於左位右併縱前後呼除矢得冝法日置積一百二十八歩倍得二百五十六歩爲實以弦二十四歩於右爲縱方約商八歩于左亦置商八歩于右縱方二十之下共三十二歩皆與上商八相呼三八除實二百四十二八除實一十六歩恰盡得矢八歩
