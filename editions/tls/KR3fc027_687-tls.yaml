body:
  text: 一百五十両乘得鍚二萬七千七百五十両於總物内减訖餘五萬五千三百両另置總银内减去一十八両五錢餘三十七両却以銅一百三十両乘之得四萬八千一百减去五萬五千三百餘七千二百爲實另以銅鐡数相减餘四十爲法除實得錢價一十八両又于三十七両减去一十八両餘一十九両爲銅價各以每錢買数乘之合問今有綾羅紗絹一百六十疋共價九十三両綾每疋價九錢羅每疋七錢紗每疋五錢絹每疋三錢問四色各若干荅曰綾三十五疋該銀三十一両五錢羅四十疋該銀二十八両紗四十疋該銀二十両
