body:
  text: 若干法日置米爲實以銀每両雜米三石爲法歸之得數莫動定位訣日此是實多法少先從實首位起數原實百順下至石遇法首位是石則止前一位得令是両又前一位是十両又前一位是百両此是逆上假如麥四百五十石賣銀三十二両四錢問每石該銀若干法日置銀爲實以麥爲法歸除之得數莫動定位訣日此是法多實少先從實首位起數原實十逆上至百遇法首位是百則止前一位得令是両降下順數至實是七分次位卽二釐也
  hash: sha256:8c84fa24b4f015d95b02ef453bdcb9ccbc09b1c4b3127a8f667410ca25ec1b30
