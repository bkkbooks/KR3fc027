body:
  text: 得五寸以加弦得一十五寸與圍三徑一直論正合然徑一則圍三有奇奇数則不能盡矣以是知弧背之説猶未盡也不特是也凢平圓一十二立圓三十六皆不過取其大較耳或曰宻率徑七則圍二十二徽率徑五十則圍一百五十七何不取二術酌之以立一定之法曰二術以圓爲方以方爲圓非不可但其還原與原数不合数多則散漫難收故筭曆者止用徑一圍三亦勢之不得巳也曰曆家以徑一圍三立法則其数似猶未精然郭守敬之曆至今行之無弊何也曰曆家以萬分爲度秒以下背不錄緃有小差不出于一度之中況所謂黃赤道弧皆度乃測驗
  hash: sha256:d56751fe0c05a57c47baa0979709cc4625c6c7b63bd7048df668e1e9e1f2664d
