body:
  text: 深若干俱加倍以五寸爲一根卽是爲倍法也丈五除長再乘行如長若干以毎根長一丈五尺除之餘数再乗書捆加深爲定如一封書捆深濶長俱乗訖又照原深若干加之是也方捆須知加濶如方捆深濶長俱乗訖又照原濶若干加之是也荒深三折倍成又名荒排者異前二形卽以深三歸而一方可倍之卽一尺二根也濶長皆是照前因雖荒排濶亦倍之與三歸深者相乗長亦照前丈五除者相乘三折一加有準但荒排濶深長俱乗訖亦照深三歸而一如之今有一封書捆深七尺五寸濶四丈七尺長九丈問木若干荅曰一萬四千八百零五根法曰置深七尺五寸以毎丈二根計之得一十五根卽倍法也又以濶四丈七尺倍作九十四根相乘得一千四百一十根爲實另置長九丈以
  hash: sha256:b279044f5b71c491e286c6e8947d5bdf6038043260b2af72d71cdb475ad57d6e
