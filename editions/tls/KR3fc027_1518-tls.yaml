body:
  text: 荅曰三十六石五斗法曰置總銀于左爲實列爲三行以每石價四錢于右爲法歸之四一二十二逢四進一十四二添作五逢四進一十四二添作五此五句後分三行用逢四進一于前本位去四存四二添作五五斗加前二作上逢四進一于前本位過門存四二添作五加後進一作六石四一二十二下位加二加後進一作合得三十乘法式假如今有米五十三石二斗每石六錢四分問該銀若干荅曰三十四両零四分八厘
