body:
  text: 甌油三十二銖乘之得三千八百四十銖以每斤三百八十銖除之得十斤爲甌油總數另以則六十以三停因之得一百八十爲盞總数以每盞油一十八銖乘之得三千二百四十銖以每両二十四銖除之得一百三十五両以斤法一十六両除之見一無除作九一無除起一下还一六八除四十八餘七両不可除卽是八斤七両爲盞油總数併甌總油共一十八斤七両合問以碗知僧歌巍巍古寺在山中不知寺內幾多僧三百六十四隻碗恰合用盡不差爭三人共食一碗飯四人共嚐一碗羮請問先生能筭者都來寺內幾多僧荅曰六百二十四人飯碗二百令八隻羮碗一百五十六隻法曰以三人四人相乘得一十二人以乘總碗三百六十四隻得四千三百六十八爲實另以三四併之得七爲法除之得僧數用三歸得飯碗用四歸得羮碗合問河邉洗碗歌婦人洗碗在河濱試問家中客幾人荅曰不知人數目六十五碗自分明二人共食一碗飯三人共喫一碗羮四人共肉無餘数請問布筭莫差争
  hash: sha256:c9bd732a916022262b058f1f547cf31258ba3ee32c0ffac737a89c6f078c0bd1
