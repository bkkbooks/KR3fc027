body:
  text: 委地二尺如弦較爲法除之得三十二尺加弦較二尺共得三十四尺折半得索長一丈七尺將弦內減去較二尺得木高一丈五尺卽股今有廳門外懸簾下埀離地五寸引簾離閾六尺離地也尺五寸問簾高若干荅曰簾高一丈法曰置去閾六尺爲勾自乘得三十六尺以離地二尺五寸減去原離地五寸餘二尺爲弦較除之得一十八尺加弦較二尺共得二十尺折半得簾高一丈合問今有開門去閾一尺不合二寸問門廣若干
