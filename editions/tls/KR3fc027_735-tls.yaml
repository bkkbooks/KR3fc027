body:
  text: 五千四百又左六對右六呼六六除實三十六歩恰盡合問今有方磗一千四百六十一塊欲爲平方問一両方若干荅曰面方三十八塊七十七塊之十七法日置磚積爲實初商三十塊于左下法亦置三十于右爲方法左右相呼三三除實九百餘實五百六十一塊就以方法三十倍作六十爲廉法次商八于左初商三十之下亦置八于右廉法六十之下爲隅法共六十八皆與上商八相呼六八除實四百八十又呼八八除實六十四餘實一十七不盡却將所商三十八倍之再添一塊共得一方数七十七命一十七何謂之命以原總数内除一十七加上七十七便商得面方三十
