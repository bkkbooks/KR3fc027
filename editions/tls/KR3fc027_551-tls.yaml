body:
  text: 銀若干荅曰二錢八分六厘八毫七絲五忽法曰置今買絲六両化爲三七五爲實以毎斤七錢六分五厘爲法乘之合問原有銀一錢買猪肉四斤今有銀三分五厘問諛若干荅曰諛肉一斤両四錢法曰置錢三分五厘爲實以毎銀一錢肉四斤爲法乘之得一斤四此四乃是虛数合斤之数也宜當毎両用加六之法四六加上二両四錢共得一斤六両四錢合問原有銀二錢三分買白銅一十三両今欲買五斤二両問
