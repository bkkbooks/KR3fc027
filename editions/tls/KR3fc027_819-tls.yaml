body:
  text: 自乘一百餘四十四以减餘實又餘實九十六却以三因得二百八十八另併大方多中四小八共十二倍之得二十四與初商十歩相呼一二除二一四除四又與次商二歩相呼二二除四二四除八得小方面十二歩加多四歩得中方面十六歩又加多四歩得大方面二十歩各以方面自乘得各積合問若四段則用四歸五段則用五歸假如大小圎田二段共積只云大圎徑多小圎徑者法置共積以四因三歸得数仍如前方田筭或只云大圎周多小圎周者法置共積以十二乘得数仍如大小方田筭假如大小立方二所共積只云大立方靣多小立方面者法
  hash: sha256:a22b57e3f8418a9095297525359c591cdbc5088dc68f7b3bfb2ac8fb51cb7e71
