  text: 新安賔渠程大位汝思甫編集會孫素亭光紳佩章甫較正藴齊鈁洪聲甫尜閱商功第五章商度也商量用力之法也此章以堅壤之率求穿地之實以廣濶高深求城塹溝渠之積以車担往來求程途負載之功商功歌卽修築商功須要問工程長濶相乗深又乗乗此数來以爲實每日工程爲法行唯一築城别一樣上下將來折半平
