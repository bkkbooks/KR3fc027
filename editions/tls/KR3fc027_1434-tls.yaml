body:
  text: 比如有錢一文每日生利八文問八日該生利併本一文問共若干荅曰一千六百七十七萬七千二百一十七文法日置初日利八文自乘得六十四文又以六十四文自乗得六千零九十六文又以四千零九十六自乘得一千六百七十七萬七千二百一十六文加本錢一文合問前諸葛綂兵一問出吳氏九章因傑改正数差反爲不正故設此問以明上意歌一條竿子一條索索比竿子長一托
