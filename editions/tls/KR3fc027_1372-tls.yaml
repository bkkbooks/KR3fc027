body:
  text: 古法通田三分得七十二歩以每邉三歩約之得圓徑一十二歩自乘得一百四十四歩三因四歸得一百令八歩减田積七十二歩餘三十六歩平方開之得池方六歩合問又法以每邉三歩自乘得九歩又以四因得三十六歩加入倍積一百四十四歩共一百八十歩爲實另以沒邉三歩以八因之得二十四歩爲縱方平方開之約商六歩于左亦置六歩于右併入縱方二十四歩共得三十歩與上商六歩相呼除實盡得半徑六歩倍之得全徑一十二歩是也孤峯馬傑斷古法曰以每邉三歩之得圓徑一十二歩此數非圓田之正徑手以正徑前之積歩不及三分豈有方池六歩之容前後不接細考後矣
