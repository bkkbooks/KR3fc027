body:
  text: 今有直田長一十四歩濶七歩計積九十八歩問內容弧矢田一段占積併二角餘積各若干荅曰弧矢積七十三歩半二角積二十四歩半法日置長一十四歩爲弧弦以濶七歩爲矢相併得二十一歩折半得一十歩五分又以矢七歩乘之得弧矢占積七十三歩五分以减直積九十八歩餘二十四歩五分是二角餘積今有直田長二十歩濶十八歩計積三百六十歩內容六角田一段每角面十歩問六角占田積併餘積各若干
