body:
  text: 荅曰六角積一百七十歩角外餘積九十歩法日置中長二十歩减去半面濶五歩餘長一十五歩以通濶一十八歩乘之得六角占積二百七十歩另以角外餘長九歩以餘濶五歩折半得二歩五分乘之得一角餘二十二歩五分以四因之得四角餘積九十歩併入六角占利二百七十歩共合直田總積也假如方田一段面方十七歩計積二百八十九歩內容八
