body:
  text: 於右位併入縱方六十共得九十歩與左商三十相呼三九除二千七百歩積盡以商三十倍作六十歩爲方面减去每邉各十歩共减二十歩餘得圓池徑四十歩合問解法方內容圓四分之三故以三因池外自乘之数得三百併債爲实另以三倍之爲六乘每边十歩得六十歩爲縱方平方開之西江月今有圓由一叚中間有箇方池丈量田地待耕犁恰好三分在記池面至問有数每邉三歩無疑內方圓徑若能知堪作筭中第一荅曰圓徑一十二歩內方池六歩
