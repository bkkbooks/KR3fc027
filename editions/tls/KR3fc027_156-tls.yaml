body:
  text: 二錢歸日八十二二錢又用六二三十二歸法筭逢六進一十法六人實六両歸日逢六進一於前位每人各得一兩六人共得六兩以合原数七歸七人爲法一兩爲實下加三法實梠呼一両不動變作每人一錢七人共除七錢餘三錢歸日下加三三錢又用後七三四十二歸法筭七人爲法二兩爲實下加六法實相呼二兩不動变作每人二錢七人共除一兩四錢餘六錢歸日下位加六六錢又用後七六八十四歸法筭七人爲法三兩爲實四十二法實相呼將三兩添一变作每人四錢七人共除二両八錢餘二錢歸日四十二二錢又用前七二下加六歸法筭七人爲法四兩爲實五十五法實相呼將四兩添一变作每人五錢七人共除三両五錢餘五錢歸日五十五五錢又用後七五七十一歸法筭
