body:
  text: 該銀若干荅曰一両四錢五分零七毫七絲汯曰置今買銅五斤二両以斤求両汯加之只加斤不加両五六加三十共得八十二両以原銀二錢三分乘之得一十八両八錢六分爲實以原銅一十三両爲法除之合問此乃異乘同除之法原有銀七錢五分買墨二斤四両今有銀二錢四分問諛墨若干荅曰該墨一十一両五錢二分法曰置今有銀二錢四分以原買墨二斤四両可將四両化爲二五共二斤二五爲法乘之得五十四両爲實以原銀七錢五分爲法除之
