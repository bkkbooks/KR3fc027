body:
  text: 田畆演段根源圖解方求積法置方十歩自乗得積一百歩合問張丘建方求斜法置方十歩用五歸得二是兩箇方正却用七因得斜十四歩故曰方五斜七若依方五求斜則斜有餘若依斜七求方則方不足假如方田隅斜一十四歩問積歩併方面各若干荅曰積一百歩实只有九十八歩方面十歩实只有九歩九分張丘建法置斜十四歩用七歸得二乃是二箇斜七却用五因得方面十歩是两箇方五就以方十歩自乗得積一百歩有斜必有方只以方求積無差
  hash: sha256:0cb4ac5d797ff15e4f38138627338b73be4a373201bec8d441d630b0a370671d
