body:
  text: 商三十再减餘縱六十二仍餘縱三十二次商二又减縱二餘縱三十與次商二相呼二三除實六十盡合問若先问長者仍前布列先商長六十减縱亦得今有勾股田積九百六十歩長濶相和九十二歩問長濶各若干荅曰長六十歩濶三十三歩法日置田積以八因之或倍田積以四因同得七千六百八十歩另以和歩自乘得八千四百六十四歩相减餘七百八十四歩以平方開之得長濶相差二十八歩加入和歩共一百二十歩折半得長六十歩内减差二十八餘得濶三十二歩合問若以减縱開平方法筭置積倍之得一千九百二十歩爲實以
