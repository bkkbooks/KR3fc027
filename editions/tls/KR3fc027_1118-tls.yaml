body:
  text: 通盈四文得二十四文如盈適足例位六七互盈二十四適足先以盈二十四文爲木價實却以六七相减餘一爲法除之得木價二十四文次以七互乘盈二十四得一百六十六却以之一之三相乘得三爲法除之得錢五十六文合問今有芝蔴不知数只云取蔴八分之三糶銀十両不足二石取蔴三分之一糶銀八両適足問蔴数及毎両該銀若干荅曰總蔴四十八石毎銀一両該蔴二石法曰先以之三互乘三分得九以通八両得七十二両次以之一互乘八分得八以通十両得八十両以八通不足二石得一十六石如
  hash: sha256:359a8e4bc24fbe6fc6fc43ce4c2a462c8ebdd29d56521231b2208fd4361448b1
