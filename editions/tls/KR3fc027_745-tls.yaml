body:
  text: 解曰若以積四百九十歩加入四十五歩减去分子六歩仍得五百二十九歩便商得二十三歩所謂不及故謂之命也歸除平方带縱歌平方带縱法最奇四因積歩不須疑縱多自乘加因積又用開方法除之再以縱多併开積折半方爲長数施若問濶涉知多少將長减却縱多基今有直田積一千七百五十歩長比濶多一十五歩問該長濶各若干荅曰長五十歩濶三十五歩
