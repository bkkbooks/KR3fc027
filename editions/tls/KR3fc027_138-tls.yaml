body:
  text: 又十二字訣日乗從每下得術歸從法前得令定位秘訣凢定位俱從實上原首位數起至遇法首位乗則每數卽斤両貫丙石等類除則不拘斤両貫箇千萬等類則止乗從每下得術術者乃法首位每下該得之名也從實上原首位赳往後順數至法首位每數則止于下位得法首每該之名是錢呼錢是石呼石是両呼両已上十百千萬已下厘毫合勺回向前數則陞依數呼之歸從法前得令令者斤両貫箇石等類亦從實上原首位起
