body:
  text: 荅曰二百一十六石法日置粳米爲實以每石减五爲法定身除之或用十五除亦得原借人小麥四百五十六石今將白米照依時價估折還之其麥每石價四錢五分白米每石價七錢五分問諛還白米若干荅曰二百七十三石六斗法曰置麥数以麥價乘之得二百零五兩二錢爲實却以米價七钱五分爲法除之卽得今有芝蔴四百五十六石易換米豆只云芝蔴三斗換米
