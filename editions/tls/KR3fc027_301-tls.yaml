body:
  text: 商除商除者商量而除之也如定商太過則總数不足而無除如定商不及則總数有餘務要酌量彀除方可然此一術亦兼歸除歸除旣通不必學此但開方之法必用商除演此而爲梯堦其法不可廢也歌曰数中有術號商除商總分排両位推惟有開方須用此續商不盡命其餘假如今有軍士六百名分粮三百九十四石二斗問每名該若干
