body:
  text: 坎三一三十一將坎一移在震三又將下位兌七移在艮八今有鈔二十三貫九百二十文每鈔四百六十文買絲一両問絲若干荅曰五十二両法曰置鈔于圖中爲實以每両鈔四百六十文爲法歸之坤離二六除一十二將本位坎一除去更于下位坤二亦除尽逢八進二十將离九除八移在坎一進二加于前坤二上震五六除三十除去震三尽坤四二添作五將坤二移在中五一掌金定位圖
