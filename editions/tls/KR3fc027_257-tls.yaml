body:
  text: 實尾二分一二如除二本位去尽三錢逢一進一十本位去一進一于左一二如除二本位去二存一定位五両逢一進一十本位去一進一于左二二如除四去四存一一分六十逢二進二十本位去二進二于左二二如除四去四存二十法首位是十過十卽止前一位得令是兩逆陛合得一錢實首二百起逢二進二十本位去二爲二于左原实百起呼百往後至十二両合得二十還原用乘一二如二一一如一一二如二一一如一二二如四一二如二二二如四一二如二假如今有米一百二十九石九斗六升作一十九人分之
