body:
  text: 法日以三朝五日相乘得一十五再以七日乘之得一百令五日合問歌今有四人來做工八日工價九錢銀二十四人做半月試問工錢該幾分荅曰一十両零一錢二分五厘法日置二十四人以一十五日乘之得三百六十又以銀九錢因之得三百二十四両爲實以四人乘八日得三十二日爲法除之合問難題均輸六粒米求程歌廬山山高八十里山峯峯上一黍米
