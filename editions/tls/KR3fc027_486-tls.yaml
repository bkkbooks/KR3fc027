body:
  text: 古今折歩法原用古弓每歩五尺今以鈔弓校之只有四尺八寸問古弓百歩該鈔弓若干若曰九十二歩一分六厘法曰置四尺八寸倍之得九分六厘自乘得九分二厘一毫六乃古弓歩一歩今折得鈔弓歩数也自此陞上合問若鈔弓歩数每百歩用八歩五分加之以合原古弓歩之数其方直田形截積具載六卷少廣章中凢量東西南北丈尺問積就以東西南北併之相乘合問新編直指筭法綂宗卷之三
