body:
  text: 法曰置六分之五四分之三以母四互乘子五得二十爲次兄之差又以母六互乘子三得十八爲小弟之差又以母四六相乘得二十四爲長兄之差另以二十减去十八餘二爲法先置長兄差二十四以八歲乘之得一百九十二爲實以法二除之得九十六爲長兄之歲另以次兄差二十以八歲乘之得一百六十爲實以法二除之得八十爲次兄之歲另以小弟十八亦以八歲乘之得一百四十四爲實以法二除之得七十二爲小弟歲数合問今有七人差等均錢甲乙均七十七文戊巳庚均七十五文問丙丁各若干
  hash: sha256:4defdd237274a93820af2f68762a1dc33a10d2026cd97559dc53773dbc396e17
