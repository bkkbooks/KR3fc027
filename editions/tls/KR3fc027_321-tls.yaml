body:
  text: 荅曰三十両法日置布四十五疋以分子之二因之得九十両爲實却以分母三爲法歸之合問解題曰三分兩之二卽每疋六錢六分六厘而不能尽故用約分之法也假如今有米三分石之二每斗價銀七分二厘問共該銀若干荅曰四錢八分法日置銀七分二厘以分子之二因之得一両四錢四分爲實却以分母三爲法歸之合問假如今有商夥論本分物俱得八分之七至銀百両問該若干荅曰八十七両五錢法日置銀一百両以子之七因之如故仍以分母八爲法
