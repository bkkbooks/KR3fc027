body:
  text: 朝廷軍國之需小而民生日用之費資能外数詎不重巳哉予切躭習是學弱冠商吳編訪明師繹其文義審至成法而覃旦於水之上馀二十年一旦恍然義召所淂逐于是乎恭會諸家之法附以一及之黑纂集成編諸凡前法之未管者明之未偹者補之絮董者刪之踈畧者详之而又爲之訂其
