body:
  text: 甲三錢六分五厘互和甲戊共得六錢折半得丙三錢互和加甲三錢六分五厘共得六錢六分五厘折半得乙銀三錢三分二厘五毫併丙戊共五錢三分五厘折半得丁二錢六分七厘五毫合問西江月羣羊一百四十剪毛不憚勤劳羣中有母有羊羔先剪二羊比較大羊剪毛斤二一十二両羔毛百五十斤是根苗子母各該多少荅曰大羊一百二十隻小羊二十隻法曰置羊一百四十以大羊剪毛一斤二加六爲一十八両乗之得二千五百二十両以减共煎毛一百五十斤亦加六爲二千四百両餘一百
