body:
  text: 法曰置米爲實列丙四乙六甲九副併共得十九衰爲法除實得八十二石爲一差衰以乘各人衰数卽出納数也今將前米令甲乙丙丁四等人戸作四六出納問各該若干法曰置米爲實列丁四丙六乙九甲十三衰五分副併共得三十二衰五分爲法除實得若干乃爲一衰之数以四因得丁所該納数列一衰則以乘各人衰数合得各人所納数也又將前米令甲乙丙丁戊五等人戶作四六納之問各該若干法曰置米爲實列戊四丁六丙九乙十三衰五分甲二十衰二分五厘副併得五十二衰七分五厘爲法除實得若干爲一衰之数以此爲則以乘
