body:
  text: 四十三両五錢爲長法次以中羊四互乖總價一百六十八両得六百七十二又置總物一百隻以賤價一両五錢乘之得一百五十以减六百七十二餘五百二十二爲實以長法四十三両五錢除之得二両二錢爲短法列二位一位以貴物半三乘之得半三十六隻一位以半貴價一十二両乘之得一百四十四両以减總銀餘得羊價合問今有大小魚一百斤共價八錢七分五厘只云大点大魚二斤價四分小魚七斤價五分問大小魚及各若干荅曰大魚一十二斤半價銀二錢五分小魚八十七斤半價銀六錢二分五厘
  hash: sha256:51694f2e0d2080d06fa0ef7685a9d3fa78db7561657771cd045190a27c2453f9
