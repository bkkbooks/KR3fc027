body:
  text: 以三除之得飯碗合問今有客不知数只云二人共飯三人共羹四人共肉通共用碗六十五隻問客若干荅曰客六十人法日置二人三人四人雞乘以二乘三得六以三乘四得一十二又四乘二得八併之二十六爲法另以二乘三得六却以四乘之得二十四以乘碗六十五得一千五百六十爲實以法二十六除之得客合問雞乘者四處颠倒相乘也右二條先用合分後用互換也新編直指算法綂宗卷之五
  hash: sha256:b0914c048a41fdc11bb2608fb641debf3f770d9ca4a4f5ecb8d73678807386b2
