body:
  text: 爲實以開平方法除之得水深三十尺爲勾合問西江月今有坡田一段西高東下曾量十歩五寸是斜長南北均濶六丈欲要修爲平壞東增一丈新墻不知幾許請推詳須要筭皆停儅荅曰得平地四分九厘五毫濶九歩九分法曰此如勾弦求股置斜弦十歩以每歩五尺乘之得五十尺加零五寸自乘二千五百五十尺令二寸五分以减勾墻一十尺自乘得一百尺餘二千四百五十尺令二寸五分爲實以開平方法除之得股四丈九尺五寸以歩法五尺除之得濶九歩九分以乘南北均濶一十二歩得平地一百
  hash: sha256:89db1591613fbb9bf9f5f6b60521f176bbf73d00273089418a469b5334a21853
