body:
  text: 實以法十五除之得銀二十七両却以左下不足三両右下盈四両五錢二数相併得七両五錢爲人實率先以前通法七十二乘之得五百四十爲人實後仍以前法十五除之得三十六人合問今有人買物毎六人出銀九両多三両毎四人出銀七両多六両問人数物價各若干荅曰一十二人物價銀一十五両法曰雙両盈置右上六人左上四人互中出九両得三十六中出七両得四十二互下盈三両下盈六両先以左上四人右上六人相乘得二十四爲乘人率通法又以左上四人互乘右中九両得三十六再以右上六人互乘左中七両得四十二二数相减餘六爲除人實物實法次以左右中得
  hash: sha256:a7487a8e84bc7424e741e9e13930e2f8e3efffe6868c791fa3539e1b57442992
