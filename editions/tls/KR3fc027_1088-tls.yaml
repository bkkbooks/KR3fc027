body:
  text: 以出五錢减出四錢餘一錢爲法除銀實卽銀数除人實卽里数合問今有井不知深先將繩摺作三條人井汲水繩長四尺後將繩摺作四條入井亦長一尺問井深及繩長各若干荅曰井深八尺繩長三丈六尺法曰兩盈置長四尺以三條通之得一十二尺又置長一尺以四條通之得四尺各列置位三條四條互乘長一十二尺長四尺先以三條乘四尺得一十二尺又以四條乘長一十二尺得四十八尺二数相减餘三十六尺爲繩實却以三條四條相减餘一爲法除繩實得繩長另以前通兩盈数相减餘八尺爲井實仍以法一除之得井深数合問
