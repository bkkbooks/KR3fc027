body:
  text: 置共積另置大立方靣多小立方面数自乘再乘以减共積餘積折半爲實初商自乘再乘得数餘實訖次商若干併入初商共若干自乘再乘得数內减云初商自乘再乘数餘若干除實訖仍餘實若干倍之却以大多小数併入初次商数共若干以次商若干乘得数又以大多小数乘得若干却以三因之得若干除實恰盡得小立方靣数如多数得大立方靣数各以方靣自乘再乘得各積立方三所共積用三歸若四所共積用四歸餘傲此開立方法歌自乘爲平方再乘爲直方自乘再乘除實積三因初商方另列
