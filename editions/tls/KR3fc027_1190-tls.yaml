body:
  text: 法曰置去岸九尺爲勾自乘得八十一尺以出水三尺爲股較自乘得九尺以減八十一尺餘七十二尺爲實以較三尺倍作六尺爲法除之得水淺一丈二尺合問水淺如股葮至岸如弦今有勾九尺卻將弦比股有餘三尺問弦股各若干荅曰弦一十五尺股一十二尺法曰以勾九尺自乘得八十一尺爲實以多三尺爲法除之得二十七尺減去多三尺餘得二十四尺折半得股長一十二尺加入弦多三尺
