body:
  text: 法遍乘中行中下得数中中正二得二與左中二減尽下一得一如左行下六得七爲法四石二斗得四石二斗與左行八石四斗對減餘四石二斗爲實以法除之得驢匹力六斗中行四石二斗內減借驢一匹除六斗仍三石六斗作騾二匹除之得騾力一石八斗右行四石二斗內減借中行騾一匹除一石八斗餘二石四斗爲馬一匹力合問今有硃二斤粉三斤價二両零四分又粉五斤丹六斤價六錢四分又硃三斤丹七斤價二両九錢八分問三色各價若干荅曰硃毎斤九錢粉毎斤八分丹毎斤四分法曰列所問数先以右行硃二爲法遍乘左行得数列于左位
