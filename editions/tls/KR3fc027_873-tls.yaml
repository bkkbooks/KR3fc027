body:
  text: 三十六乘圎窖米命爲實積定無偏却用立方開見約方求長濶約爲先圎数求周爲約数各將約数自乘焉乘來爲法除實積便見深高法更玄今有米二千四百一十九石二斗欲爲方倉盛之問長濶高各若干荅曰長二十八尺濶一十八尺高一十二尺法日置米数以斛法二尺五寸乘之得六千零四十八尺爲實以開立方約之得濶一十八尺便約長二十八尺却以長濶相乘得五百零四尺爲法除實得高合問
