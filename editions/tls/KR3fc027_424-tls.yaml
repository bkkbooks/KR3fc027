body:
  text: 一十五歩加一歩共一十六歩以减前實六十歩七分五厘餘四十四歩七分五厘合問位因傑辨吳氏之非故立圓考校前法每一歩自方五尺横直相乘得積二十五尺乃是本身連根其理甚明假如錢内方周每靣三歩四圍共合爲十二得積九歩無差據傑用方束之法反正爲邪不免有差殊不知束積皆是論箇論隻之物無零宜當除根不辯明矣束法具載第六卷少廣章賓渠子歌曰
