body:
  text: 五歸起一下還五本位起一下位還五六歸起一下還六本位起一下位還六七歸起一下還七本位起一下位還七八歸起一下還八本位起一下位還八九歸起一下還九本位起一下位還九撞歸者有歸而無除之謂也予以法實盈虧進退之理推之盈則有歸照法首之数進於上位成十虧則無除起一退於下位照法首之数還原先哲有云見一無除作九一之類此正謂有歸無除之秘法知此可與論制筭纂法之深奥矣假如今有銀二百四十三両糴米每斗價銀五分四厘問共該米若干
