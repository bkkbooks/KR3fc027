body:
  text: 一法將原下廣三尺减原上廣一尺餘二尺另以原高一丈二尺内减今高九尺餘三尺以乗二尺得六尺爲實以原高一十二尺爲法除之得五寸加原上廣一尺共一尺五寸亦得原築墙上廣一尺下廣三尺高一丈二尺今欲築高一丈五尺開上廣若干荅曰上廣五寸法日置原下廣三尺减原上廣一尺餘二尺另以原高一丈二尺减今高一丈五尺餘三尺以乗二尺得六尺爲實以原高一丈二尺爲法除之得五寸以减原上廣一尺餘五寸爲今上廣合問築墙截下廣問今高歌卽是截去下節
