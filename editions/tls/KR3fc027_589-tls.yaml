  text: 新安賔渠程大位汝思甫編集曾孫素亭光紳佩章甫較正蘊齊鈔洪聲甫叅閎衰分章第三衰者等也物之混者求其等而分之以物之多寡求之出稅以人戶等第求之差徭以物價求貴賤高低者也衰分歌衰分法数步相平須要分教一分成將此一分爲之實以乘各數自均平法曰各列置衰排列所求等次之位副併共若干爲法以所分物總乘
