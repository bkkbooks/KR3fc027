body:
  text: 貼回銅錢六百文收布一十五半疋不知每疋賣幾何只言每疋長四十荅曰一貫二百文法日置布三百疋以稅二尺乘之得六百尺另以收布一十五疋半以疋法四十尺乘之得六百二十尺以减該稅六百尺餘得多稅二十尺爲法以貼回錢六百文爲實以法除之得每尺價三十文以乘每疋長四十尺得一貫二百文合問雞兎同籠因前九卷均輪章内巳有故不重述鹧鸪天三足閣魚六眼毚共同山下一深池九十三足亂浮水一
