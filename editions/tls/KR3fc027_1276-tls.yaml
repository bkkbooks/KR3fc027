body:
  text: 解題曰假如有粟米三石五斗換芝麻三石又如芝麻五斗五升換折小麥八斗今卻有小麥九石六斗要換粟米問該若干荅曰粟米七石七斗法曰合用異乗同乗法置今有小麥九石六斗以乗所問芝蔴五斗五升得五石二斗八升再以粟米三石五斗乗之得一十八石四斗八升爲實又用異除同除法置所換芝麻三石以乗小麥八斗得二石四斗爲法除之得粟米七石七斗合問解法曰置米三石五斗爲實以換麻三石為法除之得蔴毎石換米一石一斗有零又云蔴五斗五升換麥八斗置蔴五斗五升以毎石折米一石一斗併零乗之得米六斗四升併零爲實以換麥八斗爲法除
