body:
  text: 十一文乘之二数相减餘一萬四十五爲實仍以長法四十一除之得二百四十五爲短法列二位一位以七箇乘得梨数一位以四文乘得梨價合問求桃者求梨者以梨人價求之以桃價求之今有半羊一百隻共價一百六十八両只云中三隻價銀一十二両羊四隻價銀一両五錢問半羊併價各若干荅曰半三十六隻價銀一百四十四両半六十四隻價銀二十四両法日列置半三十二両羊箇一両五錢共一百隻共一百六十八一両先以上半貴價一十二両互乘賤物羊四隻得四十八両又以貴物半三互乘賤物羊價一両五錢得四両五錢以减四十八両餘
