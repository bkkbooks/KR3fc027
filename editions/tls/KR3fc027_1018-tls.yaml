body:
  text: 東西併折半南北亦如斯互乘爲實位深数再乘之今有田內開土挑泥填基東六丈五尺西七丈五尺南八丈北九丈深二尺問取泥該方数若干荅曰一百一十九方法曰置東六丈五尺併西七丈五尺共一十四丈折半得七丈又以南八丈併北九丈共十七丈折半得八丈五尺相乘得五十九丈五尺又以深二尺乘之得一百一十九方合問量水捆西江月捆有封書模樣捆法不一一名一封書一名方捆深濶各倍相乘如濶若干
