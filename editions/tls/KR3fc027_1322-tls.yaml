body:
  text: 中二十一得八十四以少减多餘六十六爲法復以左上三乗右下三得九分又以右上四乘左下三升九合得一十五分六厘减去九分餘六分六厘爲一節之差数却以下三節盛米三升九合爲實以法六十六乗之得二百五十七分四厘以三歸之得八十五分八厘是第二節数加六分六厘爲第一節数减六分六厘得七十九分二厘爲第三節数又减去六分六厘餘七十二分六厘爲第四節数毎節次第减六分六厘得各数以法六十六除之合問原法下頭三節貯四升米不尽者多今略爲三升九合却尽矣歌一萬六百八両銀四箇啇人依率分
