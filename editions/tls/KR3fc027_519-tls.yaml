body:
  text: 今有圓窖上周一十八尺下周二十四尺深一十二尺問積米若干荅曰一百七十七石六斗法曰置上周一十八尺自乘得三百二十四尺另置下周二十四尺自乘得五百七十六尺又以上周一十八尺乘下周二十四尺得四百三十二尺併三位共得一千三百三十二尺以深一十二尺乘之得一萬五千九百八十四尺用圓率三十六除之得四百四十四尺爲實以斛法除之合問今有船倉南頭靣廣六尺腰廣六尺五寸底廣五尺北頭靣廣七尺腰廣七尺五寸底廣六尺二尺四寸長北尺問積米若干
  hash: sha256:ae9196161a83eb3337ba2933c13bf17b1038a77b2d18fd67b82aca148c82fb8c
