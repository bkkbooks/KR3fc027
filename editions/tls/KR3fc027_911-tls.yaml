body:
  text: 三角截四角法日置每靣一十四歩六因七歸得中徑一十二歩另以每靣一十四歩與徑一十二歩相乗得一百六十八歩折半得積八十四歩爲實以三段歸之各得二十八歩却以每靣折半得濶七歩歸之得四歩倍之得中長八歩合問今有直田長一十五歩濶一十二歩今依濶截圭積四十直田截圭五歩問截圭長若干荅曰圭長七歩五分法日置截積倍之得九十歩爲實以濶一十二歩爲法除之卽得其餘圭積等截法俱用開放于左
