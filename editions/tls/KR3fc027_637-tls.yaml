body:
  text: 四因得若干又將一等戸数以五因得若干併五等数共得五百四十衰爲法除實得二石一斗是第五等一戸所出数以二因得四等一戸所出数以三因得三等一戸所出数以四因得二等一戸所出数以五因得一等一戸所出数各以戸数乘之合問自五等起遁加二石一斗至一等止今有米二百四十石令甲乙丙丁戊五人分要將甲乙二人数與丙丁戊三人数以同問各該若干荅曰甲六十四石乙五十六石丙四十八石丁四十石戊三十二石法曰置總米爲實列甲五乙四丙三丁二戊一又併甲五乙四得九
