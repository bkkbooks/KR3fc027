body:
  text: 荅曰四百八十石法曰置下周三十尺自乘得九百尺又以高一十二尺乘之得萬一零八百尺用內角率九除之得一千二百尺爲實以斛法除之合問今有倚壁外角堆米下周九十尺高十二尺問積米若干荅曰一千四百四十石法曰置下周九十尺自乘得八千一百尺又以高十二尺乘之得九萬七千二百尺用外角率二十七除之得三千六百尺爲實以斛法二尺五寸除之合問共平地尖堆倚壁堆內角外角堆古洪皆以量高而算
