body:
  text: 各人衰数得各人出納数也今有米三百八十五石五斗二升令二等人戶從上四六出之甲上等二十六戶乙下等四十戶問各戶各若干荅曰上等每戸七石三斗二升計一百九十石三斗二升下等每戸四石八斗二升計一百九十五石二斗法曰置米爲實另以上等二十六戸以六因得一百五十六衰又以下等四十戸以四因得一百六十衰二共併之得三百一十六衰爲法除實得一石二斗二升爲一差衰以六因得七石三斗二升是上等一戸出数另以一衰数以四因得四石八斗八升是下等一戸所出数各以戸数乘之合問
  hash: sha256:37e4899274d57f25550efa29b0be2e62e182088046d250b3253f2baa4467ebc1
