body:
  text: 織二十七日問織錦若干荅曰一千二百四十七丈四尺法曰置五十六人乘二十七日得一千五百一十二工再以日織八尺二寸五分乘之得一萬二千四百七十四尺合問異除同除法理假如今有客一十五人住一十二日共用米三石六斗問一客每日用米若干荅曰每日二升法曰置米三石六斗爲實另以一十五人乘一十二日得一百八十人爲法除實得二升合問
