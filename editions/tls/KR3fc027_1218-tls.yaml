body:
  text: 今有直田積一百二十步廣不及幾七步問廣若干荅曰廣八步法曰置田積一百二十步以四因之得四百八十以較七步自乘得四十九步相併得五百二十九步以開平方法除之得勾股和二十三步加較七步共得三十步折半得股長一十五步內減較七步餘廣八步今有井不知其淺井徑五尺直立木五尺於井上從木末望井底人目入徑四寸問井淺若干荅曰井淺五丈七尺五寸法曰以井徑五尺除目入四寸餘四十六寸與木高五十寸相乘得二千三百寸爲容方積以餘勾四寸爲法除之
  hash: sha256:e8ab9f056e96dacee5c07f570d3d20a26277b6c13412e814cd63eaa855a26c8a
