body:
  text: 猪六十七斤乘之得三千一百三十五斤六爲實另以原秤錘二十六両爲法除之得一二六乃一百二十斤實数六乃斤下虛数用加六法加得九両六錢是也原秤稱物八斤二両因失去錘今欲買錘配秤不知輕重另將別錘重二斤五両稱之原物只得六斤問原錘重若干荅曰原錘重一斤一両三錢法曰置後錘稱物六斤以加六法通之得九十六両以後錘三十七両乘之爲實另以原物八斤二両亦用加六通之得一百三十両爲法除之得二十七両三錢合問
  hash: sha256:d03bd096b605cad3c577cb0211bc3fa70d63fef3691e8c5d92ae60c934d28d6f
