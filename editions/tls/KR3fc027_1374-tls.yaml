body:
  text: 傑攺正法曰置耕犁地三分通爲七十二歩以四歸之得张矢田積一十八歩爲实另以此數倍之得三十六歩以平方開之得六歩爲法除实得矢三歩併法六歩共九歩爲弦折半得四歩半自乘得二十歩令三分五厘以矢三除之得六歩七分五厘加矢二共九歩七分五厘爲圓徑丙減二矢濶六歩餘三歩七分五厘爲池方合問予因二数不一故今將傑攺正圓徑九歩七分五厘較之具立圓形于左細宠以辨曲直其古法数準無疑惟每邉三歩約之得徑十二此句約者両无定法含糊說孤峯攺正减数目理甚不明位法曰存方池餘地取作上下二大弧矢兩邉二直又二小弧矢以每邉三歩爲矢求弦法置半徑四歩八分七厘五毫自乘得二十三歩七分六厘五毫另置半徑
  hash: sha256:a6d281cb3877aa31c26894e810c8e13f5186de12ce333fee4dd276e9286acd35
