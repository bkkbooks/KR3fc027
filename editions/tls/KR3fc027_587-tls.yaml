body:
  text: 織工絲四兩化爲二五乘之得十斤九三七五爲實另將織絹絲併織工絲共一斤二五爲法除之得八斤七五却將七五用加六法加之爲十二兩共八斤十二兩爲織工絲以减總絲餘爲織絹絲三十五斤每疋用絲一斤卽三十五疋合問一法置絲四十三斤十二兩以斤通兩共七百兩以織工絲四兩乘之得二千八百兩爲實以每疋絲一十六両加入織工絲四両共二十両爲法除之得織工絲一百四十兩通斤得八斤十二兩以减總絲餘得三十五斤每疋用一斤卽三十五疋合問新編直指筭法綂宗卷之四
