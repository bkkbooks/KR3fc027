body:
  text: 荅曰上等戶二千四百両下等戶六百両法日置總金列二位爲實一位以八因得上等戸所納之数一位以二因之得下等戸所納之数若令三等人戶作二八出之法日置總金爲實列丙二乙八甲三十二三共併得四十二衰爲法除實得若干爲一衰之数以爲法則以二衰因得若干爲丙出金之数又以八衰因得若干爲乙出金之数又以三十二衰乘之得若干爲甲出金之数合問若令四等人戸二八出納只加上第四衰一百二十八四共併
  hash: sha256:c04c1becb1ea559ad0246e711edf45bfa6b4fd778a7817742313a50129dd3789
