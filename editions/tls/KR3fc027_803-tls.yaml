body:
  text: 法曰置田積以四因得三千四百五十六歩另以相和六十歩自乘得三千六百歩却减去四因積三千四百五十六歩餘一百四十四歩乃相差自乘積用開平方法除之得長濶相差一十二歩合問長濶相和求差同前圖解曰其相和六十歩自乘積三千六百歩內有四因積四箇共三千四百五十六歩居邉有一箇相差自乘積一百四十四歩用開平方法除之得長濶相差十二歩今有直田積八百六十四歩只云長濶相和六十歩問長濶各若于荅曰長三十六歩濶二十四歩
