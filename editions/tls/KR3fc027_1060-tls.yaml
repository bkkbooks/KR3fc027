body:
  text: 餘一十一万一千一百五十步以圍兵二万三千四百爲法除之卽得今有粮三千六百石只云毎石則例令三處倉上納東倉二斗三升四合西倉三斗四升五合南倉四斗二升一合依則均開問各倉該米若干荅曰東倉八百四十二石四斗西倉一千二百四十二石南倉一千五百一十五石六斗法曰置總粮爲實以各倉則例数乘之合問今有夏稅麥二百七十四石三限催徵初限五分六月完中限三分半七月完末限一分半八月完問各限該徵
