body:
  text: 假如今有八五色五両六錢換九五色銀問該若干荅曰該九五色銀五両零一分零五毫法曰置銀五両六錢以八五乘之得日丙七錢六分爲實以九五爲法除之合問假如今有足色紋銀七両六錢五分傾出成色銀九両問色幾何荅曰八五色法曰置紋銀爲實以傾出色銀九両爲法歸之合問假如今有足色紋銀三十五両二錢欲傾八八色銀問用銅若干
