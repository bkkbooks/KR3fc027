body:
  text: 法曰置今付車主銀六両以原行道一千里乘之得六千里又以原重一千二百斤乘之得七千二百里爲實另以今重一千六百斤以原價七両五錢乘之得一十二両爲法除之合問今有道一千七百里車主巳支去銀七両六錢五分照前議毎一千里載重一千二百斤價七両五錢問該載重若干荅曰七百二十斤法曰置原重以原行道乘之仍得一千二百里又以今去銀七両六錢五分乘之得九両一錢八分爲實另置今行道以原與銀七両五錢乘之得一十二両七錢五分爲法除之卽得
  hash: sha256:4aed6b77995866f8e1ee3a67369496242d0154535922a26024f61866943ea860
