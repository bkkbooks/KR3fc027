body:
  text: 歌梭田共積一千二又零二十有四歩濶不及長三十二要見濶長多少数荅曰長六十八歩濶三十六歩法日倍積得二千四百四十八歩爲實以不及三十二歩爲縱方于右初商三十歩于左下法亦置三十加於縱方之上共六十二歩與左初商三十相呼三六除實一千八百又呼二三除六十餘五百八十八歩另以下法六十二加倍初商三十得九十二次商六歩于左下法亦置六歩加于縱方九十二之上共九十八歩皆與次商六歩相呼六九除五百四十又呼六八除四十八十盡得濶三十六歩加不及三十
