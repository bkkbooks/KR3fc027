body:
  text: 原有一夫日耘田七畆一夫日耕三畆一夫日種五畆今令一夫自耕自種問治田若干荅曰一畆四分七厘七十一分之六十三法曰以田爲分母夫爲分子以母互乗子列分母分子之位七畆三畆五畆一夫一夫一夫先以七畆乗三畆得二十一畆又以五畆乘之得一百令五畆爲實又以七畆乗三畆得二十一畆又以三畆乗五畆得一十五畆又以五畆乗七畆得三十五畆併之得七十一畆爲法除實得一畆四分七厘不盡六十三以法命之原有三女各納錦一方長女王日完中女七日完小女九日完今令三女共納錦一方何日可畢
  hash: sha256:5ef6a201259de17fc5b74a4e524c29c48924d37468435a305f4de1aca48f14f0
