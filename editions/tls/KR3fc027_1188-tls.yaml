body:
  text: 法曰置勾二十七步自乘得七百二十九步另以弦多股九步爲股較自乘得八十一歩二位相減餘六百四十八步爲實倍較九步得一十八步爲法除之得股長三十六步加較九步得弦長四十五步合問此是股較求股卽股弦相差一法名弦較求弦置勾自乘得七百二十九步爲實以弦較九步爲法除之得股弦和八十一步仍加弦較九步得九十步折半得弦長四十五步內減較九步得股長三十六步亦得今有葮二莖生池中竝根杪齊出水三尺引葮一莖斜去至岸九尺與水適平問水淺若干荅曰水淺一丈二尺
