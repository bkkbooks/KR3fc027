body:
  text: 荅曰米一石八斗布疋價米二斗法曰置盈適足以多四斗爲實另以九疋减七疋餘二疋爲法除實得疋價米二斗却以適足九疋乘之得總米一石八斗合問今述盈朒雙套釋義于左盈朒章盈不足両盈両不足盈適足不足適足三宗皆先賢立法正律格式自劉氏通明吳氏比類始增雙套者用分母子者皆存于後以便學者雙套法三宗五條布筭俱分左右二行各列上中下三位俱先以右上左上相乘若干爲乘人率通法以右上乘左中左上乘右中二数相减餘若干爲法除實物實之法三宗双套俱先如此雙套盈不足法先用前双套法次以右中得数乘左下左中得数乘右下三數相併
  hash: sha256:249fd6ece293b37a625f17aeb6a87e964eaa42d1e9b3372a4f10d2292f13ad34
