body:
  text: 数四十二互乘右下多三両得一百一十六得一百一十六再以右中得数三十六互乘左下多六両得二百一十六二数相减餘九十両爲物實以前法六除之得銀一十五両却以左下多六両右下多三両二数相减餘三両爲人實率先以前通法二十四乘之得七十二爲人實後仍以前法六除之得一十二人合問雙套兩不足法倣此今有買物毎三人出銀五両多十両毎五人出銀九両適足問人数物價各若干荅曰七十五人物價銀一百三十五両法曰雙套盈適足置右上五人左上三人互中出九両得二十七中出五両得二十五互下適足下盈十両先以左上三人右上五人相乘得十五爲乘人率通法次以左
  hash: sha256:d33c795dbcb2fa72cc0d64dd7e98f2120ab97de9699940eb8af1e2ed02fc1f44
