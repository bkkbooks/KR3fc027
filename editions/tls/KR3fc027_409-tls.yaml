body:
  text: 若依古法南邉依斜弦量比股多一歩五分二厘東邉依斜弦量比股多二分總合積多地二十七歩二分七厘今考較當以截法皆得其當以見前古法有差使學者易暁此理也但遇歪斜不等必有斜歩豈可作正歩相乗若截之庻無悞矣假如五不等田一坵截作二段量之四角斜長三十六歩徑上十五歩二分下十二歩八分三角長二十二歩徑一十二歩問積若干荅曰共積六百三十六歩法日先置四角二徑併得二十八歩折半得一十四歩以乗長三十六歩得積五百四歩又置三角長二十二歩以徑十二歩乗之折半得積一百三十二歩二共併得橫六百三十六步合問
