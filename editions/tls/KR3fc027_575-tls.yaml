body:
  text: 四尺爲法除之合問今有紗一十二疋二丈六尺每疋四丈二尺賣鈔二百六十五貫問每尺該鈔若干荅曰五百文法曰置鈔二百六十五貫爲實以紗一十二疋以疋法四丈二尺乘之加入零二丈六尺其得五百三十丈爲法除之合問今有銀二十六兩五錢買紗每疋長四丈二尺價銀五錢問該買紗若干荅曰五十三疋法曰置銀二十六兩五錢以乘每疋四丈二尺得一千一百一十三疋爲實以
