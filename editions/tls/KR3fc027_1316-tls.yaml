body:
  text: 荅曰甲該鈔一十二両二錢乙該一十一両五錢丙該一十両零八錢丁該一十両零一錢戊該九両四錢巳該八両七錢庚該八両法曰置戊巳庚三人添一爲四以三乗之得十二折半得六减去三餘三爲下差率另以甲乙二人乗總七人得十四减去下差率三餘得十一爲上差率列置戊巳庚三甲乙二互餘三餘十一得六得三十三二十六両一錢二十三両七錢得五十二両二錢得七十一両一錢先以左上二互乗右中三得六又以左上二乗右下二十六両一錢得五十二両二錢次以右上三乗左中十一得三十三以减去
