body:
  text: 得二十四石併二数共四十九石以减總米餘二百一十六石爲實併三等戸数共一百八十爲法除實得一石二斗是下等一戸所出数加五斗得一石七斗是中等一戸所出数又加七斗得二石四斗是上等一戸所出数各以戸数乘之合問帶分母子差分今有馬軍七人給褲布四十八尺步軍六人給襖布九十二尺今共給布一十二萬五千八百二十尺問各若干答曰馬軍各五千六百七十人襖布八萬六千九百四十尺褲布三萬八千八百八十尺
