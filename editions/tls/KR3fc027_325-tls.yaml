body:
  text: 荅曰二百一十両法日置每疋價四両以分母三両因之得一十二両加入分子二両共得一十四両以乘總叚四十五得六百三十両爲實以分母三両爲法除之合問假如今有豆九石六斗六分斗之四每石價銀二錢三分錢之一問該銀若干荅曰二両二錢五分九分錢之五法日先置每石價二錢以三因之得六加納子之一共得七錢另置豆九石六斗以六因之得五七六加納子之四共得五十八以七錢因之得四十両零六錢爲實却以分母六分三分因之得
  hash: sha256:2dbb34d4974660e5f541b54ee7d67275a9ca5855f5eed676e2d9a35b0f325aee
