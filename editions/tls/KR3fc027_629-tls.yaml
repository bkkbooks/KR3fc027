body:
  text: 日又倍增織成絹六丈七尺五寸問各日織若干荅曰初日織四尺五寸次日織九尺第三日織一丈八尺第四日織三丈六尺法日置絹爲實列一二四八併得十五爲法除實得初日織四尺五十倍之得次日数再倍得第三日数又倍得第四日数合問逓减挨次差分法日置所分物者挨次爲衰各列置衰三位者一二三併得六四位者一二三四併得十五位者一二三四五併得十五六位者一二三四五六併得二十一各副併爲法除實
