  text: 荅曰一十四石八斗四升法日置正米爲實以耗米七升爲法因之卽得今有耗米一十四石八斗四升每石耗米七升問諛正米若干荅曰二百一十二石法日置總耗米爲實以每石耗米七升爲法除之卽得今有官粮二十七百六十五石九斗五升每正米一石帶耗米七升問正米耗米各若干荅曰正米二千五百八十五石耗米一百八十石零九斗五升
