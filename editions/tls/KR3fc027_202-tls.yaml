body:
  text: 實尾八錢逢九進三十本位除去進三千左定位五両三一三十一变一爲三在加一逢六淮二十本位去六進二于左両讀上是両遇両卽止前一位得令是石也六斗三十三二六十二变二爲六右加二逢三進一十本位去三進一于左十是石也向前逆陞合得八石實首八百三二六十二变二爲六右位加二起逢六進二十本位去六進二于左百起呼百往後順數至両七十合得二百還原用三因三六一十八三八二十四三七二十一二三如六假如今有苧麻七百三十五斤每四苧斤賣銀一錢問該銀若干
