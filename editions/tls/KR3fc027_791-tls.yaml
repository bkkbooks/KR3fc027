body:
  text: 法曰此是九箇周中包一置三稜物九十一箇减去中心一箇餘九十箇以十八乗之得一千六百二十箇爲實以九爲縱列于右用帶縱開平方法除之初商三十于左下法亦置三十于右縱九之上共三十九左右相呼三三除實九百又呼三九除實二百七十餘實四百五十另以下法初商三十倍作六十不倍縱共六十九次商六十于左初商三十之次下法亦置六于倍方之次共七十五以左六對右七呼六七除實四百二十又左六對右五呼五六除實三十恰盡合問
  hash: sha256:d30ca09145f264164e5653d3db78e086c8a930f965cd42ce42f9a1001902219d
