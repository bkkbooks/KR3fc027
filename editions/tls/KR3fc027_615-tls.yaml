body:
  text: 二八差分法日各以二爲首用四因以求各衰首位二以四因得八衰又四因得三十二衰又四因得一百二十八衰又四因得五百一十二衰如位数多者各以四因以生各衰一法以首爲二用二歸入因以求各衰不如四因㨗徑二位者二八併得十三位者二八三十二三共併得四十二四位者二八三十二一百二十八四共併得一百七十五位者二八三十二一百二十八五百一十二五共併得六百八十二衰爲法除實得一分衰数以乘各衰今有金三千両令二等人戶二八納之問各該若干
  hash: sha256:ba254dc180af8d0a02b40c94ff441af10aad893ef791620dcffeb00103358395
