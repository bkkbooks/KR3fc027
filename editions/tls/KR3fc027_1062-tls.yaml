body:
  text: 若干荅曰初限一百三十七石中限九十五石九斗末限四十一石一斗法曰列置麥数三位一位以五分乘爲初限数二位以三分半乘爲中限数三位以一分半乘爲末限数合問今有鶏兔同籠上有三十五頭下有九十四足問鶏兔各若干荅曰雞二十三隻兔一十二隻法曰置總頭倍之得七十于總足內减七十餘二十四折半得一十二是免以四足乘之得四十八足于總足减之餘四十六足爲鶏
