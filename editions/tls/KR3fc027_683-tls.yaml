body:
  text: 差分貴賤法尤精高價先乘共物情却用都錢减今数餘畱爲實甚分明别將二價也相减用此餘銭爲法行除了先爲低物價自餘高價物方成今有米麥五百石共價銀四百零五両七錢只云米每石價八錢六五麥每石價七錢二分五厘問米麥各若开荅曰米三百二十石價銀二百七十五両二錢麥一百八十石價銀一百三十両零五錢法曰置米麥五百石以米價八錢六分乘之得四百三十商减去共價餘二十四両三錢爲實以米價内减麥價餘一錢三分五厘爲法
  hash: sha256:d8087c5964ed3a5cd0b0ac032cff7f2bedbd4f60edd7b8a66333f76b74189564
