  text: 下三箇五錢又起了一疋又挨身下二錢五分次於五十疋內起二箇二十疋挨身下二箇五両又起了一十疋挨身下二両五錢該得一十四両二錢五分合問前法價是分倍爲錢則倍数挨身下原数隔位下此法價是錢倍亦是錢則倍数原数俱挨身下餘倣此九歸併除歌加雙下除倍加一下除原倍一挨身除餘皆隔位遷假如有錢二千二百五十文給軍九十名問每名該若干荅曰每名二十五文
