body:
  text: 原有直田一坵今從東北角截勾股形積三十八歩七分二厘股與勾数相同問該若干荅曰東北各八歩八分法日置截積三十八歩七分二厘倍得七十七歩四分四厘爲實以開平方法除之得積截東北各八歩八分合問若還原以勾股自乘折半卽得梯田截積歌梯斜截勾股具截十五卷梯田截積細端詳倍積濶差乘最良却用原長爲法則歸除乘数實之行若截大頭田積歩大濶自乘减實當
