body:
  text: 九因凢二至九單位者用此置物爲實以價爲法呼九九合數言十就身言如隔位從末位筭起用九歸還原因法歌曰合數九因須記熟起手先從末位推言十就身如隔位若要還原用九歸歸因總歌歸從頭上起因從足下生逄如湏隔位言十在本身假如今有銀一百二十三両四錢每銀一両糴米二石問
