body:
  text: 今有銀一百二十一兩一千七分五厘糴米麥豆議要米一分麥二分豆三分其米每斗九分二厘麥每斗八分五厘豆每斗三分六厘問三色併價各若干荅曰米三十二石七斗五升價三十兩零一錢三分麥六十五石五斗價五十五兩六錢七分五厘豆九十八石二斗五升價三十五兩三錢七分法曰置總銀爲實另置麥價以二因之得一錢七分又置豆價以三因得一錢零八厘米價九分二厘併三價得三錢七分爲法除實得米数二因得麥数三因得豆数各以原價乘之得各價合問又法先得米数倍之得麥数加五卽豆数
