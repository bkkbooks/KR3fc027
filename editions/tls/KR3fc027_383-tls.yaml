body:
  text: 假如直田長六十歩濶三十二歩問積税各若干荅曰積一千九百二十歩稅八畆法日置長六十歩以濶三十二歩乗之得積一千九百二十歩爲實以畆法二四除之合問假如圓田徑五十六歩周一百六十八歩問積若干荅曰二千三百五十二歩法曰以徑問積置徑五十六歩自乘得三千一百三十六歩又以七五乘之得積二千三百五十二歩若周徑問積置周一百六十八歩以徑五十六歩乗之再以四歸之亦得若周問積以周自乘用十二除之亦得合問
  hash: sha256:02661b22d0ae0964e7f65a3278e1ed3603982f5d70ab15fda866e2a58347b1b9
