body:
  text: 中寶卽商總也併率如一二三四五併得十五數也得令斤両貫箇石等類也得術乃法首位每下該得之名互乗如四處數目上下斜角相乗相減如二數以少減多餘日較合得筭數定奪維乗四處顛倒相乗若干一爲數始十爲數終未筭難定幾何與若干相同數附暗馬式一二三四五六七八九右大圈九字配合相生而成法也大圈之下小圈乃暗子馬數惟一二三不拘橫直但位數配合得宜不亂爲式假如十一數作二十二作三十三作四十四作五十七作六十九作餘倣此大數
