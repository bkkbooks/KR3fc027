body:
  text: 五等分金歌公侯伯子男五四三二一假有金五秤依率要分訖荅曰公一秤十斤侯一秤五斤伯一秤子一十斤男五斤法曰置金五秤以毎秤一十五斤乗得七十五斤爲實列公五侯四伯三男一子二副併得一十五爲法除實得五斤爲男所得数加五得十斤為子所得数再加五得一秤爲伯所得数又加五得一秤令五斤爲侯所得数再加五得一秤一十斤爲公所得数合問
