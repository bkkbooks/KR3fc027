body:
  text: 却以六十三用三歸七因得一百四十七爲乙衰却以一百四十七用三歸七因得三百四十三爲甲衰併得五百八十五位者首位三以三因又三因再三因得八十一爲戊衰却以戊衰用三歸七因得二百八十九爲丁衰却以丁衰用三歸七因得四百四十一爲丙衰却以丙衰用三歸七因得一千零二十九爲乙衰却以乙衰用三歸七因得二千四百零一爲甲衰併得四千一百四十一各以副併爲法除實得一衰数以乘各衰如位数多者皆以三因首位用三歸七因以求下位衰数今有金三千両令休績二縣金行鋪戶三七上納問各該
