body:
  text: 四九三十六一四如四八九七十二一八如八六九五十四一六如六假如今有銀二十六兩六錢買猪二十八隻問每隻該銀若干荅日九錢五分法日置銀爲實以猪二十八隻爲法除之合問法酋八隻除二十歸定位法實首位十数皆同實尾六錢五八除四十恰尽六両二一添作五本位加四爲五八九除七十二本位去七右位去二定位五分實首二十見二無除作九二変二爲九右位加二原实十法首是十過十卽止合前位得合是兩也得九錢
