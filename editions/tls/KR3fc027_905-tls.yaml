body:
  text: 圭求廣縱歌除圭尖卽是梯而言之梯求上廣出尖長上廣乘縱法最良却將上下廣相减餘法除之免恩量今有上圭下梯上廣一尺六寸下廣一十二尺八寸圭下正縱一十尺零五寸問圭尖長若干荅曰尖高長一尺五寸圭求廣縱法日置正縱一十尺令五寸以上廣一尺六寸乘之得一十六尺八寸爲實另以下廣一十二尺八寸减上廣一尺六寸除一十一尺二寸爲法除之得圭尖長一尺五寸合問圭求下廣歌
  hash: sha256:a9dd0d154efd6aa8d9489094e4cd84597d50e641f775e61af5e01e98b0aec4d4
