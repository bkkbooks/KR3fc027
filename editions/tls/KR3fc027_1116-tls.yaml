body:
  text: 四両合問取錢買物仍適足歌取錢買物仍適足子互乘母自相通却以盈錢爲物實减率畱餘作法宗取錢適足乘盈数乘子除爲錢實宮如法除之錢可見不足適足術相同假有銅錢不知数欲買木一根取錢二分之一買之盈錢四文取錢七分之三買之適足問錢数木價各若干荅曰總錢五十六文木價二十四文法曰先以之一互乘七分得七次以之三互乘二分得六以
