body:
  text: 法曰置紋銀一十二両以入色歸之得一十五両减去原銀一十二両餘入銅三両合問歌一斤半塩換斤油五萬白塩載一舟斤両內除相爲換須教二色一般籌荅曰各二萬斤法曰置總塩五萬斤爲實併塩油共得二斤半爲法除之得各二萬斤合問鋪金問積歌皇城內丹墀中周圍有八裡鋪金二寸湥方寸十六両秤
