body:
  text: 法日依方窖法以上方六尺自乗得三十六尺下方八尺自乗得六十四尺又以上方乗下方得四十八尺併三数共一百四十八尺以高一十二尺乗之得一千七百七十六尺以三歸之合問一法依築臺歌倍上方加下方共二十尺以上方乗之得一百二十尺另倍下方加上方共二十二尺以下方乗之得一百七十六尺併二数共二百九十六尺以高一十二尺乗之得三千五百五十二尺以六歸之亦得今有圓臺上周一十八尺下周二十四尺高一十二尺問積若干荅曰四百四十四尺
  hash: sha256:8dec2f6c976245027be671ce5c8ca8d3606c60b8c2e5e7054047e5a2635815df
