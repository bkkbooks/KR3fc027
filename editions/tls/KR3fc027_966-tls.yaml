body:
  text: 今有開濠上廣七尺下廣九尺深四尺長一千八百尺每人曰穿一百四十四尺今用人夫二百名問幾日畢荅曰二日開畢法日併上下廣折半得八尺以深四尺乗之得三十二尺又以長乗之得五萬七千六百尺爲實另置二百人以每人一百四十四尺乗之得二萬八千八百尺爲法除之合問築臺歌築臺丈尺要推詳上長倍之加下長上廣乗之别列位另倍下長加上長仍以下廣乗見数二数共併積相當
