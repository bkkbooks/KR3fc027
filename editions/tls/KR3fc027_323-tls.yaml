body:
  text: 歸之合得假如今有羅九十疋疋之六每疋價二両五錢問該銀若干荅曰一百六十六両六錢三分錢之二法日置每疋價二両五錢以分子六因之得一百五十両以分母九爲法歸之合問餘不尽之数仍以約分法命之假如今有米六分石之二每斗價四分錢之三問該銀若干荅曰二錢五分法日置分子石之二錢之三因之得六両爲實以分母六分四分相乘得二十四両爲法除之得二錢五分合問假如今有叚四十五疋價四両三分両之二問該銀若干
