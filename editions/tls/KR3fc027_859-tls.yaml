body:
  text: 高二百五十尺法日置積一千七百八十七萬五千尺爲實以開立方待縱法除之初商約得二百尺自乘得四萬尺再乘得八百萬尺又約二百五十尺自乘得六萬二千五百尺再以二百五十尺乘之得一千五百六十二萬五千尺减去積餘積二百二十五萬尺爲實另置長多三十六尺以所商二百五十尺乘之得九十尺再以二百五十尺乘之得二百二十五萬尺除實恰盡得濶二百五十尺加入長多三十六尺共二百八十六尺爲長数合問今有立方積二萬九千八百零八尺高比方不及一丈三尺問高方各若干
  hash: sha256:6b6fbf9cab9823706f46215e056b8e3eb366cf304a0aecd1c6ea295f5cccee17
