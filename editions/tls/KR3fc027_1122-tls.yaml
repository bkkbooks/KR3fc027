  text: 新安賓渠程大位汝思甫编集曾孙素亭光紳佩章甫較正蘊齊鈁洪聲甫沗閲方程第八章方正也程数也以諸物總併爲問去繁就簡爲主乃諸物繁冗諸價錯雜必須布置行列或損益加減同異正負逓互遍乘示其有等以少減多餘物爲法餘價爲實法實相除得一價以推其餘若繁雜甚者次第求之正者正数負者欠数二色方程歌世人欲要識方程物價俱將左右陳
