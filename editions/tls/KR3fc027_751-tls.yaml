body:
  text: 数爲長若要還原以所商得濶若干爲實另以所得商数加上縱多共或减不及餘若干乘之見積今有田積一千七百五十歩只云長比濶多一十五歩問長濶各若干荅曰長五十歩濶三十五歩法日置積爲實以多一十五歩爲縱列于下位以带縱開平方法除之初商三十于左位下法亦置三十加于縱上共得四十五歩與上商相呼左三對右四呼三四除實一千二百又左三對右五呼三五除實一百五十另以下法初商三十倍六十加縱多十五共得七十五次商五于左位
