body:
  text: 二十世爲實却以毎世三十年爲法乘之得一元共該一十二萬九千六百年合問今有周天三百六十五度四分度之一毎度經地二千九百二十里零二十歩問該里若干出望斗眞經註荅曰一百零六萬六千五百五十里零一百零五歩法曰置二千九百二十里以里法三百六十歩通之加零二十歩共得一百零五萬一千二百二十歩以四而一得二十六萬二千八百零五歩爲法另置三百六十五度以四通之加入分予之一共得一千四百六十一度爲實以法乘之得三億八千三百九十五萬八千一百零五歩却以里法三百六十歩除之合問
  hash: sha256:3b20f66fef6ebb9fdb975b1f179a37d9a18d8e568afd25282b2aab9c037db02e
