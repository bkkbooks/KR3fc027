body:
  text: 今有銀一千二百三十三両買綾四十五疋問每疋若干荅曰二両七錢四分法曰依前式置銀爲實以綾四十五疋爲法除之合問四五除二十本位去二恰尽逢八進二十本位十去八疋二進二于前位二上作四分四一二十二本位一增一作二更于下位八上增二作十五七除三十五本位五去四存一更于下位三上增五作八四三七十二本位三增四作七更于下位三上增二作五二五除一十本位四去一存三四一二十二本位一增一作二更于下位二百上增二作四
