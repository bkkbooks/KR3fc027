body:
  text: 平方带縱法爲奇下位先安縱歩基上商得数加縱内縱方下法併爲題上下相呼除實畢倍方不倍縱開餘餘数續商方再倍何愁此術不能知法日如有田積若干只云濶不及長若干問濶者置田積若干爲實以不及若干爲縱列于下法以带縱開平方法除之實商初商得若干下法亦置初商若干于縱内共得若干皆與上商相呼除實若干餘實若干另以下法初商若干倍之倍方不倍縱次商若干于左初商之次下法亦置次商若干于倍方之次共若干皆與次商相呼除實盡得濶数加不及
