body:
  text: 五分加原本一両本利共一両一錢五分爲法除實得除本銀七両八錢二分六厘又以通利一錢五分乘之得利銀一両一錢七分四厘本利共合九両之数另將原本一十五両除還原本七両八錢二分六厘餘者仍存数也異乘同除此法雖易知之術其意至奧或人用先除後乘之法若除之不盡將何以乘之乎此異乘同除實爲通變之法也歌日異乘同除法何如物賣錢來作例推
