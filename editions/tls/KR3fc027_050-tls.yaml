body:
  text: 算學統宗序夫算非小枝也有熊氏命隸首創焉周官則置保氏教國子以六藝而數居其一唯是數以俟夫算算以成夫數固二而一者也籍令算為小技何古先哲王用意勤如是哉廼令隸首遠兲保氏之職廢精其理者代不數人程汝思氏悵然有恫於裏爰輯算學統宗十七卷
