body:
  text: 及價各若干荅曰銖二十三萬四百銖毎銖三毫二絲五忽五分三萬八千四百分毎分一厘九毫五絲三忽一二五雨九千六百両毎両七厘八毫一絲二忽五裏三百裏毎裏二錢五分秤四十秤毎秤一両八錢七分五厘鈞二十鈞又日砠毎鈞三両七錢五分石五石又日馱毎石一十五両引三引每引二十五両法曰置椒六百斤爲實以歸之得三百裏就以七五除之
