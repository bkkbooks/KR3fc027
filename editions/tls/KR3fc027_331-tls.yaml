body:
  text: 貞該利二十五両法日置利銀七十両爲實以四人共本一百四十両爲法除之得五錢爲每両之利就以此爲法以乘各人原本合問假如今有甲乙丙三人合夥同商因各人本銀不齊前後付出甲于正月付出本七十両乙于四月付出本八十両丙于七月付出本九十両三人共本二百四十両至年終得利七十両問各該利銀若干荅曰甲該利二十八両乙該利二十四両丙該利一十八両
