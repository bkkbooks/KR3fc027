body:
  text: 竿上安篐歌圓圓三丈一高竿稍尖頭徑尺二毫今有鐵篐徑九寸試問將來何處安荅曰自上而下二丈二尺五寸法曰置竿高三丈爲實以頭徑一尺二寸爲法除之得二尺五寸以篐徑九寸乘之得自上而下二丈二尺五寸上安篐只離頭七尺五寸合問此如方錐作方問截高歌今有直田不知畆長濶相和十七步平不及長廿五尺請問田該多少數
