body:
  text: 離徑自乘併爲實開方倍数爲圓徑法日置弦二十四歩折半得一十二歩自乗得一百四十四歩以離徑五歩自乘得二十五歩相併得一百六十九歩爲實以開平方法除之得一十三歩倍之得二十六歩爲圓徑圓徑及離徑求弧弦歌圓徑離徑求弧弦圓徑折半自相乘離徑自乗减餘實開方倍得弧弦成法日置圓徑二十六歩折半得一十三歩自乗得一百六十九歩以離徑五歩自乘得二十五歩相减餘一百四十四歩爲實以開平方法除之得一十二歩倍之得弧弦二十四歩
