body:
  text: 今有勾二十七尺股三十六尺問弦斜若干荅曰弦斜四十五尺法曰置勾二十七尺自乘得七百二十九尺另以股三十六尺自乘得一千二百九十六尺二數併之得二千令二十五尺爲實乃和弦自乘數以開平方法除之初商四十於左亦置四十於右爲方法左四對右四呼四四除實一千六百尺餘實四百二十五尺卻以下位初商方法四十倍作八十爲廉法次商五尺於左位初商四十之次亦置五于右位廉法八十之次爲隅法左五對右八呼五八除實四百又左五對右五呼五五除實二十五尺恰盡得弦斜四十五尺今有勾二十七尺弦四十五尺問股長若干
  hash: sha256:77d518874bd02e588fc8a72a9406856245d5a174d85520327f217f95bc5ba6f8
