body:
  text: 僧分饅頭歌一百饅頭一百僧大和三箇更無争小和三人分一箇大小和尚得幾丁荅曰大和尚二十五人該饅頭七十五箇小和尚七十五人該饅頭二十五箇法曰置僧一百名爲實以三个一个併得四个爲法除之得大僧二十五人以每人三个因之得饅頭七十五个於總僧內減大僧餘七十五爲小僧以三人歸之得饅頭二十五个合問歌一千官軍一千布一官四疋無零数
