body:
  text: 毎靣方有二尺以毎靣計小囤二箇共諛四小囤故以二蓆自乘得四却以一小囤米数乘之是也餘倣此凢蓆皆相等取一領較之不同盛幾石幾斗就以此爲法各處盬塲散堆量算引法歌毎方一尺積塩四十斤長濶相乘共一遭巳乘之数又乘高毎方四十乘斤總三百斤歸卽引包今有盬一堆長一丈五尺濶一丈二尺高六尺五寸問該斤引各若干荅曰四萬六千八百斤一百五十六引
