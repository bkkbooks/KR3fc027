body:
  text: 生率之玅今畧具五乘方圖式可爲求廉率之梯堦又考其平方形如方田以平方面自乘得平方積数是一乘方其立方形如骰子様以平方面自乘得平方積再以高方靣乘之得立方積数是二乘方其三乘方以平方面自乘得平方積数再以高方面乘得立方積数又以方面乘得三乘方積数故日三乘方其形不知如何模様只是取数而已或至十乘方三十餘乘方皆是先賢取生率之玅以明開方正律亦不可廢
