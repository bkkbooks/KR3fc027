body:
  text: 梨一千七百一十五箇該錢九百八十文法日列置九箇十一文七箇四文五千箇四千九百九十五文先以上十一互乘中七箇得七十七箇又以四文乘九箇得三十六箇以少减多餘四十爲長法若求桃数價者以中下互乘置總錢以七箇乘得三萬門千九百六十五箇另置總菓以四文乘得之二萬以减三萬四千九百六十五箇餘一萬四千九百六十五箇爲實以長法四十一除之得三百六十五箇爲短去列二位一位九箇乘得桃三千二百八十五箇一位以十一文乘得桃價四千零一十五文於總内减桃数餘者卽梨總價也若求梨数價者却置總錢以九箇乘之又置總菓以
