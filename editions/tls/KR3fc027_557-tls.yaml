body:
  text: 今有綿花一百五十七斤半毎花八斤十二両換布一疋問該布若干荅曰一十八疋法曰置花一百五十七斤半爲實以八斤十二両先將十二化作七五共八斤七五爲法除之卽得今有猪一口因無大秤以小秤稱之不及原秤錘重一斤十両又加秤錘一斤四両八錢稱得六十七斤問該公道正数若干荅曰實重一百二十斤九両六錢法曰置原秤錘二十六両又加錘二十両八錢共四十六両八錢以共稱
