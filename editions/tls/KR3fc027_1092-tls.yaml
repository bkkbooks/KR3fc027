body:
  text: 人数若干却以盈適足数乘之得物数此捷徑今有人買物毎人出銀二両五錢盈六両毎人出二両三錢適足問人数物價各若干荅曰三十人物價銀六十九両法曰置盈適足列出二両五錢出二両三錢互乘盈六両適足只以盈六両互乘出二両三錢得一十三両八錢爲物實另以盈六両爲人實却以出二両五錢减出二両三錢餘二錢爲法除物實得物價除人實得人数合問一法以盈六両爲人實另以出率相减餘二錢爲法除人實得三十人却以二両三錢乘之得物價亦得
