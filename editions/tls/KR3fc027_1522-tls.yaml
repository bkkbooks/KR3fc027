body:
  text: 該價若干荅曰二両七錢四分法曰置銀于左列爲四行以綾四十五疋于右爲法除之四一二十二二五除一十四三七十二五七除三十五四一二十二逢八進二十四五除二十尽此亦總呼之法後分四行而用三両加前五作加前二共十逢八進二于前位仔四五除二恰尽十加前二作五七除三十五去四存下位加五又四二十下位二加二又加後進二作四分二百加前二作二五除一十存四三七十下位二加二錢千四二十下位合二加二得二両
