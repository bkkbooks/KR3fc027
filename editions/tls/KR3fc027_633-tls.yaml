body:
  text: 除實得九両二錢爲四子所得数自下而上各加九両二錢合問今有金八両一錢欲挨次造套鍾五箇問各重若干荅曰大號二両七錢二號二両一錢六分三號一両六錢二分四號一両零八分五號五錢四分㳒曰置金爲實以五四三二一副併得一十五衰爲法除實得五錢四分爲五號鍾重数自下而上各加五錢四分合問若造禮樂射御書数六號杯置總金爲實以六五四三二一副併得二十一衰爲法除實得数字杯重若干自下而上各加数字號杯重若干合問
