  text: 圭求中廣数圭求中廣要思量却用下廣乘尖長正縱加入尖長数爲法除之中廣長法日置下廣一十二尺八寸以尖長一尺五寸乗之得一十九尺二寸爲實另以正縱一十尺令五寸加入尖長一尺五寸共一十二尺爲法除之得中廣一尺六寸合問假如三角田一坵三靣各一十四歩今作三段俱要四角問長濶各若干荅曰共積八十四歩三角各得二十八歩每各計長八歩濶七歩
