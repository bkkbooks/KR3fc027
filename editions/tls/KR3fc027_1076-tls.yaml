body:
  text: 法曰置盈不足併盈三文不足四文共七文爲人實以出八文減出七文餘一文爲法除人實得七人却以出八文乘之数得五十六文內减盈三文餘五十三文是物價或置七人以出率七文乘之得四十九文內增不足四文亦得物價合問此因前併盈朒爲人实者是買物也仍前得人数却以出率乘之內减盈三文卽得物價凢買物者倣此今有人分絹只云毎人分八疋盈一十五疋毎人分九疋不足五疋問人絹各若干荅曰二十人絹一百七十五疋法曰置盈不足分八疋分九疋互乘不足五疋盈十五疋先以分八疋互乘不足五疋得四十疋次以分九疋互乘盈十五得一百三十五疋併二位
  hash: sha256:aef36b47d08f30878da19d35587f745b40600f3c1f1816bc5640e5dc649531cb
