body:
  text: 荅曰上等每戶一石二斗共三十石中等每戶七斗二升共二十八石八斗下等每戶二斗四升共一十四石四斗法曰置總米爲實另置上等二十五戸五因得一百二十五中等四十戸三因得一百二十下等六十戸得六十三共併得三百零五爲法除之得二斗四升是下等一戸所出之数三因得七斗二升是中等一戸所出数五因得一石二斗是上等一戸所出数各以戶数乘之得各等共数合問今有軍二萬五千二百名共支來麥豆三色只云四人支米三石七人支豆八石九人支麥五石問各該若干
