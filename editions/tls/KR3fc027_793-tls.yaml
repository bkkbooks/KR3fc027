body:
  text: 今有三稜物外周三十六箇問總積若干荅曰九十一箇法曰置外周三十六于左亦置三十六于右加內周九共四十五相乘得一千六百二十爲實以東法十八除之得九十加中心一合問凢三稜物乃是九箇周中包一以九歸外周卽知層数也自丙之外每層加九自外之內每層减九假如方箇積六十四根問外周若干荅曰外周二十八根法曰此是雙層者只以方箭積爲實以開平方法除之得一
