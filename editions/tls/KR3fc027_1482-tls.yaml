body:
  text: 一十八歩八分以畆法二四除之合問南北均濶一十二歩卽六丈也歌八尺爲股六尺勾內容圓徑怎生求有人識得如斯妙筭舉方爲第一籌荅曰內容圓徑四尺法曰置勾六尺以八尺相乘得四十八尺倍之得九十六尺爲實另以勾六尺自乘得三十六尺以股八尺自乘得六十四尺相併得一百尺以開平方法除之得弦一十尺加勾六尺股八尺共二十四尺爲法除實得內容圓徑四尺合問歌
