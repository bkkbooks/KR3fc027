body:
  text: 里爲法除之合問原雇車一輛議行道一千里載重一千二百斤與銀七両五錢今重一千五百斤行一千三百問該銀若干荅曰一十二兩一錢八分七厘五毫法曰置今重一千五百斤以今行一千三百里乘之得一千九百五十里又以銀七両五錢乘之得一十四両六錢二分五厘爲實以原重一千二百斤乘原行一千里爲法除之合問今有貨重一千六百斤先付車主銀六両照前議行道一千里載重一千二百斤價七両五錢問該行道若干荅曰六百里
