  text: 新安賔渠程大位汝思甫編集會孫素亭光紳佩章甫較正蘊齋鈁洪聲甫叅閱均輸第六章均平也輸送也此章以戶数多寡道里遠近而求車数粟数以粟数高下而求僦直以錢数多少而求傭錢歌曰均輸只要一般般不許虧民及損官勞費程途知遠近分毫依法要詳端行道駕船皆一體負桃車載重輕看今有銀二十二両八錢買黃白蟾各要均平共黃臘毎三
