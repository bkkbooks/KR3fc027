body:
  text: 法日置正耗粮爲實以耗米七升倂正米一石共一石零七升爲法除之得正米二千五百八十五石爲實以耗七升因之得耗米合問若要見正耗共米隔位加七卽得盤量倉窖歌方倉長用濶相乘惟有圓倉周自行各再以高乘見積圍圓十二一中分尖堆法用三十六倚壁須分十八停内角聚時如九一外角三九甚分明若還方窑兼圓窖上下周方各自乘乘了另將上乘下併三爲一再乘深
