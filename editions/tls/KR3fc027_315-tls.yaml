body:
  text: 荅曰八分箇之七卽是八隻鴨生七箇子也法日列子母数更相减損置母七十二减去子六十三仍餘母九反將子六十三内减去六箇餘母九子亦餘九相同就以九爲法除原母七十二得八箇九又以法九除原子六十三得七箇故命之曰八分之七也乘分假如今有一百九十人支銀一両十九分両之一問該銀若干荅曰二百両法日置銀一両以分母十九通之加分子一共得二十又以
