body:
  text: 七退九八退八九退七十退六十一退五十二退四十三退三十四退二十五退一共十六成斤進一于斤位位嘗見筭者遇斤下帶両用法各不相同有將両数化爲一二五者又有將両隔位疊数而除十六加斤者俱不合式難兼歸除甚非意也予觀筭盤梁之上二子爲十梁之下五子共有十五両論一斤該數十六而欠一両故曰一退十五以成一斤之数此法極敏捷餘皆倣此但貨物用秤者不拘法實斤下有両数切不可隔位
