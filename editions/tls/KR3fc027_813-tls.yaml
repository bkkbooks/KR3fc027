body:
  text: 法除之初商一十于左下法亦置一十于縱方之上共一十四皆與上商一十相呼除實一百四十歩餘實五十二歩却以下法初商一十倍作二十併入縱四歩共二十四歩次商二歩于左初商一十之次下法亦置二歩于縱方之次共二十六歩皆與次商二歩相呼除實恰盡得小方面一十二歩加四歩得大方面一十六歩各以方面自乘得各積合問解曰共積是一段大方積一段小方積其大方積內有一段小方積一段大多小方自乘積如隅又大多小的両段長濶積如廉每廉長卽小方靣数濶卽大多小数先用大多小方歩数自乘得数以减共積者是减去大方田一段
  hash: sha256:cb0f9e03025806df7b4cd147bad8c78b40f1aa4c60f92ec0f2c45938ae720bf1
