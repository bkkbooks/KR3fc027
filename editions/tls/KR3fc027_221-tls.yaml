body:
  text: 三四五來乗遍了却將本位破其身用畱頭乗法若依盤式小九数位次先後不一難以挨次今將暗馬数以別先後庻不亂矣暗馬式已附一卷大數前假如今有布四百二十五疋每疋價銀二錢五分問共該銀若干荅日一百零六両二錢五分法日置布爲實以每疋價銀二錢五分爲法乗之合問定位法只認疋下一位定錢依次逆数陞上合得也此所謂因乗俱向下位推五分法百三錢爲乗
