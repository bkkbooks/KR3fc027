body:
  text: 若干荅曰二百六十八歩六分二厘法日置長爲實以濶七歩四分爲法乘之合問定位法只認歩下一位是法首歩数逆上合得也法酋四分七歩乘二厘三四一十二定位六分實尾三分三七二十一四六二十四下位是步也向前逆陞合得八歩六歩六七四十二三四一十二歩只認步下一位定法首位是步也六十實首三十三七二十一原实十起呼十往後至步合得二百
