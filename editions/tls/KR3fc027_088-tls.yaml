body:
  text: 黃鍾萬事根本圖黃鍾生度黃鍾生量黃鍾之管其長積秬黍黃鍾之管其長廣容秬中者九十粒一粒爲一黍中者一千二百粒爲分十分爲寸十寸爲尺一勺十勺爲合十合爲十尺爲丈十丈爲引升十升爲斗十斗爲斛黃鍾生衡黃鍾生律黃鍾所容千二百黍爲黃鍾之長九寸空圖九勺重十二銖両勺則廿分積一百一十分是爲四銖爲両十六両爲斤律本十一律由是而損三十斤爲釣四釣爲石益焉首篇終屬八相生圖釋具載卷末
