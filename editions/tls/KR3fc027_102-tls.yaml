body:
  text: 一大數之始也十十箇一爲十百十箇十爲百千十箇百爲千萬十千爲萬十百千數之成也萬萬萬億萬萬十百千日億億億億萬十百千萬萬億萬億萬億兆萬萬億京萬萬兆垓萬萬京秭萬萬垓檳溝澗正載恆恒河沙阿僧秪那由他不可思議無量数自京垓以後世之罕用亦不可廢始存之按孟子註其麗不億之億爲十萬誤也小數分十釐爲分釐十毫毫十絲絲十忽忽十㣲㣲十纖纖十沙沙十塵
