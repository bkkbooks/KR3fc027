body:
  text: 歸除開平方今有平方積五萬四千七百五十六歩問平方一面若干荅曰二百三十四歩歸除開平方法日置積五萬四千七百五十六歩爲實於盤中見實約商二百於實左亦置二百於右下左右相呼二二除實四萬歩餘實一萬四千七百五十六歩以右下二百歩倍之得四百歩爲法歸除之呼四一二十二逢四進十一得商三十歩就置三十歩于右四百之下相呼三三除實九百歩餘實一千八百五十六歩就以右下三十歩倍之得六十歩共四百六十歩爲法歸除之呼四一二十二逢八進二十得商四歩亦置四歩于右十六之下相呼四
