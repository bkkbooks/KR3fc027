body:
  text: 人該銀若干荅日四十四両二錢二分法日置銀爲實以六人爲法歸之合問定位法從原實数百降下次位幾十又次位幾人過法是人則止前一位得令是両逆上陞之合得法六人歸實尾二分逢六進一十本位去盡進一千左三錢六一下加四逢六進一十本位不動右位加四本位去六進一千左定位二分五両六一下加四逢六進一十本位不動右位加四本位去六進一千左人法上是六人遇人則止前位得令是両也六十六二三十二逢六進一十本位加一右位加二本位去六進一于左十是両也向前逆陞合得四両
  hash: sha256:5b2e6226698abab1a82db8ff789f73e21d16294053dcc698ab7aada8885c5cad
