body:
  text: 推車問里歌二人推車恾且苦半徑輪該尺九五一日推轉二萬遭問君里数如何数荅曰一百三十里法曰置半徑輪一尺九寸五分倍之得三尺九寸爲全徑之数以周三因之得一百一十七寸爲一轉之数却以二萬遭乘之得二百三十四萬寸爲實另以每里三百六十歩每歩五尺計五十寸乘之得一萬八千寸爲法除之合問遅疾求平西江月甲乙同時起歩其中甲快乙遅甲行百歩且交立乙纔六
