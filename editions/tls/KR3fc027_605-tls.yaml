body:
  text: 荅曰米一萬八千九百石麥一萬四千石豆二萬八千八百石法曰置軍数列三位一位以三因得七萬五千六百以四除得米二萬八千九百石一位以五因得一十二萬六千以九除得麥一萬四千石一位以八因得二十萬零一千六百以七除得豆二萬八千八百石合問今有官田一頃三十八畆每畆科正米二斗今要七分本色米三分折納細絲每米一石折絲一斤問各納若干荅曰米一十九石三斗二升絲八斤四両四錢八分
  hash: sha256:6e0617bcf726fa0da65c2a8a27f02601e60b5e8a50c066af037ce094bcf026c8
