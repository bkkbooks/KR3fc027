body:
  text: 正三十七得羊正四百零七猪負四十九得猪負五百三十九價負一十九両得價負二十両令九錢却以左行羊正三十七爲法復遍乘中得羊負十一得羊負四百令七與左行羊正四百令七異名封減盡猪正十五得猪正五百五十五異減左行猪負五百三十九餘得猪正一十六爲法價正五両得正一十八両五錢異減左行價二十両令九錢餘得正二両四錢爲實以法除之得猪價一両五錢中行猪正十五以價一両五錢乘得二十二両五錢加正五両共二十七両五錢以羊十一除之得羊價二両五錢右行猪負十三以價一両五錢乘得一十九両五錢加入正五両共得二十四両五錢減五羊價共一十二両五錢餘得一十二両以牛二除之得牛價六両合問
