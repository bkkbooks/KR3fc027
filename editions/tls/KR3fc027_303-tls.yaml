body:
  text: 荅曰六斗五升七合法日置粮米于盤中爲實以軍士六百名于右爲法初商六斗于左位就以左右相呼六六除實三百六十石餘實三十四石二斗次商五升于左位六斗之次就以次商五升對右六相呼五六除實三十石餘實四石二斗再商七台于左位五升之下就以左七對右六相呼六七除實四斗二升恰盡今列布筭式于後商除式樣學者但看初商卽看初除又看次商又看次除復看再商復看再除挨次位数則不亂矣右法六百名中尾二斗去恰盡
