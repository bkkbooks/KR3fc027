body:
  text: 一両九錢除戸得二百七十衰就以五衰列置五縣再併五衰共二千八百七十三衰爲法另以賦粟二萬石以乘五縣各衰爲實以法除之合問原有綾毎疋價四両一錢絹毎疋二両一錢今欲將綾換絹問多少可均荅曰綾二疋一絹四疋一法曰以綾絹價相乘得八両六錢一分爲實以絹疋價除之得絹数以綾價除之得綾数合問其疋下有令者照疋長若干加之是也今有蔴毎石價九錢米石價八錢豆石價七錢令三主只以價均扣筭蔴米豆問各若干荅曰各該價五錢零四厘
