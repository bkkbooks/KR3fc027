body:
  text: 原今下廣数相减餘以原高乗爲實原下廣减原上廣餘爲法除高数是原築墙上廣一尺下廣四尺高一十二尺今只築下廣二尺一寸問今高若干荅曰七尺六寸法日置原下廣四尺减今築下廣二尺一寸餘一尺九寸以原高一十二尺乗之得二十二尺八寸爲實另以原下廣四尺减原上廣一尺餘三尺爲法除之合問原築墙上廣二尺下廣六尺髙二丈今已築上廣三尺六寸問今築高若干
