body:
  text: 假如覆月天弦長五十六歩矢濶二十八歩問積歩若干荅曰一千一百七十六歩法曰置弦五十六歩併矢二十八歩共八十四歩折半得四十二歩又以矢二十八歩乗之得積一法以弦矢相乘另以矢自乘併之折半亦得假如弧矢田弦長四十歩矢濶八歩問積歩若干荅曰一百九十二歩法日置弦矢相併得四十八歩折半得二十四歩又以矢八歩乗之得積合問
