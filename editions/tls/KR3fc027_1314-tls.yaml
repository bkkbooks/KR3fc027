body:
  text: 法曰列入衰一二三四五六七八各以差三歲因之爲各人之衰數長兒因得二次兒因得六三兒因得九四兒因得十二五兒因得一十五六兒因得一十八七兒因得二十一八兒因得二十四併八衰得一百令八数以減總二百令七歲餘九十九歲以九人除之得一十一歲爲第九兒之年歲次逓加三歲至長合問依等筭鈔歌甲乙丙丁戊巳庚七人錢本不均平甲乙念三七錢鈔二十三両七錢念六一錢戊巳庚二十六両一錢惟有丙丁鈔無数要依等第数分明請問先生能筭者細推詳筭莫差爭
