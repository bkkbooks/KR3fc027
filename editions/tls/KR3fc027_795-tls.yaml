body:
  text: 面方八根却减去一根得七根以四因得外周二十八根若前方箭積八十一根乃是单層者若只以方箭爲實以開平方法除之得一面方九根却减去一根得八根以四因得外周三十二根亦得面方八数爲雙乃八八六十四也九数爲单乃九九八十一也此法不論雙層单層皆可用捷徑無差演段根源開方圖解夫筭之術入則諸問出則直田葢直田能致諸用而有此説故立演段葢欲演筭之片段也知片段則能窮根源旣知根源而心無滕昧矣今摘数問詳誅圎解以明後學其餘自可引而伸之不待盡述
