body:
  text: 歩除之得七百一十五歩另以大濶三十八歩自乘得一千四百四十四歩减去七百一十五歩餘七百二十九歩爲實以開平方法除之得二十七歩爲截中濶就以此濶二十七歩併大頭原濶三十八歩共得六十五歩折半得三十二歩五分爲法以除截積一千七百八十七歩五分得截長五十五歩合問若作三段分者先截大小二頭長併中濶餘長卽是中段数也或又作四五段分者亦先截去大小二頭長濶再將原長內减截去二頭長数餘長歩数併截二段中廣復作梯法截之是也其斜形截法與梯形同理如截東西両傍積具截貞本雞題少廣章中
  hash: sha256:4995cb2702296a7b337a693a071da60f8a2ac8d029d09e6d7ba252f495b27e86
