body:
  text: 假如直田廣三十二歩只云斜多縱八歩問積若干荅曰一千九百二十歩折半如勾股積法日置廣三十二歩自乗得一千二十四歩另以多八歩自乗得六十四歩以少减多餘九百六十歩爲實倍多八歩作一十六歩爲法除之得緃長六十歩以廣三十二歩乗之得積合問假如直田縱六十歩只云斜多廣三十六歩問積若干荅曰一千九百二十歩折半如勾股積法日置縱六十歩自乗得三千六百歩另以多三十六歩自乗得一千二百九十六歩以少减多餘二千二百四歩爲实倍多十六歩作七十二歩爲法除实得廣三十二歩以縱六十歩乗之得積合問
