body:
  text: 環田者如圓田中間有圓池也若圓池不在中面偏者只以圓田筭之得全積却减去圓池積餘爲本田實積也法以外周自乗又以內周自乘二數相减餘數以十二除之若以內周外周問徑者置外周减內周餘數以六除之得徑若以內周併徑問外周者置徑以六因之得數併入內周數卽是外周若以外周併徑問內周者置徑以六因之得數减外周數餘爲內周先論方內容圓外方十四歩自乗計積一百九十六歩問容圓併四旁庇積若干荅曰圓積一百四十七歩四旁庇積四十九歩法曰置方徑十四卽圓徑自乗再以七五乗之得圓積也若問四庇積以二五乗方積是也方面卽圓徑也方積四分取三爲圓積故法用七五乘之或用二因四
