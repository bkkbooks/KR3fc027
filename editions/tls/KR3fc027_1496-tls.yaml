body:
  text: 法曰置錢二千二百五十文爲實以軍九十名爲原数另以九十倍之得一百八十名爲倍数先於二千前挨身呼加雙下除倍除實一千八百餘實四百五十次於餘實四百前呼加雙下除倍除實一百八十又呼加雙下除倍再呼加一下除原九十恰盡得每名該錢二十五文合問今有香油四百二十斤每油七斤半換芝麻一斗問芝麻若干荅曰芝麻五石六斗法曰置油四百二十斤爲實以七斤半爲原数另以七斤半倍之得一十五斤爲倍数先于四百前加二箇雙除二箇一百
