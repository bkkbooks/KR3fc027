body:
  text: 法日置表高三丈減去短表三尺卽是人目數也餘二丈七尺以表問相去五百丈乘之得一千三百五十丈爲實另置後表退行六十二丈減去前表退行六十丈餘二丈爲法除之得六百七十五丈加入表高三丈共六百七十八丈以裏法一百八十丈爲法除之得島高三裏一百三十八丈又置表問相去五百丈以前表退行六十丈乘之得三萬丈爲實亦以所餘二丈爲法除之得一萬五千丈以裏法一百八十丈爲法除之得島遠八十三裏六丈合問新編直指笲法綂宗卷之十二
  hash: sha256:e2731fc7283a45a817fff51c9d391d9ce3aa6d716ee12b67a518683835e3e2c5
