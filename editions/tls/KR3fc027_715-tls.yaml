body:
  text: 餘数續商隅又倍只依此法取空虚解日平方者乃方面自乘之積也開者以求方靣之数也一百一十定無疑者詷如積一百歩可約方面十歩巳無疑矣一千三十有零餘者謂積一千歩可約方靣三十歩有零也九千九九不離十者詷如積九千歩約方靣九十歩自乘九九八十一也一萬絻爲一百歩自乘得一萬歩也此言約初商之訣再具商積于後開平方初商定首位訣是自乘之数也商一歩積一歩商一十歩積一百歩商二歩積四歩商二十歩積四百歩
  hash: sha256:bd43af90670e7bb306ff1d2aee9080c0abedb5e7a585d8e754a382bd77991b41
