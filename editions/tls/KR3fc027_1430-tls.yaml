body:
  text: 二人二日四升七一十三口要粮喫一年三百六十日借問該粮幾多食荅曰三十六石六斗六升法日置今喫粮三百六十日以乘一十三日得四千六百八十又以原喫粮四升七合乘之得二百一十九石九斗六升爲實以原三人乘二口得六爲法除之合問歌諸葛綂領八員將每將又分八箇管每管裏面排八陣每陣先鋒有八人每人旗頭俱八箇每箇旗頭八隊成
