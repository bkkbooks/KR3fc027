body:
  text: 下位廉法六十併入次商五歩共六十五歩皆與上商五歩呼五六除實三百五五除二十五歩得廣三十五歩合問若問縱照前布列上商五十以乘不及五十得七百五十歩併加前積共二千五百歩却呼五五除實二千五百歩盡得縱合問今有圭田積一百二十六歩濶不及長九歩問長濶各若干荅曰長二十一歩濶一十二歩法日倍田積得二百五十二歩爲實以不及九歩爲縱方于右上商十歩下法亦置十歩于縱九歩上共一十九歩與上商十歩除實一百九十歩餘六十二歩另以下法初商十一倍之作二十次商二歩于左下法亦置二歩加于縱方九上共三十一歩皆與
