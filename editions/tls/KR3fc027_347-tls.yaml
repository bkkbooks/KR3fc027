body:
  text: 先下原錢乘只物却將原物法除之將錢買物互乘取百里千斤以類推筭者畱心能善用一絲一忽不差池假如原有米五石八斗四升賣銀四両三錢八分今只有米一石七斗二升問該銀若干荅曰一両二錢九分法日置今有米一石七斗二升以原賣銀四両三錢八分乘之得七両五錢三分三厘六毫爲實却以原有米五石八斗四升爲法除之合問一法先用除而後乗先置原價四両三錢八分以原米五石八斗四升爲法除之得每石價銀七錢五分又爲法以乘今米一石七斗
