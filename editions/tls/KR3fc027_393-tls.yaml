body:
  text: 荅曰二百四十歩計稅一畆法曰置長三十歩以濶十六歩乘之得四百八十歩折半得積二百四十歩合問假如梯田上廣二十歩下廣三十歩中長四十五歩問積若干荅曰一千一百二十五歩法曰置上下二廣併之得五十歩折半得二十五歩以中長四十五歩乘之得積合問一法併二廣以乘長折半亦得假如斜田南廣三十歩北廣四十二歩縱六十四歩問積若干
