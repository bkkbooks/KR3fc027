body:
  text: 爲賎實以貴賤率王十二両石三両相减餘九両爲法除實得石一十三寸减共積二十七寸餘得玉一十四寸以玉率一十二両乘之得一百六十八両另以石一十三寸以石率三両乘之得三十九両各以斤法通之得斤数合問今有客三次出外爲商俱得合利每次歸還銀三百両三次本利恰盡問原本若干荅曰二百六十二両五錢法曰置銀三百両折半得一百五十又加三百得四百五十又折半得二百二十五両又加三百得五百二十五両又折半得原本二百六十三両五錢合問
