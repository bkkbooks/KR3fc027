body:
  text: 一法以股自乘得一千二百九十六步爲實以勾弦和七十二步爲法除之得勾弦相差一十八步仍加和七十二步共九十步折半得弦四十五步內減差一十八步餘二十七步是勾亦得此乃勾弦和今有勾濶二十七步只雲股弦相和八十一步問股弦若干荅曰股三十六步弦四十五步法曰置勾二十七步自乘得七百二十七步另以股弦和八十一步自乘得六千五百六十二步二位相減餘五千八百三十二步折半得二千九百一十六步爲實以股弦和八十一步爲法除之得股長三十六步以減股弦和八十一步餘四十五步是弦合問今有弦長四十五步之雲勾股相和六十三步問勾股若干
  hash: sha256:b2322abb3bebed8172d566c4d92c66408eb8b988b43382d0e1f2c65528b5efe6
