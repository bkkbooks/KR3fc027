body:
  text: 四歩六分北頭要濶四歩問截南濶若干荅曰截南頭濶三歩直田截斜法日置截積五十四歩六分爲實以原長一十五歩六分爲法除之得截濶三歩五分此是二廣均勻之数加倍得七歩减去北廣四歩餘得截南廣三歩是也又法倍截得一百令九歩二分爲實以原長一十五歩六分爲法除之得共截濶七歩减北廣四歩餘得截南廣三歩亦得今有直田長一十五歩濶一十二歩今從西北角截勾股形一段積三十一歩五分年原坐落西邉股長九歩問截北
