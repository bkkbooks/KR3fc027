body:
  text: 求積法曰併上一下二十五共二十六以二十五乘之折半得積三百二十五爲實以五行爲法除之得縱橫斜角皆得積六十五数解曰併上下数者非圖中之上下一乃数之始爲上二十五乃数之終爲下後皆倣此求積法日併上下数上一下三十六共三十七以三十六乘之折半得積六百六十六爲實以六行爲法除之得縱橫斜角皆積一百一十一数易換術曰以一換三十六俱斜對相取
