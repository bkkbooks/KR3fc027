  text: 四十五二倍作四変二爲四四四除一十六本位去二下位加四十五十實首二百起五二倍作四変二爲四原实百起呼百往後合順数至分得四百還原用乘法四五得二十五五二十五四四一十六四五得二十假如今有銀二百六十五両三錢二分作十二人分之問每人該銀若干荅曰二十二両一錢一分法日置銀爲實以十二人爲法歸除之合問定位與前歸法同法酋二人除一十歸定位法少实多
