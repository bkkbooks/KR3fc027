body:
  text: 既壯周逰吳楚之遇方田米粟差分少廣商功均輸盈不足方程勾股諸書輒厚購得之而人耆通數學者輒造請問難孳孳不倦久之而齟者侵而通會心者印證而汝思年六十且倦逰家居賈勇特止師之知以人法窮天巧以諸家得直指而統宗之著成書焉友人吳泰
