body:
  text: 假有立木不知高日影在地長五丈隨立一竿長一丈在邊影長一丈二尺五寸問立木高若干荅曰木高四丈法曰置立木影長五丈爲實以竿影長一丈二尺五寸爲法除之合問今有立木不知高日影在地長四丈隨立一竿長一丈邊影長八尺問木高若干荅曰木高五丈法曰置木影長四丈爲實以竿影八尺爲法除之合問右二問乃孫子度影量竿之法
