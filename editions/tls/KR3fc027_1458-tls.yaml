body:
  text: 法曰置三載本利平列一倍二二倍四共七率乘五斗得三石五斗折半三遭合問又法置五斗以七乘八除亦得巳前五欵原用盈不足法繁冗刪去不錄鷓鴣天百兔縱橫走八營幾多男女間來争一人一箇難拿盡四隻三人始得停來往聚閙縱橫各人捉得往家行英賢如果能明筭多少人家甚法評荅曰七十五人法曰置百兔爲實以四隻歸之得二十五却以三人因之合問自前問三處四處五處倍飲併三年倍利還債俱是原本
