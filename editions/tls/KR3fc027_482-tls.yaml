body:
  text: 此古米增而麥减何也葢謂古有官庄產土租米重而租麥輕又紫陽書院田府縣學田有米無麥今變總歸于一則丈出畆歩派租米租麥各畆歩不同等而田山塘等起科不廢古法惟地扣合米麥總数之故云山按原額計畆新丈不計歩數每畆共米一升零七勺帶耗麥同塘池譚埸同田則園圃洲堤同地則填塋境蹟多作上地開墾儱野以作莞地三百爲畆入山稅畆法論
  hash: sha256:7b7ee7e483cfd62fcfc675d9a996cbd311957633f9421d3f472c4eccced6211f
