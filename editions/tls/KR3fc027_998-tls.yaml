body:
  text: 荅曰二百三十八里一十四分里之三法日置不及二十三里以馬主追去一百四十五里乘之得三千三百三十五里爲實另置巳行三十七里减去不及二十三里餘一十四里爲法除實二百三十八里不盡三以法約之今有大都路至杭州四千二百七十五里馬從大都往南日行一百二十里船從杭州往北日行七十里問船馬幾日相會各行若干荅曰二十二日半馬行二千七百里船行一千五百七十五里法曰置四千二百七十五里爲實却併船馬日行共一百九十里爲法除之得二十二日半又爲實各以原行里数乗之得各行数
