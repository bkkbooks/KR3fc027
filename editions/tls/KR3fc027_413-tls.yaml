body:
  text: 假如中段四角中弦十六歩以東西二徑共一十四歩折半乗之得積一百一十二歩南尖三角弦十歩以半徑二歩乗之得積二十歩西弧矢弦八歩加矢二歩共十歩折半以矢乗之得積十歩東北三角弦十二歩以半徑二歩乗之得積二十四歩四共計積一百六十六歩合問假如東北弦八歩以半徑三歩乗之得積二十四歩又正東三角弦六歩以半徑二歩乗之得積一十二歩又弦十八歩以半徑四歩乗之得積七十二歩又南弧矢弦八歩加矢折半以矢乗得積十歩又西三角弦二十四歩以半徑六歩乗之得積一百四十四歩又西北弧矢弦十四歩加矢折半以矢乗得十六歩
