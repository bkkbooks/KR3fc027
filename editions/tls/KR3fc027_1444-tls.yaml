body:
  text: 又餘兩箇厮打荅曰一十二人瓜二十九箇法日置両盈四人九个三人七个三人乘九个得二十七四人乘七个得二十八个併之得五十五个加両盈数三个共五十八个折半得瓜二十九个以三四相乘得一十二人合問歌牧童分杏各争競不知人数不知杏三人五箇多十枚四人八枚兩箇利荅曰二十四人杏五十枚法日置兩盈以三人互乘八枚得二十四以四人互乘五枚得二十以
