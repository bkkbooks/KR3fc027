body:
  text: 問每人該米若干荅曰六石八斗四升法日置米爲實以一十九八爲法除之合問法酋九人歸一十除定位法少实多實尾六升九斗四九除三十六本位去三右位去六尽逢四進四十本位去四進四于左定升九右八九除七十二本位去七右位去二無除起一下還一本位去一右位去一四升二十見一無除作九一本位加八爲九右位加一六九除五十四本位去五右位去四十法首位是十遇十卽止前一位得令是石合得八斗實首二百無除起三下還三本位去三右位加三原見一無除作九一本位加八爲九右位加一实百起呼百往後至十合得六右還原用乘
