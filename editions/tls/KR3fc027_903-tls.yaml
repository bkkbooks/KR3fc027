body:
  text: 得濶差六歩以减下濶一十二歩餘六歩卽是中廣合問今有梯田積一千五百歩北廣四十歩中長五十歩問南廣若干荅曰南廣二十歩法日置積一千五百歩倍之得三千歩爲實以長五十歩爲法除得六十歩於內减北廣四十歩餘得南廣二十歩合問原有斜田南廣四歩北廣十歩長一十二歩今欲增作勾股樣式問股長出若干荅曰股長出八歩斜增爲勾股法日以南廣四歩乘長一十二歩爲實另以二廣相减餘六歩爲法除之得尖出股長八歩合問
