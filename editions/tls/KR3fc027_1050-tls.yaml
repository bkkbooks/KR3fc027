body:
  text: 之得一千七百五十里爲實另併空車重車日行里数以三返乘之得三百六十爲法除之不盡二十二以法命之原有人負米一石一斗二升行三十步日五十返今負米一石二斗行四十步問日幾返荅曰三十五返法曰置負米一石一斗二升以行三十步乘之行三百三十六又以五十返乘之得一千六百八十爲實另以今負米一石二斗以行四十步乘得四百八十爲法除之合問今有衆兄弟軰出錢買物長兄出錢八文次兄以下各加一文順至小弟出錢六十文問兄弟軰及共錢各若干
