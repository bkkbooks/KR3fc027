body:
  text: 荅曰二十四尺法日置原下周七十二尺内减今用上周一十八尺餘五十四尺以原高三十二尺乗之得一千七百二十八尺爲實以原下周七十二尺爲法除之得今高二十四尺合問原有圓錐下周七十二尺高三十二尺今改作圓臺已築高二十四尺問今上周若干荅曰一十八尺法日置原高三十二尺减今高二十四尺餘八尺以乗原下周七十二尺得五百七十六尺以原高爲法除之合問築堤歌
