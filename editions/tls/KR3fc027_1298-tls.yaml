body:
  text: 五十六両李得八十四両副併共得二百四十両爲法另以織布一百零八尺乗張一百五十六両李八十四両得張一千六百八十四丈八尺李九百零七丈二尺各自爲實以法除之合問歌趙嫂自言快績麻李宅張家雇了他李宅六斤十二両二斤四両是張家共織七十二尺布二人分布鬧喧譁借問卿中能筭士如何分得的無差荅日張宅五丈四尺李宅一丈八尺法曰置共織布七十二尺爲實併二麻張六斤一十二両以斤加六得一百零八両李二斤四両以斤加六得三十六両共一百四十四両爲法
