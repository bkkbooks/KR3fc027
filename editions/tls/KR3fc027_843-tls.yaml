body:
  text: 立圎法歌立圎問徑法何如十六乘積九歸除除此数當爲實積立方開見更何如力圎若問周圍数四十八乘積数軀乘爲實積用開立卽見周圎数不虛法曰外周者置積若干以四十八乘之得若干爲實以開立方法除之得問若要還原以周自乘再乘以四十八除之見積問徑置積若干以十六乘之得若干又用九歸之得若干爲實以開立方法除之得徑若要還原以徑自乘再乘以九因十六除之見積周徑下原有不盡者或周徑自
