body:
  text: 一十八爲法除之不尽之数一法实皆折半而命之差分衰分意同歌日差分之法併來分須要分数一分成將此一分爲之實以乘各数自均平假如今有東西二隣共織絲絹東隣四斤六両西隣三斤二両共絲七斤八両織絹二十一丈八尺問各該若干荅曰東隣一十二丈七尺一寸六分七厘西隣九丈零八寸三分三厘法日置總絹二十一丈八尺爲實以共絲七斤八両先將八両变化爲五就
