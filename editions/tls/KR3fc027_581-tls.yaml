body:
  text: 却將狹布長二百八十尺問折筭合還濶若干荅曰一尺八寸六分法曰置原布長以原濶乘爲實以今長爲法除之合問就物抽分歌抽分法就物中抽脚價乘他都物求別用脚錢搭物價以其爲法要除問除來便見脚之總餘者皆爲主合畱筭者不須求別訣只將此法記心頭今有米三千五百石每石脚價五分因無存銀却將原米抽出誰還照原米價每石六錢五分扣筭還脚問主脚
