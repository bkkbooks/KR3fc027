body:
  text: 人一百九十乗得三千八百爲實却以支銀一両以分母十九通之得十九両爲法除之合問解題曰十九分両之一每人卽一両五分二厘六毫有課分假如今有布二疋九分疋之五用過一疋六分疋之一問尚餘若干荅曰一疋十八分疋之七法日置用過布一疋以分母六通之加分子一共得七又以原布分母尢通之得六十三另置原布二疋以分母九通之加分子五其得二十三又以用過布分母六通之得一百三十八內减去前六十三餘七十五爲實以二分母九六相乘得五十四爲法除之得一疋餘實二十一法實
