body:
  text: 共該米若干荅日二百四十六石八斗法日置銀于左爲實以每銀糴米二石于右爲法因之合間定位法只認両下位卽錢之位定石逆上卽両之位定十石再上位十両之位定百石合得此所謂因乗俱向下位推先数原實百起順下至両遇法首位每両二石則止下位得術是石回向前逐位逆数陞上合得也今列布筭之方于後法二石爲因
