body:
  text: 弧矢內勾弦求股圖圎徑與截弦求截矢歌圎徑與弦懂截矢半徑爲弦自乘是弧弦折半名爲勾亦自乘置相减矣餘用開方得股数半徑减股餘者矢圎徑十寸弧弦長八寸問截矢若干荅曰矢二寸法日以半徑五寸爲勾股之弦另以弧弦八寸折半得四爲勾各自乘相减餘九寸平方開之得股三寸以减半徑五寸餘二寸卽矢圎徑與截矢求截弧背截弦求弧背同術曰先求出弦徑除矢畀得半弦背差解曰圎之大小本於弧背之長短係于圎之大小與矢之多寡餘如平圎十寸平分一半則矢長五寸自乗得二十五寸以徑除之得二寸五分爲半茲背差倍之得五寸加入圎徑得一十五寸爲半圎周故不論圎之大小矢之多寡者凖也
  hash: sha256:79b9b5f92fff50548dad40a0e498551933c9c2c922df0f32fabd5da1881393e5
