body:
  text: 一羣再凑得半羣卽五分小半羣卽二分半共二羣七分半爲法除之得甲原羊一群三十六隻合問歌今有程途二千七十八人騎馬七匹言定十里輪轉騎各人騎行怎得知荅曰人行一千六百五十里騎馬一千零五十里法日置程途二千七百里爲實以一十八人爲法除之得每人一百五十里以馬七匹乘之得騎馬一千零五十里以减程途里数餘得人行一千六百五十里合問歌
