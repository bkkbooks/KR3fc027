body:
  text: 法曰列所問数先以右行硯三爲法遍乘左中二行得数右硯三爲法先乘左中墨五得二十筆九得三十六價八錢一分得三両二錢四分中硯四得一十二墨六得一十八筆七得二十一價八錢九分得二両六錢七分左硯五得一十五墨七得二十一筆八得二十四價一両令六分得三両一錢八分却以中行硯四遍乘右行墨筆得数墨得二十筆得三十六價得三両二錢四分與中行對減餘墨二筆十五價五錢七分另列右位又以左行硯五爲法遍乘右行墨筆得数墨二十五筆四十五價四両令五分與左行對減餘墨四筆二十一價八錢七分另列左位再列減餘以分左右位数以右行墨二爲法遍乘左行筆價得数列左位右墨二筆十五得六十價五錢七分得二両二錢八分
