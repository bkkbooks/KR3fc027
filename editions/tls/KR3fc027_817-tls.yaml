  text: 中方靣一十六歩計積二百五十六歩小方靣一十二歩計積一百四十四歩法日置共積于上另置大方面多小方面八歩自乘得六十四歩又以中方面多小方面四歩自乘得一十六歩併二数共八十歩以减共積八百歩餘積七百二十歩以三歸之得二百四十歩爲實初商一十自乘得一百歩以减實積餘實一百四十歩次商而併初商共十二自乘得一百四十四內除初商
