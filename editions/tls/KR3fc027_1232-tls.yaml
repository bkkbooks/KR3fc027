body:
  text: 二表俱與參合自前表相去二丈五尺問高若干荅曰高一丈一尺一寸法曰置遠二十五尺加入退行二尺共二十七尺以二表相減餘六寸乘之得一十六尺二寸爲實卻以後退行二尺爲法除之得八尺一寸加入後表三尺得高一丈一尺一寸合問若依前法置前表三尺六寸減去後表三尺卽是人目數餘六寸以乘遠去二丈五尺得一丈五尺爲實以推行二尺爲法除之得七尺五寸加入前表三尺六寸共高以丈一尺一寸
