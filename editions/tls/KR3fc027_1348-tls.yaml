body:
  text: 而除之是也若毬周圓積置周数以三歸求出徑数同法筭積法曰置毬高一十二寸自乗再乗得一千二百二十八寸以九因十六除得九百七十二寸是全箇金球之實另置徑一十二寸减去徑両頭共厚六分餘得毬中空徑一十一寸四分亦自乗再乗得一千四百八十一寸五分四厘亦以九因十六除得八百三十三寸三分六厘爲毬內空積之数以减全球積数餘一百三十八寸六分四厘以一百三十八寸變爲一百三十八斤零者用加六之法得一十両令二錢四分合問西江月帝城三五元宵鰲山兩樣燈毬都來一秤三斤油七両又來添凑三両分爲四盞四両分作三甌三停盞子二停甌
