  text: 冩算卽地錦歌冩筭鋪地錦爲奇不用筭盤数可知法實相呼小九数格行冩数莫差池記零十進於前位逐位数上亦如之照式画圖代乘法厘毫絲忽不須疑今有布二十三疋每疋價銀五錢六分五厘問該銀若干荅曰一十二両九錢九分五厘法曰先盡格眼置布三十二疋填于圖上橫冩爲實再將五錢六分五厘爲法于右圖外直冩法實相呼填冩格內先
