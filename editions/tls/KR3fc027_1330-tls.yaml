body:
  text: 歌甲乙丙丁戊分銀一両五甲多戊錢三互和折半與荅曰甲三錢六分五厘乙三錢三分二厘五毫丙三錢丁二錢六分七厘五毫戊二錢三分五厘解曰甲多戊一錢三分也法曰此互和减半置分銀一両五錢爲實以例用一分三分五分七分九分併之得二錢五分爲法除之得六錢乃首尾之数于內减中多戊一錢三分餘四錢七分折半得戊二錢三分五厘仍加多一錢三分得
