body:
  text: 乙羊四十五隻又以甲一百七十一内减乙羊四十五餘一百二十六折半得甲羊六十三隻合問原法置甲七分乙五分各以九乘之亦得鳯樓梧甲趕羣羊逐草茂乙拽肥羊一隻隨其後戲問甲及一百否甲云所説無差若得這般一羣凑再添半羣小半群得你一隻來方立機奧玅誰叅透荅曰甲羊三十六隻解題甲羊三十六隻爲一羣借一羣亦三十六隻再借小半羣九隻又凑一隻共石隻也法日置羊一百隻减乙羊一隻餘九十九隻爲實併羣率原一羣又
