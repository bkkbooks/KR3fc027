body:
  text: 今有絹七百二十疋令甲乙丙三人依等挨次分之問各若干荅曰甲三百六十疋乙二百四十疋丙一百二十疋法曰置絹爲實以甲三乙二丙一併得六衰爲法除實得一百二十疋爲丙所得数以二因得乙数以三因得甲数合問今有銀九十二両分散四子依等挨次分之問各若干荅曰長子三十六両八錢次子二十七両六錢三子一十八両四錢四子九両二錢法曰置總銀爲實以長子四次子三三子二四子一副併得十衰爲法
  hash: sha256:4d68ba13ddada8aa4796a4c1ba92955b5e48eea87dbc6b6008c52399c2237be9
