body:
  text: 四人支裙絹五十尺問該總絹若干荅曰共絹一十二萬四千四百八十五尺衫絹八萬一千零六十尺裙絹四萬三千四百二十五尺法曰置三人七十尺四人五十尺以三人互乘五十得一百五十以四人互乘七十得二百八十併之共四百三十乘兵士得一百四十九萬三千八百二十爲實又以三四相乘得十二爲法除實得總絹数置兵士總以七因三歸得衫絹数以五因四歸得裙絹数合問互和减半差分
