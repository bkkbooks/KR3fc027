body:
  text: 新編直指筭法綂宗難題附集雜法序夫難題肪於永樂四年臨江劉仕隆公偕內閣諸君預修大典退公之暇編成難法附於九章通明之後及錢塘吳信民九章比類與諸家筭法中詩詞歌括口號總集名曰難題難者難也然似難而實非難惟其詞語巧捏使筭師一時迷惑莫知措手不知難法皆不離於九章非九章之外其難題惟在乎立法立法旣明則迎刅而破又何難之有哉今分列九章立法明辯附集雜法於綂宗之後俾好事者其覧雲
