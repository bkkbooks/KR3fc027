body:
  text: 六尺爲勾九尺股內容方面如何取有人遠得這玄機便是高明筭中舉荅曰內容方面三尺六寸法曰置勾六尺以股九尺乘之得五十四尺爲實另併勾六尺股九尺共一十五尺爲法除之得內容方面三尺六寸合問西江月平地鞭韆未起扳繩離地一尺送行二歩恰竿齊五尺板高離地仕女佳人争蹴終朝語笑歡戲良工高士請言知借問索長有幾荅曰一丈四尺五寸
