body:
  text: 左左指有旁五指皆同務記清白假如左右両手中指掐音恰若左中指右下爲七錯記在四指左爲二此是以前位七而降後位一数差悮非小冝謹慎之如遇位数多者而足底亦當一位平立爲五平指歌前爲四平跟歌後爲六側於東南爲三側於西南爲九歌于東北爲一歌于西北爲七學者須依暗讀熟記自然慣便不拘乘除皆可用也
