body:
  text: 二十月乘之得四百二十爲實以法八除之得五箇月令二五却以二十日乘二五得七日半又置乙田以十二月乘之得三百爲實以法八除之得三箇月零七五却以三十日乘七五得二十二日半又置丙田以十二月乘之得二百四十爲實以法八除之得三箇月合問又法置一年計三百六十日爲實併甲乙丙三人田其八十畆爲法除之毎畆得值月四十五日以乘各人田数亦得今有甲乙二人往縣應役甲該十二日一往乙該十五日一往問二人何日同會荅曰六十日會法曰置甲十二日以乙十五日乘之得一百八十日爲實却以乙
  hash: sha256:e35da0f82c9bc5b5145e0e97e820560bd759a6d34e153a9304661299c6896397
