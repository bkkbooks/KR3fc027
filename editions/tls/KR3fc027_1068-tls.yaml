body:
  text: 新安賔渠程大位汝思甫編集會孫素亭光紳佩章甫軗正蘊齋鈁洪聲甫叅閱盈朒第七章盈多也朒少也此是假設有餘不足者以求隱雜之数也隱雜者不見之数顕者可見之数故以顕者推隱雜者且如数人共買物出錢多則有餘少則不足無可考究者故以有餘不足数求之則人数物價可知矣歌曰筭家欲知盈不足両家互乘併爲物併盈不足爲人實分率相减餘爲法
