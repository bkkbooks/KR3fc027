body:
  text: 法曰置毎両價一分八厘五毫乘之卽得一法置毎両價一分八厘五毫以加六法加之五六加三十六八加四十八一六加六亦得今有靛花一十八斤毎両價錢一十二文問該錢若干荅曰三千四百五十六文法曰此是斤問両價置靛花一十八斤用加六法得二百八十八両爲實以價錢一十二文爲法乘之合問今有黄蠟五百三十五斤七両毎両價八厘九毫問諛銀若干荅曰七十六両二錢四分六厘三毫
