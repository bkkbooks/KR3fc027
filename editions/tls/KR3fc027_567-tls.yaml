body:
  text: 今有銅一經入爐每十斤得八斤今三經入爐得七十五斤一十三兩四錢四分問原生銅若干荅曰一百四十八斤二兩㳒置銅七十五斤加六併入零而錢共得一千二百一十三兩四錢四分爲實另置八斤自乘得六十四再乘得五百一十二爲法除之得二千三百七十兩以斤法十六除之得一百四十八斤一二五將一二五加六爲二兩合問一法置銅變作両数以八歸三次亦得今有鐵一經入爐每十斤得七斤今三經入爐得鐵七十九斤一十兩零九錢三分一厘問原生鐵若干荅曰二百三十二斤五両
  hash: sha256:116926ce9ea09bed0de90dc6d34f87fdc51ac77afa1be53cc38e8814fdf4ae39
