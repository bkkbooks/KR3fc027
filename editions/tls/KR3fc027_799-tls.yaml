body:
  text: 法初商二十倍之共五十二次商四于初商二十之次下法亦置四于倍方之次共五十六皆與左次商四相呼除實恰盡得濶二十四歩加差一十二歩得長三十六歩合問今有置田積八百六十四歩只云長濶相差一十二歩問長濶相和共若干荅曰長濶相和六十歩法曰置田積以四因得三千四百五十六歩另以差一十二歩自乘得一百四十四歩併四因積共三千六百歩乃是相和之積用開平方法除之得長濶相和六十歩合問若問長数加差折半卽得
