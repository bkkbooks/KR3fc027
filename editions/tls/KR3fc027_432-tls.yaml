body:
  text: 乗亦得九十八歩將四角總合亦爲一小方每角正方二十一歩斜方七歩折半得三歩五分併得二十四歩五分以四角因之得九十八歩亦爲一斜方積也此合大方求積毫忽無差楊輝用開平求方求斜理明以合方積張丘建用方五斜七難以合数又論大方靣十四歩内容小方斜十四自乘得一百九十六歩是兩箇斜方積乃黑白積四段以上下斜白配合如一方斜又以左右斜黑配合如一方斜故用折半得一箇斜方九十八歩
  hash: sha256:1c01db4f8d0c3a97f59fb955b4635092b2cf86a0b7fc303ee12816bf36292236
