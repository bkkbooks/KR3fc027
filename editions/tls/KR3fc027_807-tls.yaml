body:
  text: 法日置積爲實以相和爲减縱開平方法除之上商三十以减縱六十餘縱三十與上商三十相呼合除積九百而積實不及乃命法除原積八百六十四餘負積三十六爲實再置上商三十以减餘縱三十訖次商六歩下法亦置六爲隅法與上商六呼除負積恰盡得長三十六歩合問今有方田一段圎田一段共積二百五十二歩只云方面圎徑適等隅方圎徑各若干
