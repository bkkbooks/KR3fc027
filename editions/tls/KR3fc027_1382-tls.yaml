body:
  text: 各得矢二十五歩用圓徑與載矢求截弦法另置通徑七十四歩折半得半徑三十七歩爲弦自乘得一千三百六十九歩另以半徑三十七歩减矢二十五歩餘一十二歩爲股自乘得一百四十四歩以减弦自乘数餘一千二百二十五歩以平方開之得三十五歩倍之得七十歩爲截弦併矢二十五歩共九十五歩折半得四十七歩五分以矢二十五歩乘之得一千一百八十七歩五分爲一段弧矢田積倍之得二千三百七十五歩爲見在田以减通徑總田四千一百令七歩餘一千七百三十二歩爲水占田各以畆法二四除之合問古法該弦七十歩並無用法出處今用求弦之法也歌今有梯田長一百小頭十五大廿七
