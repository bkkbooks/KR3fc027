body:
  text: 濶一十八尺合問今有米七百零五石六斗欲作圎倉盛之只云高一十二尺問周若干荅曰周四十二尺法日置米数以斛法二五乘之得一千七百六十四尺又以圎率十二乘之再以高一十二尺除之如故爲實以開平方法除之得周四十二尺合問今有米五百七十七石二斗欲作方窖盛之只云上方九尺深一十三尺問下方若干荅曰下方一十二尺法日置米数以斛法二五乘之得一千四百四十三尺以三因之得
