body:
  text: 定位法只認石上前一位卽十之位定両逆上卽百之位定十両再陞上一位定百両合得此所謂歸與歸除上位施先数原實百起順下至石遇法首位是每両二石則止轉向前一位得令是両逐位逆数陞上合得也今列布筭于後法二石爲歸實尾位二斗逢二進一十本位除去進一于左定位六石逢六進三十本位除去進三于左石法上是每両二石遇石卽止前一位得令是両也一錢八十逢八進四十本位除去進四于左十是両也向前逆數還位陞之合得三兩
