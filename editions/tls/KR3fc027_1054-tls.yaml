body:
  text: 今有錢一文日增一倍倍至三十日問該若干荅曰十億零七千三百七十四萬一千四萬一千八百二十四文法曰置錢一文以十度八因卽得一度八因乃三日倍数十度八因乃三十日数一法五度六十四乘亦得一度六十四乘乃六日倍数五度六十四乘是三十日数又法以三度三十二乘得数自乘亦得三度三十二乘乃十五日数自乘卽三十日也解曰十度者以八因十次也五度者以六十四乘五次也餘倣此今有天干十位地支十二位問干支相配若干荅曰六十甲子法曰置天干十位以地支十二乘之得一百二十爲實却以天干十位减地支十二餘二爲法除之卽得
  hash: sha256:462f779336093e91a1c36cfaee03b0fcc9cc1bd007e97202bdadeaf9521849c6
