body:
  text: 十歩矣使乙先行百歩甲行起歩方追不知幾歩方追及筭得揚名説你荅曰二百五十歩法日置甲行百歩乘先行百歩得一萬歩爲實另以甲行百歩减乙行六十歩餘四十歩爲法除之合問行程問日歌三藏西天去取經一去十萬八千程每日常行七十五問公幾日得回程荅曰一千四百四十日計四年法日置一十万零八千里以每日行七十五里爲法除之得日数再
