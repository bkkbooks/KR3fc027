body:
  text: 又爲廉法再商八歩于左位初次商一百六十之下右位亦置八歩又爲隅法於廉法之下共三百二十八呼除先呼三八除積二千四百又呼二八除積一百六十又呼八八除積六百四十恰盡今有圓田積二千三百五十二歩問平圓徑若干荅曰徑五十六歩法日置積歩先以四因後用三歸得三千一百三十六歩爲實以開平方法除之初商五十于左位亦置五十于右位爲方法左右相呼五五除積二千五百餘積六百三十六歩却以右位五十倍作一百爲廉法次商六于左初商五十之次亦
