body:
  text: 但看直行末後数逐位合数似走之照式用心明其理厘毫絲忽不須疑法日照筭盤定位布列行数用暗馬直下但可加一書者加之如文不能加者另馬若本行退盡無存者用一小圈隔之以別溷数如俱完畢只看各行末後之数自左至右猶似走之是也垜積合總假如今有銀一両二錢三分又二両六錢四分又三両八錢五分又四両九錢二分問四共若干荅曰一十二両六錢四分
