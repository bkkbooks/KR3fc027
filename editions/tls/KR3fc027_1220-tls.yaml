body:
  text: 今有邑不知大小四面居中開門西門外三十步有木一根出南門外七百五十步見木問邑方若干荅曰邑方三百步法曰出西門三十步爲餘勾出南門爲餘股相乘得二萬二千五百步以平方開之得一百五十步爲半邑之方倍之爲全邑方也卽勾股容方今有邑方二百步四面居中開門東門外一十五步有木一株問出南門若干荅曰六百六十六步六分步之一法曰半邑方爲容方一百步自乘得一萬步爲實以東門外十五步爲餘勾爲法除之合問此是容方於餘勾求餘股
  hash: sha256:5624f14a98f8d8cc2dfb2350166839e47dc0cd51f08d29b6172677f7ff737698
