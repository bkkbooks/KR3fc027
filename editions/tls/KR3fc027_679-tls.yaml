body:
  text: 疋爲法除之得二両五錢爲每疋絹價加多一両三錢五分得羅疋價三両八錢五分又加多四錢七分得綾疋價四両三錢二分合問今有綾七尺羅九尺共價適等只云羅每尺價比綾每尺少錢三十六文問各錢價若干荅曰綾每尺一百六十二文羅每尺一百二十六文法曰羅九尺以綾價三十六文乘之得三百二十四文爲實另以綾七尺羅九尺相减餘二尺爲法除實得綾尺價一百六十二文另置綾七尺以三十六文乘之得二百五十二文爲實仍將前法二尺爲法除之得羅尺價一百二十六文合問
