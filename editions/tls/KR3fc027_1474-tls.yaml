body:
  text: 得三十尺爲股自乘得九百尺另以一十六尺爲勾自乘得二百五十六尺併之得一千一百五十六爲實以平方開之初商三十自乘得九百除實餘實二百五十六以初商三十倍作六十爲方法次商四尺呼四六除二百四十又呼四四除一十六恰盡得三十四尺爲索長合問歌二丈木長三尺圍葛生其下繞纒之徐徐纒繞七週遍葛稍却與木稍齊試問先生能筭者葛長多少請君題荅曰二丈九尺法曰置木圍三尺與週七相乘得二十一爲股自乘得四百四十
