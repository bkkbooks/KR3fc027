body:
  text: 荅曰五十六石一斗六升法曰以南頭腰廣倍之併人靣廣底廣共二十四尺以四除之得六尺另以北頭腰廣倍之併人靣廣底廣共二十八尺以四除之得七尺併二数共一十三尺折半得六尺五寸以深二尺四寸乘得一十五尺六寸以長乘得一百四十尺零四寸爲實以斛法除之合問今有蘆蓆二領長濶相同先以蓆一領作囤較之盛米二石五斗問蓆二領爲一囤盛米若干荅曰盛米十石法曰置蓆二領自乘得四領爲實以較囤米二石五斗爲法乘之
  hash: sha256:27f04a6f4f82bc434efcf2ea925fc6d3d2431cfac10e30c747e5846f00e53b8a
