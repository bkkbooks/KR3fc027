body:
  text: 之者就變法以四乗五得二十再以一十二乗之得二百四十就以二歸四除以代三次除也已上皆言筭法變通之理乎開平方法者謂如平地四百皆然也如長十步濶十步自乗得積一百步開者以積求方面之數也此法別是一種有實而無法則商約而除之所以最難之法也今新增歸除開方而法之便矣開立方法者立者立起之方也如長十尺濶十尺自乗得一百尺再以高十尺乗之得積一千尺開者以積求立方每靣之数也有實而無法則商約而除之所
  hash: sha256:e3ca503cf64d7d40b9bde0cfe2d8cc86ba07931d7dd9d6ceb800b9da97f210d7
