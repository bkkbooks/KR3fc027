body:
  text: 爲勾股較自乘得四十六尺二寸四分二位相減餘五十三尺七寸六分加入斜自乘得一百尺共一百五十三尺七寸六分爲實以開平方法除之得勾股相和一丈二尺四寸加入差六尺八寸共得一丈九尺二寸折半得高九尺六寸內減差六尺八寸餘得廣二尺八寸合問此二條卽勾股相差股别勾弦歌附勾别股弦卽勾弦和股弦和股別勾弦股自乘勾弦自乘減股零折半晉爲勾實積勾弦爲法最公平法除勾積爲勾數勾別股弦依此行今有竹高一丈爲風所折僕地稍尖去根二尺問折處高若干荅曰高四尺五寸五分
