body:
  text: 畆法二四除之合問此是勾弦和歌三十八萬四千步正長端的無差誤六絲二忽五微濶不知其該多少畆荅曰一畆法曰置長三十八萬四千步爲實以濶六絲二忽五微爲法乘之得一百四十步以畆法二四除之合問此是直田長濶問積歌一段環田徑不知二周相併最幽微皆知一畆無零積一百六十不差池
