body:
  text: 七人爲法五兩爲實七十一法實相呼將五兩添二变作每人七錢七人共除四兩九錢餘一錢歸日七十一一錢又用前七一下加三歸法筭七人爲法六両爲實八十四法實相呼將六兩添二变作每人八錢七人共除五両六錢餘四錢歸日八十四四錢又用前七四五十五歸法筭逢七進一十法七人實七兩歸日逢七進一於前位每人各得一兩七人共得七兩以合原数八歸八人爲法一兩爲實下加二法實相呼一兩不動变作每人一錢八人共除八錢餘二錢歸日下加二二錢又用後八二下加四歸法筭八人爲法二兩爲實下加四法實相呼二兩不動变作每人二錢八人共得一兩六錢餘四錢歸日下位加四四錢又用後八四添作五歸法筭八人爲法三兩爲實下加六法實相呼三兩不動变作每人三錢八大共除二兩四錢餘六
