body:
  text: 不足適足列位八十両七十二両互不足十六石適足先以七十二互乘一十六石得一千一百五十二却以之一之三相乘得三除之得三百八十四石爲麻實却以八十両減去七十二両餘八両爲法除之得總蔴四十八石另以不足一十六石爲銀該蔴之實仍以前法八除之得毎銀一両該蔴二石合問此取錢買物数條是帶分母之法新編直指筭法綂宗卷之十
