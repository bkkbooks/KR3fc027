body:
  text: 五分得二両二錢五分爲法除之得棉布二十八疋合問假如原有麥三斗五升磨麵二十五斤今欲用麵一百七十五斤問該麥若干荅曰二石四斗五升法日置原麥乘今用麵爲實以磨麵二十五斤爲法除之合問假如今有綾一百六十一疋每七疋價銀五両問共該銀若干荅曰一百一十五両法日置總綾以五両因之爲實以七疋爲法歸之合問
