body:
  text: 今有布四百二十五疋每疋價銀二錢五分問該銀若干荅曰一百零六兩二錢五分法曰置四百二十五疋爲實以疋二價二錢五分爲法乘之合問今有絹一端長五丈每尺價鈔二百四十文問鈔若干荅曰一十二貫法曰置絹五十尺爲實以每尺價二百四十文爲法乖之合問今有羅二丈四尺共價一錢八分今羅一疋長四丈問該銀若干荅曰三錢法曰置原銀一錢八分以乘今羅四丈得七十二爲實以原羅二丈
