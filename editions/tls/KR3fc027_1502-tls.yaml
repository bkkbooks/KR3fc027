body:
  text: 從末行起依次相乘逆上至实首止得数從下右邉小数起亦是逆陞向前自下而上合問法疋價五錢六分五厘三五一十五三六一十八三五一十五二五得一十共銀一十二両九錢二六一十二二五得一十今有絹四百三十五疋每疋價鈔五千六百七十八文問該鈔若干荅曰二百四十六萬九千九百三十文法曰先画格眼將絹数爲實於上橫冩以每疋鈔数於
