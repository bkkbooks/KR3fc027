body:
  text: 價合問今有絹三疋添價六錢買布十疋又布五疋添價一錢買絹二疋問絹布價各若干荅曰絹疋價八錢布疋價三錢法曰如前正負術之此問可作盈不足筭右絹三正爲法布十疋負價六錢正左絹二負布五疋得正十五價一錢正得三錢先以右行絹正三爲法遍乘左行布正五得正一十五價正一錢得正三錢卻以左行絹負二爲法遍乘右行布負十疋得正二十疋減左行布正十五餘五爲法價正六錢得一両二錢加左行三錢共
