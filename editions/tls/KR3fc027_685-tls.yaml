body:
  text: 除之得麥一百八十石却以上米麥五百石内减麥数餘三百二十石爲米数各以原價乘之合問今有銀五十五両五錢共買網鍚鐡八萬三千零五十両只云銀價相做每銀一錢買銅一百三十両每銀一錢買鍚一百五十両每銀一錢買鐡一百七十両問三色各若干此爲三色差分荅曰銅二萬四千七百両價銀十九両鍚二萬七千七百五十両價銀一十八両五錢鐡三萬零六百両價銀一十八両法日置總銀以三歸之得一十八両五錢約鍚爲中以每錢買
