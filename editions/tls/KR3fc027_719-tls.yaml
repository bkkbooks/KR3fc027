body:
  text: 實若干餘實若干乃以二乘方法卽倍法也得若干爲廉法續商置第二位于上商之次得若干下法亦置續商若干爲隅法于倍方之次共若干皆與續商相呼除實盡得平方一靣数如不盡仍前再商之隅法者乃曲尺様二亷之角爲隅則小方也或数不及以法命之何謂之命若餘實若干不盡却以所商得平方数若干倍之再添一箇共得若干便商得靣方多一数也因此不及而爲之命平圓不盡数亦倣此其立方立圓不同若要還原如方田以面方自乘見積若還原過面方下原有不盡数者以面方自乘併入不盡数見積
