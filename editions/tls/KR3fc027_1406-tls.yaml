body:
  text: 次商五下法亦置五自乘得二十五爲隅法又次商五乘廉三十三得一百六十五併方三百六十二廉一百六十五隅二十五三法共五百五十二皆與上商五相呼除實盡得底脚一十五个合問難題商功五歌穿渠二十九里程再加一百四歩零上廣一丈二尺六下廣八尺丈八深每日一夫三百尺問該夫数雇工興荅曰三萬二千五百八十人不尽二百八十八尺法日置二十九里以每里三百六十歩乘之得一萬令四百四十歩加零百一
