body:
  text: 歸實二十起三二六十二变二作六右位加二歸得八月月二九除一十八十除实十起見一無除作九除得九假如今有趙錢孫李四人同商前後付出本銀趙一于癸亥年正月初九日付出本銀三十両錢二于乙丑年四月十五日付出本銀五十両孫三于丙寅年八月十八日付出本銀七十両李四于丁卯年十月二十七日付出本銀九十両四其本銀二百四十両至戊辰年終共得利銀一百二十両問各該利銀若干荅曰趙一該利三十三両八錢一分五厘五毫
