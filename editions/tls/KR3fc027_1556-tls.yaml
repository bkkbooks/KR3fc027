body:
  text: 歌奇行八子順流來遇偶之行逆上排八八尽將排列畢把來横取更休猜一行带八兼求五二三须尋七六陪却以四行居隊角均平八陣類奇才一八五三二七六四各行皆居坎位八陣圖一二三四五六七八法曰以一三五七之行爲奇以十六十五十四十三十二十一十九二四六八之行爲偶却以六十四子十七十八十九二十卄一卄二卄三卄四依上順逆排畢然後橫取上昼層排于坎陣先以第一卅二卅一三十卄九卄八卄七卄六卄五行一居北次以八行六四居東北又以五行三十三卅三卅四卅五卅六卅七卅八卅九四十居東又以三行十七居東南又以二行十六居南又四八四七四六四五四四四三四二四一以七行四九居西南又以六行四八居西又以四行四九五十五一五二五三五四五五五六三二居北第二會俱依此法而排則八陣均平各六四六三六二六一六十五九五八五七積二百六十以小輔大而無強弱不斉之数也
