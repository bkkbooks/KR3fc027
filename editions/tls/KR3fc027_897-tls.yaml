body:
  text: 邉勾濶若干荅曰截北勾濶七歩直截勾股法日直截積三十一歩五分倍置得六十三歩以西股長九歩爲法除之得截北勾濶七歩合問今有直田積一千九百二十歩只云長六十歩問濶若干荅曰濶三十二歩法日置積一千九百二十歩爲實以長六十歩爲法除之得濶若是只云濶三十二歩問長若干就以濶爲法除之得長今有圭田積二百二十五歩只云長三十歩問濶若干荅曰濶一十五歩
