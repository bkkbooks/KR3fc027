body:
  text: 難題粟布二啞子買肉歌啞子來買肉難言錢教日一斤少四十九両多十六試問能筭者合與多少肉荅曰一十一両沒両該錢八文法曰置少四十加多十六共五十六爲實以多十六減両九餘両七爲法除之得八文卻以両九因之得七十二加多十六共得原錢八十八文以八歸之得肉一十一両合問解曰若買一斤少錢四十文若買九両多錢十六文老人問甲歌
