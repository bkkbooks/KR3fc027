body:
  text: 荅曰八寸九分三厘有奇雞盡法曰置銀一萬両爲實以銀率每寸一十四両爲法除之得七百一十四寸二分八厘又爲實以開立方法除之初商八寸于左亦置八寸于又爲下法自乘得六十四寸再乘得五百一十二寸除實訖餘實二百令二寸二分八厘却以三乘下法八寸得二十四寸爲方法次商九分于初商八寸之亦置九分于右初商八寸之次共八寸九分就以九分遍乘得八寸令一爲廉法再以方法二十四寸乘廉法得一百九十二寸二分四厘除實訖餘實十寸令令四厘却以次商九分自乘再乘得七寸二分九厘除實訖餘實不盡二分七厘五毫
