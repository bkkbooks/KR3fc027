body:
  text: 又考如前圓田内除方田一坵方四十歩占積一千六百歩四邉四弧矢占積七百六十八歩共合圓田積却多一十六歩其多者何也是弦自乗得一千六百歩每百歩中多一歩該十六歩也或每弧矢内減去四歩只該一百八十八歩又考弧矢田居直田四分之三假如弧矢田弦長四十歩矢濶八歩問圓中徑若干荅曰今改正得徑五十六歩又設此間以辨前大小二弧矢虛实之数法曰置弦長折半得二十歩自乘得四百歩以矢八歩除之得五十歩加矢八歩共得五十八歩却比前圓徑多二十歩今減去是也今改其数乃是細半箇圓田因弦長而矢短故虛数差不准
