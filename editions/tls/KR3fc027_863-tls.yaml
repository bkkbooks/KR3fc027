body:
  text: 亦置六十自乘得三千六百再乘得二十一萬六千爲隅法與上商六十相呼除實一千二百九十六萬餘實七百一十九萬一千一百二十一尺乃以四乘隅法二十一萬六千得八十六萬四千爲方法另置上商六十自乘得三千六百又以六固之得二萬一千六百尺爲上廉又置上商六十以四乘得二百四十尺爲下廉次商七尺于左六十之次下法亦置七尺自乘得四十九尺再以七因得三百四十三尺爲隅法又以次商七尺乘上廉二萬一千六百得一十五萬一千二百又以七因下廉二百四十二次一次因得一千六百八十尺二次亦以七因得一萬一千七百六十尺以方法八十六萬四千上廉一十五萬一千二百下廉一萬一千七百六十隅法三百四十三併四法共一百零二萬七千三百零三尺皆與次商七尺相
  hash: sha256:ce10cddcba0732362275fa8ca5f7de4820a09b977f34328efc9551c384d0f7ab
