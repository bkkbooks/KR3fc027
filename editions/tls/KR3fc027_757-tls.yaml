body:
  text: 上商二相呼除實盡得濶一十二歩加不及九歩得長合問今有勾股田積四百八十六歩只云勾少弦一十八問各若干荅曰勾濶二十七歩股長三十六歩弦斜四十五歩法日倍積得九百七十二歩爲實以弦差一十八歩折半得九歩爲縱方開平方法除之得勾二十七歩加差一十八歩爲弦斜四十五歩另以勾自乘弦自乘二数相减餘一千二百九十六歩爲實以開平方法除之得股長三十六歩合問今有勾股田積四百八十六歩只云股少弦九歩問各若干
