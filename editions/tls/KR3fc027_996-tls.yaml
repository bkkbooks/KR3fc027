body:
  text: 法日置總一千一百七十里爲實以六日爲法除之得快者日行一百九十五里另將先行七日併後趕六日共一十三日爲法除總一千一百七十里得慢行里数合同今有甲乙二人行步不等甲日行八十里乙日行四十八里令乙先行二百四十里甲纔發步追之問幾里可及荅曰六百里甲乙日半乙十二日半法日置先行二百四十里以甲日行八十里乘之得一万九千二百里爲實却以甲乙日行里数相減餘三十二里爲法除之合問今有人盗馬乗去巳去三十七里馬主方覺追去一百四十五里不及二十三里仍復追之問幾里可及
  hash: sha256:9b472d4d6ead13e8d1ae6604060ca19d4e124c428c216ea7768a5292ea3c70d2
