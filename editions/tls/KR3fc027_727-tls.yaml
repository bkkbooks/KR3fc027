body:
  text: 右廉法二十歩之次名曰隅法共得二十八歩與左位次商八歩相呼二八除實一百六十歩又左八對右八相呼八八除實六十四歩恰盡得方面一十八歩若還原自乘是也右法以明方廉隅之名也假如今有圍棊盤共子三百六十一箇問毎面子若干荅曰每面一十九箇法日置棊子爲實約初商一十歩于實左下法亦置一十歩于實右左右相呼一一除實一百箇餘實二百六十一箇就以下法一十倍之得二十次商九箇于左初商一十之次亦置九箇于右倍方二十之次共得二十九皆與左次商九相呼二九除實一百八十箇又左九對右九相呼九九除實八十一箇
  hash: sha256:5bc61089eeb4126a6912f3ec349dc82b58d1c3d26161db4498451c6a251d4001
