body:
  text: 百分者以約去其繁而就其簡也或有不可約者法日数多爲母数少爲子子母之数両列互相减損至同就以此数爲法各以法除子母原数却無畸零所謂齊不齊而致其齊也如人分銀以至数之不能盡者亦有物之不可分者不能呼数必以法而約之歌曰数有參差不可齊須憑約法命分之法爲分母實爲子不與差分一例推又歌約分須分子母名更相减損至同成
