body:
  text: 倍加上本數也併二數擔令截割斷也分擺開也原初數也差多少不同數也通會同其數變改撫其數約量度中筭盤之中進移上前一位逢遇有數而言逢上脊深之上又位之左下脊梁之下又位之右挨隨身变數也退移下後一位勾濶也股長也斜両隅相去又不正也弦勾股斜日弦弧矢亦有弦隅曲角也長直也周外圍也較相減餘也廉方直也方四面同數徑周中之弦脊盤中橫梁隔木列位各置位次折半減去一半還原復舊數也商除心與意商量而除之相乗長濶或銀債等自乗法實數同相乗再乗自乗之而又乗遍乗先以一法遍乗諸數商總合用商開之法于盤中開方卽自乗還原也開立卽自乗再乗之還原
