body:
  text: 法曰置棗七十八斤不動將二両化爲一二五併得七十八斤一二五爲實另以二斤不動將四両化作二五併得二斤二五爲法乘之得一百七十五斤七八一二五却將斤下零七八一二五用加六之法加之得一十二両五錢合問今有生漆三百七十七斤毎斤晒得熟漆四両問諛熟漆若干荅曰九十四斤四両法曰置生漆爲實以晒熟漆四両化作二五爲法乘之得九十四五二五却將二五用加六法得四両合問原買大絲一斤用價七錢六分五厘今又買六両問諛價
  hash: sha256:7c03ebed5ed2826919de83cd3a9862da25448860ab66b48022d47283f3f07d86
