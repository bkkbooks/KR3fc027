body:
  text: 外八螾之遠皆可數計而淂非夫推本隸首之宗旨以逖遡易範餘諸祖顧唐二公畧意而成一代算學之宗者手異日者天子坐明堂考正律暦绖理方輿慱延天下绖緯通明之士大位氏持是編以徃當必首應詔令若漢唐都洛下閎諸人以布衣起家以闡明數法于天下距但為成學習九九
