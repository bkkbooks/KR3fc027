body:
  text: 作八十八根相乘得一千二百三十二根爲實另以長六丈以一丈五尺除之得四根爲法乘之得四千九百二十八根又以深二丈一尺用三歸得七尺加之合問若量方圓束木法見前六卷少廣中右捆法雖設則獘客獘未免但一封書併荒排法無異其方捆所如或濶深長不一法難必新編直指筭法綂宗卷之八
