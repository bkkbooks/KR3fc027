body:
  text: 九尺次以西高倍之加東高共五十一尺却以西頭上下廣併之共四十二尺乘之得二千一百四十二折半得一千令七十一二數相併共一千五百尺再以長九十六尺乘之得一十四万四千尺爲實以五歸之得積合問今有甲乙二人開渠甲日開積四百尺乙日開積三百五十尺先甲開七十日後令乙開問幾日與甲同荅曰八十日法日置甲開七十日以毎日四百尺乘得二万八千尺爲實却以乙日開三百五十尺爲法除之得八十日纔與甲同数今有人快行者日行九十五里慢行者日行七十五里今
