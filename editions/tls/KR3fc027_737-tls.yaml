body:
  text: 九塊因此不及而爲之命餘倣此今有方田積七萬一千八百二十四歩問平方一面若干荅曰每一面方二百六十八歩法日置方田積爲實以開平方法除之初商二百于左位亦置二百于右位爲方法以左二對右二相呼二二除實四萬訖餘實三萬一千八百二十四歩就以方法二百倍作四百爲廉法次商六十于左初商二百之下亦置六十于廉法四百之下爲隅法四百六十皆與次商六十呼除先以左六對右四呼四六除積二萬四千又左六對右六呼六六除積三千六百餘實四千二百二十四歩却以右位次商六十倍加六十于四百之下共
  hash: sha256:2b2a5506c9e28873995d7f961be9cf32e26ad63ba84b71963d5235cd6bf5a462
