body:
  text: 新安賔渠程大位汝思甫編集曾孫素亭光紳佩章甫較正總齊鈁洪聲甫叅閲難題盈朒七歌隔得容分不知人不知銀七両分之四両九両分之少半斤荅曰六人銀四十六両法日置盈不足以分七両互乘少八両得五十六両另以分九両互乘多四両得三十六両併之得九十二両爲實又以九両七両相减餘四両爲法除實得銀四十六両以多四両少八両併得一十二両爲
