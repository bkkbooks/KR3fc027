body:
  text: 黃鍾属陽空圍九分律長九寸以九分因之得積八百一十分其候冬至陽律生陰之法却以九寸二因之得一十八寸三歸之得六寸隔八下生林鍾林鍾属陰空圍九分律長六寸以九分因之得積五百四十分其候大暑陰律生陽之法却以六寸四因之得二十四寸三歸之得長八寸隔八下生大簇大簇屬陽空圍九分律長八寸以九分因之得積七百二十分其候雨水陽律生陰之法却以八寸二因之得一十六寸三歸之得五寸三分之一隔八下生宮以上三律皆得全寸自此以下九律不尽之寸俱用通之
