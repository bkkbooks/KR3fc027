body:
  text: 新安賔渠程大位汝思甫編集會孫素亭光紳佩章甫較正蘊齊鈁洪聲甫叅閱方田章第一此章以田疇界域之形狀求畆歩之積實以廣緃而求方直圭梭梯斜等形以周徑而求圓田碗田環田按田之形狀甚多具載難書學者不必執泥在於臨塲譏變必須截盈補虛俾尖減大以合䂓式但田中尖先取出方直勾股圭梭等形另積旁餘併而于一然後用法乘除之用少廣章開平等法還原始爲精審之術焉
