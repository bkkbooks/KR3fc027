body:
  text: 法曰以一三五七九為陽位二四六八十為陰位三位者三五七併得十五四位者二四六八併得二十五位者一三五七九併得二十五照位併而為法除實得首尾二人共數于內減甲多或丙少數餘數折半得首尾數加甲多或丙少數為首數三位者互和首尾甲丙二人所得數折半得中乙數合問四位者照前得首尾甲丁二人數中有乙丙二人不可折半得數却置甲多或丁少數依例用三歸之合問
