body:
  text: 法曰以一三五七九爲陽位二四六八十爲陰位三位者三五七併得十五四位者二四六八併得二十五位者一三五七九併得二十五照位併而爲法除實得首尾二人共数于内减甲多或丙少数餘数折半得首尾数加甲多或丙少数爲首数三位者互和首尾甲丙二人所得数折半得中乙数合問四位者照前得首尾甲丁二人数中有乙丙二人不可折半得数却置甲多或丁少数依例用三歸之合問
