body:
  text: 築方錐丈尺今改作方臺歌今上方與原高乘便為實積數分明原下方數宜為法法除實積截高成原築方錐下方二十四尺高三十二尺今改作方臺只用上方六尺問截去高若干答曰截去高八尺法日置原高三十二尺以今只用上方六尺乘之得一百九十二尺為實以下方二十四尺為法除之得截去高八尺合問原有方錐下方二十四尺高三十二尺今改作方臺已築高二十四尺問今上方若干
