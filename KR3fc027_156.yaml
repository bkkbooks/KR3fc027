body:
  text: 二錢歸日八十二二錢又用六二三十二歸法算逢六進一十法六人實六兩歸日逢六進一於前位每人各得一兩六人共得六兩以合原數七歸七人為法一兩為實下加三法實梠呼一兩不動變作每人一錢七人共除七錢餘三錢歸日下加三三錢又用後七三四十二歸法算七人為法二兩為實下加六法實相呼二兩不動變作每人二錢七人共除一兩四錢餘六錢歸日下位加六六錢又用後七六八十四歸法算七人為法三兩為實四十二法實相呼將三兩添一變作每人四錢七人共除二兩八錢餘二錢歸日四十二二錢又用前七二下加六歸法算七人為法四兩為實五十五法實相呼將四兩添一變作每人五錢七人共除三兩五錢餘五錢歸日五十五五錢又用後七五七十一歸法算
