body:
  text: 之以四去之算家若不精微豈可合得數乎異乘同除者謂先應除法而後用乘法者其除法多有畸零不盡之數則何由而用乘法乎故變法而先用乘法然後用歸除雖有畸零數之不盡者而可命之故日異乘同除至于精與其變通之大術矣異乘同乘者謂如用四乘之又用五乘之再以七乘之者就變法以四乘五得二十再以七乘之得一百四十就以一百四十為法乘之以代三次相乘而數之不差矣異除同除者謂用四歸之又用五歸之再用十二歸除
