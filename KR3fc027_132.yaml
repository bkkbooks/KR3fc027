body:
  text: 之以四去之筭家若不精微豈可合得數乎異乗同除者謂先應除法而後用乗法者其除法多有畸零不盡之数則何由而用乗法乎故變法而先用乗法然後用歸除雖有畸零數之不盡者而可命之故日異乗同除至于精與其變通之大術矣異乗同乗者謂如用四乗之又用五乗之再以七乗之者就變法以四乗五得二十再以七乗之得一百四十就以一百四十爲法乗之以代三次相乗而數之不差矣異除同除者謂用四歸之又用五歸之再用十二歸除
