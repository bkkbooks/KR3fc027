body:
  text: 買率減餘爲法則除來錢物自分明今有銀不知其數欲買田取銀三分之二買之盈三両取銀五分之三買之不足一両問總銀田價各若干荅曰總銀六十両男價銀三十七両法曰先以之二互乘五分得一十以通不足一両得十両次以之三互乘三分得九以通盈三両得二十七両如盈朒法列位九十互多二十七両少一十両先以十互乘多二十七両得二百七十両又以九互乘少十両得九十両併二位得三百六十両却以分子之二之三相乘得六十両爲銀實却以通十減九餘一爲法除之得總銀六十両次以多二十七両併之得三十七両爲田價
  hash: sha256:37225a630f75b1fb4eeb92740850ccb44629293d43f6c7821eb0128b86984b46
