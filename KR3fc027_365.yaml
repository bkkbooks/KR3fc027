body:
  text: 答曰銅四兩八錢法曰置紋銀為實以八八色為法除之得色銀四十兩丙減原銀餘四兩八錢假如有銅七錢五分今奠作八八色銀問用紋銀若干答曰紋銀五兩五錢法曰置銅為實以每兩用銅一錢二分為法除之得八八色銀六兩二錢五分於丙減去原銅七錢五分餘得紋銀合問新編直指算法統宗卷之二
