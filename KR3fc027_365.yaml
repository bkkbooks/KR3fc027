body:
  text: 荅曰銅四両八錢法曰置紋銀爲實以八八色爲法除之得色銀四十両丙減原銀餘四両八錢假如有銅七錢五分今奠作八八色銀問用紋銀若干荅曰紋銀五両五錢法曰置銅爲實以每両用銅一錢二分爲法除之得八八色銀六両二錢五分於丙減去原銅七錢五分餘得紋銀合問新編直指筭法統宗卷之二
