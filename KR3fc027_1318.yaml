body:
  text: 右中六餘二十七爲法又以右上三乗左下二十三両七錢得七十一両一錢减去右下五十二両二錢餘一十八両九錢爲實以法二十七除之得七錢爲一差之数另置甲乙共鈔二十三両七錢加入差七錢共二十四両四錢折半得一十二両二錢爲甲所得数除差七錢餘一十一両五錢是乙鈔各减七錢得各数竹筒容米歌家有九節竹一莖爲因盛米不均平不頭三節三升九上稍四節貯三升惟有中間二節竹要將米数次第盛若是先生能筭法教君只筭到天明
  hash: sha256:1b6e2621d009c3e9a7300bd4dac507ec6aeedfbcc235f6aacb3dc9ea754cef3c
