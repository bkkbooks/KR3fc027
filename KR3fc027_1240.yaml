body:
  text: 不盡著乃前後表両界之中名表問積所以古人以表高減人目四餘六尺乘爲實以前圖小餘股五尺減後圖大餘股八尺餘三尺爲法除實得弦外之高卽木上節三十尺加表高十尺得木高四十尺本是大小容積相減餘爲實以大小餘股相減餘爲法除實得弦外之高加表高十尺爲木高也
