body:
  text: 法曰置每兩價一分八釐五毫乘之即得一法置每兩價一分八釐五毫以加六法加之五六加三十六八加四十八一六加六亦得今有靛花一十八斤每兩價錢一十二文問該錢若干答曰三千四百五十六文法曰此是斤問兩價置靛花一十八斤用加六法得二百八十八兩為實以價錢一十二文為法乘之合問今有黃蠟五百三十五斤七兩每兩價八釐九毫問諛銀若干答曰七十六兩二錢四分六釐三毫
