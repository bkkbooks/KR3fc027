body:
  text: 荅曰綾毎尺價八分絹毎尺價六分法曰列所問数先以右行綾三爲法遍乘左中下得数右綾三尺爲法先乘左絹四尺得二十八價四錢八分得三両三錢六分左綾七尺爲法先乘右絹二尺乘得六價六錢八分乘得二両令四分却以左行綾七爲法復遍乘右行中絹四得二十八減左行中得絹六餘二十二爲法又以左綾七乘右價四錢八分得三両三錢六分減左行乘得價二両令四分餘一両三錢二分爲實以法二十二除之得絹毎尺價六分就以右行絹四尺乘之共得絹價二錢四分以減右行價四錢八分餘二錢四分以綾三尺爲法除之得綾毎尺價八分合問
