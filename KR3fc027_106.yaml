body:
  text: 斤十六両両二十四銖銖十絫絫十黍絫紫同黍禾方得而有准秤原十五斤今二十斤或三十斤釣二秤石四鈞引二百斤今両之下惟用錢分厘毫絲忽也畆所以分別田地濶狹遠近之法也畆橫一步直二百四十步卽濶一丈長六十丈也若以自方五尺計之積六千尺也步方五尺也分五寸釐半寸毫絲忽里三百六十步計一百八十丈約人行一千步頃今以百畆爲頃頃畆者乃積稅之總也廿四步爲一分十分爲畆畆之以下日厘毫絲忽角一畆分爲四角每角六十步也諸物輕重數謂長濶高每方各一寸也
