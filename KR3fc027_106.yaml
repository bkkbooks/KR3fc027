body:
  text: 斤十六兩兩二十四銖銖十絫絫十黍絫紫同黍禾方得而有准稱原十五斤今二十斤或三十斤釣二稱石四鈞引二百斤今兩之下惟用錢分厘毫絲忽也畝所以分別田地濶狹遠近之法也畝橫一步直二百四十步即濶一丈長六十丈也若以自方五尺計之積六千尺也步方五尺也分五寸釐半寸毫絲忽里三百六十步計一百八十丈約人行一千步頃今以百畝為頃頃畝者乃積稅之總也草四步為一分十分為畝畝之以下日厘毫絲忽角一畝分為四角每角六十步也諸物輕重數謂長濶高每方各一寸也
