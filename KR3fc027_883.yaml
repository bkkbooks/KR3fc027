body:
  text: 四千三百二十九尺以深一十三尺除之得三百三十三尺內减上方自乘得八十一尺餘二百五十二尺為實以上方九尺為縱方開平方法除之得下方一十二尺合問或云下方一十二尺深一十三尺問上方若干答曰上方九尺法日仍以前實四千三百二十九尺以深除之得三百三十三尺內减下方自乘一百四十四尺餘一百八十九尺為實以下方十二為縱方以開平方法除之得上方九尺合問今有米七十七石二斗欲造圎窖盛之只云上周一十四尺深九尺問下周若干
