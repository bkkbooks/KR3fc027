body:
  text: 後樂氏不用共高假如平地尖堆只以下周十而取一為高共倚壁堆乃尖堆之半以五除下周為高共內角堆乃尖堆四分之一以二五除下周為高共外角堆乃尖堆四分之三以七五除下周為商一法圓倉等五條併率數斛法總算假如原法圓倉以周自乘又以高乘再用圓率十二除之為實又以斛法二尺五除之得積今併圓率斛法總作三十除之即得解曰以圓率十二卻用斛法二尺五寸乘得三十數也餘傲此
