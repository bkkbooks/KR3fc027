body:
  text: 法日依方窖法以上方六尺自乘得三十六尺下方八尺自乘得六十四尺又以上方乘下方得四十八尺併三數共一百四十八尺以高一十二尺乘之得一千七百七十六尺以三歸之合問一法依築臺歌倍上方加下方共二十尺以上方乘之得一百二十尺另倍下方加上方共二十二尺以下方乘之得一百七十六尺併二數共二百九十六尺以高一十二尺乘之得三千五百五十二尺以六歸之亦得今有圓臺上周一十八尺下周二十四尺高一十二尺問積若干答曰四百四十四尺
  hash: sha256:7dcd920e50d9393e64275ea2083444e353fed8b4c47d641008c9f940761056d0
