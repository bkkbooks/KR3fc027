body:
  text: 得二十四石併二數共四十九石以减總米餘二百一十六石為實併三等戶數共一百八十為法除實得一石二斗是下等一戶所出數加五斗得一石七斗是中等一戶所出數又加七斗得二石四斗是上等一戶所出數各以戶數乘之合問帶分母子差分今有馬軍七人給褲布四十八尺步軍六人給襖布九十二尺今共給布一十二萬五千八百二十尺問各若干答曰馬軍各五千六百七十人襖布八萬六千九百四十尺褲布三萬八千八百八十尺
