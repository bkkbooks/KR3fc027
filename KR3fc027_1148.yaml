body:
  text: 右牛正二爲法羊正五猪負十三正五両中牛正一羊負三得負六猪正一得正二空適足左牛負五羊正六得正十二猪正八得五十六負三両得六両却以中行牛正一爲法復遍乘右行羊正五得正五異加中行羊負六共得羊負十一猪負十三得負十三異加中行猪正二共得猪正十五價正五両得正五両因中行價空無減得正五両再以左行牛負五爲法復遍乘右行羊正五得羊正二十五同名加左羊正十二共得三十七猪負十三得猪負六十五異減左行猪正十六餘得猪負四十九價正五両得正二十五両異減左行負六両餘得負一十九両再以中行羊負十一爲法遍乘左行羊
