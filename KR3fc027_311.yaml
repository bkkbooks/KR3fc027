body:
  text: 就把其同爲法則除來各数自無零假如今有物九十八除了四十二間約得若干荅曰七分之三法日数多爲母数少爲子置母九十八内减去二箇四十二餘一十四另置子四十二减去二箇一十四亦餘一十四爲之子母相同就以十四爲法除母九十八是七箇一十四另以法除子四十二是三箇一十四故日七分中除三餘倣此假如今有二十一分之一十四問約得若干荅曰三分之二法日置母二十一减去子一十四餘七另置子一十四减去七
