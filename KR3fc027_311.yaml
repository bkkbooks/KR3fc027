body:
  text: 就把其同為法則除來各數自無零假如今有物九十八除了四十二間約得若干答曰七分之三法日數多為母數少為子置母九十八內減去二箇四十二餘一十四另置子四十二減去二箇一十四亦餘一十四為之子母相同就以十四為法除母九十八是七箇一十四另以法除子四十二是三箇一十四故日七分中除三餘倣此假如今有二十一分之一十四問約得若干答曰三分之二法日置母二十一減去子一十四餘七另置子一十四減去七
